body:
  text: 馮少墟集别集類五明提要臣等謹案馮少墟集二十二卷明馮從吾撰從吾有元儒考略己著録其文集初刻止于萬厯壬子此本乃其次子嘉年益以癸丑以後至天啓辛酉作類序重刻自卷一至卷十二皆語録卷十三至卷十八皆詩文卷十九至卷二十為族譜家乘卷二十一至卷二十二為關學編蓋生平著作彚于此集其中講學之作主於明理論事之作主于達意不復以辭采為工然有物之言篤實切明雖字句間涉俚俗固不以弇陋譏也惟其與朱童䝉爭論首善書院講學一疏稱宋之不兢以禁講學故非以講學故也先臣守仁當兵事倥偬不廢講學卒成大功此臣之所以不恤毁譽而為此也又郭元厚郭興治等劾鄒元標從吾又上疏力爭稱京師講學昔已有之云云其說頗為固執夫士大夫自甲科通籍於聖賢大義不患不知顧實踐何如耳不在乎聚而講也維古極盛之治有臯䕫稷契亦越小康之世有房杜王魏韓范富歐陽亦何嘗招百司執事環坐而談心性哉無故而舍其職司呼朋引類使其中為君子者授人以攻擊之間為小人者借此為攀附之途黨禍之興未必非賢者開門而揖盜也至於謂宋之不競由禁講學尤為牽合考宋之黨禁始于寧宗慶元二年八月弛于嘉泰二年二月中間不過六七年耳至於寶慶以後周程張邵並從祀孔子廟庭紫陽東萊之流並邀褒贈理宗得諡為理實由於是蓋道學大盛者四五十年而宋乃亡焉史傳具存可以覆按安得以德祐之禍歸咎於慶元之禁乎從吾初為御史拒絶閹人劾罷胡汝寧禁大計苞苴又上疏諫神宗不親政事幾遘危禍後廷議三案亦持正不阿卓然不愧為名臣惟此兩疏意雖善而未計其流弊故附糾其失俾來者無惑焉乾隆四十七年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
