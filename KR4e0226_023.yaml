body:
  text: 少墟集巻十九明馮從吾撰闗學編一宋横渠張先生先生名載字子厚郿人為人志氣不羣少孤自立無所不學喜談兵至欲結客取洮西之地年十八以書謁范文正公公一見知其逺器欲成就之乃謂之曰儒者自有名教可樂何事于兵因勸讀中庸先生讀其書遂翻然志于道已猶以為未足又訪諸釋老累年盡究其説知無所得反而求之六經嘗坐虎皮講易京師聴從者甚衆一夕程伯淳正叔二先生至與論易二先生于先生為外兄弟之子卑行也而先生心服之次日語人曰比見二程深明易道吾所弗及汝輩可師之即撤坐輟講與二程論道學之要渙然自信曰吾道自足何事旁求於是盡棄異學淳如也文潞公以故相判長安聞先生名行之美以束帛聘延之學宫禮重之命士子矜式焉嘉祐二年舉進士為祁州司法參軍遷雲巖縣名在宜川縣西北今廢令政事以敦本善俗為先每月吉具酒食召父老高年者㑹于縣庭親勸酬之使人知養老事長之義因訪民疾苦及告所以訓戒子弟之意有所教告常患文檄之出不能盡達于民毎召鄉長于庭諄諄口諭使往告其里閭閻有民因事至庭或行遇于道必問某時命某告某事聞否聞即已否則罪其受命者故教命出雖僻壤婦人孺子畢與聞俗用翕然熈寧初遷著作佐郎僉書渭州軍事判官御史中丞吕晦叔公著薦先生于朝曰張載學有本原西方之學者皆宗之可以召對訪問上召見問治道對曰為治不法三代者終苟道也上説之曰卿宜日見二府議事朕且將大用卿先生謝曰臣自外官赴召未測朝廷新政所安願徐觀旬月繼有所獻上然之他日見執政王安石安石謂曰新政之更懼不能任事求助于子何如先生曰朝廷將大有為天下之士願與下風若與人為善則孰敢不盡如教玉人追琢則人亦故有不能執政黙然所語多不合寖不恱既命校書崇文辭未得請復命按獄浙東程伯淳時官御史裏行争曰張載以道徳進不宜使治獄安石曰淑問如臯陶猶且讞囚此庸何傷命竟下實疏之也獄成還朝㑹弟御史天祺及伯淳並以言得罪乃移疾西歸屏居横渠横渠至僻陋僅田數百畆供嵗計人不堪其憂先生約而能足處之裕如終日危坐一室左右簡編俯而讀仰而思有妙契雖中夜必取燭疾書嘗謂門人曰吾學既得諸心則修其辭命辭命無差然後㫁事㫁事無失吾乃沛然盖其志道精思未始須㬰息亦未嘗須㬰忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已以為知人而不知天求為賢人而不求為聖人此秦漢以來學者之大弊也故其學以易為宗以中庸為體以禮為的以孔孟為法窮柛化一天人立大本斥異學自孟子以來未之有也患近世喪祭無法喪僅隆三年期以下恬未有衰麻之變祀先之禮用流俗節序祭以䙝不嚴於是勉修古禮為薄俗倡朞功而下為製服輕重如儀實始行四時之薦曲盡誠潔教童子以灑掃應對給侍長者女子未嫁者必使觀于祭祀納酒漿以養遜弟而就成徳嘗曰事親奉祭豈可使人為之聞者始或疑笑終乃信而從之相傚復古者甚衆關中風俗為之大變熈寧九年秦鳯帥吕微仲大防薦之曰張載之學善發聖人之遺意其術畧可措之以復古宜還舊職訪以治體詔從之召同知太常禮院及至都公卿聞風争造然亦未有深知之者以所欲言嘗試於人多未之信㑹言者欲講行冠昏喪祭禮詔下禮官議禮官狃故常以古今異俗為說先生力争之不能得適三年郊禮官不致嚴力争之又不得先生知道之終不行也復謁告歸中道而疾病扺臨潼卒年五十八貧無以斂門人共買棺奉其喪還翰林學士許將言其恬于進取乞加贈䘏詔賜館職賻先生氣質剛毅望之儼然與之居久而日親勇于自克人未信惟反躬自艾即未喻安行之無悔也聞風者服義不敢以私干之居恒以天下為念聞皇子生喜見顔面行道見饑殍輒咨嗟對案不食者終日聞人善輒喜答問學者雖多不倦有不能者未嘗不開其端行㳺所至必訪人才有可語者必丁寧以誨之惟恐其成就之晩雖貧不能自給而門人無貲者輒麤糲與共嘗慨然有志三代之治論治人先務未始不以經界為急以為仁政必自經界始貧富不均教養無法雖欲言治皆苟而已方欲與學者買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救菑恤患敦本抑末足以推先王之遺法明當今之可行有志未就而卒始先生為學亦頗秘之不多以語人曰學者雖復多聞不務蓄徳祇益口耳無為也程伯淳聞之曰道之不明久矣人善其所習自謂至足必欲如孔門不憤不啓不悱不發則師資勢隔而先王之道或㡬乎熄矣趨今之時且當隨其資而誘之雖識有明暗志有淺深亦各有得而堯舜之道庶可馴至也先生用其言故關中學者躬行之多與洛人並歴數世不衰先生所著書曰正䝉嘗自言吾為此書譬之樹株根本枝葉莫不悉備充榮之者其在人功而已又如睟盤示兒百物具在顧取者何如耳書成掲書中乾稱篇首尾二章寘在左右曰訂頑曰砭愚已程正叔改曰西銘東銘其西銘曰乾稱父坤稱母予兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以㓜其㓜聖其合徳賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也于時保之子之翼也樂且不憂純乎孝者也違曰悖徳害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏為無忝存心養性為匪懈惡㫖酒崇伯子之顧養育英才穎封人之錫類不弛勞而㡳豫舜其功也無所逃而待烹申生其恭也體其受而歸全者參乎勇于從而順令者伯竒也富貴福澤將厚吾之生也貧賤憂戚庸玉汝于成也存吾順事沒吾寧也程正叔謂西銘明理一而分殊擴前聖所未發與孟子性善養氣之論同功又謂自孟子後未見此書先生學古力行篤志好禮為關中士人宗師世稱為横渠先生門人私諡曰誠明朱文公賛曰早恱孫吴晩逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居理宗淳祐初諡明公封郿伯從祀孔子廟庭國朝嘉靖九年改稱先儒張子天祺張先生先生名戩字天祺横渠先生季弟少而莊重老成長而好學不喜為雕蟲之辭以從科舉父兄敦迫喻以為貧乃強起就鄉貢既冠登進士第調陜州閿縣主簿移鳯翔普潤縣令改秘書省著作佐郎知陜州靈寶渠州流江懐安車金堂縣事轉太常博士熈寧二年為監察御史裏行明年以言事出知公安縣改陜州夏縣轉運使舉監鳯翔司竹監熈寧九年卒年四十有七先生歴治六七邑誠心愛人而有術以濟之力行不怠所至皆有顯效視民之不得其所若已致之極其智力必濟而後已嘗攝令華州蒲城蒲城劇邑民悍使氣不畏法令鬭訟㓂盜倍蓰它邑先是令長以峻法治之姦愈不勝先生悉寛條禁有訟至庭必以理敦喻使無犯法間召父老使之教督子弟服學省過作記善簿民有小善悉以籍之月吉以俸錢為酒食召邑之高年聚于縣廨以勞之使其子孫侍因勸以孝弟之道不數月邑人化之獄訟為衰為御史毎進對必以堯舜三代進于上前惻怛之愛無所遷避其大要啓君心進有徳謂反經正本當自朝廷始不先諸此而治其末未見其可也累章論王安石亂法乞罷條例司及追還常平使者劾曾公亮陳升之依違不能救正韓絳左右狥從與為死黨李定以邪謟竊臺諌吕恵卿刻薄便給假經術以文奸言豈宜勸講君側又詣中書省争之安石舉扇掩面而笑先生曰戩之狂直宜為公笑然天下之笑公不少矣章十數上卒不納乃嘆曰兹未可以已乎遂謝病待罪卒罷言職既出知公安未嘗以諌草示人不說人以無罪天下士大夫聞其風者始則聳然畏之終乃服其厚自公安改知夏縣縣素號多訟先生待以至誠反復教喻不逆不億不行小恵訟者往往叩頭自引未㡬靈寶之民遮使者車請曰今夏令張公乃吾昔日之賢令也願使君哀吾民乞張公還舊治使者欣然聴其辭而言于朝去之日遮道送不得行父老曰昔者人以吾邑之人無良喜訟自公來民訟㡬希是惟公知吾邑民之不喜訟也言已皆泣下徙監司竹監舉家不食笋其清慎如此先生篤實寛裕儼然正色雖喜愠不見于容然與人居温厚之意久而益親終日言未嘗不及于義接人無貴賤疎戚未嘗失色于一人樂道人之善而不及其惡樂進巳之徳而不事無益之言其清不以能病人其和不以物奪志常雞鳴而起勉勉矯強任道力行毎若不及徳大容物沛若有餘常自省小有過差必語人曰我知之矣公等察之後此不復為矣重然諾一言之欺以為己病少孤不得事親而奉其兄以弟就養無方極其恭愛推而及諸族姻故舊㒺不周恤有妹寡居子不克家先生力為經其家事有一二故人死不克𦵏十餘年先生惻然不安帥其知識合力聚財乃克襄事篤行不苟為一時師表横渠先生嘗語人曰吾弟徳性之美吾有所不如其不自假而勇于自屈在孔門之列宜與子夏後先晩而講學而達又曰吾弟全器也然語道而合乃自今始有弟如此道其無憂乎關中學者稱為二張云進伯吕先生先生名大忠字進伯其先汲郡人祖通太常博士父蕡比部郎中通𦵏藍田子孫遂為藍田人先生豋皇祐中進士為華隂尉晉城令未㡬提督永興路義勇改秘書丞僉書定國軍判官熈寧中王安石議遣使諸道立縁邊封溝進伯與范育被命俱辭行進伯陳五不可以為懐撫外國恩信不洽必致生患罷不遣令與劉忱使遼議代北地㑹遭父喪起復知代州遼使至代設次據主席先生與之争乃移次于長城北遼使竟屈己而復使求代北地神宗將從之先生曰彼遣一使來即與地五百里若使魏王英弼來求闗南則何如神宗曰卿是何言也劉忱曰大忠之言社稷大計願陛下熟思之執政知其不可奪議竟不決罷忱還三司先生亦終喪制其後竟以分水嶺為界焉元豐中為河北轉運判官徙提㸃淮西刑獄尋詔歸故官元祐初歴工部郎中陜西轉運副使知陜州以直龍圗閣知秦州進寶文閣待制紹聖二年加寶文閣直學士知渭州後汲公及黨禍乞以所進官為量移徙知同州旋降待制致仕卒詔復學士官佐其𦵏知秦州時馬涓以狀元為州僉判初呼狀元先生謂之曰狀元云者及第未除官之稱也既為判官則不可今科舉之學既無用修身為己之學不可不勉又時時告以臨政治民之道涓自謂得師後為䑓官有聲毎嘆曰吕公教我之恩也謝上蔡時教授州學先生每過之聴謝講論語必正襟斂容曰聖人之言行在焉吾不敢不肅先生為人質直不妄語動有法度從程正公學正公稱曰吕進伯可愛老而好學理㑹直是到㡳所著有輞川集五巻奏議十巻弟大防大鈞大臨兄弟四人皆為一時賢者世無不高之大防字微仲進士及第元祐初以左僕射同范純仁相垂簾聴政者八年能使元祐之治比隆嘉祐封汲郡公紹聖初貶舒州行至䖍州信豐薨紹興初贈太師宣國公諡正愍和叔吕先生先生名大鈞字和叔大忠弟嘉祐二年中進士乙科授秦州司理叅軍監延州折博務改光禄寺丞知三原移巴西又移知候官以薦知涇陽皆不赴丁外艱服除自以道未明學未優曰吾斯之未能信於是不復有禄仕意家居講道以教育人才變化風俗期徳成而致用久之以大臣薦為諸王宫教授當獻文作天下一家中國一人論上尋監鳯翔船務制改宣義郎㑹伐西夏鄜延轉運司檄為從事既出塞轉運使李稷餽餉不繼欲還安定取糧使先生請于种諤諤曰吾受命將兵安知糧道萬一不繼召稷來與一劒耳先生即曰朝廷出師去塞未逺遂斬轉運使無君父乎諤意折彊謂先生曰君欲以此報稷先稷受禍矣先生怒曰公將以此言見恐耶吾委身事主死無所辭正恐公過耳諤見其直乃好謂曰子乃爾耶今聴汝矣始許稷還是時微先生盛氣誚諤稷且不免未㡬以疾卒於官年五十有二先生為人質厚剛正初學於横渠張子又卒業於二程子以聖門事業為己任識者方之季路先生於横渠為同年友及聞學遂執弟子禮時横渠以禮教為學者倡後進蔽于習尚其才俊者急于進取昏塞者難于領解寂寥無有和者先生獨信之不疑毅然不恤人之非間己也潜心玩理望聖賢尅期可到日用躬行必取先王法度以為宗範居父喪衰麻斂奠比虞祔一襄之于禮已又推之冠婚飲酒相見慶弔之事皆不混習俗與兄進伯微仲弟與叔率鄉人為鄉約以敦俗其畧云徳業相勸過失相規禮俗相交患難相䘏節文燦然可觀自是關中風俗為之一變横渠嘆秦俗之化和叔有力又嘆其勇為不可及而程正公亦稱其任道擔當其風力甚勁云先生少時贍學洽聞無所不該嘗言始學必先行其所知而已若夫道徳性命之際惟躬行久則至焉横渠謂學不造約雖勞而艱于進徳且謂君勉之當自悟至是博而以約渙然氷釋矣故比他人功敏而得之尤多其與人語必因其所可及而喻諸義治經說得于身踐而心解其文章不作于無用能守其師說而踐履之尤喜講明井田兵制謂治道必自此始悉撰次為圗籍使可見之行曰如有用我舉而措之而已其卒也范巽之表其墓曰誠徳君子又曰君性純厚易直強明正亮所行不二于心所知不二于行其學以孔子下學上達之心立其志以孟子集義之功養其徳以顔子克己復禮之用厲其用其要歸之誠明不息不為衆人沮之而疑小辨奪之而屈勢利刼之而回知力窮之而止其自任以聖賢之重如此當先生卒時妻种氏治先生喪一如先生治比部公喪諸委巷浮圗事一屏不用子義山能傳其學人以為道行于妻子云所著有四書註誠徳集其鄉約鄉儀朱文公表章之行于世鄉約今為令甲與叔吕先生先生名大臨字與叔號芸閣大鈞弟以門䕃入官不復應舉或問其故曰某何敢揜祖宗之徳元祐中為太學博士秘書省正字嘗論選舉曰立士規以養徳厲行更學制以量才進藝定試法以區别能否修辟法以興能備用嚴舉法以覈實得人制考法以責任考功范學士祖禹薦其修身好學行如古人可為講官未及用而卒先生學通六經尤邃于禮毎欲掇習三代遺文舊制令可行不為空言以拂世駭俗少從横渠張先生㳺横渠歾乃東見二程先生卒業焉與謝良佐㳺酢楊時在程門號四先生純公語之以識仁先生黙識深契豁如也作克己銘以見意其文曰凡厥有生均氣同體胡為不仁我則有已立己與物私為町畦勝心横生擾擾不齊大人存誠心見帝則初無吝驕作我蟊賊志以為帥氣為卒徒奉辭于天誰敢侮予且戰且倈勝私窒慾昔焉冦讎今則臣僕方其未克窘我室廬婦姑勃磎安取其餘亦既克之皇皇四達洞然八荒皆在我闥孰曰天下不歸吾仁癢痾疾痛舉切吾身一日至之莫非吾事顔何人哉睎之則是始先生博極羣書能文章已涵養深醇若無能者賦詩云學如元凱方成癖文似相如始類俳獨立孔門無一事只輸顔子得心齋婦翁張天祺語人曰吾得顔回為壻矣而其學尤嚴于吾儒異端之辨富文忠公弼致政于家為佛氏之學先生與之書曰古者三公無職事惟有徳者居之内則論道于朝外則主教于鄉古之大人當是任者必將以斯道覺斯民成已以成物豈以爵位進退體力盛衰為之變哉今大道未明人趨異學不入于莊則入于釋疑聖人為未盡善輕理義為不足學人倫不明萬物憔悴此老成大人惻隠存心之時以道自任振起壊俗在公之力宜無難矣若夫移精變氣務求長年此山谷避世之士獨善其身者所好豈世之所以望于公者哉弼謝之正公嘗曰與叔守横渠說甚固毎横渠無說處皆相從有說了更不肯回又曰與叔六月中來緱氏閒居中某常窺之見其儼然危坐可謂敦篤矣又曰和叔任道擔當其風力甚勁然深潜縝宻有所不逮於與叔其見重如此所著有大學中庸解攷古圖玉溪集所述有東見録録二程先生語二先生㣲言粹語多載録中其有功于程門不小故朱文公稱其高於諸公大段有筋骨而又惜其早死云季明蘇先生先生名昞字季明武功人同邑人㳺師雄師横渠張子最久後又卒業于二程子時尹焞彦明方業舉造之先生謂曰子以狀元及第即學乎復於科舉之外更有所謂學乎彦明未達一日先生因㑹茶舉盞以示曰此豈不是學彦明大悟先生令詣程門受學焉元祐末吕進伯大忠薦曰臣某伏見京兆府處士蘇昞徳性純茂强學篤志行年四十不求仕進從故崇文校書張載學為門人之秀秦之賢士大夫亦多稱之如䝉朝廷擢用俾充學宫之選必能盡其素學以副朝廷樂育之意乃自布衣召為太常博士後坐元符上書入黨籍編管饒州行過洛館彦明所伊川訪焉既行伊川謂季明殊以遷貶為意彦明曰然焞嘗問季明當初上書為國家計邪為身計邪若為國家計自當忻然赴饒州若為進取計則饒州之貶猶為輕典季明以焞言為然先是横渠正䝉成先生編次而序之自謂最知大㫖熈寧九年横渠過洛與二程子論學先生録程張三子語題曰洛陽議論朱文公表章之行于世今刻二程全書中巽之范先生先生名育字巽之三水人父祥進士及第累官轉運副使以邊功追贈秘書録其後先生舉進士為涇陽令以養親謁歸有薦之者召見授崇文校書監察御史裏行神宗喻之曰書稱聖讒說殄行此朕任御史意也先生請用大學誠意正心以治天下國家因薦張載等數人西夏入環慶詔先生行邊坐劾李定親喪匿服出知韓城久之晉知河中府加直集賢院徙鳯翔以直龍圖閣鎮秦州元祐初召為太常少卿改光禄卿出知熈州今臨洮府時議棄質孤勝如兩堡先生争之曰熈河以蘭州為要塞此兩堡者蘭州之蔽也棄之則蘭州危蘭州危則熈河有腰膂之憂矣又請城李諾平汝遮川曰此趙充國屯田古榆塞之地也不報入為給事中仕終戸部侍郎卒紹興中採其抗論棄地西夏及進築之䇿贈寶文閣學士先生從程張三先生學伊川嘗曰與范巽之語聞而多礙者先入也横渠嘗詰先生曰吾輩不及古人病源何在先生請問横渠曰此非難悟設此語者欲學者存之不忘庶㳺心深久有一日脫然如大寐得醒耳横渠正䝉成先生序曰張夫子之為此書也有六經之所未載聖人之所未言盖道一而已語上極乎高明語下涉乎形器語大至于無間語小入于無朕一有窒而不通則於理為妄正䝉之言高者抑之卑者舉之虛者實之礙者通之衆者一之合者散之要之立乎大中至正之矩天之所以運地之所以載日月之所以明鬼神之所以幽風雲之所以變江河之所以流物理以辨人倫以正造端者㣲成能者著知徳者崇就業者廣本末上下貫乎一道過乎此者滛遁之狂言也不及乎此者邪詖之卑說也推而放諸有形而準推而放諸無形而準推而放諸至動而準推而放諸至静而準無不包矣無不盡矣無大可過矣無細可遺矣言若是乎其極矣道若是乎其至矣聖人復起無有間乎斯言矣其篤信師說而善發其藴如此師聖侯先生先生名仲良字師聖華隂人二程先生舅氏無可之孫從二程先生㳺人有欲館先生者先生造焉則壁垂佛像几積佛書其家人又常齋素欲先生從之先生遂行或問之曰蔬食士之常分若食彼之食則非矣嘗訪周濂溪濂溪留之對榻夜談越三日乃還自謂有得如見天之廣大伊川驚異其不凡曰非從濂溪來邪後逰荆門胡文定留與為隣終焉文定與楊大諌書云侯仲良者去春自荆門潰卒甲馬之中脫身相就于漳水之濵今已兩年其安于羈苦守節不移固所未有至于講論經術則貫通不窮商畧時事則纎微皆察國勢安危民情休戚凡務之切于今者莫不留意而皆曉也方危艱難之時而使此輩人老身貧賤亦足慨矣伏望吾兄力薦于朝俾命以官使得效一職亦不為無補朱文公稱其學清白勁直所著有論語說及侯子雅言行世按伊洛淵源録稱先生為華隂先生無可之孫即當書為華隂人而云河東人豈金䧟闗洛時先生曾避難河東耶學者詳之天水劉先生先生名愿字闕天水人天資耿介時王安石新書盛行學者靡然向風先生獨不喜穿鑿附㑹之說潜心伊洛之學後以八行舉闗學編二金君美楊先生先生名天徳字君美高陵人肄業大學登興定二年進士第釋褐補博州聊城丞未及赴辟陜西行臺掾尋權大理寺丞繼擬主長安簿未㡬正主慶陽安化簿尋辟徳順之隆徳令再辟安化令補尚書都省掾遷轉運司支度判官京城不守流寓宋魯間十年而歸長安先生自讀書入仕至於晚嵗風節矯矯始終不少變亂後士夫或不能自守而先生于勢利藐然如浮雲晩讀大學解沿及伊洛諸書大嗜愛之常語人曰吾少時精力奪于課試殊不省有此今而後知吾道之傳為有在也埋沒篆刻中幾不復見天日目昏不能視書猶使其子講誦而朝夕聴之以是自樂及有疾親友往問之談笑歌詠不衰曰吾晚年幸聞道死無恨矣卒年七十九魯齋許先生衡誌其墓銘曰出也有為死生以之處也有守不變于時日臨桑榆學喜有得其知益精其行益力吾道之公異端之私瞭然胸中洞析毫釐外私内公息邪距詖俯仰古今可以無愧受全于天復歸其全尚固幽藏無窮嵗年子恭懿益昌其家學為元名儒别有傳元紫陽楊先生鑑山宋氏附先生名奐字煥然號紫陽乾州奉天人母程嘗夢東南日光射其身旁一神人以筆授之已而生先生父振以為文明之象因名曰奐天性至孝年十一喪母哀毁如成人未冠夢逰紫陽閣景趣甚異後因以自號長師鄉先生吴榮叔逈出倫輩讀書厭科舉之學遂以濂洛諸儒自期待金末嘗作萬言䇿指陳時病辭㫖剴切皆人所不敢言者詣闕欲上之不果元初隠居講道授徒抵鄠縣栁塘門生百餘人剏紫陽閣即清風閣稱紫陽先生嘗避兵河朔河朔士大夫想聞風采求見者應接不暇東平嚴實聞先生名數問其行藏先生終不一詣嵗戊戌太宗詔宣徳稅課使劉用之試諸道進士先生試東平兩中賦論第一以耶律楚材薦授河南路徵收課稅所長官兼㢘訪使既至招致一時名士與之議政事約束一以簡易為事按行境内親問監務月課幾何難易若何有以增額言者先生責之曰剥下欺上汝欲我為之耶即减元額四之一公私便之不踰月政成時論翕然謂前此漕司未有也在官十年請老于燕之行臺壬子世祖在潜邸驛召先生叅議京兆宣撫司事累上書請歸築堂曰歸來以為佚老之所教授著述不倦乙卯病革諭子弟孝弟力田以㢘慎自保戒家人無事二家齋醮引觴大噱命門人員擇載筆留詩三章怡然而逝年七十賜諡文憲先生博覽強記真積力久猶恐不及作文務去陳言以蹈襲為恥一時諸老皆折行輩與之交闗中號稱多士一時名未有出先生右者不治家人生産業而喜周人之急雖力不贍猶勉強為之人有片善則委曲稱奬惟恐其名不聞或小過失必盡言勸止不計其怨怒也初翰林學士姚燧早孤育于世父樞樞督教甚急先生馳書止之曰燧令器也長自有分何以急為乃以子妻之燧後為名儒其學得于先生為多元好問譔神道碑稱為闗西夫子江漢趙復序其集稱其志其學粹然一出于正即其文可以得其為人其見重如此所著有還山前後集百巻天興近鑑三巻韓子十巻槩言二十五篇硯纂八巻比見記三巻正統書六十巻時宋規字漢臣長安人與紫陽及遺山鹿菴九山數儒論道洛西弟子受業者甚衆親歿廬墓瑞草生塋閻復嘗稱之曰天性至孝徳重三秦才贍而敏冠絶一時中統戊戌徵試中論賦兩科拜議事官先是官吏縱肆日久數侵苦小民公繩之以法惕然皆莫敢犯丙辰春詣闕陳便宜數事上悉加納㢘希憲云宋規循良可與共事希憲相知公有經濟才議欲為列有嫉其文章名世者沮之署為講議官不就後徵為耀州尹官至蜀道憲副政聲在在著聞號鑑山先生有鑑山補暇集梓行于世年七十七卒元甫楊先生先生名恭懿字元甫號潜齋高陵人天徳之子自少讀書强記日數千言㑹時艱從親逃亂而東于汴于歸徳于天平雖間闗險阻未嘗怠弛其業年十七侍父西歸家貧假室以居鄉鄰或繼其匱皆謝不取惟服勞以為養暇則力學博綜于書無不究心而尤邃于易禮春秋思有纂述恥為章句儒而止志于用世反覆史學以鑒觀古昔興亡之事從學者已衆海内搢紳與父友者馳書交譽即以宗盟斯文期之年二十四始得朱子四書集註太極圖小學近思録諸書讀之喜而嘆曰人倫日用之常天道性命之妙皆萃此書今入徳有其門進道有其途矣吾何獨不可及前修踵武哉于是窮理反躬一乎持敬優㳺厭飫俟其成功于潜齋之下自任益重前習盡變不事浮末矣赫然名動一時宣撫司行省以掌書記共議事辟之皆不就至元七年與魯齋許文正公同被召先生不至魯齋由國子祭酒拜中書左丞日于右丞相安圖前稱譽其賢丞相以聞十年帝遣協律郎申敬來召以疾辭十一年太子下教中書俾如漢恵聘四皓故事再聘之丞相遣郎中張元智為書致命不得已乃至京師帝遣國王和通勞其逺來既入見帝親詢其鄉里族氏師承子姓無不周悉詔與學士徒單公履定科舉之法先生議曰三代以徳行六藝賔興賢能漢舉孝㢘兼䇿經術魏晉尚文辭而經術猶未之遺隋煬始専賦詩唐因之使自投牒貢舉之法遂熄雖有明經止于記誦宋神宗始試經義亦令典矣哲宗復賦詩遼金循習將救斯弊惟如明詔嘗曰士不治經學孔孟之道日為賦詩空文斯言足立萬世治安之本今欲取士宜勑有司舉有行檢通經史之士使無投牒自薦試以五經四書大小義史論時務䇿夫既從事實學則士風還淳民俗趍厚國家得識治之才矣奏入帝善之㑹北征辭歸十六年詔安西王相敦遣赴闕詔與太史王恂等改厯明年厯成授集賢館學士兼太史院事辭歸當厯成進奏日諸臣方列跪帝命先生及魯齋起曰二老自安是年少皆受學汝者故終奏皆坐畢其說盖異禮也二十年以太子賔客召二十二年以昭文館大學士領太史院事召二十九年以議中書省事召皆辭疾不行三十一年卒年七十先是魯齋提京兆學與先生為友一遇講貫動窮日力篤信好學操履不苟魯齋亟稱之父歿水槳不入口者五日襄事遵朱文公家禮盡祛桑門惑世之法為具不足稱貸益之魯齋㑹𦵏歸語學者曰小子識之曠世墜典夫夫特立而獨行之其功可當肇修人極聚居六年魯齋東歸後治母喪一如父三輔士大夫知由禮制自致其親者皆本之先生云蕭維斗㪺誌其墓曰朱文公集周程夫子之大成其學盛于江左北方之士聞而知者固有其人求能究聖賢精微之藴篤志于學真知實踐主乎敬義表裏一致以躬行心得之餘私淑諸人繼前修而開後覺粹然一出乎正者維司徒暨公司徒謂魯齋也學士姚燧譔神道碑銘曰維天生賢匪使自有俾拯烝民為責已厚公于明命實肩實負乾乾其行艮艮其守師古喪祭如禮不苟三綱之淪我條自手推得其類無倦誨誘學者宗之西土山斗皇慶中贈榮禄大夫太子少保𢎞農郡公諡文康所著有潜齋遺稿若干巻子寅字敬伯博通六經百氏累官集賢學士國子祭酒在成均講明誨誘終日忘倦有父風維斗蕭先生伯充吕氏附先生名㪺字維斗號勤齋奉元人天性至孝自幼翹楚不凡長為府史語當道不合即引退讀書終南山力學三十年不求進制一革衣由身半以下及卧輒倚其榻玩誦不少置于是博極羣書凡天文地理律厯算數靡不研究侯均謂元有天下百年惟蕭維斗為識字人學者及門受業者甚衆鄉里孚化稱之曰蕭先生鄉人有自城暮歸者途遇冦詭曰我蕭先生也冦驚愕釋去嘗出遇一婦人失金釵道旁疑先生拾之謂曰殊無他人獨公居後耳先生令随至門取家釵以償其婦後得所遺釵媿謝之世祖初分藩在秦用平章咸寧王野仙薦徵侍藩邸以疾辭授陜西儒學提舉不赴省憲大臣即其家具宴為賀遣一從史先往先生方灌園從史不知其為先生也使飲其馬即應之不拒及冠帶迎客從史見有懼色先生殊不為意後累授集賢直學士國子司業改集賢侍讀學士皆不赴武宗初徵拜太子右諭徳不得已扶病至京師入覲東宫書酒誥為獻以朝廷時尚酒故也尋以病請去或問其故則曰在禮東宫東面師傅西面此禮今可行乎俄除集賢學士國子祭酒諭徳如故固辭歸年七十八以夀終于家諡貞敏劉致諡議畧云聖王之治天下也必有所不召之臣盖志意修則輕富貴道義重則輕王公蟬蛻塵埃之中翺逰萬物之表不事王侯高尚其事者以之傳曰舉逸民天下之民歸心焉故必蒲車旌帛側席以俟其至冀以勵俗興化猶或長往而不返亦有既至而不屈則束帛戔戔賁于丘園者治天下者以之也于吾元得二人焉曰容城劉因京兆蕭㪺士君子之趣向不同期各得所志而已彼不求人知而人知之不希世用而世用之至上徹帝聰鶴書天出薜蘿動色巖户騰輝猶堅卧不起不得已焉始一至卒不撓其節不隳所守而去亦可謂得所志也已方之于古則嚴光周黨之流亞歟雖其道不周于用而㢘頑立懦勵俗興化之功亦已多矣且其累徵而不起蹔出而即歸不既貞乎以勤自居其好古好學之心不既敏乎按諡法清白守節曰貞好古不怠曰敏請諡曰貞敏詔從之先生制行甚高真履實踐其教人必自小學始為文立意精深言近指逺一以洙泗為本濂洛考亭為據闗輔之士翕然宗之稱為一代醇儒門人涇陽第五居仁平定吕思誠南陽孛术魯翀為最著所著有三禮說小學標題駁論九州志及勤齋文集行世時有吕􅀢字伯充其先河内人金末父佑避亂關中因家焉伯充從許魯齋學魯齋為祭酒舉為伴讀輔成教養其功居多至元間為四川行樞密院都事勸主帥李徳輝不殺巴人感徳祠之知華州勸農興學俱有成效累官翰林侍讀學士致仕卒追封東平郡公諡文穆大徳中河東闗隴地震月餘伯充與維斗各設問答數千言以究其理居父憂喪𦵏一倣古禮魯齋貽書稱其信道力行為楊元甫之亞云寛甫同先生先生名恕字寛甫號榘菴奉元人祖昇父繼先博學能文㢘希憲宣撫陜右辟掌庫鑰家世業儒同居二百口無間言先生安静端凝羈丱如成人從鄉先生學日記數千言年十三以書經魁鄉校至元間朝廷始分六部選名士為吏屬闗陜以先生貢禮曹辭不行仁宗初即其家拜國子司業階儒林郎使三召不起陜西行臺侍御史趙世延請即奉元置魯齋書院中書奏先生領教事制可之先後來學者殆千數延祐設科再主鄉試人服其公六年以奉議大夫太子左賛善召入見東宫賜酒慰問繼而獻書歴陳古誼盡開悟涵養之道明年春英宗繼統以疾歸致和元年拜集賢侍讀學士以老疾辭先生之學由程朱上遡孔孟務貫浹事理以利于行教人曲為開導使得趨向之正性整潔平居雖大暑不去冠帶母張卒事繼母如事所生父喪哀毁致目疾時祀齋肅詳至嘗曰養生有不備事有可復追逺有不誠是誣神也可逭罪乎與人交雖外無適莫而中有繩尺里人借騾而死償其值不受曰物之數也何以償為家無擔石之儲聚書數萬巻扁所居曰榘庵時蕭先生㪺居南山下亦以道高當世入城府必主先生家士論並稱曰蕭同自京師還家居十有三年中外縉紳望之若景星麟鳯鄉里稱為先生而不姓至順二年卒年七十八贈翰林直學士封京兆郡侯諡文貞所著有榘庵集二十巻從善韓先生先生名擇字從善奉元人天資超異信道不惑其教學者雖中嵗以後亦必自小學等書始或疑為凌節勤苦則曰人不知學白首童心且童䝉所當知而皓首不知可乎尤邃禮學有質問者口講指畫無倦容士大夫逰宦過秦必往見先生莫不虛往而實歸焉世祖嘗召之疾不果行其卒也門人為服緦麻者百餘人伯仁侯先生先生名均字伯仁蒲城人父母蚤亡獨與繼母居賣薪以給奉養積學四十年羣經百氏無不淹貫每讀書必熟誦乃已嘗言讀書不至千遍終于己無益故其答諸生所問窮索極探如取諸箧笥名振闗中學者宗之用薦者起為太常博士後以上疏忤時相意即歸休田里先生貌魁梧而氣剛正人多嚴憚之及其應接之際則和易欵洽雖方言古語世所未曉者莫不隨問而答世咸服其博聞云今祀蒲城鄉賢祠士安第五先生先生名居仁字士安涇陽人幼師蕭維斗㪺弱冠從同寛甫恕受學博通經史躬率子弟致力農畝而學徒滿門其宏度雅量䏻容人所不䏻容嘗行田間遇有竊其桑者先生輙避之鄉里髙其行義率多化服作字必楷整逰其門者不惟學眀而行加修焉卒之日門人相與議易名之禮私諡曰靜安先生恱古程先生先生名瑁字君用號恱古涇陽人隠居不仕弱冠即以古學自力討論六籍雖祁寒暑雨造次顛沛未嘗少輟三原李子敬創學古書院延先生講學其中逺近從遊者百餘人循循然樂教不惓學者稱恱古先生嘗誡諸子曰人性本善習之則荒古聖賢皆以驕惰為戒况凡民乎集家戒一巻以遺子孫著述有遼史三巻異端辨二巻雲陽志二巻樂府文集傳世李子敬字恭甫為人質謹孝友家素裕族黨因其資而𦵏者三十餘喪婚者八十餘姓捐千金創學古書院又割田以供釋奠廩師生學士蕭貞敏公為記行省上其義下詔旌表其門少墟集巻十九
