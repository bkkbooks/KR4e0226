body:
  text: 少墟集卷十八明馮從吾撰奏疏論劾險佞科臣疏萬厯十九年十二月二十二日題為險佞科臣惑亂主聽懇乞聖明速賜罷斥以杜釁端事昨者臣接邸報見禮科都給事中胡汝寧參論兩京中卷一二可疑及吏部推升一事臣不勝駭異夫汝寧見任諌垣言事自其職掌而臣顧駭異者何也謂汝寧之言投間抵隙假公濟私非真為皇上發姦摘伏也臣意皇上必能洞燭姦膽以折亂萌乃反聽若轉圜臣又不勝駭異豈皇上不知汝寧之罪狀而誤聽其言耶臣不暇辨其言請先誅其心且汝寧之為給事已數年於此矣自有參論饒伸之疏而諂諛已不容于衆口繼有輔臣相戕之奏而姦邪益大犯乎公評别號穢名至不可道自古小人未有狼狽若此者舉朝臣鄰咸謂汝寧縱不肖將復何顔立于掖垣間耶顧注籍未幾旋稱病愈人人相顧詫為異常而臣獨私語人曰此不足為異也鄙夫患失何所不至他日舉動更有異于此者臣言未幾而二疏相繼上矣此二疏也立言在此寓意在彼臣試為皇上分明之昔者部臣饒伸發科場之弊而汝寧劾之人人未有不為伸稱屈者皇上亦鑒伸無他準其起用矣故汝寧亦洗瘢索垢發科場之弊若借此以掩其非也而不知妄逞胸臆以衊汚大典適益重其參伸之罪耳至于參論王教又揣摩上意為之不知近日皇上不遽起王遴不遽遷孟一脈蔡時鼎者意欲需其缺以大用之耳汝寧敢於以私心窺皇上遂乘機舉銓臣推升一事言之以滋皇上之惑不然何皇上罰俸科臣之旨甫下而汝寧之疏遂上也急於獻諛而巧于逢君汝寧之罪不容於誅矣夫汝寧特一小人耳堂堂天朝濟濟臣鄰何難於容此一人而臣嘵嘵者非論一汝寧也蓋謂汝寧以一小人之言中於皇上故言科場則皇上聽之言銓臣則皇上又聽之或下部覆或命回話使君臣上下反覆疑二是今日廟堂之上已不勝其多事之擾矣儻汝寧恃皇上之優容而再肆傾危之巧計則議論愈多是非愈混其弊不至於小人攘臂君子裹足不止者猶幸今日無李春開耳使有之則必以保吳時來者保汝寧借此以結皇上之歡天下國家之事臣不知其所稅駕矣皇上何惜汝寧一人而不為國家杜釁端也且皇上昔年斥逐姦邪曾不踰時公論大為稱快何獨於汝寧過為寬貸湯顯祖論之而不報樊玉衡論之而不報蔡獻臣周應嵩彭好古論之而又不報人人以汝寧為非而皇上若以為是人人以汝寧為可斥而皇上若以為可留此臣之所未解也即如前月汝寧因玉衡彈劾辨疏自陳乃皇上於彈者留辨者下且徑批以照舊供職夫照舊供職之旨自正卿以下不敢望而一旦加於七品之汝寧不知汝寧何德何功而皇上優容若此且唯其言而聽之如此此又臣之所未解也汝寧去就原不足為重輕但以一小人而能以其言惑亂主聽此誠匪細故者臣是以嘵嘵言之且不欲以汝寧之故傷皇上知人之明也臣願皇上大奮乾剛速賜罷斥則天下萬世頌皇上之神聖於無疆矣臣無任激切待命之至請修朝政疏萬厯二十年正月十三日題為中外多事朝政當修懇乞聖明勵精以圖萬世治安事臣不佞猥以書生叨入仕籍三年於此矣竊見皇上郊廟不親朝講不御章奏多留中不發臣不勝杞人之憂然而未敢有請者謂在廷諸臣明諍顯諌連篇纍牘庶幾哉萬有一之感悟上心也又惡用臣言為哉苐諸臣言之諄諄而皇上聽之藐藐屢請饗祀矣而皇上之遣官恭代者如故屢請朝講矣而皇上之靜攝深宫者如故屢請發章奏矣而皇上之留中不發者如故豈在廷諸臣無一言之有當於皇上耶抑皇上始勤而終怠即諸臣言之亦不恤耶臣竊意皇上之心不過以為昔年勵精天下不見其益近年靜攝天下不見其損何苦舍逸而就勞不知人君之舉動與士庶不同士庶久不理家則家事廢其為患也小而易弭人君久不理天下則天下之事廢其為患也大而難圖皇上試觀丁亥戊子以前四裔效順海不揚波天下何等景象也是勵精之效既如彼己丑庚寅以後南倭報警飢饉薦臻天變人妖疊出遝至天下又何等景象也是靜攝之患又如此中外多事人心憂虞失今不圖長此安窮豈必朝講一日不舉便有一日之禍章奏一日不發便有一日之禍然後為可憂哉且今日皇上自視為何如主也皇上欲成其神聖之名而使天下不見其太平之象則名實不符人誰信之况今當朝覲之期萬國冠裳畢集闕下咸欲一覩其清光而竟不可得則必相顧而疑相疑而議不曰皇上困于麯蘖之御而歡飲長夜必曰皇上倦於窈窕之娛而晏眠終日不然何朝政廢弛至此極也雖皇上近頒敕諭謂聖體違和或可以再借靜攝之名以少掩其晏安之非而不知皇上靜攝已非一日如以為真疾耶則當戒酒戒怒以圖尊生之計如一時倦於早起托之乎疾耶則鼓鐘于宫聲聞於外天下人心豈可欺乎况皇上每晚必飲每飲必醉每醉必怒酒酣之後左右近侍一言稍違即斃杖下如是則既非靜攝又廢朝政縱諭旨森嚴恐亦不足以服天下而信後世也臣見前嵗皇上禁止章奏非奉聖旨不許傳布臣意皇上不過以為臣下章奏多有不識忌諱者恐一傳布則天下傳誦其章奏必議及於皇上之舉動故姑留中以泯其迹耳不知今日諸臣來朝而皇上猶然靜攝其紛紛議論視章奏所傳更孰多寡乎一人之舉動四海之觀望隨之豈在章奏之傳不傳也欲以泯其迹而反以彰其過豈皇上未思及於此耶臣願皇上勿以天變為不足畏勿以人言為不足恤勿以目前之晏安為可恃勿以將來之危亂為可忽必乘此大班紏劾之日亟出視朝以答四海臣工之望無惜此頃刻省覽之勞發臣章奏以昭一人納諌之明仍望節飲以養性情戒怒以馭左右至於以後諸臣章奏無論奉旨與否準其照舊傳布則聖德以光聖度以宏天下太平之治可計日而奏矣世道幸甚臣愚幸甚祕録萬厯壬辰實維覲期時從吾濫竽西臺已六閲月先是疏劾都給事中胡汝寧主上幸見納竊以為聖明在上正臣子披肝露膽之時于是此疏于正月十三日上席藁待罪者旬日而未報逮草九日聞上遣校尉百人候于廷將杖言者而朝論洶洶不知為誰蓋數日前曽杖給事中孟君養浩故言者聞此咸用愕然比日昃忽有旨傳免矣當辰巳時聞上命一內臣送一疏至閣大學士趙公志臯見而異之會是日為仁聖皇太后誕辰于是具揭上請謂聖母聖莭不宜有此舉揭入而傳免之旨遂下中外人始知為杖余之舉而余不知也次日以注宣大差入院見掌院左都御史李公世達將入門晤掌河南道御史陳君登雲陳見余執余手呼曰好造化好造化昨日之事蓋為君也君知之否余曰不知比入見李公李公一見亦曰君知昨日事乎昨日之事蓋為君也幸有趙相公揭耳言已而别余喟然嘆曰主上聖明一至此乎因聖母誕辰而宥狂言至孝也納閣臣手揭而不少逆至明也宥臣一人而諸臣競勸至仁也一舉而三善備即古堯舜何以加焉嗚呼際聖明之主而不效竭身之誼甘于緘默苟容以自為身家計殆非人哉殆非人哉因祕録而笥存之請告疏萬厯二十年四月二十一日奏為中途患病危篤不能赴任懇乞天恩俯容回籍以便調理事臣陜西西安府長安縣人由萬厯十七年進士選翰林院庶吉士尋授今職于本年二月內奉命差往宣大巡按竊念臣猥以草茅誤叨任使正欲竭愚畢智捐頂踵以報國恩奈夙病劇發萬分危篤有不能一日支持者輒敢哀鳴于君父之前臣賦命蹇拙素患痞病每年春夏必發輕則經旬重則纍月非謝絶勞役不能遽愈數年以來百計調攝而病根尚在不意今春自二月即發飲食漸減形體漸羸心竊慮之方欲請告調理以圖報效于異日而會有宣大之命臣以為馳驅疆場惟今日事即有病焉可勉強而行也顧始則雖病而愈加勉強繼因勉強而愈增之病至于陛辭後行至涿州而臣之身幾不為臣有矣然猶冀其沿途調理稍得痊可依期受代而病根既深轉覺沉重胸膈脹滿噯氣嘔逆比至保定即伏牀褥不能動履先後召醫尚時廉李茂華王繼業等診視調治但藥餌愈攻元氣愈損脾胃愈虛痞氣愈增至于今已三夜目不交睫三日口不入一粒矣形神俱脫危在旦夕使不以此時披情引退而猶貪戀于功名之場則溝壑徒委補報末由是忍于負主而甘于誤國也臣罪不細臣即死不瞑目矣除將前情遵例備文彼處撫按具奏外伏望皇上俯賜矜憫敕下吏部題覆容臣回籍調理儻萬一不至顛隮則他日有生之年皆感恩圖報之日矣臣不勝惶悚待命之至公移申飭放關行蒲臺縣為申飭放關引鹽以絶弊源事照得山東各商引鹽自海下場所起運必由蒲臺過關方得運往他處斯咽喉鎖扼之地雖有神姦豈能飛越詢之先年放關俱委佐二等官每每接受姦商常例通不稽查以致匿引不送切角將鹽徑發阿城張秋等處私自販賣欺隱餘沒課銀並不運至洛口卸園候掣運司懼悮掣期只得捏報虛數一掣常補數年一引常補數倍姦商日肆積引日壅國課日虧鹽法日壞誠可痛恨已經前院徐洞徹弊端特委該縣清查放關革除積蠧所行極其詳悉深得拔夲塞源之道本院奉命接差以來訪得該縣練達精明實心為國清查克殫辛勤放關不避嫌怨殊沾沾為鹽政委托得人喜第恐該縣以為新舊交接事體更易倘或勤始怠終其如姦弊復熾何擬合再行申飭為此牌仰本官查照先今牌內事理每日下午親詣河下一一查驗登記至于本院原發該所過鹽簿內不許間隔遲滯如有違例大包并夾帶私鹽者除徑追引目解院大包私鹽入官外仍將姦商船戶照例重究招解以憑發遣施行毋得姑息亦不許轉委佐二等官仍開弊竇如果鹽法肅清積弊盡釐本院定以賢能優敘本官務要著實留心以副委托俱毋違錯未便禁革吏承夙弊行五道及二運司為出巡事照得本院不日巡厯按屬地方已經通行去後訪得本院吏書承差及跟隨人役每遇巡歷地方千方百計苛求需索稍有查駁隨即揚言搜剔由己甚至有私帶家人充覔船夫沿河詐騙者至于承差隨行每向所司叩頭希賞且揑報考語詐稱訪事又將日給支應盡行折乾勒令縣驛重復備辦諸如此類未易枚舉良可痛恨擬合禁革為此牌發該道仰司呈堂照牌事理即便轉行所屬各衙門官吏人等如遇本院按臨一切常例盡行禁革如有仍蹈前轍者所在官司即便據實密揭報院以憑究遣本官定以風力優處如視為常套漫不遵行本院别有所聞定行連坐干礙職官一體參究各具遵行過緣由報查俱毋違錯未便稽察承差行真定縣為稽察承差姦弊事往本院家居時見各院承差奉法者固多壞法者亦不少所恨各院苦于不知耳未有明知而明縱之者也本院自受代以來雖然刻意禁約但恐差人不等該縣驛或隱忍不言甚非本院革弊初意為此仰縣官吏照牌事理即查原差去承差李文福在撫按兩院會稿公務果于某日某時到某日某時行回轉行該驛備細查的從實回報本役如有别項需索情弊該縣仍密揭報院方見以心相信且藉此覘該縣風力也毋得遲違未便嚴催掣鹽行山東運司為嚴催掣鹽事照得二十三年春秋二關掣鹽案查止有河南鹽二萬八千餘引其本年該銷掣十五十六十七等年積引十二萬至今一年將終尚無引鹽報掣該司已違欽例咎將誰諉揆厥所由實係姦商覬踵夙弊故意耽延不肻報掣似此巧計三尺謂何據法本當參提重究但積弊已非一日姑記再行嚴催為此仰司呈堂照牌事理速將今嵗春關限月內呈掣聽候本院按臨親驗其秋關限十二月中呈掣如再故違遲悮該司先將為首姦商鎖拏二三名同違玩吏書解院以憑重究發遣決不輕貸剔除姦蠧行蒲臺縣為剔除姦蠧以肅鹽政事據邉商王承賜等連名揭稟內稱姦商因見蒲臺關防嚴緊計出百端突于蒲臺縣西相離四十餘里開河鎮相連濵州交界附近私鹽處所私立鹽園結交鹽徒驢馱車載堆垜園內舂築大包上船將殘引影射指作官鹽瞞天之弊實為鹽政大蠧叩法嚴行禁毁等情到院看得山東鹽法向被棍商沿襲為姦壞之已極即今虧損國課壅滯積引已經嚴行本官于蒲臺要口立法清查關防嚴密以為弊不能作矣何又有越關于開河鎮等處私立鹽園等弊似此姦計神人莫測合行嚴拏以肅鹽政為此牌仰本官照牌事理即便帶領兵快密切星夜親詣開河鎮等處地方將越關私鹽逐一封盤私立鹽園登時拆毁仍拏作弊姦商與興販鹽徒車驢到官一併究招報院詳奪施行本官務在神速出其不意毋得泄漏以致各姦聞風脫網不便破積弊開自新以正鹽法行山東范運同為破積弊開自新以正鹽法事照得山東內商向來沿襲為姦鹽法大壞節經申飭嚴革各商尚爾怙終觀望所賴以共濟分理者惟在該司本院素知本官才望迎刃有餘蒞任方新奮然振刷所喜鹽政得人庶幾積弊可釐所有本院曉諭各商告示合行給發為此仰本官照牌事理務期同心共濟肅清鹽法仍將發去告示稿大書告示張挂蒲臺洛口各鹽園場所及該司門首曉諭俾各商咸知省悟務使盡掃他年故習聿新今日良模毋蹈前愆噬臍莫及仍具不致風雨損壞結狀呈報查考毋得遲違發山東運司告示稿為破積弊開自新以正鹽法事照得山東鹽法決裂已非一日其病根全在各商之虛掣補關而虛掣補關其病根多在各商之家人夥計此輩或指稱多帶用以迎合主心或借口打點反以乾沒主利即所稱大包夾帶徒以充此輩之私槖即有一二不然亦以博鋪牙之脅制為利幾何為害無窮加減乘除徒滋妄費內商之引鹽日滯邊商之引目日壅揆厥本原皆此輩為之倡率阻撓也似此不破之弊本院三尺謂何除不時密訪嚴拏以憑究遣外為此特示各商務要各保身家痛革前弊果有此等夥計即時分夥此等家人即時逐去本院必不追咎既往以阻將來自新如怙終不悛徘徊觀望故意延遲覬踵弊轍本院廉知其人定將本商盡法重處決不輕貸各商宜細思之無貽後悔尊崇名賢行茌平縣為尊崇名賢以敦教化事照得本院觀風兹土查有該縣已故鄉宦原任尚寶司少卿孟諱秋生平髙節清風允足廉頑立懦本院素所景仰今雖已逝合行表揚所有祠宇祭田等項相應查報為此仰縣官吏照牌事理即查本官曾經山東前按院鍾建立祠字見在何處地方置有祭田若干畝仍抄録祠內碑記及本宦文集墓志併查見有幾子曽否入學作速具由報院以憑施行毋得遲違未便優禮名賢行泰安州為優禮名賢以風世教事查有已故教官李諱汝桂謝迹紛華潛心性命本院景仰有日方欲式廬聞己物故深為世教民風痛悼為此仰州官吏照票事理即動該州堪動官銀置扁一面上書理學名儒四字前列本院銜名後書本官銜名再動銀十兩封折賻儀鼓樂齎送伊子收領懸挂用昭本院優崇之意仍將動過銀數并取回帖具由繳查毋違清理鹽法行山東運司為清理鹽法事照得二十三年春秋二關掣鹽迄今一年將終尚無引鹽呈掣多係無藉棍商堅圖虛掣故意煽衆阻撓合行設法查理為此仰司呈堂照牌事理即查二十三年春關應掣商人某人某人春關除河南鹽二萬八千有零呈掣外其應掣積引邉鹽六萬零某人曽運到洛口鹽園鹽若干某人已運未到園鹽若干某人通未領運若干同秋關應掣商人姓名逐一清查真的備細造册限二十八日送院查考如已曽運鹽到園者為奉法良商本院即行司紀録優奬如往運而未到者次之若逗遛觀望不運者即係無藉姦商定行重處俱毋違錯未便又為清理鹽法事據該司呈送己未運鹽商人文册到院查得已運鹽到園商人申良棟等二十七名均係守法良商深可嘉尚內申良棟杜雲鵬王克謙三名各運到引鹽過千尤為奉法其張納訓費光輝李邦化李篤志張修業等五名俱觀望全未領運即係把持煽衆棍徒俱應分别懲勸為此仰司呈堂照牌事理先將申良棟等三名動支院銀備辦花紅自運司當堂鼓樂迎出以示優奬其餘二十四名即行登簿紀録待鹽全完之日酌量查行仍將棍商張納訓等五名嚴拏各正身即時解院以憑重究施行毋得遲違未便尊髙年以重名教行齊東縣為尊髙年以重名教事查得該縣致仕教官王曉年髙有德甘守清貧合行資助為此牌仰該縣官吏照牌事理即動堪動官銀三兩具侍生帖差人齎送本官以示優禮之意仍將動過銀數取回帖繳查毋違批山東運司問過路上陳偉器詳該司積引甚多欠課年餘正坐內商大包夾帶之病五運司未必如此本院惟知有長蘆惟知有該司安得以五運司為解也至于州縣私販阻滯官鹽本院自有按季比較法紀森然與運司積引欠課何相干涉私販阻滯誠有此説今止聞該司有積引未聞各州縣有積鹽又安得借各州縣為解也至于圖賤接買尤屬支吾果爾則該司不必設本院亦不必差矣三尺具在誰其干之至于新舊相兼果如所議則新者行而舊者終無疏通之日此斷斷乎不可行者總之為引何分新舊總之欲其順序疏通又何分彼此耶設今不嚴行振刷則不惟已往之舊引愈舊且恐將來之新引亦舊矣不惟十二萬之邊引終無復舊之日且恐今日九萬之邉引亦壅閼而置之無用之地矣不惟今日之國課拖欠一年且恐將來之拖欠又不止于今日矣范運同謂先年姑息之流弊誠可為今日之斷案也大抵利之所在人必趨之大包不已勢必橫行夾帶夾帶不已勢必回頭影射愈寬愈肆長此安窮究其本原皆此虛掣補關為之作俑耳至于商人運鹽不前不曰灘無積水鹽花不生則曰河水淺涸舟楫難行不曰數商一船循環輪載則曰舊鹽未賣新鹽難通此或間亦有之未必時時如此總之借口數欵以圖虛掣不然何稱掣之委官朝起馬而各商之運鹽夕踵至也任意補關豈不甚便誰肻甘心速運以就稱掣乎人情大抵如此顧當事者寬嚴何如耳該司慎勿輕聽前言墮彼姦計可也大包之禁掣鹽規制仰司即便刋刻榜文樹立各場兩關榜示洛口一一務查遵部文及本院節次憲牌行毋得展轉以覬虛掣以致各商觀望上誤國課下悮各商也據招嚇詐搶奪既屬虛情路上等本當枷號重究姑念無知依擬贖發為首路上仍加責若干板陳偉器加責若干板取庫收繳表隱德以勵世風行分守濟南道為表隱德以勵世風事照得本院巡歷地方訪得平原縣隱士石瓛年八十餘嵗謝迹塵囂潛心性命行誼久孚于月旦著作頗闡乎道真誠盛世之逸民而理學之髙士也合行優禮為此牌發該道照牌事理即便轉行平原縣動支堪動官銀置扁一面大書理學髙隱四字前列本院銜名後書為隱士石瓛立再動銀三兩折羊酒差人鼓樂齎送本氏宅上懸挂仍將動過銀數行過日期繳查毋違少墟集卷十八
