body:
  text: 少墟集卷十九明馮從吾撰關學編目録卷一宋橫渠張先生載天祺張先生戩進伯吕先生大忠和叔吕先生大鈞與叔吕先生大臨季明蘇先生昞巽之范先生育師聖侯先生仲良天水劉先生願卷二金君美楊先生天德元紫陽楊先生奐鑑山宋氏規附元甫楊先生恭懿維斗蕭先生㪺伯充吕氏􅀢附寬甫同先生恕從善韓先生擇伯仁侯先生均士安第五先生居仁恱古程先生瑁卷三明容思假先生堅默齋張先生傑小泉周先生蕙大器張先生鼎抑之張氏鋭附介菴李先生錦仲白李氏錦附思菴薛先生敬之平川王先生承裕卷四明涇野吕先生柟溪田馬先生理苑洛韓先生邦奇瑞泉南先生大吉雲林尚氏班爵附斛山楊先生爵愧軒吕先生潛石谷張氏節附正立李氏挺蒙泉郭先生郛秦關王先生之士
