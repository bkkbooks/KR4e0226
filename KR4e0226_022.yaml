body:
  text: 少墟集巻十九明馮從吾撰闗學編目録巻一宋横渠張先生載天祺張先生戩進伯吕先生大忠和叔吕先生大鈞與叔吕先生大臨季明蘇先生昞巽之范先生育師聖侯先生仲良天水劉先生愿巻二金君美楊先生天徳元紫陽楊先生奐鑑山宋氏規附元甫楊先生恭懿維斗蕭先生㪺伯充吕氏􅀢附寛甫同先生恕從善韓先生擇伯仁侯先生均士安第五先生居仁恱古程先生瑁巻三明容思叚先生堅黙齋張先生傑小泉周先生蕙大器張先生鼎抑之張氏銳附介菴李先生錦仲白李氏錦附思菴薛先生敬之平川王先生承裕巻四明涇野吕先生柟谿田馬先生理苑洛韓先生邦奇瑞泉南先生大吉雲林尚氏班爵附斛山楊先生爵愧軒吕先生潜石谷張氏節附正立李氏挺䝉泉郭先生郛秦闗王先生之士
