body:
  text: 少墟集卷十七明馮從吾撰傳河南衛輝府通判一軒劉公傳余外王父一軒劉公諱璽字廷節一軒其别號也先世宜川人始祖諱孝先國初從戎𨽻西安前衛因家焉父諱俊以季子琛貴贈兵部主事舉子五先生為中子伯兄琰以成化丁酉舉人知河南新鄉縣季弟琛以𢎞治壬戌進士厯山西僉憲有司各竪棹楔于門關中稱為三牌樓劉家云公幼頴敏絶人讀書即知大義稍長與僉憲公同逰膠庠每試兄弟迭為諸生首督學邃菴楊公深器重之𢎞治乙卯同舉于鄉是時縣尹公已謝政兄弟三人衣冠濟濟時人榮之公逡逡不自多明年下第歸閉門授徒益修舊業僉憲公北面從受學出其門者如公之甥王太府諤王僉憲謳內弟張憲副環及僉憲公先後俱成進士公屢上春官竟不利謁選河南衛輝府通判居數月喟然嘆曰某曩所為下帷攻苦為二尊人耳今二尊人以吾弟貴吾志遂矣吾老矣又安得以五斗苦七尺哉且公宦情素淡不能隨上官俯仰會有言者即浩然歸歸而買田城西南搆别墅數椽僅蔽風雨躬耕以老終嵗足不履城市一日寇至索無所有止劫一羊裘去已而笑曰不意劉官人貧至此復還之每農暇即取四書大全朱子綱目讀之或誚其迂以為公復應舉子試耶公曰吾平日所樂在此舍此無所事事矣年七十九卒公初娶于吳繼張再繼邢先宜人張媪出其子孫繁衍不具述馮從吾曰余幼時每侍先大夫輒稱引公以訓從吾兄弟公為人真率質戅絶無世俗脂韋態即或有矯枉過直處要不失君子先進之風也乃今則時尚靡而人趨競矣扼腕狂瀾安得如公者起而障之哉論者謂國朝人物惟𢎞正間為最盛嗚呼觀公可知也西郭先生傳先生姓姚氏諱顯字微之咸陽人正統九年鄉舉在太學三上封事皆闢異端崇正道安社稷之謀景泰五年四月上疏言王振修大興隆寺車駕不時臨幸佛本異端信佛得禍若梁武帝足鑒時上欲幸隆福寺太學生濟寧楊浩與先生相繼言上遂罷行名震天下後寓居長安西郭藩臬諸公造之食以蔬糲無弗飽者令齊東武城二縣祀名宦循政詳山東通志中當時民歌之曰先有子遊後有姚公學道愛人同一古風而先生自讃其像曰六尺長軀尺五長鬚學古入官讀孔孟書軀兮鬚兮五十三年而知五十二年之非軀兮鬚兮碌碌庸庸不能作邦家之基官至太僕寺丞馮從吾曰師友之益大矣先生之寓居長安也以與李介菴先生講學故介菴以理學鳴關中而先生與之為友交砥互礪俱成名儒是先生之氣節蓋從學問涵養中來也彼虛憍恃氣者視先生當赧然愧矣朱貧士傳朱藴竒字子節西安右護衛人家貧甚僦屋而居妻子織網巾為生讀書古東嶽廟嘗併日而食宴如也聽講寶慶寺寒暑不輟一日其子因差徭下獄會天雨四日不食氣息奄奄待盡矣時嶽廟有大户收糧米者黃冠憐之因取其米少許為粥以食藴竒知其故心計以為此官米何可竊也曰死即死耳豈可以臨死改節竟不食而亦不明言其故同舍生素誚藴竒迂矯至此始深服其節操以為不可及因出其食食之藴竒曰此可食也由是始得不死而劉孝廉必逵聞而義之因白于衛官始出其子于獄當路諸公及士大夫有髙其節而周之者必擇而後受一毫不肯妄取先是嘗之市途有遺網巾二頂其子拾之藴竒曰彼之失猶我之失也使我失此二網則舉家懸罄矣即命其子追而還之其人感甚欲分其一為謝藴竒竟謝不受父早喪養母曲盡其孝母歿毁幾滅性秦俗人死多用青烏之説當于某日某時避殃殃謂死者之魂來辭家而家人或庶幾見之者也而見之者凶以故當避此其説幻妄不足道而秦人多惑之藴竒曰使果有此殃也吾猶可藉此一見吾母使果無此殃也吾又何為避之伏棺痛哭竟不避而卒亦無恙人稱其孝秦俗之惑由此少破年五十一以布衣終蓋己酉八月十八日也生平苦節篤行一步不苟人共稱之歿之日貧無以為斂葬聞義而賻者幾數百人始克襄事有子五人貧幾不能聊生長安令修齡楊公為搆屋三楹居之仍扁其門曰髙士藍田令思軒梁公祭之以文學臺青巖段公廉憲祥宇李公各捐金優恤其後段公扁曰處士李公扁曰懿行範俗聞者莫不咨嗟太息以為為善之報而諸公之髙誼尤近世所罕覩風世勵俗功蓋不小云馮子曰學問之於人甚矣哉朱生操行如是固天性使然亦講學之效不可誣也生每赴余寶慶之會見衣敝履穿人或誚之以為貧至此不聽講可耳余聞之應曰如此是聽講者皆當鮮衣華服以飾觀美矣誚者語塞嗚呼死生亦大矣朱生死且不二天下又何物能二之哉傳云見利思義見危授命若朱生者亦庶幾近之矣貢士樊公傳關中有篤行君子曰樊公諱天敘字敦夫號看山後更號與楓世為西安右護衛人家世武辨公少有逺志父户侯公歾公以嫡長當承廕乃謝去折節學舉子業籍西安郡諸生每試裒然前列尤以德行屢為督學使者所奬顧數竒不售于棘闈萬厯戊寅以積廩充貢如京師時年已六旬矣將廷試偶疾作輒謁歸隱居不仕就城北故廬耕讀自老號曰與楓蓋自况云公天性孝義母病篤忽思爐餅苦厨無具者求諸里舍及歸母逝矣遂悲悼終身不食爐餅廬墓數載人多不及知年方強仕內子相背故有一侍婢即日遣之諸子念公起居跽勸再娶公峻拒之徐而曰豫德非閔曽恐貽家纍爾由是終身不再娶嘗苦家居不得一志于學偕二三友人讀書蕭寺昕夕必整衣冠相揖或嘲其迂曰不可以燕居廢禮也同儕雖雅相厚善亦不戲謔曰善戲謔兮不為虐兮非武公不能也其他一言一動無不斤斤繩尺自少至老無少踰越故至今里中月旦皆曰樊道學樊道學云萬厯乙酉按臺貞復董公以孝行扁其門仍給粟帛以風頺俗德清許敬菴先生督關中學延公臮藍田王秦關先生講學正學書院亡何公以疾卒許先生為七言律弔之曰丈人髙行冠鄉閭閉户長安只著書恬處蕭齋同野衲懶隨塵鞅謝公車希蹤古道貧逾力問學吾門老更虛奄爾少微星殞沒令人灑淚滿襟裾而一時士大夫傳誦其詩咸欷歔歎息以為實録云公生平不好博奕不親聲妓不言人過失杜門終日惟知讀書故于書無所不窺第不輕于著述興到或搆詩歌自詠間吮毫作水墨小畫殊有解衣盤礴之意惟是素寡交逰故詩畫傳者甚少生于正德己卯正月初一日卒于萬厯丙戌八月二十四日享年六十有八子圃囿相繼襲祖職馮從吾曰自世之降也士以放縱為真以敬謹為偽以稱惡為直以揚善為黨士風決裂莫可底止如公卓然自立之死不二者幾人哉公于余為前輩而樂與余為忘年友余知公最深獨愧貌公不盡雖然世豈乏執鞭願焉者士風其庶幾有瘳乎楊繼母傳楊繼母姓龎氏吾會友楊孝亷重熙之繼母也重熙生七嵗而失其母蕭九嵗而失其父縣尹公翀然重熙得至有今日者龎氏以也故重熙每為余言及繼母龎氏事輒澘然泣屑交頥云龎氏適縣尹公僅僅浹嵗以故子女無所出當縣尹公捐舍時龎氏撫棺且泣且誓曰傷哉天乎未亡人不難從夫于地下第有此孤在耳所不撫摩此孤而有異志者有如此棺于是茹荼孤闈幾三十年而以夀終終之後七年為萬厯甲午重熙舉于鄉以孝亷聞嗚呼龎氏亦可以瞑目矣重熙之言曰熙不肖生而臞甚母保護之眂兄重光有加焉不肖年已壯不自知其非龎母出蓋龎母素未嘗以前子子不肖不肖又安所知以繼母母龎母也故至今鄉黨宗族稱慈繼母者必于龎母首僂指焉言已淚下不能已余聞之為之欷㱆太息者纍日重于人心世道有感云夫人性皆善匹夫匹婦皆可與知能彼世所稱繼母者豈盡皆蘆花輩哉奈世之人但見一繼母不問賢不賢即曰某繼母某繼母云于是為繼母者苟非卓然特然亦未有不因人言而不以繼母兩字自橫于中者以此兩字橫于中則方寸有物所在成隙雖有生來愛子之真心久之浸假而化澌滅而歸于無有矣由是以觀世所稱繼母之不慈也豈盡天性然哉亦習俗之移之耳而其間卓然特然者豈遂乏人士君子暗于大較因噎懲羮概謂天下無慈繼母吁亦寃矣余觀龎氏事竊怪世之繼母移于習俗者固多而又怪士君子概以世之繼母為移于習俗也至使賢者無以自白不賢者遂得而甘心也其為人心世道關係不小于是作楊繼母傳以風之四先逹傳尚書雍公公名泰字世隆别號誼菴咸寧人成化巳丑進士知吳縣吳濵湖湖漲淪田千頃公作隄民受其利稱雍公隄吳民有妾亡者妾父訟其夫密殺吾女兩月匿尸湖中石下召訊夫夫曰妾逃兩月迹求無效妾父脅財始知死所公使人視尸死當近日乃訊父曰夫夫密殺汝女汝安知匿于石下此又豈兩月尸耶必非汝女汝殺他人女冀得賂耳一拷而服甲辰詔擢為御史吳俗令行皆饋樓船公獨不受民涕泣固饋乃駕至張家灣還之吳人歌曰時苖留犢雍公反舟既守御史彈射不避權貴褒揚不滲卑逺時威寧伯王公典院事語親舊曰棘避驄馬御史也初巡南城四城咸求折訟公曰去有主者民崩首他官不辦也公為折之于是豪右斂迹聲震京師巡居庸紫荆兩關軍民讋服嘗笞梨盜後有首得遺驢者訊之乃前盜官梨者也巡鹽兩淮且滿巡撫都御史以公力遏權要商民咸悅復奏留一年初公至淮竈丁貧而鰥者幾二千人比及二年俱要完室既去淮南人詠曰客邊檢槖渾無硯海上遺民盡有家又曰了却四千兒女願春風解纜去朝天云己亥升鳯陽知府未任丁外艱服闋改南陽唐王奏取民田千頃命下按察勘給公力執不從奏曰民去王誰與守甲辰升山西大同兵備副使公至鎮汰侵漁振頑慢廣墩堡制兵車以禦敵敵自公至不敢襲邊千户韋英誣民百人謀逆巡撫將坐實以聞公不可後百人竟得釋升山西按察使晉獄無寃綱紀振肅有父訟其子失養者公垂涕泣喻子曰爾由襁褓何所食得至今日乃不顧父母之養私其妻子罪當誅其父復號泣乞原曰愚民老且死僅有此兒一時感怒不知至此公始釋之曰慎勿又犯乃卒為孝子尋與太原知府尹珍以事相揭奏逮公錦衣獄無證佐遷湖廣參政湖民被誣為強盜者七八人厯多官不解御史下公勘畢得誣狀盡釋之七人皆圖公像祀于家武昌知府王達貪虐而喜媚權要當述職自布政按察率與上考公艴然曰泰敢黨達以負國邪獨注曰上官畏其暴下民被其虐諸公變色後達卒黜辛亥升浙江右布政使太宰屠公家衆鬻販私鹽鄉人效尤幾至千輩盜竊橫行公先收屠僕扺罪諸寮咸諌公曰此等為屠公禍屠公豈知禁此當非大助耶既而丁內艱未闋吏部辟為山東左布政使固辭不起已未詔起右副都御史巡撫宣府居宣府二年諸所奏議咸當時務士民祗畏邊陲宴安士無室者援兩淮例來訴公復與完娶千人參將李傑不法部下狀其惡公將參奏李跪堂下乞受責以圖自新公曰此亦軍法也縛下杖之三軍股栗已乃譛公于時相時相于李有戚黨言官遂劾公擅打將官罷歸正德丁卯言官潘鐸諸人交薦公有敢死之節克亂之才詔起公為左副都御史董操江或問公此出以何為先公曰請先誅劉瑾耳聞者咋舌時瑾正用事卿佐遷除厚賂行謝鄉人喻公公曰進退在天若奈我何未幾升南京户部尚書又不謝遂勒令致仕仍罰米千石芻千束輸宣府潘鐸諸言官及靈寶許公進鈞陽馬公文升華容劉公大夏十數人皆以薦公獲罪而許公進嘗語人曰吾遙望關西見有二髙一為華嶽一為雍世隆也年八十卒卒時榻下有聲若雷鳴訃聞上賜祭葬先是禮部奏稱雍某才眀剛斷操行清介至老不渝當時以為確論公善事二親比歿哀悼浮禮同學李介庵先生錦博學履道名通天下選公而友比公五試禮部不第勸公仕公曰易不云乎行而未成君子弗用也李君歎服奉身儉素雖貴賔至肉味止一二品初第時歸省鄰人遺以束薪固辭或詰之公曰昔伊尹非其道義一介不以取諸人如何方入仕籍而先貪也巡撫王公會公語曰前辟人不勝厥職後不敢辟人矣公曰寧教人欺公莫教公欺君豈可因此而怠進賢之道王公退語藩臬諸大夫曰雍進士能識大體他日樹立非我輩所及致仕後居韋曲别墅日焚香危坐間出與田翁野叟談稼穡及鬼神事經年不入城市當道諸公求一見不可得族黨有犯必告有司曰某是曰某非幸無為某故屈法所著有司徒奏議五卷正誼菴詩集六卷公無子故遺書多散逸不傳髙陵吕涇野先生柟銘其墓鄭端簡公吾學編有傳馮從吾曰孔子于剛者歎其難見蓋歎真剛之難也公與介菴講眀理學剛大之氣蓋從直養無害中得者彼剛愎自用而自命曰剛是曩者夫子所謂棖也欲焉得剛者也視公霄壤矣大參李公公名崙字世瞻别號靜菴臨潼人聞咸寧李介菴先生講理學遂師事之因僑居咸寧其作止語默一稟于介菴成化己丑進士授山西屯留知縣時大飢公請賑役民鑿河渠民多所全活升户部主事厯郎中升直𨽻廬州知府清慎自持鋤強抑暴興學築堤百廢俱興嵗飢遍厯所屬加意安輯出庫藏銀帛令自易食春初價貴始發倉廪賑濟全活者衆存留所屬起解馬匹令輪流解馬七户資之民困始蘇户口鹽鈔存留稅糧令解價三之二給軍一充府庫軍民兩便巢縣大河水急人每溺死創立浮橋以便往來自用淡薄一書案衣八年始易升河南左參政未幾丁外艱復補山東參政又以內艱歸服闋貧不能治裝遂不出比卒幾無以為殮西安郡守馬公炳然捐俸命官營葬事夫人郝氏不能遣日撫按兩臺奏聞命所司月給米養終其身亦殊典云屯留名宦志稱公好學甘貧不事華飾賑蘇殍餓開鑿河渠民賴安養而廬陽志稱公為人縝密方正亷靜寡欲有古君子風祀廬州名宦何大復撰雍大紀馬溪田纂陜西通志載公行履尤詳今祀臨潼鄉賢祠論曰世之降也士通苞苴充囊槖自謂得計即有清修之士或不芘其妻孥人且以迂腐誚之矣曰亷吏安可為也世道至此可勝浩歎如公一介不苟清節凛然當此狂瀾真稱砥柱嗚呼可以風矣給諫張公公名原字士元别號玉坡三原人師事王康僖公講理學與馬溪田為友言動一于古人𢎞治乙卯舉于鄉正德甲戌成進士授吏科給事中遇事敢言即上書言十二事曰正守令擇將帥理刑獄汰冗食省征斂慎工作恤士卒明賞罰禮大臣開言路崇天道進德學忤旨降貴州新添驛驛丞至貴州學者聞公名莫不裹糧負笈而從經所指授輒充然有得居夷八年困心衡慮用是造詣益精閲厯益熟夷方士風為之一變嘉靖紀元復召兵科給事中公感知遇益以諌諍為己任言皆剴切凡論國家大計及進賢退不肖詞嚴色正凛然風生上亦多嘉納之三年七月以諌大禮被逮杖死闕下先是公有停司禮監請乞一疏中貴人銜之所以廷杖獨重竟至不起年僅五十一耳時禁方嚴弔客無敢至者獨都給事安磐與公同杖幸不死而為之經紀其後事因哭之以詩曰七載夷方謫三年諌議班家聲續臺史封事動天顔弔客何人至秦川有櫬還不才同逐放後死淚潺湲康僖公贊其像曰頴敏絶俗名髙登第剴切過人職居要地不以一時之失竄炎荒而動心不以一時之得復青瑣而樂意利害滿前何敢趨避諌諍報上惟知奮勵其身雖死其烈則著百世之下必有指其事而歎之曰斯人也誠哉乎忠義之士穆廟初奉世宗遺詔贈公官録其後贊曰孔子有言求仁而得仁又何怨公八年處困人易動心一旦賜環竟以諌死所稱求仁得仁者非邪憂國如家視死若飴龍逢氏之儔歟比干氏之儔歟尚書劉公公名儲秀字士竒别號西陂咸寧人舉𢎞治甲子鄉試登正德甲戌進士授刑部主事厯郎中武廟末閹宦用事大獄屢起公不避權幸多所平反録囚蜀中全活尤衆嘉靖癸未以文望分校禮闈所取多名士時同舍郎薛蕙張治道輩與公俱以詩名當時有西翰林之稱甲申出守鎮江郡中大治戊子擢山西提學副使崇雅黜浮士風丕變庚寅升河南左參政尋以前提學時文移之誤罷歸丙申薦起湖廣參政未幾遷江西按察使浙江右布政轉湖廣左庚子晉都察院右副都御史巡撫遼東時遼鎮邊事方殷朝廷倚注公力為保障辛丑之嵗錦義開原東西被兵公督率將士戮力捍禦斬獲數多二次奏捷上降璽書褒嘉仍有白金文綺之賜特召入為户部右侍郎以公有守禦功且久諳邊事改兵部丙午復改吏部丁未擢户部尚書總督倉場督理西苑農事時陶仲文方幸上至以三孤兼禮書蓋一時有八尚書而公于仲文獨不為禮且題桃符于倉場門有六部七尚書獨愧鵷班之列之句仲文過而銜之尋改公兵部尚書二品例應疏辭疏中語及復套事時嚴嵩方借復套謀陷夏言因與仲文交搆上前遂奉旨為民角巾野服優遊田里者十有一載卒年七十六公立朝居鄉毫無訾議止以見忤分宜無故削籍生前未得復冠帶而沒後又因無子不能請恤典卒使一代名臣齎志泉下豈不悲哉公所著有西陂集若干卷少師徐文貞公階為之序蕭沈二先生傳蕭先生余啓蒙師沈先生余受經師也蕭先生諱九卿字良輔别號後山長安人少為邑諸生纍試秋闈不售後棄去設科為童子師余九嵗從先生學先生為人嚴整不輕言笑篤于倫理事父曲盡孝養尤善事兄長其兄貨殖建康夏月中暑歿于舟中先生號泣躬迎扶櫬西歸貨資封識宛然悉歸嫂姪涉獵羣經尤長于易至綱目性理爛熟胸中至老猶手不釋卷生於𢎞治己未三月十六日卒于隆慶壬申十月十一日享夀七十有四孫景德景才俱有守沈先生諱豸字司直西安前衛人讀書灃芑之濵學者稱灃源先生自幼端方正直為郡庠生鍵户誦讀不妄交遊席遇妓輒避之工舉子業每試冠儕輩尤以德行屢見褒于學臺門下執經者甚衆余年十四從先生受毛詩見先生座右大書心術不可得罪於天地言行要留好樣與兒孫二語心竊識之知此可以知先生為人矣坐數竒竟困於棘闈齎志而沒是在萬厯己卯十二月二十九日距生嘉靖乙酉正月十六日夀僅五十有五先生有子士奎為長安邑諸生甘貧苦節有父風馮從吾曰古人云師道立則善人多誠哉是言也今世衰教微師道廢而不講久矣世安得多善人哉二先生生平俱以敬謹自持以嚴毅教人即以余之不肖而不至大有暴棄皆二先生力也撫今思昔可勝感慨因為傳次以識泰山梁木之痛云祭文祭王蓮塘太史文皇明羅俊鼎甲稱先曰余關輔科不乏賢髙陵武功其最著焉維公嗣起於鑠光前吁嗟吕康位不滿德學士大夫歎息靡極物望屬公大拜在即胡天不弔陽九數逼天不公夀人為公哀余所哀者不在鼎台維吕之學維康之才公也兼之後進取裁公昨入京余接光霽公曰小子毋先文藝方今世風流波靡替維余與汝交相砥礪余謝不敏公曰勉諸聖賢學問不在玄虛躬行實踐竭盡無餘余聆公訓敢不拮據公雖云亡言猶在耳思公不置嗟余無倚斯文之厄吾道之否心之悲矣曷維其已嗚呼夭夀理屬渺茫哲人弗永天道靡常輀軒晨發丹旐飛揚摛辭布奠寫我肝腸祭許封翁文德清敬菴先生尊人􅉨翁伯子我師督學關中兮首倡明夫理道嗟余渺渺以猥劣兮叨埏埴于鴻造繄我師學有淵源兮惟庭訓之無違羌執牛耳于中原兮俾斯道之常輝揆元元而本本兮景我翁于有素秪北斗而泰山兮憾識荆以無路聞翁採芹于束􅀈兮紛燁燁其蜚聲奈數竒而屢躓兮竟敝屣乎榮名謝塵世之紛華兮乃潛神于聖學時徜徉于苕霅兮信修姱而抱朴彼蒼夙鑒其垕積兮縱濬發而流長爰篤生夫象賢兮翩鳯翥而龍驤膺南北之銓衡兮復剖符于劇郡繇文衡而京兆兮益潛心于學問以田舍為子舍兮展戲綵于庭除胡我翁之不愸兮遽騎箕于太虛惟有子為不死兮翁雖沒而猶在也我師孺慕以終身兮悲風木而永慨也既逾耄而望耋兮已考德而令終且霑恩于申錫兮肆昭假于蒼穹將瞑目而遊九原兮付乾坤于大運惟頌尼山于啓聖兮夫孰不溯源于遺訓矧從吾等夙奉教于我師兮誼同立雪之遊楊倐聞哲人之既萎兮我心衋然而悲傷寄哀悰于隻絮兮瞻餘不而歌薤露冀靈爽其不昧兮洋洋乎來假而來顧祭西郭先生文萬厯二十六年五月草二日長安馮從吾自孟村訪友歸過興善寺前見一塋內樹有二碑其一將仆余因下車省視之乃故太僕寺丞西郭先生姚公墓也其碑乃故督學虎谷王公題其碑隂王公仍書西涯李公贈詩一律余瞻其碑讀其詩低回留之不能去越數日物色其曾孫姚春姚冬輩因命工扶其碑而樹之碑既樹于是年六月初九日偕友人王境劉必逵蕭耀焚楮酹酒告于先生之墓曰惟公之沒百有餘年迹公行事一代豪賢頃過蒿里低思惘然虎谷題墓錦字如鮮顧瞻豐碑為扶其顛庶幾夙夜永永不遷假令公在願為執鞭尚饗祭孟雲浦先生文嗚呼先生秀鍾伊洛神降嶽嵩力承正學大啓群蒙往嵗辛卯幸挹髙風切劘砥礪受益實鴻越嵗壬辰余别先生之上谷先生恐余之離索也遺余曹尤二先生之語録余受而奉以周旋庶幾不至于顛覆中途請告謝絶徴逐幸有先生教言在儼若坐春風而誦讀故雖閉户三年忘其為獨寐寤宿也比余病痊北上先生業削籍西旋余乃就而訪之閽人辭之甚堅匪先生之過抗實養重之宜然余信宿再訪之始獲與先生把酒而談天由是躑躅風塵稍稍得力者皆賴先生之教為之左右而後先也亡何余亦削籍歸比道先生之里登先生之堂先生已先期使使逆我伊水之陽余時以訂士諸稿就正于先生若闢荆棘而示之以周行瀕行復録數語于便面用致丁寧于不忘余于是益感先生之教不翅更訂頑為西銘如宋儒之程張别後未及浹嵗聞有採薪之憂余方欲裁書而起居先生已辭世而仙逰嗚呼人生在世真似浮漚訃音一至泣涕橫流嗚呼痛哉始余别先生于函關也見其神王氣充竊意必享期頥之算詎意握手之日即為永訣之秋也邪嗚呼先生筮仕計部出納惟平賑飢兩省向隅更生既遷銓部黜陟稱明清通簡要遹駿有聲此世所為先生榮者而余不以為先生榮海內學士大夫方推轂先生大用于時乃竟至此天不可知􅐁先生之官未已也而又􅐁其年􅐁先生之年未已也而又􅐁其嗣此世所為先生悲者而余不以為先生悲蓋余所為先生榮者在逺接二程之傳而近契文成之旨俾伊洛淵源藉以常存而萬古人心有所底止矧有弟有姪又能世其家學則先生亦庶幾乎不死余所為先生悲者在吾道之運厄而斯文之會否同志者方有興起之意則今悵悵乎其無所倚豈直從吾一人抱鍾期之痛于無已也哉嗚呼關洛相距僅千里餘末繇奔奠徒切欷歔搦管歌些痛不盡書先生有靈或其鑒豫嗚呼尚饗學會公祭王經軒文維萬厯二十六年嵗次戊戌八月甲寅朔越二十七日庚辰學會友人馮從吾偕同會某某謹以牲帛庶儀致祭于明故四川資陽縣知縣經軒王公之靈曰嗚呼關中理學推重橫渠而橫渠之學乃自晚年得之觀勇撤皋比一變至道之贊可知也嗚呼人患不志于道耳苟志于道即蚤悅孫吳晚逃佛老何損焉以今觀于我公非所謂老而志于道者邪公少年登科以風流人物自命雖未嘗從事于學而本根稟賦原自不凡逮宦逰歸杜門謝客者十年人或疑公為功名不遂而甘自廢棄也及至前嵗丙申公約不佞輩立會講學于寶慶寺後從公講論間得讀公批點陸象山文集陳白沙詩教諸書見其字字句句雌黃精確人人始知公十年杜門蓋耽心于斯匪以功名不遂之故也而向所為疑公者不惟憬然悟抑且赧然退矣寶慶月凡三會公每會必至每至必早寒暑風雨未嘗少輟諸同志赴會者必先問王先生至否每會公必發一問端使人人有所憤悱雖講解發明時或有所謙讓而聫屬鼓舞則直任之而不辭三年以來人人踴躍而興起者秋毫皆公力也今不佞輩方幸得公為依歸而公已遽然長逝矣嗚呼痛哉始公之倡斯會也每會見公神王氣充終日與言不見厭倦人皆以此卜公享耄耋之算而今以一疾遽至于此嗚呼痛哉公生平瀟灑坦夷不問家人生産業故晚年家益窘甚而公毫不介意惟惓惓于問學當公病時猶勉強赴會二次至七月朔而公病力始不克赴會矣然猶厭家居多冗也靜攝于香城寺香城距寶慶不數十武諸同志當會期必先過香城候公而後赴會人人以不得公為歉而公亦自以為力不能赴會為歉仍伏枕書數語以代面講比至臨終竟無一語及家事第曰順受其正順受其正云耳嗚呼若公者真所謂甘貧好學死而後已者哉公知學雖晚而自知學之後汲汲皇皇恨不能一蹴而進于聖賢之域而又汲汲皇皇恨不能舉同志之士俱一蹴而進于聖賢之域雖忌者之搖奪百出而公之講自若也至于病中深以知學之晚自悔而又深以晚而知學自幸嗚呼不悔不幸不幸不悔觀公之悔與幸而公之學可知矣公知學雖晚又何損于公哉勇撤皋比一變至道人皆可以為橫渠特人不自信耳嗚呼公往矣某等悵悵乎其無所依矣斯文之痛安所紀極今為公三七之辰公具生芻聊以寫哀公其鑒之乎否邪嗚呼痛哉尚饗祭韓旻阜郡丞維萬厯四十六年嵗次戊午七月丁亥朔越二十二日戊申原任河南道監察御史通家治生馮從吾謹以牲醴香楮之儀致祭于明奉政大夫陜西西安府同知旻阜韓老公祖之靈曰嗚呼公真不起邪抑傳者誤邪頃公𣙜稅潼關瀕行辭余依依不忍别去居無何而公訃至矣嗚呼公真不起邪抑傳者誤邪公初司李鳯翔也刑敷僑愛清凛楊知政聲藉甚關輔時余杜門謝客雖聞問未通乃私心時嚮往之而公不以余為不肖先施手翰惓惓問學其于善利舜跖之辨尤元元本本不落言詮而余亦妄以一得為復今往返書札尚藏笥中若公者其以理學為政事者耶余方望公內召蘭臺代狩西土以大展所學而竟以直道不偶量移西安郡丞西安為余郡余庶得朝夕請益心竊自幸而余以多病莊居非公事不至偃室公不以我為簡而禮遇有加焉愧非滅明辱知子遊可不謂千載一時哉公職司撫民諸凡善政為秦人士造福無量而公又以亷介見知于填撫中丞特檄𣙜關人人方期公旦夕有特擢而公不待矣嗚呼痛哉公年不滿德位不配望人皆為公哀而公之尊人致位金紫公之兩弟聨翩鄉書而公之象賢又少年與偕計父子祖孫兄弟齊名競爽不翅三蘇且兩地甘棠並稱蔽芾公于人間世亦庶幾無遺恨者惟是秦人士失所天而海內失一正人君子不能不為梓里痛為世道痛耳抑余之痛更有進于此者方今邊事孔棘中外震驚以公之才望使得借觀察治兵于邊則出竒制勝庶于疆場大有禆益而公今已矣寧不益重余杞人之憂哉且近世非學者多信學者少如公以鄰邦大夫執弟子于深山野人其沖襟逺韻今可數數見乎西蜀理學自南軒鶴山東窗後代不乏人余方幸公羽翼斯道自南軒而上接孔孟之傳而今若此此夫子所以有喪豫之悲也嗚呼余之痛公豈徒僅僅如世俗生死存亡之感也歟哉嗚呼錦江涸波玉壘摧峯萎矣哲人渺矣髙蹤爰筆寫哀痛衋填胸桐鄉尸祝如覿音容嗚呼痛哉尚饗祭伯兄文維天啓元年嵗次辛酉三月癸卯朔越二十一日癸亥太僕寺少卿期服弟從吾率男嘉年孫湛若等謹以剛鬛柔毛清酌庶品之儀致祭于恩詔冠帶貢士伯兄斗翁先生之靈曰嗚呼痛哉兄胡遽背棄弟而逝耶先是吾父之棄養也兄才十八歲弟才九歲未及五年而吾母亦棄養彼時弟嬰危病生死未卜安敢望其成立而兄飲之食之教之誨之匪手擕之言示之事匪面命之言提其耳故弟之得有今日者皆兄之以也弟即有胸無心寧不知感頃弟仗庇叨賜環之命而兄亦欲就選銓曹方欲偕兄北上而不意兄一疾至此嗚呼痛哉兄夀踰古稀有子有孫又能世其家學則兄亦可以無憾惟是從吾以六七十年相與之兄弟而一旦有生死之别鶺鴒增痛手足傷懷有不能為情之甚耳嗚呼痛哉居諸易駛倐忽三七聊具薄奠少盡哀思惟兄鑒之嗚呼痛哉尚饗詩關中四先生詠涇野吕先生涇野吕夫子矯矯崇正學挾册逰成均馬崔同切琢馬溪田崔後渠射䇿冠時髦聲華何卓犖慷慨批龍鱗封章凌五嶽講學重躬行乾坤在其握吁嗟橫渠後關中稱先覺溪田馬先生卓彼馬光祿聲望髙山斗弱冠崇理學平川稱畏友立朝無多日強半在畎畝富貴與功名視之如敝帚垂老學逾虛一步不肯苟吁嗟如先生百代名難朽苑洛韓先生偉矣韓司馬造物鍾竒異讀書探理窟著作人難企生平精樂律書成雙鶴至立朝著偉節居鄉談道義繄有五泉子孝弟稱昆季嗟余生也晚景行竊自愧斛山楊先生挺挺楊侍御直節髙今古人知直節難不知問學苦獄中究理學周錢日揮麈周訥溪錢緒山嵗寒節彌堅不茹亦不吐之死誓靡他淵源接鄒魯嗟彼虛憍人敢與先生伍訥溪緒山時俱以事下獄觀書吟立言先立意意定始修辭欲得辭中意當看未立時善利圖聖狂分足處善念是吾真若要中間立終為跖路人自省吟日用平常自有天如何此外覔空玄請看魚躍鳶飛趣多少真機在眼前千聖相傳只是仁滿腔惻隱始為真納交要譽終何用收斂精神做主人讀書切己工夫只恨少會心言語豈須多而今識得斫輪意甘苦疾徐奈若何輕言能悟即非悟漫道無疑便是疑終夜伊吾渾不寐清風明月坐來時丙申春日與同志論學因及莫春章有感為賦十二絶春風沂水雨初晴童冠新成洙泗盟兩兩三三間玩適歸來歌詠不勝情鼓瑟吾門樂有餘強兵富國竟何如縱然堯舜勳華業一點浮雲過太虛幾日清間幾日忙春風沂水任相羊莫教童冠空歸去贏得當年點也狂行藏用舍幾人同曾點原非鄙事功一自詠歌歸去後乾坤何處不春風信步蹻來自坦夷何須沂水始相宜風流不得前賢意晉室清談又足悲富貴功名自有時人生何苦日攢眉不如曾點風雩樂省得經營也是竒服成麗景莫春天童冠風雩亦灑然此日詠歌無足異簞瓢不改始為賢簞瓢不改亦非賢人不堪憂徒自憐俗學不知吾性樂丢過自己覔顔淵吾儒真樂自天然何必求仙又學禪沂水風雩多少趣孔顔樣子此中傳憶昔宣尼發憤年曲肱疏水樂悠然狂夫但得些兒意解脫人生名利緣人生有樂豈無憂憂樂從來為忮求不忮不求隨處樂春風沂水自優遊鳶飛魚躍在天淵夫子安能不喟然若使中間稍有物任他行樂亦為偏勉學寥寥聖學幾多時春色今看上栁枝世路險夷渾是夢人情反覆總成癡睎賢睎聖千年事不欲不為一念知莫把嵗華容易過關閩濓洛是吾師讀易復卦一陽來復見天心此際真為不易尋若向靜中參得透那知往古與來今天心方動見微陽一念獨知夜未央悟到庖羲未畫處天根月窟任徜徉答友人問坐馳方寸茫茫易外馳外馳不識欲何之能于之處常防檢便是主翁在室時方寸茫茫易外馳外馳知得是誰知能知即是能收處一榻清風獨坐時讀割烹章人生取與要分明少不分明百事傾一介莫言些小事古今因此重阿衡古今因此重阿衡一介原來道匪輕不是聖賢局面小格天大業此中成野叟耕莘避世情直將堯舜樂生平假非一介嚴辭受千載誰為辨割烹千載誰為辨割烹當年心事鬼神驚吾儕有志希賢聖肯把塵埃誤此生余自戊戌卧病閉關九年至丙午冬始勉赴學會感而賦此衡門之下可棲遲泌水洋洋足樂飢旨矣詩人非漫我病夫今日益相宜藥物頻為供塵情總不知閉關垂十載如在羲皇時偶書朅來學問尚繁文千古真傳豈易聞試問此心空洞否池蓮窗草正芳芬朅來學問尚玄虛千古真傳妄掃除試問此身實踐否天心月到水成渠戊申莫春偕王惟大郡丞宜化汝刺史劉孟直郡丞楊工載進士周淑逺大參張去浮學慱宜叔尚文學講學太華山中同志至三百餘衆徴會來蓮嶽良朋喜共逰白雲時去住野鳥自夷猶雨霽千巖翠春深萬木稠山靈真有待吾道重千秋青柯亭榭倚山隈喜見儒冠濟濟來心性源頭原有辨覩聞起處豈容猜三峯直欲凌霄漢九曲常看浸草萊此會莫言間眺玩百年道運自今開讀數仞章示門人數仞宫墻門自開百官宗廟亦雄哉秪因接引無同志遂令及門空自回遂令及門空自回宫墻外望亦堪哀從今覺悟求師友攜手同登天上來數仞宫墻門自開人人皆可任徘徊秪因自己甘封閉遂令階前長緑苔遂令階前長緑苔一朝剪却即蓬萊升堂入室誰無分努力前途莫浪猜讀陋巷章自朂命定難逃陋巷貧機關徒惹鬼神嗔不如打疊心源淨做箇羲皇以上人命定難逃陋巷貧奔忙徒惹世人嗔不如閉戶焚香坐做箇乾坤無事人中和吟六言十絶此心常是中和猶恐客氣易肆若把此心放開客氣何所不至平居此心敬事猶恐視事無傷若把無傷視事可憐其禍將長道理平常看透猶恐一時差訛若以道理為迂將來決裂必多學問終日相講猶恐行時茫然若是只行不講行錯誰肯相憐未發之中得力猶恐已發不和若于未發不慎發不中節奈何禪學空談性命面壁求之渺茫不知性命實理只在日用平常吾儒自有精微未發之中便是離中求之渺茫又與佛氏何異控制六馬猶易駕馭一念為難喜怒哀樂中節才得身世平寬不覩不聞非無千古聖學真傳靜中看此氣象位育就在目前氣象非落幻景觸目盡是天機必須戒慎恐懼才得魚躍鳶飛夏日郊居有以腴田求售者余辭去賦此志喜生平甘寂寞那得買山錢幸有先人業耕耘度嵗年耕田守祖業講學繼儒先此外無餘事逍遙到百年寄懷鄒南臯先生憶昔嬰鱗出帝畿志完聲價古今稀千年絶學君能繼一點真心我不違桃李有情開絳帳乾坤無事掩柴扉何時負笈來相訪五老峯頭爛醉歸與同志講學太華書院太華峯頭好振衣雨晴百卉競芳菲孔顔博約傳心訣堯舜危微泄性機玄鶴逺從天外至白雲時傍洞中飛工夫須到真源處才得吟風㺯月歸少墟集卷十七
