body:
  text: 少墟集卷十二明馮從吾撰語録關中書院語録綱常倫理要盡道天地萬物要一體仕止久速要當可喜怒哀樂要中節辭受取與要不苟視聽言動要合禮存此謂之道心悖此謂之人心惟精精此者也惟一一此者也此之謂允執厥中此之謂盡性至命之實學右書允執堂屛聖賢之學總只在此心故虞廷人心道心之説乃千古聖學之原而解者多謂道心非人不麗而人心非道不宰不必屏去人心而别覔道心也舉吾之人心一稟於道即云道矣余向來亦為此説所誤不知人心道心不容並立如綱常倫理能盡道便是道心不能盡道便是人心喜怒哀樂能中節便是道心不能中節便是人心視聽言動能合禮便是道心不能合禮便是人心極容易辨非以喜怒哀樂視聽言動為人心以中節合禮為道心也今曰舉吾之人心一稟於道即云道是舉吾之喜怒哀樂一稟於節舉吾之視聽言動一稟於禮即云道是明以喜怒哀樂視聽言動為人心而以中節合禮為道心矣以中節合禮為道心不差而以喜怒哀樂視聽言動為人心不知喜怒哀樂視聽言動可以屏而去之乎以必不能屏而去之者為人心是明白左袒人心回護人心也人心屏而去之猶恐不盡而以必不可去者當之何怪乎人心日熾道心日微令人猖狂而無忌也哉若以視聽言動為人心則亦可以綱常倫理辭受取與仕止久速為人心矣可乎類而推之如好問好察是道心不好問好察便是人心隱惡揚善是道心不隱惡揚善便是人心執兩端而用中是道心不執兩端而用中便是人心益為明白若以視聽言動為人心是以問察善惡兩端皆為人心也愈無此理矣吾儒曰不邇聲色不殖貨利此聲色就不好一邊聲色説非耳得之而成聲目遇之而成色之聲色也而或者宗異端不即不離之旨倡為不離聲色不溺聲色不絶貨利不染貨利之説夫不離不絶人所易見自己已諱不去所以不得已只得説箇不溺不染不知既不離不絶矣又烏知其溺不溺染不染哉且如理所不當離的惟恐其不即理所當離的只不離便不是又何論不即不即不離明白為當離而不離者諱而人多不及察何也使人有兩箇心一箇是人心一箇是道心有何難精惟其只是一箇心所以難於辨别難於分析所以異説得易於誤人所以學者多易為異説所誤這等去處關繫不小此精一執中堯舜所以開萬世道學之原也學之一字創自説命而孔子揭之為萬世鵠講學者講其綱常倫理如何能盡道仕止久速如何能當可能盡道能當可得處在何處不能盡道不能當可失處在何處這等去處不容不講講的明白痛快心上默默有透悟處默默有自得處然後能一一盡道一一當可盡道當可非可以襲取而卒辦也孔子曰學而時習之不亦説乎學者學此者也習者習此者也説者説此者也樂者樂此者也我能盡道我能當可我心自説何論人之知不知又何愠此君子之學非孔子吾誰與歸有朋自遠方來不是樂其人知若因其人知而樂便因其人不知而不樂矣安得不愠其何以為説其何以為君子朋來而樂者樂其綱常倫理大家俱能盡道樂其視聽言動大家俱能合禮樂吾道之得人樂斯文之有托非專為人知我而樂著在自家一人身上論也道心為善為君子人心為惡為小人左袒人心者又倡為有善之善有無善之善之説如周程張朱説他不好不得心欲退之而無其辭曰此有善之善如操莽溫懿説他好不得心欲進之而無其辭曰此無善之善主意愈竒立論愈妙關繫愈不小此人心道心辨之不容不嚴也人心道心本自判然而或又借孟子仁人心也之説以證人心之即道此其説愈精而其左袒人心愈甚不知虞廷之所謂人心人字對道字言是不好字眼如公私天人理欲之類孟子之所謂人心人字不對道字言是渾淪字眼猶云仁即我之心云耳虞廷之所謂道心道字對人字言是好字眼孟子之所謂道二仁與不仁而已矣道字不對人字言是渾淪字眼猶云世間只有此兩條路云耳聖賢論學下字眼各有不同安得借孟子仁人心也之説而證人心之即道也公私天人理欲之類分别人心道心極明白故程子謂吾學雖有所受天理二字却是自家體貼出來天理人欲四字乃程子破天荒語真得洙泗正脈唐虞真傳而或者一則曰天理人欲之分論極有病二則曰天理人欲之言亦自不是又曰若天是理人是欲則是天人不同矣果如此説是混天人理欲人心道心而一之也豈有此理人心道心其謬雖去千里其差止在毫釐儘去精一尚恐混淆而今曰天理人欲之分論極有病令人滅天理而縱人欲關繫豈小程子天理人欲分論既不是不知虞廷人心道心之分論是否或曰書云人心惟危道心惟微解者多指人心為人欲道心為天理此説非是心一也人安有二心自人而言則曰惟危自道而言則曰惟微罔念作狂克念作聖非危乎無聲無臭無形無體非微乎云云夫以人心為人欲以道心為天理説得極是而以為不是何也既曰心一也人安有二心自人而言則曰惟危自道而言則曰惟微自當云心一也自人欲而言則曰人心惟危自天理而言則曰道心惟微何等明妥而必於闢天理人欲之説何也惟危惟微都就本體説惟精惟一才就功夫説今以罔念作狂克念作聖解惟危何也異學誤人雖賢者不免如此又曰天理人欲之分論極有病自禮記有此言而後人襲之記曰人生而靜天之性也感於物而動性之欲也若是則動亦是靜亦是豈有天理人欲之分若不是則靜亦不是豈有動靜之間哉其説如此余以為若是則便是天理若不是則便是人欲如何以分論為有病彼以是不是闢天理人欲之論余即以是不是破天理人欲之關心之精神是謂聖出孔叢子而不載於論語此後人假借之言非孔子告子思語此句却有病不知心之精神是謂聖果道心之精神耶抑人心之精神耶如果道心之精神也則心之精神誠是聖如是人心之精神也則心之精神是謂狂豈得槩言聖哉蓋精神二字在好處固説得在不好處亦説得在吾儒固説得在二氏亦説得豈可不辨孟子曰心之所同然者何也謂理也義也以理義言心才是道心不以理義言心便是人心必曰心之理義是謂聖方為無弊耳如玄之又玄衆妙之門都是混帳兩可模稜話在人心道心上都説得必如易所謂成性存存道義之門始無弊問虞廷説人心道心而上蔡謂心本一支離而去者乃意爾何也曰心本一自念起而後有人與道之分故曰欲正其心者先誠其意上蔡之言從大學來蓋心為意之主宰意為心之發動本只是一箇心只因一念發動處遂名為意耳上蔡之所謂心與大學之所謂心對意而言也虞廷之所謂心兼意而言雖不言意而意與知自在其中也大學因虞廷言人心道心恐人無處覔心故説出箇意字見此心一念發動才有人與道之異不然一念未起鬼神莫知從何分辨欲正其心者先誠其意正欲人在此心一念發動處分辨人心道心即下精一之功耳惟精者精察人與道之分不使之支離而去也惟一者心本一而一之乎道不至於支離而去也上蔡與大學之言正是人心道心惟精惟一的注解解得何等痛快問詩云小心翼翼昭事上帝張子云大其心以體天下之物程子又謂心有主則實無主則虛何也曰不當在大小虛實上論只當分别人心道心如是道心則小也是大也是有主也是無主也是如是人心則小也不是大也不是有主也不是無主也不是詩與程張之言皆是在道心一邊説所以無所不可易曰百姓日用而不知不知便是人心一知便是道心一知則日用的便是故曰人莫不飲食也鮮能知味也飲食只是一箇飲食人心道心之分只在知味不知味耳綱常倫理視聽言動衆人與聖人都是一樣只是盡道不盡道合禮不合禮便分人心道心便分聖人衆人矣天下豈有兩樣綱常倫理兩樣視聽言動耶或稱為聖或流為狂只在一念操舍存亡飲食知味立躋虞唐勉旃同志慎此毫芒世之點檢於綱常倫理喜怒哀樂視聽言動者固多點檢於形迹而不知求之於此心求心者又多求之於虛無寂滅而不知求之於綱常倫理喜怒哀樂視聽言動之際此心學所以愈晦若反觀內照以心為主直從念頭初起處提醒此心精之一之綱常倫理一一要盡道喜怒哀樂一一要中節視聽言動一一要合禮時時察識時時體認造到心體澄徹本原得力處則隨其所遇不必一一推勘而綱常倫理自然盡道喜怒哀樂自然中節視聽言動自然合禮故曰從心所欲不踰矩從心所欲不踰矩是論成功非論用功也余所云云是論用功非論成功也孔子十五志學不惟志不踰矩即志此從心所欲不踰矩苐從心所欲不踰矩不能徑造故孜孜一生惟知有此志此學縱學到從心所欲不踰矩地位而志學一念猶然十五之心一息尚存此志不容少懈此孔子之心學所以上接虞廷之傳也若心之不存而望視聽言動之檢固無是理若視聽言動之不檢而曰我能存心亦豈有是理哉言心而不言矩言成功而不言用功此心學所以愈晦而成功所以終不可幾也詩云左之左之君子宜之右之右之君子有之維其有之是以似之學者只當在維其有之上用功不當在是以似之上用功學問之道全要在本原處透徹未發處得力本原處一透未發處得力則發皆中節取之左右自逢其原諸凡事為自是停當不然縱事事點檢終有不湊泊處此吾儒提綱挈領之學自合如此而非謂日用常行一切俱是末節可以任意不必點檢也孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也又曰博學而詳説之將以反説約也可見學不到自得終是支離終不能取之左右逢其原若不深造以道而曰我能自得又無是理世之學者喜談左右逢原自得之妙而厭深造以道博學詳説之功是未嘗有之而欲其似之也恐終無似之之日矣學問功夫全要曉得頭腦主意深造以道主意全為自得博學詳説主意全為反約博學詳説正是解深造以道反約正是解自得以自得為主意以深造以道為功夫以左右逢原為自得之妙此孟子生平學問大得力處學問曉得主意才好用功夫用了功夫才得到妙處若只談妙處而不用功夫則妙處終不能到若泛用功夫而不曉得主意則功夫亦徒用矣此空虛之學與支離之學皆聖道所不載也問先立乎其大則小者不能奪也若只在喜怒哀樂上一一要中節視聽言動上一一要合禮不幾於舍本而務末乎曰不然先立乎其大不是懸空去先立乎其大懸空在心上求正是在喜怒哀樂視聽言動間辨别人心道心精之一之務使道心為主而人心盡化討得此中湛然虛明如雲之定如水之止如鏡之空如衡之平此之謂先立乎其大而喜怒哀樂自然中節視聽言動自然合禮目耳口體小者自不能奪也若丢過此心不去精一而徒欲喜怒哀樂中節視聽言動合禮此真舍本而務末若不於喜怒哀樂視聽言動間精之一之而别求先立乎其大此又異端懸空之學恐大者終不能立而小者終不能不奪也吾儒論心正在綱常倫理日用常行間精之一之未感寂然既感豁然無事廓然有事沛然此心之所以為妙若丢過綱常倫理日用常行而懸空求心未感無事之時似覺寂然似覺俗心已化而一有所感便覺茫然便覺俗態復生觀於既感之茫然而知未感之寂然非真寂然也觀於既感之俗態復生而知未感之俗心已化原非巳化也不過懸空想像暫暇片時而已欲根未拔而欲欲之不縱理根未培而欲理之不消其可得乎此所以今日悟道明日放恣小者任其所奪而猶曰我能先立乎其大也悲夫可為心學陽九一慨問先正有云道心者率性之謂未雜於人人心則雜於人而危矣見孺子入井而惻隱率性之道也從而內交於父母焉要譽於鄉黨焉則人心矣飢而食渴而飲率性之道也從而極滋味之美焉恣口腹之叨焉則人心矣惟一者一之於道心也惟精者慮道心之不一而或二之於人心也道無不中一乎道心而不息是謂允執厥中矣何如曰説得極是只飢而食渴而飲二句不是蓋異端之所謂性正指飢食渴飲之類指欲而言所以告子有三品之疑吾儒之所謂性專指見孺子入井而惻隱之類指理而言所以孟子斷然有性善之説今以內交要譽極滋味恣口腹説人心極是只是説道心率性兼理欲兩項言不是耳如曰孩提知愛稍長知敬此良知也極是若曰飢之知食渴之知飲亦良知也便説不得矣一邊屬理一邊屬欲今把良知朦朧説此所以君子以循理為致良知而小人亦以縱欲為致良知耳况以欲為良知而以遏欲為致則功夫又不合本體矣本體源頭處一不清楚此所以後來流弊無窮曰如何得清楚曰只消下一轉語曰食之知味飲之知味此良知也便不差矣且知味豈是知滋味之美惡是知其當飲不當飲當食不當食知其當飲當食而飲食之知其不當飲不當食而不飲食之便是致良知率性良知都是就理一邊説蓋異端以甘食悅色欲字為率性為良知為自然而然而以吾儒愛親敬長理字為矯揉為造作為勉然而然所以吾儒不得已直指本體曰吾儒這箇理字是天命之性是率性之道是自然而然之良知非矯揉非造作非勉然而然也今以理欲混言率性混言良知又何怪縱欲無忌者之借口也問致良知與精一之説同否曰綱常倫理盡道不盡道喜怒哀樂中節不中節視聽言動合禮不合禮孰為道心孰為人心别人還看不透自家良知却一毫瞞昧不得於此精之一之便是致良知故曰慎獨又曰無為其所不為無欲其所不欲如此而已矣問虞廷言心而孔孟又言性何也曰性者心之生理非心之外别有性也如心是心心之仁義禮智是性故曰君子所性仁義禮智根於心如丢過仁義禮智之心言心是人心非道心矣孟子所謂性善蓋直指虞廷之道心言也此理甚微故曰人之所以異於禽獸者幾希若佛氏以所以能知覺能運動的這箇言性而不以所以能中節能合禮的這箇言性是言氣質之性嗜欲之性而非言義理之性也生之謂性食色性也皆是就氣質嗜欲一邊説若生生之理食色之理才是吾儒之所謂性故曰性善孟子道性善是就生生之理言而非直以生死之生為性是就食色之理言而非直以食色為性也若丢過理而專以生為性專以食色為性則人又何以異於禽獸哉孟子道性善是就氣質中提此一點道心為千古辨幾希之一脈也關繫豈小孔子言性相近至戰國時又有三品之説有性惡之説孟子獨言性善何也蓋以天地觀之天本大生然天不能無旱潦地本廣生然地不能無肥磽孔子言近是兼旱潦肥磽説孟子言善是專就大生廣生處説若三品性惡之言則是因天有旱潦而疑天之不能大生因地有肥磽而疑地之不能廣生也誤之甚矣存心養性辭平而意串存是收放心養是養德性存如擇種下地養是有了此種方可涵養蓋心有道心人心之别能存則人心去而道心現矣養也者即勿忘勿助養此道心之謂也夭壽不二即知之盡即知性也修身以俟只是存養無間立命合知天事天言之即易所謂先天而天弗違後天而奉天時至此則天人合一而造化在我矣問唐虞之際洪水艱食天下正是多事而虞廷獨揭人心道心更不及事功一語恰似迂濶而堯舜事功獨卓越千古何也曰心者政事之源而精一執中正修政立事之根也源潔流清根深末茂此堯舜之事功所以獨卓越千古耳三代以後講心學者多見謂迂而君臣上下爭馳騖於事功又何怪乎事功之反不及古人也心學不明關繫千百年國家治亂不小故不容不講問心體本空空洞洞本一物不容而今綱常倫理又要盡道天地萬物又要一體仕止久速又要當可喜怒哀樂又要中節辭受取與又要不苟視聽言動又要合禮其功夫不幾於支離繁難與一物不容之本體相左乎曰不然子徒知心體本空空洞洞一物不容而不知心體雖空空洞洞實萬物咸備故曰萬物皆備於我矣萬物皆備於我可見我必如此一一盡道一一中節一一合禮才謂之反身而誠才得樂若反身不誠不惟理勢上過不去即心上也過不去自不容不強恕而行反身不誠原是有物焉以間隔之原是有物焉以疑二之以一物不容之本體而雜之以物所以反身不誠所以不能一一盡道一一中節一一合禮非本體之不能皆備也強恕而行不過去其所以間隔者而自無不通去其所以疑二者而自無不一當下便一一能盡道一一能中節一一能合禮當下便合本體故曰求仁莫近焉如此用功何等易簡直截而反以為支離繁難何也若以此為支離繁難將綱常倫理不論盡道否喜怒哀樂中節否視聽言動合禮否而第曰心體本來無物以此為易簡直截可乎且心體如何見得萬物皆備曰如孩提知愛稍長知敬此便是綱常倫理本體原來盡道處如覩天清地寧而色喜覩山崩川竭而色憂此便是天地萬物本體原來一體處如喜怒哀樂能中節心下便覺快樂不能中節則心下便覺愧悔此便是喜怒哀樂本體原來中節處推之仕止久速辭受取與視聽言動莫不皆然可見心之本體雖一物不容實萬物皆備也但以一物不容之體而間之以物二之以物所以不能萬物皆備耳精之一之不過辨别人心道心去此一物不容之物以復此萬物皆備之物豈於本體上有所增加此正是功夫要合本體處安得謂之支離繁難也哉世之學者止知本體之一物不容而不知本體之萬物皆備此所以多墮於虛無之病而無實地之可據令人猖狂而自恣也沖漠無眹萬象森然萬象森然復沖漠無眹此精一執中之學所以得統於天而萬世學者之所不能違也問一物不容萬物皆備景象時書院新闢階除灑掃花樹森隂令人可愛因顧諸生謂之曰階除灑掃此便是一物不容景象花樹森隂此便是萬物皆備景象若異端之一切俱無是無蕪穢併無花樹而一切俱無也世俗之無所不有是有花樹併有蕪穢而無所不有也於理通乎諸生聞之躍然少墟集卷十二
