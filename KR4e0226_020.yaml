body:
  text: 高弟第事迹多不詳故另列小傳于前而編中斷自橫渠張子始一次序各以時代庶古今不相混淆一宋元諸儒有史傳諸書可考不佞稍為纂次十五仍舊至國朝諸儒中多僣妄論著文之工拙不恤也一國朝諸儒特録其所知蓋棺論定者其所未知者姑闕之以俟
  hash: sha256:a65d492185b863df2d4f678cd85034590eab341b9c4abcf80c249f25a33fe3e9
