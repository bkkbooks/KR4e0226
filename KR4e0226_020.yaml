front:
  text: 關學編凡例一是編専為理學輯故歷代名臣不敢泛入一理學如秦子南燕子思壤駟子從石作子明俱孔門
  hash: sha256:eaf8142e52d35ad001de55b7227629035fd519f5d9b797ec2dbc8d7499defd1b
