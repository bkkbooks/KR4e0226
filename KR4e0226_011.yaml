body:
  text: 少墟集卷十一明馮從吾撰池陽語録河北西寺講語萬厯辛亥孟冬草一日先生至池陽謁王端毅公王康僖公馬溪田先生張玉坡先生溫一齊先生祠墓門人數十人從之是日天氣睛明冬日可愛兩兩三三煞有春風舞雩之意詠歌歸來門人韓學博及諸生百有餘人候講於寺先生曰吾關中如王端毅之事功楊斛山之節義吕涇野之理學李空同之文章足稱國朝關中四絶然事功節義係於所遇文章係乎天資三者俱不可必所可必者惟理學耳吾輩惟從事於理學則事功節義文章隨其所遇當自有可觀處不必逐件去學而後謂之學四先生也先生曰事功如端毅節義如斛山真為國朝第一然學端毅者不當學事功學斛山者不當學節義何也假如端毅當日上疏後即觸怒逮獄遭譴播遷如斛山則端毅當以節義名不得以事功名矣如斛山當日上疏後䝉溫㫖嘉納陟華躋膴則斛山又當以事功名不得以節義名矣可見吾輩只當就二公同道二公易地皆然處學不當在事功節義上學但不知二公同道處何在易地皆然處何在願共思之毋草草看過問理學與舉業同異先生曰以舉業體驗於躬行便是真理學以理學發揮於文辭便是好舉業原是一事說不得同異又曰今之務舉業者多在文字上求好不在心術上求好不知七篇者有形之舉業固要好一念者無形之舉業尤要好不然心術一念少差則終身事業可知又何論功名哉問明年科年屈指試期止有數月欲務舉業恐妨理學欲務理學恐妨舉業奈何先生曰理學使妨於舉業則理學亦異端談𤣥說空之學非吾儒進德修業之學矣理學原不離舉業如明年科年諸君中有自家應舉者有子弟應舉者時日已迫工夫不多父兄固當督責乎子弟自家亦當督責乎自家勿事優遊玩愒月日如此便是學否則非學收心靜養簡事寡交將一切聲色貨利屏之絶之如此便是學否則非學看書作文時務要潛心體驗就在此處發揮道理使一一可見諸行事如此便是學否則非學絶奔競營為之念下忘食忘寢之功衆皆馳逐我獨恬淡如此便是學否則非學其得雋也念縣官之寵遇何為而布素不改其偕計也念千里之跋涉又何為而株守彌堅如此便是學否則非學從此得第則仕途一味奉公而不敢萌榮身肥家之念及至懸車則林下一味談道而不敢忘耕田鑿井之恩如此便是學否則非學樹標一代流芳千古皆決於今日之一念毋以今日舉業為妨功而廢業也竊願諸君從此打起精神發起志願斷斷然欲以為賢而為聖不專專欲以為解而為魁則豈惟自家不負科名即父兄亦永錫之光不惟父兄永錫之光即百二山河亦與有榮施矣倘見不及此第曰時日已迫工夫不多方且舉業不暇奚暇理學無論今日所讀何書所作何文日用飲食鮮能知味即使口耳記誦幸博巍科則功名到手心意滿足倘萬一謙虛者化而為驕傲謹守者變而為縱恣彼時自家固不能把持乎自家父兄又豈能約束乎子弟臨渴掘井臨淵羡魚方曰如何做人不亦晚乎為今之計莫若就在今日勘破將來一著養成終身根本不出舉業直躋聖域豈非一舉兩得之道哉若外舉業言學是異端談𤣥說空之學非吾儒進德修業之學也不知諸君以為何如問在止於至善先生曰聖賢學問只在心性用功性者心之生理人性原來皆善至善者性體也止於至善則當下直合性體矣五霸不知性體至善故假仁假義二氏不知性體至善故絶仁棄義告子不知性體至善故有杞栁湍水之議若知性體至善學問止於至善則五霸自不消去假二氏自不能絶棄告子紛紛之議亦自悟其非矣此曾子之學獨得孔氏之宗而萬世學者之所不能違也問知止止字是死煞字否先生曰論語止吾止止字是死煞字此止字是活字孔子十五便知止於從心所欲不踰矩所以終身學問都有著落一知止則胸中便有主張便有無窮妙趣當下便活潑潑地定靜安慮正是知止妙處非如槁木死灰置一物於此而後曰止也聖人正恐人誤認止字為死煞故以定靜安慮形容得止之妙問中庸大㫖先生曰中庸一書如一篇論天命章是冒頭仲尼曰君子中庸是主意中間引舜顔武周反覆發揮君子中庸一句尚絅章是大結首章自天說到人以本體為功夫順言之也末章自人說到天以功夫合本體逆言之也故曰易逆數也知易則知中庸矣畫前原有易删後豈無詩知畫前之易則知天命之性先生曰只中庸其至矣乎一句費聖人多少心堯舜授受大事也止說一箇中字孔子又恐人看得中字太高逺故不得已加一庸字若曰中者庸也既補出一箇庸字又恐人看得太淺近又贊之曰其至矣乎可見這箇中字非高非逺非卑非近真愚夫愚婦可與知能而天地聖人所不能盡也子思一本中庸只是發揮此一句意先生曰大學至治國平天下中庸至贊化育參天地皆是言學術不是言事功事功乃學術中之作用非與學術對言也後世迂視講學而專講事功此所以併事功亦不及古人可惜可惜問不得中行而與之必也狂狷乎與聖人吾不得而見之矣得見君子者斯可矣意同否先生曰中行者資學兼到者也狂狷者具美資而可進於中行者也狂狷一加學問便是中行矣正與聖人吾不得而見之矣思君子思善人又思有恆語意同思有恆正所以思聖人思狂狷正所以思中行也豈專為狂狷有恆而已哉奈何夫子思狂而天下遂有僞狂夫子思狷而天下遂有僞狷夫子思中行而天下遂有僞中行如古之狂也肆肆是真狂今之狂也蕩蕩便是僞狂古之矜也廉廉是真狷今之矜也忿戾便是僞狷聖人吾不得而見之矣之聖人是真中行若鄉原便是僞中行此夫子所以致慨於三疾而深惡乎鄉原也問理障之說先生曰不然謂之曰理自是無障謂之曰障還不是理如非禮之禮非義之義或者以此為理障不知此正察理不精之障也豈理之障哉如人目中理上容不得砂石屑理上亦容不得金玉屑以理之所不能容者而强容之此正悖理不通之障也豈理之障哉或者又曰今有人於此病中縱欲固是欲障病中讀書亦是理障先生曰且問病中理上該讀書否曰理上不該讀先生曰既是理上不該讀却要讀此亦悖理不通之障也豈理之障哉以悖理之障而反坐於理則寃理甚矣或者為之快然問吾有知乎哉無知也章大意先生曰聖人胸中如太虛然一無所有而亦無所不有鄙夫未問之前安得無故起念此正所謂未發之中也故曰吾有知乎哉無知也及鄙夫一問於我則因彼之問遂發動起我之知安得不竭兩端兩端既竭矣聖心尚有知乎哉依舊是無知故曰吾有知乎哉無知也此聖人之無知正聖人之所以有知也若人未問則自誇其知既欲己之勝乎人及人既問則自祕其知又恐人之同乎已使驕且吝胸中不知有多少機械此世人之有知正世人之所以無知也先生曰吾有知乎哉無知也鄙夫未問知從何起兩端既竭知從何留如諸生考試當題未出時安得無故下筆故曰無知及題既出因他題目才發動起我的文思故曰叩及文既完尚還有一句一意不盡發於文內否故曰竭及交卷後胸中依舊是題未下時光景故曰吾有知乎哉無知也先生曰吾儒之無知無知而有兩端佛氏之無知知無而兩端亦無洪鐘無聲由叩乃有聲雖由叩乃有聲不知當未叩時雖無聲而實有聲聲之理惟無聲而實有聲聲之理所以大叩則大鳴小叩則小鳴若無聲而併無聲聲之理是廢鐘也未叩時若與洪鐘同既叩後便與洪鐘異雖既叩後與洪鐘異其實原是未叩時與洪鐘不同知未叩時之不同則知佛氏之言性與吾儒之言性佛氏之無知與吾儒之無知毫釐而千里也先生曰佛氏以理為障是空其聲而併空其聲聲之理一切總歸於空也所以無感時似與吾儒同一有所感便顛倒錯亂依舊落於世味中而不可救藥此正以理為障之障也理何嘗有障哉若不以理為障則無障矣先生曰聖人憫人之無知如見孺子將入於井故一當鄙夫之問便有怵惕惻隱之心便不容不竭兩端非納交於鄙夫非要譽於鄙夫非惡其有隱之聲於鄙夫也先生曰上智聖人與下愚鄙夫同只是中人多了些知識所以過於下愚者在此所以不及上智者亦在此何也當無感時無論上智下愚中人都是一樣無知只是一有所感人一問及下愚則以知之為知之不知為不知問一答一問二答二何嘗不竭兩端何嘗添自家一些知識在內上智亦以知之為知之不知為不知問一答一問二答二亦何嘗不竭兩端亦何嘗添一些知識在內只是中人多不然或以知為不知或以不知為知或問一答二或問二答一便不肯竭兩端便自家添許多知識在內世道人心之壞全壞於此等人此聖人所以自任以無知也為中人者能親師取友講明正學刋落機知復還本真造到與下愚一般境界便是到上智聖人境界先生曰陽明先生云箇箇人心有仲尼則箇箇人心有良知惟聖人能致良知所以鄙夫一問便竭兩端不然則茫然無以置對又不然則記誦之學易窮何以能竭兩端哉無知而能竭兩端此正聖人之所以致良知聖人之所以為無知也問人生所遇不齊多不免動心奈何先生曰人心本自如太虛一切窮通得喪是非毁譽真如寒暑風雨原與太虛本體無與卑之存一徇世心不是高之存一憤世心尤不是只平心易氣應之便合太虛之體隨其所遇便都是瀟灑快樂境界先生又曰請問人生所遇不齊不知動心後能齊否曰不能先生曰既不能可見還多了箇動心到不如只平心易氣應之自家還討箇受用自在問先天後天之說先生曰人須要認得天字明白然後可言先後此處最要活看假如以起念為天則未起念時為先天既起念後便屬後天如不睹不聞是先天至慎獨便是後天繼此而發為事業則慎獨又是先天事業又屬後天矣總之天字指當下言凡事有天凡事有先天後天最當活看如以伏羲之畫為天則未畫為先天既畫即為後天如以文王之卦辭為天則伏羲之畫為先天而文王既演之後即為後天如以周公之爻為天則伏羲文王皆為先天而周公作爻之後即為後天先後字不可執一看問和同之辨先生曰和同外面一樣若虞廷都俞喜起之盛無一毫乖戾異議恰似同不知此和也非同也若後世安石秦檜之流當時附和者不少恰似和不知此皆私相迎合以取官爵耳此同也非和也和同外面一樣只是君子小人心上不同講和而不同處不可用吁咈獻替字若用此則外面顯然不同矣又何消辨和而不同同而不和先生至𢎞道書院謁三先生祠畢一客曰端毅公父子當日極一時之盛今後人可謂否屯之極先生曰以端毅公父子如此勳業今否之極正泰之漸也如禹稷契同時奏功宜同時享報却不盡然禹以其身有天下報之最早享國却只四百年契之後若湯雖遲四百餘年始有天下而享國則六百年稷之後若武王直遲千有餘年中間去邠遷岐為狄人所苦及文王羑里之厄一身一家且不可保自當日觀之似天不可問不知享國却八百年天地間乘除加減道理原來如此三先生祠內先生問其後人曰聞康僖公七歲能詩果否其後人述屋隙詩風來梁上響月到枕邉明一聯先生曰此不愧屋漏意先生曰康僖公生長世家少年登第自筮仕至宦成通無坎坷中間止因得罪劉瑾罰粟三百石輸邉受許多苦楚至今尚論者以此為康僖公第一美事可見學者不當以厄困為不幸問諸生中多有貧困不得讀書者奈何先生曰顔子在陋巷中能博文約禮斟酌四代禮樂貧困曷嘗誤了顔子讀書余亦嘗屢空因讀陋巷章作二絶以自寬云命定難逃陋巷貧機關徒惹鬼神嗔不如打疊心源净做箇羲皇以上人命定難逃陋巷貧奔忙徒惹世人嗔不如閉户焚香坐做箇乾坤無事人人人若知難逃徒惹四字不惟髙明者能自守即庸愚者亦見無益而自止矣先生曰貧如夷齊千古稱聖貧如顔淵千古稱賢貧曷嘗負人哉只恐人負貧耳先生曰人貧而我憐之周之則可我貧而望人憐之周之則不可先生曰賈誼上書痛哭流涕欲感動人主使天下太平孔子講學亦是痛哭流涕欲提醒人心使萬世太平聖人用心之苦如此問徐行後長先生曰臯䕫稷契之揖讓只是箇徐行後長操莽溫懿之爭篡只是箇疾行先長問至誠之道可以前知先生曰要看一道字天地間原有這箇道理這箇道理又非渺冥實不外禎祥妖孽蓍龜四體人之善不善一念處此天地間自然實理實事惟至誠能先知之他人實自昧之耳至誠前知是人自異於至誠非至誠異於人也問儒一也何有真儒醇儒大儒名儒之别先生曰儒一也若立心制行一毫不假雖卓然以聖學自命而中間不無雜於二氏之學此可以言真而不可以言醇如純然吾儒不雜二氏躬行實踐不愧古人而硜硜自守尚隘與人為善之量此可以言醇而不可以言大若暗然潛修而一腔四海退然如不勝衣而一念萬年如舜之善與人同舍己從人樂取諸人以為善如橫渠為天地立心為生民立命為往聖繼絶學為萬世開太平此之謂大儒而真醇不待言矣此三者總謂之名儒吾輩學為儒者也請擇於斯三者慶善寺講語先生謁諸公祠墓之明日歸長安門人百有餘人祖於城南慶善寺因設講席如昨先生坐已諸生請曰自昔大儒講學宗旨不一願先生提綱挈領使諸生有所持循先生曰自昔大儒講學宗旨雖多端總之以心性為夲體以學問為功夫而學問功夫又總之歸於一敬君子小人之分只在敬肆之間敬者衆善之根肆者衆惡之門敬者衆福之根肆者衆禍之門敬則父子有親君臣有義夫婦有别長幼有序朋友有信肆則父子無親君臣無義夫婦無别長幼無序朋友無信人人敬則天下治人人肆則天下亂堯舜只是箇敬桀紂只是箇肆可不畏哉可不辨哉故曰敬者聖學之要問敬為聖學之要固矣又云敬者聖學所以成始而成終何也曰初學之士多以安詳恭敬為主多知收斂及至既學之後多自以為有所得便寬一步自謂悟後全無礙不知悟處就是誤處卒之放縱決裂壞人不小是徒知敬以成始而不知敬以成終也不知以文王之聖且緝熙敬止曰緝熙者無已時也故曰純亦不已以孔子之聖縱學到從心所欲不踰矩地位而志學一念必不敢少已若少已便踰矩矣成始成終成終二字尤當玩味先生曰敬者心之本體如見大賔承大祭此心不覺收斂豈納交要譽惡聲哉一自然而然莫知其所以然而然耳可見敬者心之本體原如是主敬云者不過以功夫合本體耳非硬將一物强置之胸中曰敬曰敬也問見大賔能敬承大祭能敬是性體否先生曰是情也非性也是率性之道非天命之性也見賔承祭能敬必有所以能敬者在此天命之性也此天命之性特因見賔承祭而後形非因見賔承祭而始有惟未見大賔而吾心先已有主未承大祭而吾心先已有神此之謂性體此之謂未發之中惟吾心先已有主所以一見大賔便能敬惟吾心先已有神所以一承大祭便能敬此之謂率性此之謂中節之和能敬者情所以能敬者性知其所以能敬而主敬者君子盡性至命之學問人之所以異於禽獸者幾希先生曰且只問禽獸見大賔承大祭能敬否人之所以異於禽獸者幾希正指此一㸃能敬之性體耳不然人之目能視禽獸之目亦能視人之耳能聽禽獸之耳亦能聽人之口能飲身能動禽獸之口亦能飲身亦能動人義何異於禽獸哉孟子曰無辭讓之心非人也余亦曰無恭敬之心非人也昔人有欲打破敬字者有謂目自能視耳自能聽更說甚存誠持敬者蓋未知人之所以異於禽獸者幾希只在敬肆之間耳問晉人以放達為高近世高明者多效之不知敬處安在先生曰晉人做出放達氣象若與世相忘與人無競不知如王戎鑽核王衍三窟郗超入幕不知果相忘無競否可見他放縱恣肆處正是機械變詐處故作無心處正是詭祕有心處先生曰莊子言自得自適是言堯舜以天下勞心以天下為桎梏不過要得人之得適人之適使别人得所而非自得自適也自得自適與吾儒之說不同只是要自家討便益討受用不管别人死活此莊子之逍遙所以壞心術而得罪於名教也先生曰今人以敬為僞以肆為真即有好修者見道不明欲敬恐人說僞欲肆於心又不安此所以耽閣一生良為可惜不知恐人說僞只當在敬中求真不當在肆中求真敬中求真是真君子肆中求真是真小人真之一字亦不可不辨也且於心不安處就是真心求為真君子者正當於此處識取問曽㸃莫春之樂過此亦能有是樂否曰遇莫春能樂遇秋冬不能樂㸃與三子何異只有了這箇樂無時無處無不是此物矣譬之善畫者寫出春景固好寫出秋景冬景亦好即如此時天氣雖寒然少長咸集欣然有得就是春風舞雩氣象何必遠求先生曰學者必有戒愼恐懼之心然後有春風沂水之樂若無此心而徒談此樂是晉室之風流非曽㸃之真樂矣問君子小人當如何處先生曰論交與當親君子而遠小人論度量當敬君子而容小人論學術當法君子而化小人不化則乏曲成之仁不容則隘一體之量不遠則傷匪人之比先生曰交與一人不可妄講學無人不可容先生曰有經世之學有出位之學有暗修之學有私已之學以出位為經世以私已為暗修此學者大病然有經世之學而無出位之學便是暗修而非以不講為暗修有暗修之學而無私已之學便是經世而非謂講經世之學者盡皆出位好名之人問好名乃學者大病先生曰然然又有不可不辨者君子曰不好名恐雜為善之心小人亦曰不好名恐妨為惡之路又曰君子為善不純只有好名二字小人阻君子為善亦只有好名二字先生曰好名之心有顯而易見者有隱而難知者務外之人無論矣至於私已之士躲避是非絶口不敢言自以為我不好名人亦以不好名歸之不知此正是好名之深處何也是與非對譽與毁對喜是喜譽之心固是好名避非之心即喜是之心避毁之心即喜譽之心避毁避非之心獨非好名乎可見喜是喜譽其為好名也易見避毁避非其為好名也難知故學者必拔去好名之根而後可以言學問為惡無近刑為善無近名先生曰惡原不當為也而曰為惡無近刑只是教人為惡不要已甚耳不戒其為惡而戒其無近刑何也不知其為惡之日即其近刑之日而曰為惡無近刑令人犯不赦之刑而悔之無及者必斯言也是誤天下之小人也善原當為也又何論有名不有名君子為善原不為名而實大聲宏名必隨之是為善之日即近名之日也而曰為善無近名令人避好名之嫌而不敢為善者必斯言也是誤天下之君子也范忠宣曰若避好名之嫌終無為善之路可謂莊生頂門之針先生曰君子曰不好名小人曰君子好名若不好名何以名都歸於君子君子無辭以應不得已只得併實亦不敢務恐務實而一時名至無以避好名之嫌耳不知避好名之嫌是亦好名也惟不避好名之嫌而後謂之真不好名先生曰好名不好名古今聚訟余有一言解之凡說好名的事就都是該做的事若不是該做的事一做便壞了名如何說得好名可見好名之譏正周行之示也豈直不當避而已哉知此則君子有所恃以務實小人無所恃以肆譏矣問近有以不操不舍之間有妙存焉解操舍存亡何如先生曰此特為不操者居間耳猶居官者曰不清不濁之間有妙存焉有是理乎為此言者必貪墨自恣者也莊生謂盜跖死利於東陵伯夷死名於首陽蓋曰貪固好利清亦好名臧穀亡羊其失一耳不知使居官者號於人曰貪固好利清亦好名此其人清耶貪耶不問可知矣此莊生所以誤人不淺也先生曰易曰藏密詩曰潛伏子思曰暗然此正聖學真脈吾儒講學正是講學問要潛要暗要密而鄉原反借此以杜講學之口亦竒甚矣不知講學而不粘帶世味譏評時事便是潛便是暗便是密非以不講為潛為暗為密也先生曰楊氏無君墨氏無父當日豈料至此只是起於一念學術之差所以併自家亦不知耳可見術不可不愼孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不愼也嗚呼君親大倫仁人孝子無所解於其心者也楊墨豈不仁於吾儒哉亦學術誤之耳世之非學者曰只在行不在講竊恐所行一差關係豈小譬之岐路之中又岐路焉雖欲不問不可得也彼謂不必講者原安心不行第借口非學耳先生曰學者須要腳根踏得定徹頭徹尾才得有成不然如登九級浮圖一腳履錯直跌到底為山九仞未成一簣豈止不能成山恐平地亦不可得也可畏可畏問君子質而已矣章大意先生曰棘子成意思儘好只是言語過激子貢真得夫子彬彬之意不可說失輕重本末之等當時有文無質賤得以凌貴卑得以凌尊紊名分壞紀綱固不成世界若有質無文則貴無以别於賤尊無以别於卑名分紊紀綱壞亦不成世界矣如周制樹屛反坫舞佾歌雍正所以别上下辨尊卑若因大夫之僭而遂併其佾與雍而去之則大夫固不得以僭乎天子天子又將何以别於大夫哉故曰虎豹之鞟猶犬羊之鞟其關係世道一樣不可以偏勝有無論也問文質彬彬先生曰彬彬最要體認蓋文質不是對立的亦不是六分四分低昻的譬之一木質也斫而為器則文矣器質也加以彩飾則文矣文質豈二物哉第雕斫彩飾不可太過使文勝質耳是知無方之愛敬皆從孩提知愛一念生來知此可以論文質矣問道可道非常道何如先生曰吾儒所謂道正指其可道者而道之也老氏云道可道非常道則是以道不可道者為常道矣有是理乎可言者是常言可行者是常行今曰道可道非常道則是言可言非常言行可行非常行而以言不可言者為常言以行不可行者為常行矣背理不通莫此為甚問有為漢儒躬行宋儒空談之說者某殊不然不知先生何如先生曰漢儒中誠有躬行者而槩謂漢儒躬行則不可無論其他失節敗行即如馬融之列女樂桓榮之誇稽古不知可言躬行否宋儒如周程張朱即在孔門亦當列德行之科其他如司馬君實邵堯夫尹彥明劉元城諸儒其躬行實踐豈在冉閔之下漢書宋史明白易見而猶敢為此言是托胄江陵之餘唾不可不察也雖然亦非真尊漢儒也特因漢儒不講學故借以非宋儒耳使漢儒而亦講學也恐亦不免以非宋儒者非之矣先生曰漢儒有傳經之功但當論其功而不當論其行宋儒有明道之功固當重其功而尤當重其人問行義以達其道先生曰行義達道不是行義時能建些大功業便謂之達道便謂之有用實學便謂之真儒不能建些大功業便謂之不能達道便謂之處士純盜虛聲便謂之僞儒如此將道字却看做事功了人安得不詭遇以圖功業如此是行義以達其功非行義以達其道也且如詭遇而能獲禽則功業雖建而人品已失如詭遇而又不能獲禽則人品先失而功業又不能建豈不惜哉行義達道只是要不枉其道不專在功業大小間論也三代而後此道不明久矣夫子安得不有聞語未見人之嘆問求志者求何志達道者達何道先生曰求志者求此天地萬物一體之志達道者達此天地萬物一體之道若不求此志即幸成一匡九合之功亦枉道也豈得謂之達道哉問仁者以天地萬物為一體倘責任不在得無於一體之心有礙乎先生曰不然有此一體之心時乎大行雖披纓而於此心無所加時乎窮居雖閉户而於此心無所損非謂一槩披纓而後謂之一體也雖閉户之時而披纓之心未嘗不在只是責任不在我不得不閉户耳非謂一閉户而遂於一體之心有礙也禹稷顔回同道正同此一體之心同此猶已之心只是禹稷有責任說得由己顔子無責任說不得由己惟猶已之心同所以能易地皆然猶已之心天地萬物一體之心也先生曰仁者以天地萬物為一體只在心上論不在責任上論責任所在無論山林不得侵廟堂之權即廟堂之上錢穀亦不得侵甲兵之權一體之心雖同而所居之位不一素位而行不願乎其外此之謂君子而時中此之謂以天地萬物為一體之學先生曰天下事各有職分一毫越俎不得只是講學一事無論窮達人人都是當講的人人都是有分的却說不得越俎故曰自天子以至於庶人一是皆以修身為本先生曰仁者以天地萬物為一體今人一膜之外便分彼此即父母兄弟間尚且不能一體又何論天地萬物哉程子天地萬物一體之說蓋恫乎有餘悲也或有疑程子一體之說為馳騖者先生曰子請勿疑學者儘以天地萬物為一體尚恐不能以父母兄弟為一體若疑其馳騖而不以天地萬物為一體則一膜之外便分彼此其痿痺不仁之病殆有不可言者矣程子一體之說乃對症之良藥彼馳騖之疑是亦痿痺不仁之病將發而不自覺者也請速以程子之良藥藥之先生曰張子西銘正是解仁者以天地萬物為一體一句開口說乾稱父坤稱母民吾同胞物吾與也何等痛快學者果能知乾坤原是我的父母自然知萬物原是我的同胞雖欲痛癢不相關不可得也先生池陽之講不惟士人興起即里巷小民咸擁輿聚觀候門竊聽欲得一二語終身誦之先生因出所刻做箇好人心正身安魂夢穩行此善事天知地鑒鬼神欽舊對一聯示之於是衆共朗念歡然稽首而去先生瀕行諸門人餞於郊洗腆酌先生先生曰因此酒觸起周公思兼三王以施四事其有不合者仰而思之聖聖相承道同心一那有不合有德曰或時勢不同先生曰只頭一句禹惡旨酒先不合禹曰惡旨酒周公曰我有旨酒周公豈不知惡當時也費了多少思量如禹之絶亦不難只是燕賔奉祭又不可少斟酌再三才悟得這箇道理原是活的所以三百篇中一則曰旨酒再則曰旨酒而俱繫以燕樂嘉賔可見除了賔祭都是當惡而絶之的雖然燕賔固不可少又恐賔主借此沉湎而不知惡所以賔筵章又極言其醉狀而深戒之曰既醉而出並受其福可見這箇旨酒雖賔燕不可少亦不可縱此又周公善用其惡而深合大禹之心者也只此一事不知費了多少思量故曰仰而思之夜以繼日又何况四事哉注曰禹惡旨酒實未嘗絶先生曰絶尚不能制不絶必至濫觴賔筵之詩吾輩不可不書一通以銘之座右少墟集卷十一
