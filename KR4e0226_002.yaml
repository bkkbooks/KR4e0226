body:
  text: 少墟集卷二明馮從吾撰語録疑思録原序疑思録余同年友馮仲好氏録其講學語也仲好讀中祕書冠柱後惠文冠正色立朝天下想望其丰采及休沐過里則杜門却掃足不踰户閾乃多士執經問難户外屨常滿嘗手學庸論孟書詔諸士遡洙泗淵源抉鄒魯祕密力闢蓁蕪共偕大道語具録中其濳心理學篤信聖人情見乎辭矣而自題曰疑思且曰吾斯之未能疑何居千古聖學肇自唐虞允執一言直開草昧宣尼承之曰篤信好學曰信而好古未聞以疑示者即疑思問一語正思袪疑非求疑也至白沙先生始曰大道本無階級以疑為階級故大疑則大進小疑則小進仲好之㫖其本此乎余謂疑信非有兩心疑正所以信也萬里之程始於跬步必真信其可至然後肯秣馬脂車日征月邁亦必真經歷跋涉然後能躊蹰岐路詳審迷津倘測想前途若越溟渤望瀛洲方丈然尚在恍惚有無間而欲質所向往問征夫以前路其何疑之從世之不信學者既任其惶惑敝精神於無用信者又固其扃鑰視天下為無可疑其信心過於信學其所疑益成其所不信終其身或信或疑而卒無所成此夫求前而却步南轅而燕程者也故苟志於學即疑益矣無問信不志於學即信非矣無問疑雖漆雕氏所謂信未易言然亦從此信入也仲好聚友講學諄諄信之一字為從逰者規而兹録顧皇皇若弗及疑余謂此正其信後語且以藥世之自信而居之不疑者耳門下執經多士皆篤信仲好者傳覽兹録苦所及不廣謀付剞劂公之同好而問序於余余寡昧不知學然夙辦此信心故以此堅多士之志若能疑與否則多士當自得之余何言仲好論著甚衆善利有圖辨學有録訂士有編關學有編其餘種種未艾率多發前賢所未發然大疑大進得力處在兹録故信仲好者亦當自兹録始萬厯戊申孟夏既望關中年弟周傳誦書少墟馮先生疑思録成寄猷一帙寓書曰願子一言以辨諸首猷因仰而讀俯而思尋繹久之乃歎曰先生真善讀書者哉今夫四子之書表章自程朱頒降自昭代其理炳如日星夫何疑試觀海內三尺童子皆能誦說搦管為文且謂家思孟而户顔曽矣奚足疑矧先生褒然為一代大儒即刪詩書定禮樂皆分內事又何待疑且思也噫嘻我知之矣衆人以書觀書祗藉為制科羔鴈而一切無補於身心是不知疑者也賢智者左袒二氏反厭薄聖賢之言為無竒是不屑疑者也不知疑不屑疑則均之未能思矣先生力排異端羮牆堯舜故於四子之書以心讀之以身證之證之而是也則已纖毫未協焉得不疑疑稍未釋焉得不思思者明之基而疑者信之漸也猷觀録中大都悟後語自別如曰一本大學都是格物不必另補一傳則羣言之折衷也曰論語論功夫不論本體論見在不論源頭中庸則合併言之如此而後可以泄孔子之祕破異端之非則道德之閫奧也曰由孔孟而後至今日才好說只消轉念不消易業則舉業之標的也曰天地間惟有此道仲尼顔子之樂乃所以樂道非懸空別有箇樂一言而聖賢心體有歸宿矣曰孔子曰學而時習之不曽說出所學何事孟子曰學問之道無他求其放心而已是其解也孟子願學孔子故特拈出聖學之原以示人一提而孔孟宗傳若劵合矣又曰甘得淡者品髙容得人者量大見何卓也志伊尹之志須從一介志去學顔子之學當自四勿學來功何密也講到無言處方知道在心㫖何約也諸如此類皆發先儒所未發直破千古之疑者也夫能破千古之疑者必自一念之能疑始假令尋行數墨駕言無疑直矮人觀場者等耳烏能剖藩籬窺聖域力障狂瀾羽翼傳注之若斯哉白沙有言以我觀書則開卷得益以書博我則釋卷茫然若先生真能以我觀書者矣漆雕氏曰吾斯之未能信正其疑未釋處先生曰吾斯之未能疑正其力求信處故曰思者明之基疑者信之漸也或曰先生默識道體烏乎疑又烏乎思曰疑曰思直謙辭耳猷曰唯唯否否昔宣尼讀易嘗絶韋編矣夫以聖人天聰明之盡奚事韋編屢絶哉疑之也疑而思思而信是以十翼成焉先生之疑思毋亦宣尼讀易之遺意乎名之曰謙猷不敢知矣時萬厯已酉春三月荆山門人楊嘉猷元忠甫書於靖邊之吏隱軒長安馮少墟篤志洙泗之學日取四子書濳而玩之隨有所得隨即劄記久而成編名曰疑思録寄音以貽不佞不佞讀之亦不能不疑疑而不能不思也少墟之疑思録何居洪範有言思曰睿睿作聖不疑則思不起不思則不能通微不能通微而謂之誠可乎故知思誠之學起於疑而成於思也入聖之階也即夫子亦必四十而後不惑則四十之前夫子必疑而思矣周公思兼三王其有不合者仰而思之則不合而生疑端周公亦善疑且善思矣顔子疑於髙堅前後其思亦苦及聞博約之後卓爾妙其立境不可謂非思之有得也若曽子之問則疑端更多而思則可知至一貫之印而始渙然冰釋使當時曽子不疑而不思即孔子啓以一貫恐不能神解而一唯孟子曰我四十不動心則四十之前心猶動矣必疑而後動思而信之凝之而不動則孟子浩然之氣亦由此疑思而得之故曰大疑則大悟小疑則小悟若曰即不思之本體而存之無事思念不必窮索運水搬柴即為神通妙用言則甚易而證則實難自謾謾人不淺吾恐於聖人明善誠身之學無當也少墟於四子書善疑而思之故有所得以成編大悟大徹可知已作聖之功不在兹乎若不佞亦不能無疑而不能善疑不能不思而不能善思不能有所得如少墟耳且此疑思之義亦精且微矣人徒知易以卜筮立教乃稽疑之典不知易之卜疑即疑而思之以求合天則之學也故曰居則觀其象而玩其辭動則觀其變而玩其占參伍錯綜於心而理有定衡執而守之不難不然者疑根未破此心搖搖不如風前之絮乎何以為事為之準故知易之立教乃擇乎中庸而明誠之學非徒如世俗卜筮之謂也少墟之讀四子書人以為少墟之善學四子故疑而思之㑹而通之吾以為少墟之善學夫易不用卜筮而自有神明之道也且今四子書治舉業者舉能言之海內坊刻幾於充棟中間亦有當者不當者然為舉業而作則為文而解其義不為身心而求其㫖也雖能疑且思思而有妙解出若過於漢之訓詁吾終以為得而未得是紙上之機括非心中之妙悟若疑思録者則異於是是為德業而作不為舉業而設若舉業則人疑思之可也何勞少墟疑疑而思之易曰精義入神以致用也是録中多有精義不佞不能縷細數之惟在善讀者之自得也先是吾鄉端毅王公則有四書意見文簡吕公則有四書因問其書皆直接洙泗心傳不為訓詁文辭之解知學者無不宗而主之今疑思録出蓋稱鼎足矣王吕二先生而後學其在少墟乎萬厯嵗次已酉陽月望日岐陽友弟張舜典頓首拜撰余自壬辰請告杜門謝客足未踰閾者三年自藥裹外惟以讀書遣懷無它營也間有二三同志及伯兄月夜過存相與講孔曽思孟之學辨析疑義嘗至漏分或撫琴一曲或歌詩數首始别蓋忘其身之病而亦忘其寒暑之屢更也居恆多暇乃取所辨析者口授兒康年劄記之針砭韋弦聊以自朂嵗月積久不覺成帙要之遺忘不及記者尚多此特存什一於千伯云耳一日為友人蕭輝之擕去越數日輝之詣余曰吾子用心誠勤矣第聖賢精義不知果如斯否恐其中又未必無可疑者余當為子編次之以就正於海內同志之士余曰唯唯編成題曰疑思録蓋取九思中疑思問意耳嗚呼吾斯之未能疑録中業已言之矣同志不遺幸教我焉萬厯二十三年嵗在乙未孟陬十日長安馮從吾序疑思録一讀大學天地間惟有此道人生天地間惟有此學舍此更有何事問大學之道曰大字最當玩味天地之性人為貴人生天地間原都是大的只因不學便小了大學之道三節道理已說完古之欲明明德於天下至末不過發明前三節意耳其所厚者薄而其所薄者厚未之有也正是其本亂而末不能治處知本末則先後不待言故曰知所先後則近道矣又問知所先後則近道固矣至於古之欲明明德於天下節又從新民說起何也曰大人之學其志量要大其工夫要實觀欲明明德於天下一節可見必有明明德於天下的志量然後吾之明明德者不涉於二氏之𤣥虛觀物格節可見必有明明德實在的工夫然後吾之新民者不涉於五霸之功利明德不涉於𤣥虛新民不涉於功利然後謂之止於至善然後謂之大人之學問至善曰明德而不知新民是異端虛無寂滅之學是世儒自私自利之學不謂之明德止至善新民而不本於明德是五霸權謀功利之學是世儒舍巳藝人之學不謂之新民止至善明德新民而不知本末始終先後之序是異端懸空頓悟之學是世儒鹵莽滅裂之學不謂之明德新民止至善必明德而又知新民新民而本於明德明德新民而又知本末始終先後之序方謂之止於至善且謂之至善見人性皆善吾德本明而吾明之原是吾性自然不容已事不是分外求明仁者以天地萬物為一體明德自然不容不新民不是分外求新明德新民自有本末始終先後之序這次序雖毫不可缺毫不可紊皆是天性自然不容缺不容紊的不是分外强生枝節故謂之至善至善者指其自然恰好不容人力安排增減者言之耳此善字即易繼善之善孟子性善之善止於至善是直從本體做功夫直以功夫合本體者此吾儒之學所以異於諸子百家也心不妄動四字解靜字真發古人所未發蓋身不妄動易心不妄動難人心原是神明不測活潑潑地的豈能不動只是不妄動便是靜非塊然如槁木死灰然後為靜也此吾儒異端之辨真妄最難辨有真者有妄者有似真而妄似妄而真者此處辨之不蚤則認真為妄認妄為真此心安得不妄動古人當知止時真妄之辨已明故至此方能心不妄動耳心不妄動不是容易能的此知止二字古人所以獨先之也問格物曰言致知不言格物則落空物字有三解萬物皆備於我物字對我而言格去物欲物字指私欲而言此物字兼物我而言王心齊謂格物是格物有本末之物致知是致知所先後之知最為有見格物是格其知如何致意如何誠心如何正身如何修天下國家如何齊治平中間孰為本孰為末孰當先孰當後節目次序一一講究明白則誠正修齊治平功夫才得不差明德新民始止於至善耳此格物所以為大學第一義格物即是講學曰物見學不可談𤣥說空耳格物二字千載聚訟不知講格物就是格物何事深求何事逺求問本亂如何末便不能治曰其所厚者薄而其所薄者厚未之有也所謂誠其意者毋自欺也只毋自欺便是自慊自字最妙欺曰自欺則其苦真有不可對人言者慊曰自慊則其趣亦有不可對人言者吾輩默默體驗自得月掛梧桐上風來楊栁邊院深人復靜此景共誰言自慊二字甚有味見君子而厭然正是小人自家不慊意處安得心廣體胖故曰行有不慊於心則餒矣君子慎獨只是討得自家心上慊意自慊便是意誠便是浩然之氣塞於天地之間問良知小人有否曰小人而無良知何以見君子而厭然可見良知是人人有的只是君子肯致小人不肯致耳問如見其肺肝然不知肺肝從何處看見曰就從厭然掩著上看見曽子曰三字乃曽子作傳立言之法不可作平日之言看左傳用君子曰史記用太史公曰皆倣此例問幽獨之中何有指視而曰十目十手何也曰幽獨之中原無指視而却曰十目十手解者求其故而不得乃以吾心之明還而照吾心之隱等語以自家良知上發揮不知此却是解莫見乎隱莫顯乎微的話說與此節十目十手何相干此節正為上文小人只說見君子之時有人指視所以不得巳厭然掩著當閒居之時原為無人指視所以敢於無所不至不知指視雖在見君子之時而所以指視已在閒居之日何也譬如種五榖與荆棘及其生苗後人人指視不待言當其下種時恰似無人指視不知既有此種必有此苗雖有此苗實由此種可見人之指視不在生苗之後而即在下種之日矣是下種之日正生苗生葉生枝生幹人人指視之日也豈不嚴哉若自恃以為此種也非苗也非枝葉也而忽之則無及矣有此心術必有此舉動有此意念必有此事為不嚴於心術意念而徒嚴於舉動事為此小人所以卒露肺肝而悔之無益也或曰閒居不慎而厭然於君子之見小人誠失計矣不知閒居之時一念方萌何以能知善知惡而慎之邪曰閒居之時一念方萌或善或惡人雖不知而自家良知却知的比别人還明白故又曰莫見乎隱莫顯乎微此處才好說以吾心之明還而照吾心之隱等語蓋自家念頭起處一念善便是人人以為善一念惡便是人人以為惡若是只憑著自家良知致去無為其所不為無欲其所不欲自是見得君子自是不消掩著此所以子思又說出莫見乎隱二句正是為十目十手補出一段源頭話說令人自視自指自下頂門之針耳不可與此節意混而為一也少壯不努力而徒傷悲於老大康健不保養而徒針砭於病疾豐年不積蓄而徒稱貸於凶嵗未雨不綢繆而徒拮据於侮豫此皆閒居不知慎而徒厭然於君子之類也少壯不努力便知必傷悲於老大豐年不積蓄便知必稱貸於凶年是少壯不努力之日即傷悲於老大之日豐年不積蓄之日即稱貸於凶嵗之日也豈待老大凶嵗而後知哉故曰十目所視十手所指其嚴乎問十目十手别人的指視既這等嚴莫見莫顯自家的覩聞又這等真人却不肯慎獨者何故曰只是不曽著實講學若講的著實明白未有不慎之理天下事只是人不肯心誠求之若是肯心誠求之真未有不中者縱不中亦不逺矣誠字求字最當體認求字不是在外邊紀綱法度上求只是在自家心上痛癢相關一體不容巳處求於此處求則紀綱法度一一皆從一體不容巳處流出自然與粉飾太平者不同自然深入於民心中字是直中民心痛癢處非徒以法度强民於外而使之感也只看那慈母何嘗在外面强愛赤子赤子亦何嘗在外面强從慈母都是自然而然莫知其所以然而然一團天性不容已處故曰誠後世君臣未嘗不求只是在事上求不在心上求紀綱法度非不燦然可觀多是僞多不是誠所以百姓不能實受其惠縱然求多不能中此世道所以不如古也一人貪戾一國作亂貪是愚不肖者之病戾是賢智者之病賢智之士刻意尚行矯情拂衆其所為多有乖戾不合人情處縱是實心為國亦足以釀禍而激變二字清濁雖異其一國作亂則一也曽子以此二字並言其慮可謂甚逺好人之所惡惡人之所好是謂拂人之性可見人之性都是好善惡惡的可見人性皆善故不知人性之善者不可以治天下大學古本原有錯簡還當依朱子章句為是第此謂知本此謂知之至也一節與上聽訟節雖分兩節原是一章非衍文亦非別有闕文也右傳之四章釋本末八字當序在此謂知本節之後一本大學都是釋格物不必另補格物傳傳止該九章聖經乃孔子之言而曽子述之其傳俱曽子之言不是門人記之者疑思録二讀中庸問天命之性曰如孩提知愛是誰命他愛稍長知敬是誰命他敬這都是自然而然的故曰天命雖然此率性之道非天命之性也如何是天命之性曰孩提如何便知愛稍長如何便知敬這必有所以知愛知敬者在此蓋自父母初生時天已命之矣豈待孩提稍長後才有此愛敬哉知此則知天命之性問修道之教曰古之聖人說出許多教人言語立下許多教人規矩都不是强人都是教人各自率其知愛知敬之性耳有這言語規矩在則賢智者有所俯而就愚不肖者有所企而及故曰修道之謂教教曰修道只是明其教非强世耳喜怒哀樂未發之中此千古聖學之源學者須在此處得力然後能發皆中節故羅豫章教李延平靜中看喜怒哀樂未發氣象而陳白沙亦云吾儒自有中和在誰㑹求之未發前喜怒哀樂中節才是率性若任喜任怒是無忌憚非率性也然則何以能中節曰在戒慎恐懼七情之中惟怒為難制不惟在行事上見得即著述立言多嫉憤不平之氣亦是怒不中節處問君子中庸曰君子即下文舜回文武周公孔子君子中庸即下文舜之智回之仁文之無憂武周之繼述孔子之道德九經皆是這中庸不是容易能的故曰中庸不可能也中庸雖不可能豈終不可能哉惟至誠能之故曰惟天下至誠為能盡其性玩此節六箇能字可見且至誠都是人人能做得的只是人人諉於不能不肯致曲耳故又曰其次致曲玩此節兩箇能字可見故君子尊德性一節便是致曲工夫故下文又曰唯天下至聖為能聰明睿知又曰唯天下至誠為能經綸天下之大經又曰苟不固聰明聖知達天德者其孰能知之始終發揮一能字可見中庸雖不可能而實未嘗不可能也末云至矣即至誠至聖中庸其至矣乎至字總只是說箇君子中庸問小人而無忌憚曰此小人不是泛常小人乃異端之害道者彼其教以綱常倫理為情緣以詩書禮樂為糟粕以辭受取豫為末節以規矩準繩為桎梏其自視常居吾聖人上其視吾聖人之教不啻若辨髦之其弊使人猖狂自恣以禮為僞以肆為真貽禍於天下後世不小故夫子斷之曰小人而無忌憚先儒有言無以學術殺天下後世此小人乃以學術殺天下後世者若泛常說無忌憚雖未嘗不是恐非中庸立言本㫖賢知誤以中為不及故以過為中而失之過愚不肖誤以中為過故以不及為中而失之不及非明知其過與不及而甘之也故曰人莫不飲食也鮮能知味也中庸不可能也近來講學者把不可能處說的太髙逺太𤣥虛太奧妙真是不可能不知於不可能則不可能矣却又不中庸了中庸不可能也觀於此益信中庸不可能也聖人又恐人無處覔箇中庸故下文便有所求乎子以事父未能之語可見中庸道理只在綱常倫理間若舍此别覔箇中庸便𤣥虛而流於佛氏問遵道而行半塗而廢何也曰此悔心也素隱行怪後世有述遵道而行無述可知無述則遁世不見知矣不見知而悔安得不廢故曰君子依乎中庸遁世不見知而不悔唯聖者能之可見學者必先絶去好名之心而後謂之依而後謂之聖事父未能也云云正是聖人能處何也有未能之心才肯去行庸德謹庸言勉不足慎有餘縱是到慥慥地位聖人之心恰似照舊未能故曰躬行君子則吾未之有得原來不是謙辭後世學者不及聖人處正坐自以為能之病把許多不是都推在父兄朋友身上誰肯自家認箇不能聖人曰君子之道四丘未能一焉真非聖人不能為此說在上位不陵下在下位亦不可使上之陵在下位不援上在上位亦不可使下之援故在上而割體統以樹私交在下而假風力以傲上官皆使援使陵之道也使之陵而又不甘於陵使之援而又不喜其援安得無怨問上不怨天下不尤人曰上不怨天非不得於天不怨天下不尤人非不得於人不尤人蓋正已而不求於人則無入而不自得自然無天可怨無人可尤何也在上位而陵下下之人未必皆甘於陵在下位而援上上之人未必皆喜其援安得一一如意安得不怨天尤人惟在上位不陵下我正已於上無所求於下自不見下之人有所拂意於我何所怨於下在下位不援上我正巳於下無所求於上自不見上之人有所拂意於我何所怨於上上焉若天之於我皆順而無逆自然無天可怨下焉若人之於我皆是而無非自然無人可尤又何入而不自得哉當此之時自君子視之若我之所遇與小人異自它人視之亦若君子之所遇與小人異不知非君子所遇與小人異乃君子正巳而不求於人與小人異也人到得意時每囂然自以為功多不肯言命到失意時輒歸咎於命又不肯惕然引咎反求諸其身是命之一字徒為小人行險者之口實耳子曰射有似乎君子失諸正鵠反求諸其身夫惟失諸正鵠之時能反求諸身然後謂之居易以俟命問居易俟命行險徼幸曰素位不願外便是居易不素位而願外便是行險非素位不願外之外別有居易功夫故用故字命如吉凶禍福之類如吉凶禍福是命素位不願外便是居易居易便有吉道福道在天下又未有因吉道福道在我遂抗命以求吉求福之理吉焉惟命凶焉亦惟命只得靜以俟之此是自然道理若不素位而願外便是行險行險便有凶道禍道在天下未有有凶道禍道而不罹於凶禍之理即不然而吉焉福焉亦徼幸耳非吉與福之常也徼幸二字真令人可畏可危君子之道辟如行逺必自邇登髙必自卑吾儒自有吾儒之髙逺吾儒之卑近異端自有異端之髙遠異端之卑近今學者多以髙逺歸異端以卑近歸吾儒豈君子之道必由吾儒而後可至異端耶豈吾儒只下學而不上達耶非孔氏之㫖矣問禪家之樂曰詩云妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎不知禪家有此樂否問困知勉行視生知安行逺甚何以能知之成功則一曰好學近乎知力行近乎仁知恥近乎勇所以知之成功則一也此三句正是發明上文所以能一處非困勉之下復有此一等人問博學審問慎思明辨篤行五之字何所指曰此五箇之字皆指善字善即上文不思而得不勉而中道理擇善固執是擇其不思而得者思之又思以至於不思而得擇其不勉而中者勉之又勉以至於不勉而中是之謂擇善固執弗措之志弗措乎此也百倍之功百倍乎此也若不辨得之字明白縱是博學審問慎思明辨篤行到底總只是外面工夫問不思而得不勉而中曰孩提知愛稍長知敬見孺子而怵惕覩親骸而顙泚不忍觳觫之牛不屑呼蹴之食此等去處不知由思而得由勉而中否堯舜其心至今在箇箇人心有仲尼正在此處禮儀三百威儀三千此天地間實在道理此士君子實在學問發育萬物此發育也峻極於天此峻極也若不敦厚以崇禮而曰禮僞率天下蕩檢踰間放縱恣肆以為真是小人而無忌憚也問尊德性而道問學曰德性對氣質說今人皆氣質用事所以喜怒哀樂不能中節尊德性者使德性用事而不為氣質勝也故曰變化氣質涵養德性尊德性由於問學道問學乃所以尊德性廣大精微髙明中庸故新厚禮是德性本體致之盡之極之道之溫之知之敦之崇之是學問工夫識得本體然後可做工夫做得工夫然後可復本體此聖學所以為妙德性乃天命之性不覩不聞無聲無臭氣原不能囿質原不能拘本是尊的只因少學問工夫所以氣質用事所以不能尊德性學者須知天命之初德性原來本尊則知學問之功不過變化氣質使尊者無失其為尊耳非矯揉造作以拂性也故曰率性之謂道可見學問二字原非義外工夫問上律下襲曰如可以仕則仕可以止則止可以久則久可以速則速一毫不肯執著何等樣圓故曰上律天時可以仕則仕可以止則止可以久則久可以速則速一毫不肯假借又何等樣方故曰下襲水土內省內字極重內字對外字言外省不疚不過無惡於人內省不疚才能無惡於志外省不疚無惡於人到底只做成箇鄉願內省不疚無惡於志才是箇真君子中庸一書只是說了窮理盡性以至命一句故開口說天命之謂性而末云至矣至字即至命之至也問道德一也中庸言道德與論語言道德其㫖同否至於老子五千言亦以道德名經又何以為異端曰中庸道德字與論語道德字微有不同論語一書論功夫不論本體論見在不論源頭蓋欲學者由功夫以悟本體由見在以覔源頭耳此其為慮甚逺非故祕之而不言也如論道是指其見在可道者而言故曰夫子之道忠恕而已矣而異端則曰道可道非常道如論德是指其見在可據者而言故曰據於德而異端則曰上德不德是以有德舍功夫而直談本體舍見在而直談源頭如此則異端之說似又髙吾儒一層矣不知異端差處正在本體源頭處差不在舍功夫而直談本體舍見在而直談源頭也故子思不得巳亦直指本體源頭以泄孔子之祕以破異端之非如論語論夫子之道曰忠恕而巳矣而中庸則曰忠恕違道不逺蓋論語之論道指其見在可道者言中庸之論道直指天命率性之初而言也不然忠恕即一貫之道而曰違道不遠何哉言道而直指天命率性之初則𤣥莫𤣥於此也彼異端道可道非常道之說真粗淺甚矣論語論德曰據於德中庸則曰不顯惟德百辟其刑之蓋論語之論德指見在可據者言中庸之論德直合於上天之載無聲無臭之初而言也不然為巳知幾即君子之德而曰可與入德何哉言德而合於無聲無臭之初則𤣥又莫𤣥於此也彼異端上德不德是以有德之說又粗淺甚矣如水一也論語指其見在如江河如池沼皆水也即如飲酒如啜茶亦皆水也而中庸則直指山下出泉原泉混混而言矣言功夫併言本體言見在併言源頭必如此而後可以泄孔子之祕破異端之非耳若中庸不言本體源頭則異端隱微之病孰為剖決道德不經之談真足稱經於後世矣道學不為之失傳哉此中庸所以不容不作也蓋有憂也疑思録三讀論語上問學而時習章大意曰學而時習一節已包括下文二節意在內不然所學何事然既說學而時習之悅可以不說朋來之樂而猶繼時習而云者所以廣學者之量也不然惟知有已而不知有人矣可以不說人不知而不愠之君子而猶繼朋來而云者所以廣學者之識也不然又惟知有人而不知有己矣此孔門第一學問心法惟顔曽可以與此故顔淵問仁子曰克己復禮為仁即學而時習之說也一日克復天下歸仁即朋來之說也為仁由已而由人乎哉即人不知而不愠之說也而大學說明明德親民止至善又說知所先後則近道矣意亦如此故由明明德於天下說到格物由格物說到天下平又總歸於修身意益明析要之學字仁字修身字總是一箇道理人已內外上下四方毫無滲漏此聖賢授受之真傳非顔曽以外諸弟子之可及也問朱注解學為效先覺之所為漢儒解學為覺何如曰學所以求其覺也注中人性皆善而覺有先後後覺者必效先覺之所為乃可以明善而復其初數語極精復其初則覺矣然必效先覺之所為而後能覺覺何容易後世學者憚於求師求友而樂於自寬自便輒曰學者覺也何必效先覺之所為不知既不效先覺之所為何以能覺此必無之理也謂學所以求其覺學然後覺則可若直解學為覺於學字說不去效先覺之所為為字下得極妙曰為便落不得空不學不覺不覺不學學然後覺覺然後學此夫子所以發憤忘食樂以忘憂不知老之將至也後世學者惑於異端之說又自以為一覺便了不復言學且併疑憤樂相尋之說為非若曰既樂矣何消去再憤不知既不憤矣何以見其樂可見自謂一覺便了不復言學者還非真能覺者也維天之命於穆不已若是真覺自然巳不得一息尚存此志不容少懈自然說不得便了佛氏以所以能知覺運動的這箇為性故不消言學所以多流於放縱自恣吾儒以知覺運動之所以恰好的這箇為性故曰人性皆善所以非學則不能明善而復其初問人不知而不愠是知我者希則我貴之意否曰不然人不知而不愠聖人之心如太虛然原不貴知亦不賤知朋來則樂人不知則亦不愠人知之則囂囂人不知之則亦囂囂何等平心易氣曷嘗有絲毫憤世不平之意芥蒂於中總之以無心自處亦以無心處天下耳若知我者希則我貴我貴二字便覺傲氣便覺憤世不平此是借此二字以自寬慰之意此又愠之甚者也安得與夫子之言並論問學也者所以學為人也不知當從何處為曰在為仁又問為仁當從何處為曰在孝弟故有子曰其為人也孝弟又曰孝弟也者其為仁之本與聖門學問只在根本上做不是泛然用功為人謀而不忠乎是就自家為師說與朋友交而不信乎是就自家與朋友說傳不習乎是就自家為弟子說為人謀人字指弟子言不是泛說為人謀吾於子思則師之矣於顔般則友之矣王順長息則事我者也王順長息是費惠公之弟子二人皆可與師子思而友顔般者不是等閒人事字就弟子事師說古人之學只有師弟朋友舍此無餘事此所以學有淵源非後世可及古之學者必有師曽㸃曽參顔路顔回父子同師孔子楊時楊迪羅從彥父子師弟同師伊川蔡元定蔡沈父子同師晦菴王柏金履祥師弟同師北山吕大鈞與橫渠同年而後師橫渠沈煥與象山為友而後師象山雖曰未學語意與雖曰不要君吾不信也同只是決其即此是學吳注謂抑揚太過其流弊或至廢學不知雖曰乃聖賢文法非抑揚之詞如以此為廢學則君子食無求飽節亦廢學耶問處貧之道於人已間有辨否曰有如憐貧一也憐人之貧可自憐其貧不可樂貧一也自樂其貧可樂人之貧不可問患不知人也如大庭廣衆中偶然相遇君子小人一時何以知之曰此不難知聞之前輩云大庭廣衆中如一人稱人善一人稱人惡則稱人善者為君子而稱人惡者為小人一人稱人善一人和之一人阻之則和者為君子而阻者為小人一人稱人惡一人和之一人不答則不答者為君子而和者為小人以此觀人百不失一矣問患不知人是患人難知否曰人難知何消說只是患我不知人耳不患妍媸難辨而患鑑之不明不能照人之妍媸不患輕重難定而患衡之不平不能稱人之輕重此患不知人正君子近裏著巳之學也問為政以德譬如北辰居其所而衆星拱之曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格問孔子生知聖人何十有五而志於學曰惟十有五而志於學乃所以為生知聖人問從心所欲不踰矩曰只從心所欲便不踰矩若從耳目口體所欲便踰矩矣故曰從其大體為大人從其小體為小人夫子之從心是從志學中千磨百鍊而來所以能從心所欲不踰矩若放開學字而曰從心所欲是縱心非從心也縱心所如豈有不為耳目口體引去之理豈有不踰矩從心縱心此吾儒異端之辨問從心縱心之辨曰有心放開之謂縱無心自然之謂從問夫子於回則終日與言於賜則豫欲無言何也曰終日與言之意正豫欲無言之意譬之盧扁治病欲人勿藥自不容不教人用藥是教人用藥之意正欲人勿藥之意也知此則豫欲無言又安得不終日與言哉孔門以博約立教是論功夫非論本體學者不達遂以聞見擇識為知故夫子不得已又曰知之為知之不知為不知是知也直就人心一㸃靈明處㸃破知字此千古聖學之原若聞見擇識不過致知功夫非便以聞見擇識為知也故曰知之次知其知知其不知是本體多聞擇其善者而從之多見而識之是功夫譬之鏡本明而拂拭所以求明非便以拂拭為明也以拂拭為明固不是謂鏡本明不必拂拭亦不是故聖人說出本體正見得功夫原非義外耳此孔門博約之教所以上符精一之傳也生而知之者上也學而知之者次也故曰多聞擇其善者而從之多見而識之知之次也孔子之道一貫之道也又曰博文約禮何也蓋道有本原功無泛用博文原不是有心求博蓋所以探本窮原耳博文約禮則本立而逢原矣故曰吾道一以貫之孟子曰博學而詳說之將以反說約也此博約一貫之說也知知知不知是良知知之為知之不知為不知是致良知故曰是知也老子曰知不知上不知知病不知知病固也知不知獨非病乎必如夫子所謂知之為知之不知為不知斯不病矣然則知不知何以亦曰病曰知不知令人不可知矣故亦曰病子張學干祿而夫子告以祿在其中似又教以得祿之道或者求其故而不得乃以天爵良貴解祿在其中祿字又與學干祿的祿字不相䝉不知子張學干祿也是在言寡尤行寡悔多聞闕疑慎言其餘多見闕殆慎行其餘上用功只是念頭為得祿才如此用功耳故夫子告之只一味如此用功祿自在其中矣何必干哉若曰修其天爵而人爵自從之矣何必修天爵以要人爵哉子張之學是修天爵以要人爵夫子之言是修其天爵而人爵從之子張之學是有所為而為夫子之言是無所為而為古今人功夫都是一樣只是主意念頭有所為無所為不同耳夫子此章與孟子天爵章總只是令人轉念不是令人易業春秋戰國時成周取士之制雖廢而遺風猶存或以言揚或以行舉間有行之者故子張學干祿孟子謂今人修天爵以要人爵還說得只消轉念不消易業自秦漢以後取士之途不一學者欲為聖賢先要易業更說不得轉念矣前半生精力既奪於諸子百家後半生精力又奪於功名富貴到老年縱有為聖為賢之心那裏有功夫去讀六經孔孟之書此真儒所以不多見而世道人心不三代若也且尤可異者漢詔舉非常之士於是人爭跅弛不羈以博非常之名卒之操莽溫懿接踵而出世道之禍可勝言哉至於王安石以新經字說取士其壞人心術尤甚南宋韓托胄當國取士稍涉義理者悉見黜落六經語孟中庸大學之書為世大禁宋之不競又何怪焉樹鵠於彼而責成於此此必無之理也逮我國朝以五經四書取士而設儒學以作養之諸士自幼所讀者理學之書所作者理學之文下以此應舉上以此取士主司若曰其言如此其人可知此必理學真儒無疑也雖中間言行不相顧徒以文售者未必盡無乃各人自家不知轉念有負於上之所舉耳非其舉業立法之不善也由孔孟而後寥寥千餘載至今日才好說只消轉念不消易業由此觀之士生今日豈非至幸至幸矣哉吾輩今日千講萬講只是要轉得此一念則平生所學者盡皆是物矣不必易業而後稱真儒也願共勉旃毋負千載一時入太廟每事問此正聖心自然不容已處如見孺子而怵惕覩親骸而顙泚之類此正象山所謂墟墓興哀宗廟欽斯人千古不磨心也古之先王有此一念所以不得不制出許多祭禮如宗祝有司籩豆樽罍一切儀文度數之類此皆從此一念不容已處流出故孔子入太廟不覺的每事問此一念即古先聖當日制禮最初之一念所以不得不把許多祭禮如宗祝有司籩豆樽罍一切儀文度數之類每事去問此亦皆從此一念不容已處流出故曰是禮也見孺子而怵惕乃不忍之政之原覩親骸而顙泚乃葬親之禮之原入太廟每事問乃宗廟之禮之原先王得其原遂昌其流聖人覩其流遂觸其原此聖人每事問處正聖人窺禮之原處或人烏足以知之問管仲功業甚大夫子嘗亟稱之而又鄙其器小者何曰惟其功業大所以敢於奢僣惟其奢僭所以見得他器小若是器大將此功業不知容在何處豈肯奢僭至此管仲之功莫大於尊周攘夷管仲之罪莫大於樹屏反坫何也桓公之於仲即湯之於尹不是過而樹屏反坫仲何忍也仲方尊周室明君臣之分攘荆楚峻華夏之坊而樹屛反坫仲又何悖也是仲能尊周天子而不能尊齊桓公能攘荆楚之僣而不能攘自己之僭仲將何詞以謝桓公哉仲之得以善始善終者亦天幸耳且當時以桓公之威豈其不能禁仲之樹屛反坫而甘心任仲之僣也或者其偏信乎仲而不知其僭乎抑一匡九合有所用乎仲而不得不為是隱忍之計乎抑仲自恃其大有功於桓而謂桓其奈我何乎不知使桓而偏信乎仲而不知其僭也是仲愚桓也使桓私計有所用乎仲而不得不為是隱忍也是桓愚仲也使仲自恃其功而謂桓無奈我何也是仲脅桓也愚之不可脅之可乎哉周公憑叔父之親居冢宰之位操制作之權自古人臣功烈權勢未有過此者而公也吐哺握髮赤舄几几曽不以功烈權勢自髙仲誠有功未必加於周公顧以周公之所不敢僭者而仲僭之何也如曰成大功者略小節不知樹屏反坫是居然以桓自命也此而為之小孰能為之大厥後季氏舞八佾三家歌雍徹是仲也為之作俑矣仲之功不能掩乎其罪仲之罪不能掩乎其功故曰功烈如彼其卑也功烈本髙而自髙之則卑仲固可罪也哉仲亦可惜也哉淮隂羞列絳灌禍慘赤族管仲僣擬邦君老死牖下仲之不為淮隂者亦幸耳可見為人臣者寧可無功業之成不可無居功之量功業大小繫於所遇器量大小繫於所學有器量而無功業猶可言也有功業而無器量不可言也問達生死曰所謂達生死者謂自己不以生死動其心也若不以人之生死動心如莊子妻死而歌友死而歌甚至母死不哀而曰達生死可乎或曰此寓言也曰以母死不哀為寓言可乎問朝聞道夕死可矣曰人能聞道則生也可死也可不能聞道則生也不可死也不可言死生則諸凡是非毁譽窮通得喪可知死生特舉其重者言之耳只是甚言道之不可不聞且聞道之人能出離生死固不待言若専為出離生死聞道執定在了生死一邊說是佛氏之㫖非夫子之意矣朝聞道夕死可矣乃吾儒光明正大之說也若說未嘗生未嘗死而人謂之生謂之死則幻妄不經甚矣生死原無二理故謂未知生焉知死則可謂未嘗生未嘗死則不可問德不孤必有鄰曰象山不云乎東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也故曰德不孤必有鄰雖然還多一聖字耳漆雕開曰吾斯之未能信余則曰吾斯之未能疑夫道中天日也有何可疑學行而已疑之何為不知道雖中天日也而吾儕果能見道分明胸中朗朗如中天日乎學行而已而吾儕果能於人倫日用間一一行而著習而察乎胸中不能朗朗如中天日而曰有何可疑人倫日用間不能一一行而著習而察而曰疑之何為是何其敢於自信如此也易曰或之者疑之也故無咎可見疑雖非信而欲求信必自疑始故居之不疑夫子鄙其非士而自以為是孟子謂其為鄉原聖賢之為慮逺矣余故曰吾斯之未能疑嗚呼疑且未能矧信也乎哉因書此與同志者正之孔子惓惓教人謹言慎行後世學者多以謹言慎行為僞放言肆行為真夫謹言慎行中誠有僞者懲其僞只當進而在謹慎之中求真不當退而在放肆之中求真進而求真則為真君子退而求真則為真小人涇野先生平日教人惟以甘貧改過為言或者疑其淺余曰先生之學蓋得之顔子者也簞瓢陋巷不改其樂非甘貧乎有不善未嘗不知知之未嘗復行非改過乎故曰屢空又曰不二過聖賢之學大抵如此以此而疑其淺也則佛老深矣問回也不改其樂孔子樂在其中不知是樂道否曰天地間惟有此道吾儒之學亦惟有此道故孔子曰志於道又曰吾道一以貫之其言道者不一而足至於曽子言大學之道子思言率性之道孟子七篇尤惓惓於道字可見自古聖賢學問全在此道故仲尼顔子之樂乃所以樂道非懸空去別有箇樂也孔孟而後禪學盛行將此一道字掃而去之只懸空以求此樂故其弊至於猖狂自恣而不可救後世溺於禪學者無論即號稱大儒挺然以崇正闢邪為任者亦羣然謂孔顔自有樂處不是樂道一倡百和莫可究詰蓋其心雖專主於吾儒而其學則浸淫於佛氏而不自知矣故謂樂道有淺深安勉之分則可謂非以道為可樂而樂之則不可彼舍道而懸空以求此樂是異端之樂非吾儒之樂也千言萬語諱此道字千思萬想解此樂字此正見禪學入人之深而人亦不自知處孔孟而後此道不明蓋千有餘年矣吾儒異端關繫學術不小故不可不辨孔子曰君子憂道不憂貧惟其憂道則所樂在道可知惟其不憂貧則不改其樂樂在其中可知可見孔顔之樂全在此道字奈何後儒必欲諱言之也不知雖樂到渾然相忘無適不然處亦總只是箇樂道孟子曰理義之悅我心猶芻豢之悅我口分明說破道之可樂如此後儒必欲謂顔子非以道為可樂而樂之何也既非以道為可樂又將以何者為可樂乎禪學移人雖吾儒不能自解免如此二程見茂叔後吟風弄月以歸有吾與㸃也之意即此便是得仲尼顔子樂處又何必更往別處尋鳶飛魚躍時行物生斯道原在目前只是人丢過道字往别處尋所以孔顔樂處終不能到耳冉有曰非不說子之道力不足也還是不說若說則何論力且能說就是力既曰說矣而又曰力不足何也冉求之病只是把這道理認在夫子身上不曽認得是自家的故曰非不說子之道夫以我說子之道是二之也力即足安所用之他日問聞斯行諸子曰聞斯行之不知求所聞斯行之者果說夫子之道而行之耶抑說自家之道而行之耶回知博我約我故欲罷不能既竭吾才是回說我之道非說子之道也力何患其不足既竭吾才吾字正與博我約我二我字相應吾輩為學勿說我學聖人之道把道當做聖人的當知聖人不過先得我心之同然我自赤子以來此道完完全全聖非有餘我非不足只是我自家不知說我之道耳使我自家果能說我之道也即此便有餘力何患不到聖賢地位問女為君子儒君子儒何以解曰儒行篇解之詳矣或曰昔人謂儒行篇非夫子之言是否曰儒之道大矣夫子告哀公是泛說儒行道其實如此不是說自家如此多自夸大以搖其君也自異端絀吾儒吾儒不惟不能絀異端且往往混於異端而自絀乃曰儒行非孔子之言不知何以知其非孔子之言也宋制新進士賜儒行中庸二篇此其意甚盛髙閌乃奏儒行詞說不純請止賜中庸閌受學龜山且不知儒且自絀儒如此况異端哉又何怪三教日月星之說也堯舜其猶病諸與下論不同此是論其勢若曰心猶易盡而勢殊難周下論是論其心若曰勢猶易周而心殊難盡下論病字正是修己以敬敬處問夫仁者己欲立而立人己欲達而達人曰一向解者皆謂己立立人己達達人兩念並起不分先後不知謂之曰兩曰並猶未得一體之㫖己欲立己欲達此欲是人人有的不獨仁者只是少立人達人之心所以不及仁者耳故曰夫仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也已玩能近取譬四字其意自見又問躬自厚而薄責於人所求乎人者重而自任者輕何也曰躬自厚者謂以立人達人自任薄責人者謂不以立人達人責人也若自家不能以立人達人自任只責備別人不能立人達人便是所求乎人者重而自任者輕可見己欲立而立人己欲達而達人才謂之躬自厚才謂之自任重昔伊尹思天下之民匹夫匹婦有不被堯舜之澤者若已推而納之溝中而孟子以為其自任以天下之重如此既曰天下又曰自任此可以解立人達人之㫖矣雖然伊尹猶待三聘而後自任而孔子則以匹夫自任不論事業而論理不論窮達而論心一腔四海一息萬年此孔子之所以為仁而孟子所以願學孔子也惟欲己立而不立人甚且忌人之立惟欲己達而不達人甚且忌人之達如此存心不知可稱己立己達否可見己欲立而立人己欲達而達人才謂之己立己達故曰古之學者為己古之學者是如此為己不然則楊氏為我矣述而不作不是聖人謙詞後世天下不治道理不明正坐一作字不遵守祖宗法度只作聰明以自用天下安得治不表章聖賢經傳只好異論以自髙道理安得明述而不作聖人之為慮逺矣默而識之一句最要緊果然默識得這箇道理原自無止息安得不學學之安得厭原自無人我安得不誨誨之安得倦子在川上曰逝者如斯夫不舍晝夜此學而不厭之解也二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也此誨人不倦之解也或又問默者何曰此章默字從次章講字來原不是懸空頓悟余嘗有一絶句末云講到無言處方知道在心不是一味不言坐待默識也講到無言處真是多說一句不得故曰默參乎吾道一以貫之曽子曰唯何消多說勝日尋芳泗水濵無邊光景一時新等間識得東風面萬紫千紅總是春既識得東風面則萬紫千紅總是春安往非學安往得厭安往非誨安往得倦何有於我哉正是聖人默識處正是聖人不厭不倦處若自以為有便非聖人望道未見之心便是厭便是倦便不是真識問默識所識何物曰夫子嘗自解之矣曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣可見默識是識仁識聖聖是究竟處仁是發端處究竟處無所增發端處無所減仁如桃仁杏仁雖止一粒而枝葉花實無窮生意已具聖如成株之後枝葉花實已扶疏而爛漫矣其實只是一箇道理故曰學者先須識仁或問吾輩只修德足矣又何必講學余笑而未答頃之問余如何修德余曰公只修德足矣又何必問如何修德或者笑而大悟徙義改過是修德實在功夫講學者正講其如何是義如何是過如何去徙如何去改耳總是一件事非判然四段功夫問講學盛於宋或云議論多而成功少又云理學敝宋何也曰聲容盛而武備衰論建多而成效少此元人進宋史表中語蓋指當時廟堂之上言也如新法和議之類滿朝爭之而竟不報真所謂論建多而成效少者而忌者乃借口歸咎於理學諸儒不知當時諸儒多屏逐山野或棄置散地師友之間不過私相講論以明道覺人耳何關於廟謨國是而責其成效少哉且宋之不競正係於京惇托胄輩禁學之故即有忠言無從取效而反歸咎於學何也是宋以禁理學敝非以理學敝也論者試取宋史一細讀之則諸儒之寃可不待辨而自白矣問宋儒有不適於用之譏是否曰不然天下之人不一有有才而講學者亦有無才而講學者有有才而非學者亦有無才而非學者彼見講學而無才者之不適於用非學而有才者或亦幸成其功遂謂講學之無益不知講學而不適於用乃無才之過非講學之過也非學而幸成其功乃有才之效非非學之效也不咎其所以不適於用而歸咎於學不察其所以成功而歸功於非學此宋儒所以有不適用之譏也雖然元祐之禁僞學之禁即有才安所用之是宋儒之不適於用又時為之也於諸儒乎何尤有才而講學益足見其所長無才而講學亦足補其所短不然有才而非學則為恃才無才而非學則為棄物矣昔三原王康僖公講學其父端毅公督之朝邑韓苑洛講學其父蓮峰老人督之康僖公之門人為馬溪田苑洛之門人為楊斛山當其時家庭之間藹若洙泗師弟之際不愧伊洛此吾鄉前輩所以為盛今父師之教弟子之學自舉業外無復有此風味矣識者不能不為之三歎親妻子奴僕之日多接賢人君子之日少學問終無進益此古人所以講學㑹友常若不及聚坐一番收斂一番講論一番明白一番問子路行三軍恐顔子未必能此夫子何以與之曰用之則行舍之則藏正是行三軍之上䇿可以進則進可以退則退可以戰則戰可以守則守臨事而懼好謀而成兵法之妙莫過於此可見行三軍特用舍行藏之緒餘耳顔子豈迂濶而無用也凡天下事果於道理見得明白自家就該做去不該徇人故孔子論貧富不論别人所好何如但曰如不可求從吾所好論禮樂不論别人所用何如但曰如用之則吾從先進二吾字正是聖人不肯徇人處不然空慨嘆一場徒說别人不是自家依舊落了世俗蹊徑問子曰其為人也發憤忘食樂以忘憂不知老之將至云爾不知在何處憤何處樂曰學也者所以學為人也故曰其為人也發憤忘食樂以忘憂不知老之將至云爾憤在此樂亦在此此聖人所以不可及後世學者不知此將一生精力或在詩文上發憤或在功名上發憤或在富貴上發憤不肯在做人上發憤所以不及聖人問我欲仁斯仁至矣如何是欲如何是至曰無論如何是欲如何是至當論如何是仁程子曰仁者以天地萬物為一體故欲以天地萬物為一體則其心公公則謂之欲仁不欲以天地萬物為一體則其心私私則不謂之欲仁故曰學者先須識仁仁人心也仁者以天地萬物為一體此真心也古聖賢千言萬語吾輩千講萬講總只是要涵養此一念擴充此一念更無多術聖學真傳原在於此彼摩頂放踵從井救人者乃有此心而不能善用其心之過正所謂好仁不好學其蔽也愚者若懲其愚不病其不好學而反病仁之不當好則其愚抑又甚矣故學者必涵養擴充此一念到滿腔皆惻隱之心處然後信仁者以天地萬物為一體之說有若無實若虛非顔子明知其有而故為無明知其實而故為虛也蓋天下道理原是無窮盡的豈可以自足自滿故曰有若無實若虛此正是顔子實見道理處不可與老氏良賈深藏若虛盛德容貌若愚之說並論蓋老氏明白又說聖人欲上民必以言下之欲先民必以身後之這二欲是甚麼心腸此其用意甚深反落霸術畦徑蓋用此以欺世愚人令人不可測識非真見道理當如此也老氏巧顔子誠老氏有意顔子無心此吾儒異端之辨問犯而不校曰方將與物同休戚何暇共人爭是非問民可使由之不可使知之曰民可使由不可使知非聖人不使之知也聖人看破這道理不能强人人而使之知是以因性牖民道德齊禮立規矩樹準繩昭然示人以可由之則使之家遵而户守然而使民知之之意已在於由之之中特不强人人以必知耳中間有能知者不外規矩準繩直透精微奧妙固聖人所深願有不能知者有此規矩準繩亦不至放縱決裂亦聖人所深喜民可使由不可使知聖人誠不能强人人而使之知也老氏不達乃倡為愚民之說故其言曰古之善為道者非以明民將以愚之民之難治以其知多卒使始皇焚書以愚黔首則老氏一言誤之耳學術一差關繫豈小三年學不至於榖不易得也只為志榖一念不知忙壞古今多少人且無論聖學無所為而為只說榖之得與不得豈係於志人第不思耳問御乃藝之卑者夫子何以執御曰古人每出必輿必以子弟御非以自逸所以防輕動妄動耳且子為父御弟為師御亦寓教孝教敬意在內故曰樊遲御又曰冉有僕堯舜孝弟只在徐行後長可見御之義甚大此御所以為六藝之一而夫子所以願執御也六藝中惟御久廢可見夫子執御之說為慮甚逺多能是游藝功夫博文是志道功夫不可混看多能是藝如射御釣弋之類故曰吾不試故藝博文是講明道理約禮是體驗身心此聖門精一之學原自與多能不同博文不是在藝上博雖俯仰宇宙上下古今只可謂之博文不可謂之多能博文與多能蓋道與藝之別也多能無論其粗者即如詩文一事雖亦是古今不朽之事不可少的但聖人之所以為聖與學者之所以學聖人功夫所重不在此故聖人不禁人題詩作文寫字亦不教人題詩作文寫字天資髙有餘力不妨正務學之無傷不然不學亦無傷彼不能詩文而遂謂詩文為不當學固不是即能詩文而遂謂惟詩文為當學亦不是漢人之文晉人之字唐人之詩自是宇宙竒觀自足令人欣賞學者但以此為游藝之助則可若以此為正學之妨則不可問空空鄙夫何足與言而夫子必竭兩端曰此正見聖人誨人不倦之心自己稍有所知不待人問而汲汲於自見是其病在淺露自己無所不知而人或有問却含糊不肯盡言是其病在深晦洪鐘有聲特不可不叩而自鳴耳豈可叩之而復不鳴哉此其為人心術不問可知子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉自己不自有其知而告人務必盡其知此聖人所以不可及問自己無所不知而人問不肯盡言是何主意曰只是恐其人知忌人並己意思鴛鴦繡出憑君看莫把金針度與人壞人心術莫此為甚問空空如也當作聖人看否曰不可鄙夫惟空空才能領受聖教不然聖言未畢必有齟齬不相投處聖人必不能盡言又安得竭兩端哉夫子說鄙夫空空正見得他受教有地程明道謂空中受道意本於此若說夫子空空顔子屢空是學别有所宗特援聖言以為證耳叩字竭字正見聖人無知處人未問我我安得無故起念是未問之前我本無知由人之問才發動起我之知故曰叩既發動起我之知是以不得不竭兩端彼所問者如此我所答者不得不如此多說一句不得少說一句不得故曰竭竭者竭盡無餘之意也既竭矣聖人之心尚復有知乎是既答之後依舊無知故曰吾有知乎哉無知也問知不知上曰知而不自有其知誠上也但老氏之意明知其知而欲以上人先人故故為不知以下之後之故曰知雄守雌知白守黑又曰非以明民將以愚之是知而故為不知以愚人者也安得為上孔子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉知而不自有其知而又與天下人共進於知此吾儒之所謂上非異端之所謂上也問博約之訓孔門羣弟子共聞之獨顔子悟得博我約我何也曰此一悟全從仰鑽瞻忽中來羣弟子所以日聞聖教而不悟者正是少此功夫耳人皆有為聖人之才只是不肯竭竭之便幾於聖人故曰既竭吾才如有所立卓爾顔子得力處在一竭字世儒受病處在一罷字偶有所悟輒去放開此所以流弊無窮自以為悟遂去罷手還不是悟若是真悟自然欲罷不能聖人心同天地聖人學問直是與天地萬物為一體學問不是自家私自做的故曰可與共學未可與適道可與適道未可與立可與立未可與權只玩可與未可與五字便見聖人公己公人處曽子亦曰堂堂乎張也難與並為仁矣此亦夫子未可與之意學者且無論有可與不可與之人當先論有與人不與人之心若無此與人公共之心縱自家十分用功終是自私自利之人其於聖學不啻千里問權曰道譬之稱然權是稱錘衡是稱梗經是稱星應感之來即所稱之物經是一定不移的權是移來移去的權雖移來移去始終在星之內非移在星之外也權雖通變不離乎經事事有權時時有權非専為經處常權處變也程子謂權只是經可謂獨見若外經言權則權謀權變矣可與立未可與權不可說壞立字權是立之熟處孔子不踰矩是立從心所欲不踰矩是權魯男子以己之不可學栁下惠之可是他立處然能以己之不可學栁下惠之可又是他權處即此是立即此是權故夫子與之不獨魯男子昔沈晦問尹彥明今有南子可見乎尹曰不可曰子學孔子者也如何不見曰若某學未到磨不磷涅不緇處故不見人謂此尹子立處余謂此尹子權處故必權如魯男子如尹彥明才謂之真可與權問鄉黨篇大意曰當恂恂則恂恂當便便則便便當誾誾則誾誾當侃侃則侃侃用之則行舍之則藏夏葛而冬裘渴飲而飢食聖人何以異於人哉人自異於聖人耳問孔子疏食飲水樂在其中至鄉黨一篇凡飲食衣服又要齊整何也曰鄉黨篇是說聖人動容周旋無不中禮即一飲食一衣服人所易忽略處聖人亦不肯苟不是要齊整受用不然紺緅何以不飾紅紫何以不為䙝服羔裘𤣥冠何不以弔食必求精何以不厭精膾必求細何以不厭細惟知肉食何以不使勝食氣哉為此言者是惡惡衣惡食之人而借孔子以自解者也何足置辨許平仲嘗暑中過河陽渴甚道傍有梨衆爭取啖平仲獨危坐樹下自若或問之曰非其有而取之非義也人曰世亂此無主曰梨無主吾心獨無主乎或者歎服必如此方謂之善學孔子不撤薑食不為通神明去穢惡與不得其醬不食俱無所取意只是門弟子心恱誠服聖人把聖人平日所嗜的所常用的都要記下以識不忘耳與曽晳嗜羊棗曽子不忍食羊棗之意同即此足見聖門肫肫其仁景象問傷人乎不問馬曰此聖心自然不容己處蓋聞廏焚倉卒之際正真心發見之時只一問人不問馬則聖人一生老安少懷多少大的志願皆從此一念中來故孟子驗人皆有不忍人之心驗之乍見孺子入井之一念其意正本於此戰國時廏有肥馬野有餓莩天下日趨於危亂只是為人上者少此一念耳這道理儘大不可看小了問論語中有重出者有重出而逸其半者何曰非是重出蓋聖人丁寧意也春秋傳所謂書之重詞之復必有大美存焉爾時哉時哉鄉黨一篇聖人的行事也只是箇時哉時哉故曰孔子聖之時者也少墟集卷二
