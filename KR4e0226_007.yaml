body:
  text: 少墟集巻七明馮從吾撰語録寳慶語録子夏在聖門稱篤信謹守者猶曰入聞聖道而悦出見紛華而悦可見人心操存最難今學者無聖人以為之依歸是入既未聞聖道而出又只見紛華安保此心之不舍而亡耶念及於此真是汗顔慄骨已所不欲勿施于人此仁者强恕而行之事然天下不皆强恕而行之人我奈何因不欲之加而輙動其憤懣不平之念如此則必生身于羲皇之世而後可也但不知羲皇之世又有此憤懣不平之士否君子遵道而行其志曷嘗不鋭然不免廢於半塗者怕人責備也不知别人責備我正是指㸃我處有人指㸃我方喜其前途之不迷也而又何怕之有管仲設三歸用反坫樹塞門其規模何等大也而夫子乃曰管仲之器小哉夏禹菲飲食惡衣服卑宫室其家數若隘乎小也而夫子乃曰巍巍乎舜禹之有天下也而不與焉何聖人之識見議論與人情大相懸絶耶于此勘得破方不為世俗所粘染黄擴儒問學者學聖人尚矣竊意聖人𤣥修實詣或髙出尋常一籌及登壇聚講以日用為體驗處平澹為下手處何時才躋聖域曰自古聖人造詣豈止髙出尋常一籌蓋髙出尋常萬萬者但不知聖人當日用何功才得造詣至此亦不過以日用為體驗處以平淡為下手處耳吾輩果能如此常常用功不患不躋聖賢之域又問旦晝時百累膠結萬竇碁布牛羊斧斤易知也憶午夜乍覺每將旦晝未為隠事預先千想萬慮一切牛羊斧斤都打不退此様病根如何拔去曰斧斤牛羊時時有之只是自家一向不知故反愛䕶之耳今既知是斧斤必不肯再使我伐既知是牛羊必不肯再使我牧不患不退只患不打毋曰一杯水不能救一車薪之火也又問人生塵寰舉足就差開口便錯尋自悔之差錯過的都收拾不來似這終身痼轍如何解脱曰學者終身痼轍不能解脱只是不知自悔若能自悔舉足自然不差開口自然不錯縱不然亦不至大差大錯矣又何痼轍之足患又問堯舜地歩最髙功業最偉及閲子輿氏論一不為堯隔壁即桀一不為舜隔壁即蹠夫堯桀舜蹠相去霄淵何故並談無别曰堯之隔壁就是桀舜之隔壁就是蹠中間再不隔一家此孟子所以並談無别世之學者既不敢為堯為舜又不甘為桀為蹠只是錯認以為中間尚隔許多人家耳使早知堯之隔壁就是桀舜之隔壁就是蹠自然一歩不敢差錯又問古昔論人多在事後今世論人多在事始想姬旦負成王時伊尹放太甲時心事未白二公何所擔當不為流言中傷竟成千古大事曰世間是非毁譽最易動人伊尹周公只是能自信不為是非毁譽所動所以能成千古大事亡論伊周即如宋濂洛闗閩國朝河㑹姚涇諸先生當日講學時有多少是非毁譽由今視之于諸先生竟何如大約古昔論人多在事後今世論人多在事始今世論人雖在事始吾輩自信當在事後又問小白重耳兩霸最是魁杰稱善假之者迺陘亭衡雍後執陳濤塗聴衞元咺甫履盛滿輙肆慆媱暴行彰彰可指可摘又若不善假者此何以故曰天下事真者斷不能假假者亦斷不能真伊周真者也雖叢流言何損于真桓文假者也雖費彌縫何益于假不然濤塗之執元咺之聴何一旦敗露至此哉或曰非敗露也是真心發見也余曰然君子有真小人亦有真濤塗之執元咺之聴是小人之真心發見也于此可以觀桓文之假而不可以此概天下之真若概以此為真則日肆慆淫無所忌憚者為真而一介不苟赤舄几几者反為假矣故君子之真不可無小人之真不可有毋徒諉曰吾真也吾真也而置君子小人于不辨或問先知後行知行合一曰昔涇野與東廓同遊一寺涇野謂東廓曰不知此寺何以能至此寺東廓曰不至此寺何以能知此寺之妙二公相視而笑可見二説都是不可執一也雖然道之不行章先後合一業已詳言之矣吾輩又何疑天地之大也人猶有所憾覆載生成之偏寒暑災祥之不得其正説的未嘗不是但講天地之大處不可説壊天地當云以天地之大無所不覆無所不載人不知當何如頂戴宜乎有感而無憾然人心不足人之願欲不齊雖以天地之大也人猶有所憾可見道理無窮猶字最當體認不可説壊天地尚有可憾處天地生我當吾世而使人猶有所憾則天地生我之謂何須是為天地立心為生民立命為徃聖繼絶學為萬世開太平使天地不至于為人所憾才不負天地生我之意不然無論為人猶有所憾之人即不為人猶有所憾之人而碌碌庸庸不能使天地不至為人所憾則天地又烏用生我為哉可愧可懼孔子稱舜曰必得其名稱武曰身不失天下之顯名正見得武之征誅與舜之揖讓一耳且更加一天下字又加一顯字尤見得武之心事顯然明白天下人人所共信也問曰必得曰不失一字之間真春秋袞鉞之意何如曰不然孔子正恐人有此議論故序武于舜後序不失於必得後耳又問不失二字何曰二字極有意思三分天下有其二以服事殷不獨文王武王受命而曰末可見武王一生亦以服事殷父子已得天下之顯名直至末年不得已順天應人才有此舉宜乎平日之顯名至此不無少損而猶然不失此所以為難故曰不失非與必得二字有袞鉞也又問曰身似心猶歉焉何如曰不然自古聖人做非常之事必有非常之疑一時浮議或有所不免然公論久而後定縱身後有顯名而不能保其身之不失武王能以其身不失天下之顯名是何等心事又何以服人至此豈不尤難之難哉謂武王自歉則可若以心猶歉解身字則不可問壹戎衣而有天下何也曰一字正見得師不老財不匱兵不血刃處向非天與人歸武王不得已而應之安能易易如此惟一戎衣而有天下此所以身不失天下之顯名也問文王事殷而武王伐受文王之心戚矣何如曰父作之子述之此正文王之所以無憂也烏乎戚謂之曰善繼人之志善述人之事可見武王到文王之時亦必以服事殷文王到武王之時亦必一戎衣而有天下孔子明白説破而蘇子猶謂武王非聖人何也問子思惓惓於纉緒繼述為武周辨者何曰孔子嘗謂武未盡善蓋悲其遇也又謂夏禮殷禮吾能言之蓋為周監于二代遡其郁郁之文所從出也而或者不察以為孔子若有不足于周者且春秋時周先王存一空名而為下之敢於倍者又多借未盡善之言以為辭故子思不得已直説出武周心事原與堯舜揖遜之心同而後又惓惓于今用之吾從周及憲章文武之説又引夏禮吾能言之云云以為証此其憂誠深而其慮誠逺矣中庸一書謂之明道之書可也謂之維周之書亦可也子貢欲去告朔之餼羊此亦裁革節省之意不知有當裁革節省者亦有不當裁革節省者春秋時列國不惟不奉聲教且不奉正朔矣闗係豈小夫子愛禮之意只當在奉正朔上説與春秋書春王正月之意同昔人謂桐江一絲繫漢九鼎余謂有司一羊存周九鼎王者之迹熄而詩亡周自平王東遷政教號令不行于天下天子不廵狩諸侯不述職列國不陳詩貢俗原是詩亡不是黍離降為國風而雅亡也所以孔子刪詩止於三百篇此外再無詩可刪矣王迹熄而詩亡觀詩亡而王迹可憂此孔子所以作春秋以存王迹也春秋天子之事不是孔子僣托二百四十年南面之權只是魯之春秋照周天子的制度稍為筆削便是天子之事非復諸侯之事矣故觀於春秋而知周天子之政教號令猶然行于天下也夫子維周之功大矣問胸中正則眸子瞭焉胸中不正則眸子眊焉如今有目疾者亦神散而昏豈胸中不正耶曰只視所當視不視所不當視便是瞭便是神精而明若不視所當視而反視所不當視便是眊便是神散而昏昔一朋友書屋中有酒數罌有書數巻客至反覆視酒更不及書主人因留飲大醉而别嗚呼瞭眊之際亦㣲矣可不慎與問格物曰今吾輩在此講格物就是格物即如孝弟二字與師友講明便是格孝弟之物心下講得孝弟二字明白即是知至由是誠其孝弟之意正其孝弟之心脩其孝弟之身齊其家使一家之人皆孝弟治其國使一國之人皆孝弟平其天下使天下之人皆孝弟故曰人人親其親長其長而天下平若離却眼前另尋一物是物與吾身為兩而道可須㬰離矣問經權曰天地間只有此經天地以此立心生民以此立命人類以此異于禽獸可進可退可毁可譽可生可死而此經必不可廢但當平常易處之事雖中人或亦偶合當變故難處之事雖賢者不免出入所以古之聖人不得已設一權字以為事至于此須是行權才得合經不然便拂經矣是聖人之設權正為委曲合經設也而後人之行權反多至於廢經何哉聖人為經以設權後人借權以廢經闗係豈小信者人之真心國之大經足食足兵民信三者誠不可缺一若不得已寧可去兵必不可去信再不得已寧可去食必不可去信再三斟酌至死不去此權也正所以求合乎其經也若今人論政平常已不知信為人之真心國之大經每毎與兵食並論所以但不得已先要去信何况於再若曰不得已而行權耳不知行權之主意謂何如此又何取於權哉權一也權的合經不合經便是能權不能權便是可與不可與孔子而後可與權者莫如孟子如答任人一章任人不知禮為天地之大經為萬古之常經乃權於禮與食之間而謂食重又權於禮與色之間而謂色重曰饑而死曰不得妻者甚之也説到這個去處恰似食色重所以屋廬子亦不能答不知如此權禮則人欲肆而天理滅人類將盡淪於禽獸矣其關係夫豈小哉孟子亦權於禮與食之間而曰寧可以無食必不可以紾兄之臂而奪之食亦權於禮與色之間而曰寧可以無妻必不可以踰東家墻而摟其處子曰紾兄曰踰墻亦甚之也説到這箇去處自然是禮重如此權禮則天理常存人心不死人類不至為禽獸矣先王為食色而制禮孟子權食色而重禮天地之大經以正萬古之常經以明其功豈小補哉故曰孔子而後可與權者莫如孟子也君子逺庖㕑一句正是行權以合經處不忍見其死不忍食其肉此真心也此經也此心既是不忍而賔祭又不可廢若不行權執定禮不可廢只得忍而殺之則其初一二次還覺不忍久之習以為常必至見其生而亦忍見其死聞其聲而亦忍食其肉矣故先王不得已行權以逺庖㕑庶乎禮既不廢心亦可存豈非為仁至妙至妙之術哉庖㕑原為此心而逺行權原為合經而設惟至於委曲以合經而後見權之所以為妙吾儒事業不外齊治均平此是如何景象若以家道富厚為齊以天下富强為平此五霸之治平非二帝三王之治平也唯是入其家見其父慈子孝兄友弟恭夫和婦順方是家齊景象而家之貧富不與焉推而一國必一國興仁興讓而始謂之治又推而天下必人人親其親而長其長則天下始平不在國之富不富兵之强不强也以富强為治平此千載不破之障一念不起純然是善惟有念而後有善惡之不同故戒慎不睹恐懼不聞而朱子解之止曰存天理之本然莫見乎隱莫顯乎㣲而朱子解之即曰遏人欲於將萌發而皆中節謂之和此節字乃天然自有之節就是中不是人為問豫立之意曰豫在事上尋求斷不能立蓋事變無窮千頭萬緒豫先何以安排即安排得是亦屬有所將迎之弊况又未必合乎此豫字即是下文擇善固執博學審問慎思明辨篤行於此勵弗措之志加百倍之功造到雖愚必明雖柔必强凡事自然是立前定者前定乎此也若預先不在理上講究得明白心上不涵養得純熟事到面前如何得妥貼凡事豫則立是在心上豫不在事上豫一夕坐寳慶月下見皓月當空自覺此心湛然無物因顧謂諸生曰此時正好自識心體蓋人性上不容添一物就如皓月當空纎塵不染可見吾輩心體必一物不容而後能萬物皆備彼反身不誠萬物不能皆備者還是自家心上有物還是自家心體不乾净問一物不容與萬物皆備二物字同否曰一物物字指欲言萬物物字指理言佛氏本來無一物不止欲無併理亦無不止理無併無理之無亦無矣此理障二字所以貽禍無窮也人心所以與萬物隔者只是不能舍己若能舍己自然眼界大心地寛自然看得我與人俱從一善生來有何不可從處有何不可樂取處蕩蕩乾坤獨來獨往豈不為千古一快取與二字原是相反惟善是同有的故即取為與於人無損而于已有益于已無損而於人有益故曰君子莫大乎與人為善彼此無損彼此有益人亦何憚而不與人為善耶大學言正心無他法只是要此心常在腔子裏蓋此心一不在所以視聽遂失其職以此應事未有不差錯者此身所以不脩也薛文清公每寢必自問曰主人翁在室否可謂精于心學者岀門如見大賔非止為岀門而發蓋出門之後就要待人就要處事有多少事體多少應酬若以不敬當之豈有不差錯之理故提醒之法于出門尤為𦂳要問叅前倚衡曰只如此時眼前師友相對大家精神收歛寧一便是叅前倚衡真境苐恐吾輩過此時不能如此時耳所以學要常講師友要常㑹問人而無信曰信在天為實理故四時一信之流行在人為實心故四徳一信之貫徹如怵惕形于孺子固信之見于仁矣俄而接大賔而恭敬生焉非信之見于禮乎又俄而屈直互陳是非立判非信之見于智乎世人不知無信之不可故意做岀許多機械來以為巧于涉世不知人而無信終不能行自己做到州里不能行處還不知是不忠信篤敬之故真是可惜言忠信一節正是人而無信的註䟽問淡而不厭曰淡之一字原是性體吾性中一物不容何其淡也無物而萬物皆備又何厭之有即如滚水淡極矣故人人皆可用且如眼前飲茶就有多用不得的推而至于羮汁酒醴之類則人人斷難如一矣可見淡中之味人人當知能知此味則天下無事不可做矣先儒曰咬得菜根百事可做此之謂也人之樂未有無所寄者只是要寄得好即如聲色貨利人皆以為可樂故敝精耗神以殉之至老死而不寤所樂一差匪獨人品攸闗而身家亦係之良可悲痛故二程初見茂叔即教之尋仲尼顔子樂處誠恐劈頭所樂一差則終身不能出此坑塹耳孔子論友即繼之論樂而損益辨焉此之損益即利害禍福也不得輕輕看過自家所樂一差則終身相與的朋友豈得不差朋友一差何事不差念之悚然今人於書畫奕詠靡不殚精為之如曰學聖人則退托不敢當豈知技藝至難故不能者極多若夫孝弟庸行當身而具人人可能則學聖人不較易乎問吾子云人生天地間惟有講學一事固矣苐講學者多惹人議論奈何曰議論何病議論然後見君子且吾輩為學非所以學孔孟耶孔子講學或人疑其為佞孟子講學外人譏其好辨不特此也伊川有洛黨之嫌紫陽有僞學之禁真西山稱為真小人魏了翁號為僞君子自古聖賢未有不從是非毁譽中來者故曰若要熟也須從這裏過又曰金不鍊不精玉不琢不美可見是非毁譽聖賢方藉以為鍜鍊砥礪之資也又何計人之議論哉不然瞻前顧後方信忽疑是遵道而行半途而廢者也何以謂之孔孟又何以謂之程朱哉白沙先生詩有云飽歴氷霜十九冬肝腸鐵様對諸攻羣譏衆詆尋常事了取男兒一世中願與諸君日三復之問大徳不踰閑小徳出入可也何如曰道無大小學亦無大小安得以小徳出入為可此中大有意思蓋先王立教大處不待言小處如曲禮所稱上東階則先右足上西階則先左足先生書䇿琴瑟在前坐作跪而遷之就屨跪而舉之屏於側鄉長者而屨跪而遷屨俯而納屨人子行不中道立不中門之類即一言一動一歩一趨都有箇䂓矩凖繩一毫不肯假借一毫不得踰越非是先王過於詳過於嚴蓋立教不得不如此先王立教既如此其詳且嚴而又恐學者苦其繁畏其嚴於是不得已又寛一歩曰大徳不踰閑小徳岀入可也庶使初學之士不至苦其繁而自諉又畏其難而自阻耳不嚴不足以端學者之趨而不寛又不足以鼓學者之進此正是聖賢循循然善誘人處非果謂小徳可以岀入無傷也若果謂小徳可以出入無傷則先王立教只標其大徳足矣又何必條縷小徳若是之詳且嚴哉惟其若是之詳且嚴所以不得不説此一句聖賢中間有多少苦心處語云天之愛民甚矣余亦曰聖人之愛學者甚矣學者豈可不亦歩亦趨務使毫無岀入以無負聖人愛之之意此章之言大有闗係安得謂不能無弊吳氏蓋未嘗深思其意耳問或以綱常倫理為大徳辭受取與為小徳何如曰伊尹格天事業皆從一介不苟中來辭受取與豈是小徳為此言者是貪夫借口之辭豈子夏之意先王立教雖是寛人一歩學者不可自寛如禮記内則云子事父母鷄初鳴咸盥潄衣服歛枕簟洒掃堂室及庭布席各從其事至於曲禮又云献粟者操右契凡遺人弓者右手執簫左手承弣主人自受由客之左之類由是觀之吾輩自來不知出入了多少尚敢還説别様出入無傷哉不辨其何者為大徳何者為小徳而槩言小徳岀入無傷竊恐其認大徳為小徳認踰閑為岀入而猶曰無傷無傷也其自誤誤人可勝道哉細行不矜終累大徳願與同志共朂之聖賢學問雖多端一言以蔽之曰謹言慎行不必深求只看世間謹言慎行的人那一箇不為人所敬愛那一箇不獲福放言肆行的人那一箇不為人所怠慢那一箇不惹禍故曰愛人者人恒愛之敬人者人恒敬之又曰禍福無不自己求之者念及于此敢不凜凜言易而行難為謹言易而慎行難也今于易者且不能又何論難者哉昔劉元城問盡心行已之要于司馬温公公曰其誠乎又問從何入曰從不妄語始元城于此三字力行七年而後成為古今大儒不妄語三字似易而實難願共勉之毋忽語云一念而善景星慶雲一念而惡妖氛厲鬼余亦云一言而善景星慶雲一言而妄妖氛厲鬼古詩云忠孝傳家國詩書教子孫廣行方便事隂徳滿乾坤余亦云忠孝傳家國詩書教子孫廣開方便口隂徳滿乾坤言出于我一毫無所費而能使隂徳滿乾坤人亦何憚而不為耶可見人不惟不當妄語且當善言徳行天下之患莫大于小人倡不根之言君子不察誤信而誤傳之人見其出于君子之口也皆謂君子必有所見其言必不妄即理之所無者或亦信其為有而不可破矣不知小人當造言之時原覬君子之信而傳之及君子一信而傳之則小人反借為口實曰君子云何君子云何即他人亦必曰君子原云何原云何也如此則小人不根之言一一皆有根之論矣當斯時也即堯舜之明亦豈能察之哉忠臣飲恨孝子含寃病正坐此余以為君子之聽言凡説好人不是處當姑闕疑從容詳審勿輕信而輕傳之則小人之計自無所售彼縱假借而君子原無此言天下必有能辨之者又何萋斐貝錦之足憂哉問君子小人之心曰恐君子變而為小人望小人變而為君子者君子之心也恐小人變而為君子望君子變而為小人者小人之心也此小人所以動輙左袒小人而媒孽君子左袒小人者非是厚小人只是使小人益成其為小人而有以快已之忌心媒孽君子者非是恨君子只是使君子不成其為君子而有以遂已之忌心耳故曰君子成人之美不成人之惡小人反是小人只是一箇忌心不知壞了世道人心多少良可浩歎問或云必有孔孟之道然後可闢佛老其説是否曰此佞佛者阻人闢之之言而聽者未及察耳孟子曰能言距楊墨者聖人之徒也若必待有孔孟之道者而後可以闢佛老則佛老終無人闢矣能言距楊墨二句余昔有此破云大賢公闢邪之責于天下亦不得已意也余師蕭慕渠先生深以為然近又見葉寅陽破云大賢主張聖教而深望于羽翼者焉更得其意問從祀孔廟只當重人品不當專重講學何如曰不然此祀原專重講學須在講學中擇其有功聖門人品無議者方得從祀若不論講學與否而槩論人品則古今人品無議者亦多矣豈得人人而祀之且孔子以前人品無議者又不在所遺邪講學二字創自孔子此祀全為風人講學而設不專為古今人物而設也若古今人物表表不凡者或祀鄉賢或祀名宦或為專祠以祀用以崇徳報功磨世礪俗皆無不可第不宜輕易從祀孔廟耳此闗係不小不可輕議問講學者多棄去文詞不理此道學自䕶其短之巧術何如曰學者棄去道學不理誠不可若棄去文詞不理有何闗係而曰此自䕶其短之巧術也能文者自是能文不能文者自是不能文能文者而不理此正道學不自恃其所長不能文者而不理此正道學不自䕶其所短而反以為自䕶其短之巧術何也道理甚明無足置辨問聖賢道理在人倫日用間只為子孝為臣忠可矣何必講心性而後為學耶曰聖賢道理原在人倫日用間但不知以心性不端之人為子能孝為臣能忠否此必不能而曰不必講心性可乎借忠孝大題目以杜講學之口此正以不忠不孝誤天下者也而學者多誤信之何也心之理一也在子謂之孝在臣謂之忠忠孝是天命之性為子孝為臣忠是率性之道聖人教子孝教臣忠是修道之教講心性正是講忠孝之理處今曰不必講心性是臣子而不講忠孝之理也其不臣不子甚矣問心性之學上逹之學也或不宜槩施于下學曰收放心養徳性下學不當如是邪問必有事焉而勿正心勿忘勿助長也一説以必有事焉而勿正心為句經鉏堂雜志又謂正心二字元是忘字傳冩失真以一字分為二字蓋養浩然之氣必當有事而勿忘既當勿忘又當勿助長可也疊下勿忘作文法云云二説孰是曰二説俱非當依伊川以勿正七字為句為是孟子謂必有事原是在心上有事心上用功不專在事上有事事上用功若説心必有事焉而勿正雖是明白却不渾融却不妙惟將心字放在下句正見得上句必有事焉而勿正是在心上有事勿正非專在事上有事勿正也此正見孟子句法字法之妙上文是集義所生者義原在心在内故行慊於心便是義行不慊於心便不是義集只行事件件務慊於心便是非硬將外面一物取而積累於此而曰集義也告子義外之見病正在此故孟子先説集義後説行有不慊於心而直斷之曰告子未嘗知義正與此先説有事後説心勿忘勿助長一様文法大抵聖賢立言下字眼都有意思學者識見不到切勿輕起疑端擅自更改也正心誠意四字千古正論聖學真傳而或以必有事焉而勿正心為句或又以正心二字為忘字之誤必欲借孟子抺摋正心二字何也問巧言佞利口何以分别曰佞與利口俱是巧言孔子曰巧言亂徳孟子解之曰佞亂義利口亂信昔張横渠以崇文説書被召與王安石議不合安石遂命按獄浙東寔䟽之也時程伯淳為御史争曰張某以道徳進不宜使治獄安石曰淑問如臯陶猶且讞獄此佞語也朱文公内召入朝有人要於途説之曰正心誠意上所厭聞文公正色答曰某平生所學惟此四字言者愧服上所厭聞云云此利口也或以文公平生所學惟此四字之言為迂不知正與邪對誠與僞對既以誠正為迂不知將以何者為不迂邪或者其人可知矣或曰正心誠意亦未必為上所厭聞或為上所喜聞亦不可知為臣子者何可不言余曰不然臣子進言不必論上所厭聞不厭聞亦不必論上所喜聞不喜聞如以厭聞誠正而不言誠正固非事君之道如以喜聞誠正而始言誠正亦豈純臣之節如喜聞誠正而言誠正固矣倘喜聞狗馬而亦言狗馬可乎喜聞貨財而亦言貨財可乎不論自家所學惟論上所喜厭其勢必至于此唐李勣知遂良之説上所厭聞故陛下家事之説一投而遂貽唐室無窮之禍想勣之心不過以遂良之言為迂耳豈知貽禍之烈至此哉文公不論上所厭聞否第曰平生所學惟此四字宛然孔氏家法真萬世臣子之所不敢違也問學之不講孔子所憂後世學者多不肯講何也曰其病多端一則于已不便一則自以為是一則為人不足與言一則恐為世所厭一則嫉忌人之勝已孔子曰躬行君子則吾未之有得一講則人必以躬行責備于已不便故不得已謂學只在行不在講是以行之一字杜責備者之口以掩不行之過也即間有能行者又器小易盈若曰吾行是是亦足矣何必再講而况其人又不足與講也孟子曰齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾彼其心或亦曰是何足與言學問也云爾昔人説朱文公曰正心誠意上所厭聞今之不講者豈亦以正心誠意世所厭聞而講之無益邪女無美惡入宫見妒士無賢不肖入朝見妒今之不講者得無曰我不能行而講之使人行則形已之短我能行而講之使人行則掩已之長得非忌心勝而不欲人之行之邪不知不講者不行者也真能行者必不避人責備而不講義理無窮即聖賢且望道未見我安敢自以為是而不講人性皆善孰不可與言敢謂人不足與言而不講平生所學惟此四字何論人之厭不厭也而不講君子莫大乎與人為善方愧不能與人為善也又何忌人之勝已也而不講孔子憂之正憂乎此耳後人不憂豈其有加於孔子邪問近世講學者多講𤣥虛不知只躬行足矣何必講曰藥𤣥虛之病者在躬行二字既學者多講𤣥虛正當講躬行以藥之可也而反云學不必講何哉為此言者是左袒𤣥虛之説而阻人之辨之者也講𤣥虛之學講學也講躬行之學亦講學也𤣥虛之學不講可也躬行之學不講可乎若曰學不必講豈躬行之學亦不必講邪堯舜之道孝弟而已矣若不講如何孝如何弟安能孝弟夫子之道忠恕而已矣若不講如何忠如何恕安能忠恕彼謂只孝弟忠恕而不必講者是原無心于孝弟忠恕者也孔子曰躬行君子則吾未之有得可聽其未得已乎故曰學之不講是吾憂也講學者正是講其所以躬行處正是因其未得而講之以求其得處不然躬行君子終未之有得矣講學二字幸出于孔子若出于孟子則必以為孟子不及孔子處在標此二字矣問講學可也第不宜如諸儒之各立門户何如曰不然天下有升堂入室而不由門户者乎如以諸儒標天理二字標本心二字標主敬窮理四字標復性二字標致良知三字為立門户不知孔門標一仁字孟子標仁義二字曾子標慎獨二字子思標未發二字豈亦好立門户邪夫子之墻數仞若真欲見宗廟之美百官之富自不容不覔此門户以入不然是原甘心于宫墻之外者也何足辨哉且論道體則千古之門户無二論功夫則從入之門户不一第求不詭于孔氏之道各擇其門户以用功不自䕶其門户以立異可耳而必于責備其立門户不知舍天理本心慎獨未發之外又將何所講邪一開口便落門户真令人不敢開口矣聞者豁然大悟天下有三件不可解的事言可省也别様不該説的言語通不省偏只省了講學的言語一不可解交可寡也别様不該交的朋友通不寡偏只寡了講學的朋友二不可解是非可避也别様不該管的是非通不避偏只避了講學的是非三不可解或有苦忌者之責備者余曰人而不為人所忌則其人可知矣人而忌人則其人可知矣人而不為人所責備則其人可知矣人而責備人則其人可知矣戰國之時楊墨之言盈天下得孟子辭而闢之從漢至宋佛老之言盈天下得程朱辭而闢之至于今日非學之言盈天下倘有辭而闢之如孟子程朱其人乎余竊願為之執鞭非學之言忌者倡之誤聽者從而和之講學者又誤從而講之忌者無論矣誤聽者從而和之講學者又從而講之何也講學者誤講非學之言于已為自誤于人為誤人論學譬如為文必融㑹貫通乎百家然後能自成一家若只守定一家恐孤陋不能成家矣學之道何以異此故曰孔子聖之時者也又曰孔子之謂集大成天下事執彼以議此執此以議彼則皆短也執此以濟彼執彼以濟此則皆長也執伯夷之清以議下恵之和執下恵之和以議伊尹之任則三子皆在所棄矣執伯夷之清以濟下恵之和執下恵之和以濟伊尹之任則三子皆在所收矣孟子聖三子正所以備孔子之集成孔子之時耳不然舍清任和之外又將何所集以成大成哉惟不外清任和而能時出之此孔子所以異于三子也古人惟見人之長今人惟見人之短古人論人于短中求長今人論人于長中求短古人見人之長處原是長處見人之短處原是短處今人見君子長處反以為短處見小人短處反以為長處皆古聖人也論人何其恕吾未能有行焉自處何其謙乃所願則學孔子也趨向又何其正此正孟子之所以得統於孔子也以孔子自期則可以孔子自任則不可以孔子望人則可以孔子責人則不可只争一念遂隔千里宋儒云天不生仲尼萬古如長夜余亦云人不學仲尼萬古如長夜士君子為人全要有品有量一介不苟以學品則品自髙萬物皆備以學量則量自大少墟集巻七
