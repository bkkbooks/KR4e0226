body:
  text: 高弟第事蹟多不詳故另列小傳于前而編中㫁自横渠張子始一次序各以時代庶古今不相混淆一宋元諸儒有史傳諸書可考不佞稍為纂次十五仍舊至國朝諸儒中多僣妄論著文之工拙不卹也一國朝諸儒特録其所知盖棺論定者其所未知者姑闕之以俟
  hash: sha256:0e8d0320e76e89374982804044771de3ceef7d71e44b30abe451dc80c34405c9
