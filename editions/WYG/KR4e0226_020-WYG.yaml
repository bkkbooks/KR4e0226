front:
  text: 闗學編凡例一是編専為理學輯故歴代名臣不敢泛入一理學如秦子南燕子思壤駟子從石作子明俱孔門
  hash: sha256:86596aeefe816a61ff92c903b6a909a811df5f6bb35dade1a648c580fba6d5f8
