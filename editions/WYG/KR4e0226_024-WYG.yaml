body:
  text: 少墟集巻二十明馮從吾撰闗學編三明容思段先生先生名堅字可久蘭州人初號栢軒後更號容思義取九容九思也學者稱容思先生生而剛方頴異讀書即知正學年十四為郡諸生見緱山陳先生書銘于明倫堂有羣居慎口獨坐防心之語酷愛而敬誦之遂慨然以為聖賢可學而至年十七王父殁白其父治䘮不用浮屠法凡當世宿儒官游于蘭者無不師之于經史蘊奥性命精微不究其極不止也動作不苟人以伊川擬之正統甲子領郷薦明年下第歸郷之士大夫多遣子弟就學先生以師道自尊教法嚴而造就有等士類興起己巳英廟北狩應上詔詣闕上書不報乃裹糧買舟南游由齊魯淮楚以至吳越訪求同志之士相與講切得閻子與白良輔輩定交焉逾年始歸學益有得景泰甲戌登進士以文名差纂山西誌明年誌成復命尋移疾歸讀書于五泉小圃依巖作洞以為㑹友講習之所有得即形于詩有云風清雲凈雨初晴南畆東阡䇿杖行幽鳥似知行樂意緑楊烟外兩三聲論者謂宛然有浴沂氣象越五年為天順己卯選山東福山知縣福山故僻邑先生以德化民刋布小學諸書令邑人講誦復以詩歌興之必欲變其風俗或謂其迂闊不能行先生獨謂天下無不可化之人無不可變之俗嘗有詩曰天下有材皆可用世間無草不從風始終不少懈由是陋俗丕變海邦島嶼渢渢乎有絃誦風旣六載以李文達公薦超擢知萊州府迺先生與文達公竟未面也先生治萊如治福山時召郡縣官師與燕俾言志咏歌以申政教未期月萊人大化以憂去旣禫不遽北上乃訪周廷芳于秦州訪張立夫于鳯翔講學求友孜孜不暇其于功名利達澹如也久之復補南陽在南陽慨近世學者以讀書媒利禄階富貴士尠知聖賢之學乃倡明周程張朱與古人為學之意建志學書院聚郡庠及屬治諸生親授講説又以民俗之偷由未預教乃遴屬治童䝉授以小學孝經文公家禮教民俗言諸書俾之講習又創刻二程全書胡致堂崇正辨諸書俟盈科者給授士習翕然改觀又創節義祠祀古聖母烈女以風勵郡俗尤嚴迸巫尼不使假左道傷風化㑹有女纓而自經以殉夫死者先生率僚屬師生往弔為具棺歛卜地合葬己又奏表其閭由是郡人雖婦人女子皆為感化先生為政持大體重風教不急功利不規規于簿書不以毁譽得失動其心凡屬吏不法者即案問不少貸民或良或奸相宜訓治與民休息在南陽八年郡人戴之如父母其敬畏之至若家有一段太守者治行為天下第一以直道不能諧時遂致政歸乃結廬蘭山之麓扁曰南村曰東園取淵明詩昔欲居南村及青松在東園意授徒講業相羊唫詠以自樂然于時政闕失民情困苦則又未嘗不憂形于色成化甲辰卒年六十有六門人私諡曰文毅先生性素孝友治父母䘮一遵古禮事兄椿曲盡弟道居家嚴内治崇禮教凛然為郷邦典刑與人尤篤于分義友人唐知縣廷器貧甚其殁也為具棺歛以襄事併志其墓方伯石公執中曾孫以貧鬻于人乃埀涕捐貲贖還俾主其祀業師周公麟殁為撫其後毎至其家坐必避席焉先生雖未居言路而屢有建白如請修龍逢比干祠墓請從祀元儒劉因請旌表孝行節義請開言路諸封事皆鑿鑿有闗國體補風化蓋先生之學近宗程朱逺遡孔孟而其功一本于敬嘗言學者主敬以致知格物知吾之心即天地之心吾心之理即天地之理吾身可以叅天地贊化育者在于此必以命世大儒自期而不可自暴自棄以常人自居有負為人之名所至從游者衆多所成立如同郡董學諭芳羅僉憲睿彭少保澤孫孝亷芳秦州周布衣蕙山西董僉憲齡福山張同知瓛南陽柴尚書昇王文莊鴻儒熊少叅紀張孝亷景純皆門牆尤著者郡人陳祥贊云距釋排耼吾道是遵士趨歸正郷俗以淳繼往開來逺探濓洛文清之統惟公是廓彭澤撰墓碑云先儒謂道自堯舜以來至孟子殁失其傳焉匪道不傳學者託之言語文字而無深造力踐之功也至宋周程三夫子出至晦庵朱先生始極主敬致知力行之功上繼孔孟之統元魯齋許文正公我明敬軒薛文清公以篤實輝光之學繼其絶此固萬世之公議也若我南陽太守容思先生段公其克尊信斯道而致深造力踐之學者歟論者以為知言所著有容思集栢軒語録行世黙齋張先生先生名傑字立夫號黙齋鳯翔人父璡工部主事先生生有異質頴悟過人稍長入郡庠卓然以聖賢自期年二十一登正統辛酉郷薦乙丑中乙榜以親老就山西趙城訓導居官六年惟以講學教人為事一日薛文清公過趙城與先生論身心性命之學文清公嘆服而去先生之學由是益深值嵗祲捐俸賑饑雖所捐無幾亦寒氊所難景泰辛未工部公捐館舍先生徒跣奔歸䘮葬悉以禮先是里俗多用浮屠法先生一切屏去郷人化之久之以養母不出天順癸未母棄養旣禫有司勸駕先生蹙然曰吾少也力學以明道禄仕以養親今吾親終矣而學無所得尚欲仕乎遂不復出因賦詩自責曰年幾四十四此理未真知晝夜不勤勉遷延到幾時益大肆力于學居恒瞑目端坐至于移時起則取諸經子史朗然諷誦或至丙夜後已最愛涵養須用敬進學在致知二語因大書揭座右造詣日深弟子從逰者日衆乃拓家塾以五經教授學者稱為五經先生名重一時巡按御史某薦先生為提學僉事不報成化乙酉應天聘典文衡謝不往辛卯茶臺馬公震行部漢南特遣諸生黄照王宣輩奉書載幣聘先生攝城固學事先生復書略曰天地生人無不與之以善聖賢教人亦無不欲其同歸于善是知善者人所自有而自為之先覺之覺後覺如呼寐者而使之寤耳但古之學者從事于性情而文辭所以達其意今之學者專務文詞反有以累其性情某今年五十有一矣方知求之于此以尋古人向上之學雖得其門未造其域汲汲皇皇恐虚此生嘗自念僻處一方獨學無友毎欲逺逰質正髙明奈有寒疾不可以出况郷黨小子相從頗衆豈能逺及他方邪亦謝不往與臯蘭段先生堅趙侍御英河東李學博㫤秦州周布衣蕙相與論學而段尤稱契厚嘗贈以詩有云萬徑千蹊吾道害四書六籍聖賢心聖賢心學真堪學何用奔馳此外尋而先生詩中亦有今宵忘寢論收心之句學者爭傳誦焉或勸先生著書曰吾年未艾猶可進也俟有所得為之未晩乃竟未及著書而卒是為成化壬辰十月十二日距生永樂辛丑八月十九日年僅五十有二先生為人篤于孝友事二親曲盡子道與兄英為異母同居五十年無間言姊早卒撫其子若己出教之成立御子弟一以禮法内外斬斬嘗自讚曰讀孔孟書學孔孟事知有未真行有未至惟日孶孶以求其所無負也其勤勵如此先生殁若干年郡守趙公博白兩臺為先生建祠于家塾之左以供祀事長平郭公定為記郡倅范公吉稱先生以五經教授明心學于狂瀾旣倒之餘以四禮率人挽風化于頽靡不振之秋以端實淡泊飭躬砥行埀休光于千百載之後可謂一代人物矣識者以為實録云小泉周先生先生名蕙字廷芳號小泉山丹衛人後徙居秦州因家焉年二十聽人講大學首章奮然感動始知讀書問字為臨洮衛軍戍蘭州守墩聞容思段先生集諸儒講理學時往聽之有聞即服行久之諸儒令坐聽旣而與坐講旣而以為畏友有疑與訂論焉段先生朂以聖賢可學而至教示進為途方段先生曰非聖弗學先生曰惟聖斯學遂殫力就學究通五經篤信力行慨然以程朱自任當時見者亦翕然以為程朱復出也咸敬信樂從之又受學于清水教論安邑李公㫤得薛文清公之傳功密存省造入真純遂為一時逺邇學者之宗有總兵恭順侯吳瑾者聞其賢欲延教其子先生固辭或問故先生曰總兵以軍士役某召之役則往役召之教子則不敢往聞者嘆服吳侯亦不能强遂親送二子於其家以受教先生始納贄焉時肅藩有二樂人鄭安鄭寧者進啓本願除樂籍從周先生讀書其感發人如此後隱居秦州之小泉因以為號著深衣幅巾為容成紀之人薫化其德稱為小泉先生嘗逰西安與介菴李公錦論學介菴由是大悟遂為闗西名儒渭南思菴薛公敬之執弟子禮師事焉秦州守數造其廬舉鄉飲賔謝不往巡按杜公禮徴求見講太極先天二圖不覺前席嘗正冠㛰䘮祭之禮以示學者秦人至今遵之成化戊子容思先生至小泉訪之不遇留以詩有歴盡巉岩君不見一天風雪野梅開之句後又贈以二詩云小泉泉水隔烟蘿一濯冠纓一浩歌細細靜涵洙泗脉源源動鼓洛川波風埃些子無由入寒玉一泓清更多老我未除塵俗病欲煩洗雪起沉痾又云白雲封鏁萬山林卜築幽居深更深養道不干軒冕貴讀書探取聖賢心何為有大如天地須信無窮自古今欲鼓遺音絃絶後闗閩濓洛待君尋何大復謂先生于容思先生其始若張横渠之于范仲淹其後若蔡元定之于朱紫陽也迨老以父遊江南歴涉險蹤訪没于揚子江人皆稱其孝而又重悲其死云先生初名檜後更蕙或作桂誤先生門人甚衆最著名者渭南薛敬之秦州王爵爵字錫之自少潛心力學及長從游先生門而知操存郡守秦公與語悦之時與講操存之學及教後學切切以誠敬為本𢎞治初以國子生仕為保安州判君出納公㑹計當日不憚勞保安稱平焉秦公後總督原州聘君至原三年相處如一日及歸秦公贈以揚州鹽引數百石君辭之而惡衣惡食坦如也州人咸稱之詳載可泉胡公纂鞏郡志中敬之余别有傳大器張先生抑之張氏附先生名鼎字大器别號自在道人咸寧人父亷為山西蒲州知州先生少從父之任受學于河東薛文清公之門用是日勤勵于聖賢之學諸子百家雖靡不研䆒而一禀于濓洛闗閩之㫖文清公深器重之歸補西安郡庠弟子員景泰癸酉以易舉于鄉成化丙戌成進士授刑部主事遷員外郎氷蘖自持推讞詳明甲午出知山西太原府太原為省㑹劇郡故稱難治先生游刃有餘循良弁三晉郡人德之不忍先生離去故九載考績晉山西叅政仍署府事又四載始遷河南按察使振肅紀綱奸貪歛跡嘗辨指揮董敬等人命之誣𢎞治改元擢右僉都御史巡撫保定等府時畿内多事盜賊縱横于途行旅戒嚴先生築牆植樹自内丘直達京師由是道路肅然至今頼之值嵗大祲先生給糧賑濟民免流亡辛亥晉户部右侍郎尋以病請歸歸四年為𢎞治乙卯卒于家年六十有五先生為人仁厚敬慎事不苟為非義一介不取進退惟命是聽終身恪守師説不敢少有踰越文清公殁其文集散漫不傳先生搜輯校正凡數年稿始克成乃為序梓而傳之至今學者尚論文清必以先生之言為徴信云所著有仕學日記自在詩文蠧齋博稿若干巻先生為都憲為亞卿皆三原王端毅公為冢宰時所推轂其卒也端毅公銘其墓稱其理學傳自文清公髙名可並太華峯世以為確論時有秦州大叅張公鋭字抑之成化初舉于鄉父敏以國子生為江西布政司照磨公從之任受學東白張先生元禎張先生者豫章名儒也公由是學益有得乙未登進士授刑部主事歴員外郎郎中遷江西吉安知府在吉安政教兼舉士習聿興民用安業坐忤權貴調湖廣漢陽六載以兩郡令譽晉山東左叅政後致仕居鄉日進執經諸弟子于庭講學不倦鄉閭薫德焉故隴西學者稱為張夫子可泉胡中丞纘宗稱公誠確温厚本之天性而多學好古汲引後進尤人所不可及云介菴李先生仲白李氏附先生名錦字在中號介菴咸寧人幼警悟不凡九嵗失恃如安成依舅氏韓君智韓為擇師教之端坐終日不逐羣兒嬉讀書知大義日見英發比成童還為諸生受易于鄉先生董君德昭之門大肆力于學毎試輒為督學使者所稱賞後遇秦州小泉周廷芳講學得聞周程張朱為學之要遂棄記誦辭章之習專以主敬窮理為事又與渭南思菴薛氏咸陽西廓姚氏同邑誼菴雍氏麗澤講習相勸相規久之踐履醇茂闗中學者咸以横渠稱之濟南尹恭簡公為通政時使秦聞先生名延與語大為驚嘆天順壬午舉于鄉成化戊子逰成均友天下士其學益進大司成邢公讓深器異之令諸子受業焉後邢坐事下獄先生倡六館士伏闕抗章明其無罪雖于事無益而先生之名重京師矣嘗愛武侯靜以修身儉以養德學須靜才須學數語揭之座右以自警事親色養備至執䘮盡禮力絀異端至今省㑹士大夫不作浮屠事實自先生始為孝亷居憂時廵撫余肅敏公欲延教其子先生以齊衰不入公門固辭余益重之後余知其䘮不能舉賻以二槨先生卻其一曰不可因䘮射利也郡大夫有與之厚者賻米數十斛以辭命無俸米字辭後周廷芳復過省與先生印證所學設問辨難周為嘆服先生解經平正通達不為鑿説且善誘後學諄諄忘倦出其門者如李叅政崙劉尚書璣于知州寛董員外養民及舉人張子渭李盛漸被尤深先生數上春官竟不第成化甲辰謁選直𨽻松江府同知職親戎牒夙夜精勤奸無所售有脫役埀四十載者先生始發之即令補伍雖權貴居間竟莫能奪未究厥施以疾卒于官是在成化丙午年僅五十一貧不能為棺歛其僚友賻之始克歸云先生性剛介不妄交接不苟為然諾義之所在確然自信不以一毫挫于人尤重取予所居僅蔽床席茹淡服䟽雖至屢空終不輕有所取學務窮理盡性體之身心不好立言語文字以故殁之日遺稿無存靈寳許襄毅公為先生同志友先生歾十年襄毅公廵撫闗中屬督學楊文襄公表其墓文襄公稱先生挺然風塵之表不苟簡遷就與世低昻抱其貞璞卒以完歸而督學虎谷王公亦稱其化如和叔辭章外貧似原思草澤間嗚呼可謂深知先生者矣後數十年而有渭南李仲白氏者名與先生同字仲白號龍坡亦潛心理學為諸生時西蜀龍灣髙先生儔署髙陵教事仲白越疆從受學與涇野呂先生同門相切磋焉正德庚午領鄉薦為宿遷令著勸農文勸孝文以化俗由是邑多孝子又以稅餘金買牛給民耕墾荒地宿遷人稱為百年以來一人遷海州知州致仕初擢州時不能具一花帶呂先生遺之一圍後去州抵家猶是帶也其清苦如此嘉靖丙申卒于家呂先生銘其墓稱其稟受懿嘉學求根本云思菴薛先生先生名敬之字顯思號思菴渭南人生有異狀長大雄偉鬚髯修美左膊一黒文字深入膚裏生五嵗愛讀書十一解屬文賦詩稍長言動必稱古道則先賢景泰丙子獲籍邑諸生居止端嚴不同流俗鄉閭驚駭稱之曰薛道學為文説理而華毎為督學使者所賞鑑應試省闈至十有二次竟不售成化丙戌以積廩充貢入太學太學生接其言論咸為嘆服一時與陳白沙並稱由是名動京師自太學歸二尊人相繼歾徒跣奔𦵏時大雪盈尺兼湭淺泥濘亦不知避後遂病足值冬月輒發母嗜韭母歾終身不忍食韭成化丙午謁選山西應州知州先生治應首勸民耕稼紡績時當東作循察田野民艱于耕種者賚以牛種民貧負租及不能婚葬者皆助之買牸畜數十給之㷀民令孶息為養又務積蔬粟不三四嵗粟至四萬餘石乾蔬數萬餘斤尋當饑饉應民免于死亡其旣竄而復歸者三百餘家皆與衣食補葺其屋廬與處由是屬邑聞風復者沛然又立義塜以瘞流民之死于道者𢎞治戊申秋南山有虎患為文祭之旬日間虎死于壑己酉春蕭家寨北平地有暴水湧出一寨幾至沉陷先生亦為文祭告水即下洩聲如雷鳴民免于溺他德政異政多此類詳守谿王公譔碑記中先生尤雅重學政數至學舍切切為言孔孟之㫖由是應人士始知身心性命之學奏課第一𢎞治丙辰陞金華府同知東南學者如陳聰輩數十人皆摳衣門牆居二年致仕撰金華鄉賢祠志若干巻正德戊辰卒年七十又四先生嗜道若飴老而彌篤好與人講遇人無問人省解不即為説道人或不樂聽説亦不置又好靜坐思索凡有所得如横渠法即以劄記所著有思菴野録道學基統洙泗言學録爾雅便音田疇百咏集歸來藁及演作定心性說諸書其言多有補于名教云其卒也呂文簡公誌其墓略曰初先生致仕家居以事入長安柟獲遇于長安之開元寺因叩先生先生言蘭州軍周蕙者字廷芳躬行孝弟其學近于伊洛吾執弟子禮事之吾入太學時道經陜州陳雲逵忠信狷介凡事皆持敬遇之吾以為友凡吾所以有今日者多此二人力也柟謁先生者再四見先生年已七十日夜讀書不釋巻聽其論議皆可警䇿惰志則亦今日之博學好古死而後已者也又謂門人胡大器曰為學隆師取友變化氣質為本渭南有薛先生從周先生學常雞鳴而起候門開灑掃設坐及至則跪以請教又謂門人亷介曰予聞諸思菴薛子曰介菴李錦闗西之豪傑也甘貧守道好學至死不倦今亡矣夫夫薛子其亦見介菴而興起者乎其學問淵源如此云平川王先生先生名承裕字天宇號平川三原人父恕歴官太子太保吏部尚書贈太師諡端毅為國朝名臣第一道德功業載在國史成化元年乙酉先生生于河南宦邸蓋端毅公廵撫日也端毅公七子而先生最少方兒時即重厚如老儒恒端坐不妄言笑七八嵗作屋隙詩曰風來梁上響月到枕邊明又作先師孔子木主朝夕拜之春秋丁日具香果齋而祭乃為齋銘曰齊不齊謹當謹萬物安百神統聖賢我古來脗齊不齊謹當謹太淑人亷知之以白端毅公公喜曰此兒足繼志矣十四五時在南都從莆田蕭先生學蕭令侍立三日一無所授先生歸告端毅公曰蕭先生待兒如此謂不足教耶公曰善哉教也真汝師矣先生由是益尊師樂學遂深造焉年十七八著進修筆録崇仁吳正郎宣序之以傳年十九應鄉試督學戴公珊試其文竒之丙午年二十二舉于鄉丁未孝宗登極召起端毅公為冡宰先生侍行讀書京邸與一時名公逰由是聞見益廣學益進癸丑第進士㑹端毅公致仕先生予告歸乃開門授徒講學于釋氏之刹堂至不能容復講于𢎞道書院先生教以宗程朱以為階梯祖孔顔以為標凖語具督學虎谷王公書院記中蓋先生以師道自居甚嚴弟子咸知敬學故自樹而成名者甚衆久之授兵科給事中有時政先務等䟽皆切中時弊兩使藩國饋遺一無所受歴吏科都給事中正德初逆瑾專政羣工多出其門先生逺之又上䟽乞進君子退小人及諸不法事瑾怒罰粟三百石輸邊其恨猶未已㑹先生以外艱去始免服除瑾誅以原官遷太僕少卿本寺卿南太常卿時上南巡先生夙戒牲帛祭品待祀或曰上方用武無暇于祀焉用備為弗聽及上至奏祀皆行之言者愧服己卯宸濠叛欲趨南都大臣分城以守先生分守通濟門乃與家人訣别登城誓死守之㑹有逆黨藏甲兵于槨以應賊者先生覺發服以上刑都城肅然壬午世廟即位改元嘉靖論禦敵功有白金文綺之賜癸未遷户部右侍郎提督倉塲尋回部為世廟所重賜獻皇帝睿筆清平正直四字丁亥晉南户部尚書己丑致仕林居十年惟以讀書教人為事當時稱其濟美有范忠宣繼文正公之風論薦者無虚日廟堂方欲召用而先生已殁識者于是有蒼生之恨云卒年七十有四蓋嘉靖戊戌五月也訃聞賜祭葬如例諡康僖先生性篤孝能悦親養志故端毅公愛之特甚又善事諸兄諸兄皆殊常友之時序祀先唯謹誨諸子姪以道與人交温乎可親而又栗然不可狎故與之交者咸愛敬焉與長安髙御史𦙍先游久之贈詩以堯夫正叔與之蓋服其和粹嚴正不易及也自少樂多賢友端毅公尤夙以尚友之道誨之故一時海内名賢無弗接者自始學好禮終身由之故教人以禮為先凡弟子家冠婚䘮祭必令率禮而行又刋布藍田呂氏鄉約鄉儀諸書俾鄉人由之三原士風民俗至今貞美先生之力居多所著有論語近説論語䝉讀談録漫語星軺集辛巳集考經堂集庚寅集諌垣奏草草堂語録三泉堂漫録厚鄉録童子吟藁婚禮用中進修筆録動靜圖説等書所述有横渠遺書太師端毅公遺事等書行世端毅公林居日著五經四書意見獨攄心得自成一家學者宗之先生著述種種蓋多本之庭訓云門人馬光禄理秦大叅偉郝大叅世家雒中丞昻張給諫原李憲副伸趙僉憲瀛秦明府寧王明府佩李孝亷結有名光禄别有傳涇野呂先生先生名柟字仲木髙陵人世居涇水北自號涇野學者尊之曰涇野先生父溥號渭陽有隱德先生少儁悟絶人覊丱為諸生受尚書于髙學諭儔邑人孫大行昻即有志聖賢之學又問道于渭南薛思菴氏充乎有得不妄語不苟交夙夜居一矮屋危坐誦讀雖炎暑不廢衣冠年十七八夢明道程子東萊呂氏就正所學由是學益進督學邃菴楊公虎谷王公抜入正學書院與羣俊茂游大叅熊公李公延教其子先生辭不獲乃館于開元寺後聞父疾即徒步歸二公以夫馬追送不及先生曰親在床褥安忍俟乘為也父尋愈構雲槐精舍聚徒講學其中二公仍遣子熊慶浩李繼祖卒業焉𢎞治辛酉舉于鄉明年計偕不第逰成均與三原馬伯循秦世觀榆次㓂子惇安陽張仲修崔仲鳬林縣馬敬臣諸同志講學寳卭寺嘗約曰文必載道行必顧言毋徒舉業以要利禄毋徒任重弗克有終日孜孜惟以古聖賢進德修業為事遣弟栖師事伯循其入學儀式京師傳以為法同邑髙朝用時為地官郎謂檢討王敬夫曰予邑有顔子子知之乎敬夫曰豈吕仲木耶自是納為厚交乙丑敬皇帝賔天與諸生哭臨先生聲出淚下衆譁為迂弗恤也孫行人歾于京遺孤不在側先生衰絰哭拜弔者或曰禮與曰禮䘮無主比隣為主况師乎及返葬于鄉猶是服也宿館下三日哭而相葬事旣歸復講學于精舍從游者日衆正德戊辰舉南宫第六人廷對擢第一授翰林修撰凡知先生者皆喜曰今得真狀元矣時閹瑾竊政以枌榆故致賀先生却之瑾銜甚自是遜避不與往來在翰林二年操介益勵禄入祗祀其先父母書問至必再拜使者受之退而跪讀期功䘮為位而哭門無饋遺時何粹夫瑭為編修以道自守不為流俗所喜先生日相切劘驩如也㑹西夏構亂䟽請上入宮御經筵親政事不報瑾惡其言益銜甚乃與粹夫相繼引去未幾瑾敗禍延朝紳人咸服先生之明家居杜門謝客者三年臺省交章薦其往拒逆瑾卓識偉節宜召擢大用壬申起供舊職上䟽勸學謂文王緝熙敬止諴和萬民斯享靈囿之樂元順帝廢學縱欲盛有臺沼我太祖代取之人主可不深念或謂元主之戒傷于太直先生曰賈山借秦為喻漢文尚能用之况主上過漢文逺甚柟獨不能為賈山乎䟽入上亦嘉納未幾乾清宫災復應詔言六事一曰逐日臨朝聽政二曰還處宫寢預圖儲貳三曰郊社禘嘗祗肅欽承四曰日朝兩宫承顔順志五曰遣去義子番僧邊軍令各寧業六曰天下鎮守中官貪婪取回别用不報先生復引疾去崔仲鳬嘆曰古有直躬進退不失其道者吾于吕仲木見之矣歸而卜築邑東門外扁曰東郭别墅四方學者日集都御史虎谷王公薦其學行高古乞代己任不報渭陽公病先生侍湯藥晝夜衣不解帶履恒無聲如是一年鬚髪為白比卒哀毁踰禮旣葬廬墓側旦夕焚香號泣門人感之皆隨先生居乃與平定李應箕同邑楊九儀輩講古今䘮禮當襄事時郡守致賻受之旣而馳幣匄文辭門人問故先生曰方卒哭而遽懷金為文吾不忍也旣禫釋服講學于别墅逺方從者彌衆别墅不能容又築東林書屋居焉鎮守閹廖餽以豚米却之廖素張甚乃戒使者曰凡過髙陵毋擾有吕公在也有客以兼金乞居間先生笑而謝曰人心如青天白日乃以鳥獸視耶其人慙曰吾姑試子耳門庭蕭然無異寒素世廟即位詔起原官時朝鮮國奏稱狀元吕柟主事馬理為中國人才第一朝廷宜加厚遇仍乞頒賜其文使本國為式其為外國敬慕如此上御經筵先生進講適值仁祖淳皇后忌辰口奏宜存黲服禮罷賜酒饌朝論韙之癸未分校禮闈取李舜臣輩悉名士時陽明先生講學東南當路某深嫉之主試者以道學發䇿有焚書禁學之議先生力辨而扶救之得不行塲中一士子對䇿欲將今宗陸辨朱者誅其人火其書極肆詆毁甚合問目意且經書論表俱可同事者欲取之先生曰觀此人今日迎合主司他日必迎合權勢同事者深以為然遂置之念新天子即位上䟽請講聖學略曰學貴于力行而知要故慎獨克己上對天心親賢逺䜛下通民志天下中興太平之業實在于此不報在史館與鄒東廓友善甲申奉修省詔復以十三事上言頗過切直時東廓亦上封事同下詔獄一時直聲震天下人人有真鐡漢之稱尋謫東廓判廣德先生判解州道出上黨隱士仇欄兄弟遮道問學有梓匠張提者役于仇氏聞先生講喜甚跽而求教先生誨以善言提大悟昔嘗取人一木作界方至是遂還其主仇氏兄弟益為感動先生喜形諸詩云豈有征夫能過化雄山村裏似堯時旣至解仰堯舜故址慨然以作士變俗為己任解士子視聖學與舉業為二先生曰苟知舉業聖學為一則干禄念輕救世意重于是講學崇寧宫毎誨諸士雖舉業拳拳不離聖賢之學諸士皆欣然向道以為聖賢復出也㑹守缺先生攝事不以遷客自解免恤㷀減役勸農課桑築堤以護鹽池開渠以興水利善政犂然郡庠士及四方來學者益衆乃建解梁書院居之選少而俊秀者歌詩習小學諸儀朔望令耆德者講㑹典行鄉約亷孝弟節義者表其閭求子夏後教之學建温公祠正夷齊墓訂雲長集久之政舉化行俗用丕變丁亥轉南吏部考功郎中解梁門人王光祖謂先生在解三年未嘗言及朝廷事為考功躬親吏牘少司馬王浚川薦其性行淳篤學問淵粹遷南尚寳卿久之遷南太常少卿往太常讌樂甚䙝先生悉革之乙未遷國子祭酒先生在南都幾九載海内學者大集初講于柳灣精舍旣講于鷲峰東所後又講于太常南所風動江南環向而聽者前後幾千餘人閩中林頴浙中王健以謁選行中途聞先生風遂止乃買舟泛江從之逰上黨仇欄不逺數千里復來受學先生猶日請益于甘泉湛先生日切琢于鄒東廓穆𤣥菴顧東橋諸君子時東廓亦由廣德移南蓋相得甚驩云其在國學益以師道自任自講期外尤日進諸生諄諄發明使人人知聖人可學而至嘗取儀禮諸篇令按圖習之登降俛仰鐘鼓管籥洋然改觀易聽有以孝亷著者揭榜示旌䘮者弔而賻病者問而醫死者哭而歸骸其鄉又奏減歴以通淹滯絶請托以杜倖門凡監規之久弛者罔不畢舉六館僚屬觀法清慎諸生皆循循雅飭一時太學有古辟雍之風京邸搢紳多執弟子禮從學而内使大興沈東亦時時聽講焉其感人如此人人稱為真祭酒臺臣張景薦其德行文學真海内碩儒當代師表丙申晉南禮部右侍郎東南學者喜先生復至益日納履其門乃復講于禮部南所時上將躬視承天山陵累䟽勸止不報署南吏曹篆䟽薦何瑭穆孔暉徐階唐順之等二十人入賀㑹有論湛先生偽學者先生白諸當路曰聖皇在上賢相輔之豈可使明時有學禁之舉乎事遂已時霍文敏為南宗伯與夏貴溪故有隙時時噂詬夏先生乘間諷曰大臣誼當和𠂻過規之可也背憎非體霍誤疑先生黨夏己先生來闕下夏已柄國數短霍于先生先生毅然曰霍君性雖少褊故天下才也公為相當為國惜才由是夏亦誤疑先生黨霍㑹廟災自陳遂致仕然先生終未嘗以此向人自白也歸而講學北泉精舍越四年壬寅七月初一日卒距生成化己亥四月二十一日年六十有四卒之日髙陵人為罷市休寧門人胡大器先至髙陵侍疾遂視殮殯而執䘮焉四方門人聞者皆為位而哭先生性至孝友儉朴事繼母侯色養篤至室無妾媵與李淑人相敬如賔事叔父博如父嵗饑嘗分俸賙其族衆姊劉家窶甚時時濟之憫外祖宋乏嗣毎展墓流涕從舅瑾寓同州特訪迓歸平生未嘗干謁人亦不受人干謁不事生産旣歾家無長物蓋先生之學以立志為先慎獨為要忠信為本格致為功而一凖之以禮重躬行不事口耳平居端嚴恪毅接人則和易可親至義理所執則鏗然競烈置死生利害弗顧也甞訪王心齋艮于泰州趙玉泉初于黎城毎遇同志雖深夜必徃訪苟非其人即一刺不輕投教人因材造就總之以安貧改過為言不為𤣥虚髙逺之論門人侍數十年未嘗見有偷語惰容論者謂闗中之學自横渠張子後惟先生為集大成云所著有四書因問周易説翼尚書説要毛詩説序春秋説志禮問内篇外篇宋四子抄釋史館獻納南省奏稿詩樂圖譜史約髙陵志解州志及涇野文集别集傳世隆慶初贈禮部尚書諡文簡谿田馬先生先生名理字伯循號谿田三原人𢎞治戊午舉人正德甲戌進士皆髙等初授吏部稽勲司主事尋調文選甫一年即謝病歸戊寅薦起考功庚辰又送母歸嘉靖甲申復薦起稽勲員外郎尋遷稽勲考功郎中丁亥擢南京通政司右通政戊子又謝病歸辛卯復薦起光禄寺卿甫一年又謝病歸歸十年又薦起南京光禄卿至即引年致仕乙卯年八十又二其年十二月十二日夜地大震先生即以是夜卒人皆慟之先生幼敏慧醇雅如成人年十四為邑諸生即稱説先王則古昔研究五經指義多出人意表𢎞治癸丑先生年二十矣㑹王端毅公致仕康僖公以進士侍歸講學𢎞道書院先生即受講康僖公所于是得習聞國朝典故與諸儒之學先生一切體驗于身心與同門友秦西澗偉作告文告先師共為反身循理之學以曾子三省顔子四勿為約進退容止力追古道康僖公深器異之一時學者即以為今之横渠也邃菴楊公督學闗中見先生與康德涵吕仲木大驚曰康之文辭馬呂之經學皆天下士也是時身未出里中而名已傳海内動京師矣旣如京益與海内諸名公講學其意見最合者則陳雲逵吕仲木崔仲鳬何粹夫羅整菴諸君子于是學日純名日起所在學者多從之逰督學漁石唐公為建嵯峨精舍漁石作記稱先生得闗洛真傳為當今碩儒四方學徒就講者益衆其教以主敬窮理為主士無問少長與及門不及門無不聞風傾慕者先生又特好古儀禮時自習其節度至冠婚䘮祭禮則取司馬温公朱文公與大明集禮折衷用之處父䘮與嫡生母之䘮闗中傳以為訓乃其難進易退之節人尤以為不可及嘗曰身可絀道不可絀見行可之仕惟孔子能之下此者須自揣分量可也仲鳬稱先生愛道甚于愛官當世以為確論往安南貢使謂部郎黄清曰故聞馬先生名願一見今不在仕列何也黄曰先生髙志不欲官使人嘉嘆以去朝鮮國王奏乞頒賜主事馬某文使本國傳誦為式其名重外夷若此先生主事時上書諫武宗巡逰者二後伏闕諍益力杖于廷員外時值議大禮率百官伏闕進諫世宗震怒命開伏闕者姓名百官以先生名為首逮繫詔獄復杖于廷尋復官郎中時奏寢莊襗之奏即執政言亦不從考察力罷執政私人彭澤廣東人力主被劾調用魏校蕭鳴鳯為正人卒不改官公論翕然至今稱為真考功嘉靖丙戌分校禮闈所取皆海内名士人尤服其藻鑑先生喜接人又喜汲引後生年七十歸隱商此書院名益重來學者逺近踵集搢紳過訪與海内求詩文者無虚日先生亹亹應之不倦山巾野服鶴髪童顔飄然望之若仙人以是益願侍先生談諸得詩文者又願得先生親書先生不談佛老不觀非聖書初年介而毅方大以直至晩年則益恭而和直諒而有容其執禮如横渠其論學歸凖于程朱然亦時與諸儒異同蓋自有獨得之見云所著四書註䟽周易贊義尚書䟽義詩經删義周禮註解春秋修義陜西通志與詩文集各若干巻隆慶間追贈副都御史賜祭葬先生門人最盛有河州何永達字成章自號拙菴以嵗貢為清豐縣丞尋棄去讀書講學老而彌篤夀九十有四著春秋井鑑林泉偶得聖訓補註井鑑續編諸書先生嘗寄以詩云楊柳灣頭撫七絃故人零落似飛綿河濵尚有鍾期在青鳥音來動隔年其見重如此苑洛韓先生先生名邦竒字汝節號苑洛朝邑人父紹宗號蓮峰成化戊戌進士仕至福建按察副使學識才品當世推重先生幼靈俊異常承訓過庭即有志聖學為諸生治尚書時即著蔡傳發明禹貢詳略律呂直解見者驚服𢎞治甲子以書舉第二人正德戊辰成進士拜吏部考功主事尋轉員外郎辛未考察都御史某私袖小帙竊視先生曰考覈公事有公籍在何以私帙為乃奪其帙封貯不檢都御史為遜謝衆皆失色調文選太宰托意為官擇人欲發視缺封先生執不可太宰銜之㑹京師地震上䟽極論時政闕失謫平陽通判甲戌遷浙江按察僉事時逆厮錢寧以鈔數萬符浙易銀當事者歛餽恐後先生檄知縣吉棠散其歛卒不餽宸濠將舉逆先命内竪假飯僧數千人于杭天竺寺先生立為散遣濠又以儀賔託名進貢假道衢州先生召儀賔詰曰進貢自當沿江而下奚自假道歸語爾王韓僉事在此不可誑也後三年濠果通鎮守欲襲浙江頼前事發姦不竟逞先生謂鎮守為浙蠧諸不少假鎮守銜甚誣奏擅革進貢誹謗朝廷逮下詔獄為民旣歸謝客講學四方學者負笈日衆世廟即位改元嘉靖詔起山東叅議尋乞休甲申大同巡撫張文錦階亂遇害時勢孔棘復以薦起山西左叅議分守大同人皆危之先生聞命即行將入城去二舍許逆者使二人露刃迎且故燬叅將宅以懾之先生奮然單車入時諸司無官鎮人聞先生入皆感激泣下人心少安旣而巡撫蔡公天佑至代州先生親率將領令盛裝戎服謁蔡于代蔡驚曰公何為如此先生曰某豈過于奉上者大同變後巡撫之威削甚大同人止知有某耳不身先降禮何以帥衆蔡為嘆服㑹上遣户部侍郎胡公瓚提兵問罪鎮人聞之復大譟先生迓侍郎于天城以處分事宜馳白巡撫諸軍聞言出于先生信之始解翼日首惡就戮先生謂侍郎曰首惡旣獲宜速給賞以示信庶亂可弭寧不然人心疑懼將有他變侍郎不聽先生遂致仕歸後果如其言戊子起四川提學副使尋改右春坊右庶子兼翰林院修撰其秋主試順天因命題為執政所不悦嗾言者謫南太僕寺丞己丑再䟽歸尋起山東按察副使大理左少卿以左僉都御史巡撫宣府時大同再變王師出討百凡軍需倚辦宣府悉力經理有備無乏乙未入佐院事尋改巡撫山西時羽檄交馳先生躬歴塞外增飭戰守之具拓老營堡城垣募軍常守以代分畨諸邊屹然可恃四䟽乞休復致仕甲辰復用薦起總理河道陞刑部右侍郎改吏部右侍郎太宰周公用喜得佐理翕然委重丁未陞南京都察院右都御史復進南京兵部尚書參贊機務五䟽乞歸是在己酉益修舊業倡導來學居七年乙卯㑹地震卒年七十七贈少保諡恭簡門人白璧曰先生天稟髙明學問精到明于數學胸次灑落大類邵堯夫而論道體乃獨取張横渠少負氣節旣乃不欲為竒節一行而識度汪然涵養宏深持守堅定躬行心得中正明達則又一薛敬軒也所著有苑洛語録苑洛集苑洛志樂性理三解易占經緯易説書説毛詩未喻諸書傳世弟邦靖字汝慶號五泉幼稱竒童年十四舉于鄉二十一與先生同第進士為工部主事𣙜税武林比及𤓰有同年趙司李以屈安人病無子買女婢遺之拒不受趙曰此越女有色者笑曰政恐若此耳旣遷郎中以建言逮獄為民嘉靖改元起山西左叅議以病免尋卒年僅三十有六汝慶父子兄弟以學問相為師友太史王敬夫銘其墓稱為曠世之英全德之士所著有五泉集朝邑志若干巻瑞泉南先生雲林尚氏附先生名大吉字元善號瑞泉渭南人正德庚午舉人辛未進士授户部主事歴員外郎郎中浙江紹興府知府致仕嘉靖辛丑卒年五十有五先生幼頴敏絶倫稍長讀書為文即知求聖賢之學嘗賦詩言懷有誰謂予嬰小忽焉十五齡獨念前賢訓堯舜皆可并之語弱冠以古文辭鳴世入仕尚友講學漸棄其辭章之習志于聖道然猶豪曠不拘小節嘉靖癸未如紹興時王文成公倡道東南講致良知之學王公乃先生辛未座主也先生旣從王公學得實踐致力肯綮處乃大悟曰人心果自有聖賢也奚必他求于是時時就王公請益焉嘗曰大吉臨政多過先生何無一言王公曰何過先生歴數其事王公曰吾言之矣先生曰何曰吾不言何以知之曰良知自知之王公曰良知却是我言先生笑謝而去居數日復自數過加密來告曰與其過後悔改不若預言無犯為佳也王公曰人言不如自悔之真先生笑謝而去居數日復自數過益密曰身過可勉心過奈何王公曰昔鏡未開可得藏垢今鏡明矣一塵之落自難住脚此正入聖之機也勉之先生謝别而去于是闢稽山書院聚八邑彦士身率講習以督之而王公之門人日益進己又同諸同門録王公語為傳習録序刻以傳越丙戌先生入覲以考察罷官先生治郡以循良重一時當事者以抑王公故故斥之先生致書王公千數百言勤勤懇懇惟以得聞道為喜急問學為事恐卒不得為聖人為憂略無一字及于得䘮榮辱之間王公讀之嘆曰此非真有朝聞夕死之志者未易以涉斯境也同門逓觀傳誦相與嘆仰歆服因而興起者甚多王公報書為論良知㫖甚悉謂闗中自横渠後今實自南元善始先生旣歸益以道自任尋温舊學不輟以書抵其侣馬西𤣥諸君闡明致良知之學構湭西書院以教四方來學之士其示弟及諸門人詩有云昔我在英齡駕車詞賦塲朝夕工步驟追踪班與揚中嵗遇達人授我大道方歸來三秦地墜緒何茫茫前訪周公跡後竊横渠芳願言偕數子教學此相將而尤惓惓于慎獨改過之訓故出其門者多所成立蓋先生之學以致良知為宗㫖以慎獨改過為致知工夫飭躬勵行惇倫叙理非世儒矜解悟而略檢押者可比故至今稱王公髙第弟子必稱渭南南元善云所著有紹興志渭南志瑞泉集若干巻行于世時有同州尚公班爵字宗周𢎞治甲子經魁父衡為浙江叅議公隨父任亦從王文成公學後任安居知縣谿田先生譔通誌稱公作縣剛果勤勵政舉民安著有小淨稿雲林集斛山楊先生先生名爵字伯修號斛山富平人初誕時室中如火光起人咸驚異之長美姿容身滿七尺家故貧年二十始發篋讀書苦無繼晷資嘗以薪代夙夜攻苦毎之隴上耕即挾册往意欣欣也居恒念人當以聖賢為師一切不禀古昔何所稱宇宙間兄靖以掾誤罹法先生徒步百里外申厥寃遂並繫獄先生從獄中上書辭意激烈邑令見而驚之曰竒士也胡累至是耶立出之給油薪費督之學年二十八聞朝邑韓恭簡公講理學躬輦米往拜其門公睇先生貌行行壯也欲卻之父蓮峰老人謂曰意若非凡人數日叩其學詫曰縱宿學老儒莫是過吾幾失人矣旣省語言踐履錚錚多古人節嘆曰畏友也同門學者皆自以為不及後與楊椒山稱韓門二楊云年踰三十督學漁石唐公始首拔為邑諸生嘉靖戊子秋應試長安就食食館客有遺金者先生守之客至持館人急先生詰其實付以金客謝寡取先生峻不允乃敦請家止宿焉是秋即以書舉第三名明年成進士授行人三使藩國饋贈俱讓不受或以為矯先生曰彼雖禮來名重天子使吾獨不自重天子使邪聞者嘆服壬辰選山東道監察御史時權臣當國草䟽將劾之䟽且具㑹鄉人有以埀白在堂勸止者乃移疾歸歸未幾母歾毁瘠踰禮廬墓三年有冬笋馴兎之瑞服闋家居授徒講學者又五年庚子秋以薦起河南道巡視南城權貴歛避而所覩時事不勝扼腕辛丑春二月初四日上封事娓娓數千言大約天下事内而腹心外而百骸皆受病足以失人心而致危亂者五一則輔臣夏言習為欺罔翊國公郭勛為國巨蠧所當急去二則凍餒民閔不憂恤而為方士修雷壇三則大小臣工弗覩朝儀宜慰其望四則名器濫及緇黄出入大内非制五則言事諸臣若楊最羅洪先輩非死即斥去所損國體不小是時中外頗以言為諱䟽入人皆愕然上大怒即逮繫鎮撫司窮究其詞拷掠備至先生一無詘是日都城風大作人面不相覷都人呼為楊御史風其感動天地如此先生身晝夜柙鎻中創甚血淋漓下死而復甦先是士大夫下獄並未有柙鎻者乃自先生始蓋貴溪翊國意也戸部主事周公天佐巡按陜西御史浦公鋐相繼申救俱箠死獄中守益戒嚴人益為先生危而先生處之自若刑部郎錢公德洪工部郎劉公魁吏科給事中周公怡皆先生同志舊友先後俱以事下獄相得甚驩然自學問相勸勉外各相戒不得言得罪事錢先釋獄先生願有以為别錢曰靜中收攝精神勿使逰放則心體湛一髙明廣大可馴致矣古人作聖之功其在此乎先生敬識之而乃日與周劉切劘修詣不少輟繹四子諸經百家研精于易著周易辨録及中庸解若干巻諸所著作畧無憤惋不平語詩文倡和身世頓忘如是者五年乙巳秋八月十二日上以受釐故放先生及周劉歸田里而三人者猶相與取道潞水講學舟中逾臨清始别歸㑹熊太宰以諫仙箕忤㫖復逮三人獄先生抵家甫十日聞命即日就道親朋揮淚為别先生無幾微見顔面身幽圜扉者又三年丁未冬十一月五日上建醮髙𤣥殿災火圍中恍聞呼三人名氏者次日釋歸為民上之聖明保全諫臣如此旣歸教授里中貴人莫得見其面䟽粥敝履怡然自適己酉冬十月九日卒于家年五十有七病革時援筆自誌又惓惓以作第一等事做第一等人教其子孫無他辭蓋先生為人硜直不阿而内實忠淳自少至老孶孶學問以韓苑洛馬谿田為師以楊椒山周訥溪劉晴川錢緒山蔡洨濵諸君子為友險夷如一初終不貳磨礲精光展拓胸次其所涵養者誠深以故鼎鑊湯火百折不回完名全節鏗鍧一代不偶也彼世之淺衷寡蓄耽耽以氣節自多者視先生當媿死矣先生没若干年莊皇帝以世廟遺詔贈光禄少卿録其後今上用禮官議諡忠介愧軒呂先生石谷張氏正立李氏附先生名濳字時見涇陽人號愧軒嘗謂為學必不愧屋漏方可為人因取號以自警云父應祥嘉靖壬辰進士為禮科都給事中以論宫寮事奪官為時名臣先生幼頴敏讀書即解大義嘗秘書克己銘懷袖中時為展玩稍長從都諌公任師事蜀進士趙木溪氏聞木溪氏講義理之學而悦于是學甚力歸又師事涇野吕先生深幸其得所依皈凡一言一動率以涇野為法于是學益力而舉子業亦益入理為邑諸生試毎傾曹偶學使者重其文行拔入正學書院以風多士嘉靖丙午以詩薦鄉書卒業成均友天下士而名日起時朝紳中有講學㑹毎聞先生偕計至亟延之講先生刻意躬行逺聲色慎取予一毫不苟而尤嚴于禮諸冠婚䘮祭咸遵文公惟謹即置冠與祭器式必如古人或以為迂弗恤也先是母栢孺人病于京先生扶母病西歸劑醫百至孺人病革以先生且弱冠命之娶先生娶而不婚日夜苫處䘮次旣襄事廬居墓所服除乃始婚事至孝之名動闗中事都諫公與繼母張曲盡孝養都諫公病至嘗糞以驗歾則哀毁幾絶都諫公封事故未留稿先生走闕下録原䟽請銘馬文莊公文莊公亟稱之事叔父待諸弟情愛備至毎嵗時祭畢燕諸族人講明家訓又率鄉人行鄉約人多化之親黨有窘乏輒憐而周焉與人交平易欵洽或有過即面規之而未嘗背言其短嘗與友人䝉泉郭公郛讀書講學谷口洞中四方從學者甚衆聽者津津有得咸曰得涇野之傳者愧軒也當道旌異無慮數十初南祭酒姜公寳建言天下人才多壞于舉人之時以其身階仕進而上無繩束甄别故易壞也請詔有司推擇舉人中行誼修者特掄擢風士習于是撫按張公祉等交章以先生名上聞遂辟入京特授國子監學正時馬文莊公為祭酒䝉泉郭公亦為助教乃與郭公議以涇野先生為祭酒時所布學約請馬公力舉行之由是講讀之聲徹于橋門萬厯癸酉調工部司務㑹淮海孫公楚侗耿公俱入京先生數就兩公質所學同志方依先生為主盟乃戊寅六月一病遽逝年僅六十又二水部郎葉君逢春狀其行大司馬確菴魏公銘其墓宫保李敏肅公為之傳皆實録非溢美時從涇野先生學者又有張公節李公挺節字介夫號石谷亦涇陽人父幡以文無害官通州同知公隨之任㑹甘泉湛先生講學京師通州距京師甚邇公從之游湛先生教以隨處體認天理公大有省無何通州公致仕公歸而補邑諸生復受學涇野先生為諸生四十餘年竟戹于塲屋以積廩行將膺貢嘆曰吾老矣安用貢為乃上書督學劉公辭廩劉公雅知公學行特加禮遇仍扁其門曰清風髙節尋奉例遥授訓導職銜云公為人方正介直涇野先生深器重之嘗贈以詩有守道不回比舊堅之句生平不妄交逰獨與愧軒䝉泉諸君子相講切日坐南園草屋中讀書窮理涵養本原至老不倦即惡衣糲食澹如也嘗語學者曰先儒有云黙坐澄心體認天理又云靜中養出端倪吾輩須理㑹得此方知一貫真境不爾縱事事求合于道終難凑泊不成片段矣人皆以為名言卒于萬厯壬午夀八十貧不能葬李敏肅公捐金助之始克襄事云挺字正立咸寧人正嘉間西安郡學生性孤直有義氣不隨時頫仰㑹有詔藩郡如故事出諸生分諭諸屬公以次出某邑贈遺一無所受嘗自誦曰生須肩大事還用讀春秋涇野先生歾又講學谿田馬先生所往來三原路中以盜死人皆惜之䝉泉郭先生先生名郛字惟藩號䝉泉涇陽人器宇凝重童時屹若成人甫八齡即知誦讀諳聲律時從都諫龍山吕公學偶試以對句云曉風拂水面先生輒應聲曰朝日射巖頭龍山公計偕屬受學東橋李公與龍山公子愧軒先生同筆研兩人同肆力于學即以聖賢相期許曰必不為世俗碌碌者補邑庠生聲名蔚起父母相繼逝先生侍疾居䘮竭力盡瘁家計窘甚而處之裕如朝夕攻苦益潛心性命不顓顓競雕蟲之技時蓋未離庠校而名己蜚三輔矣邑侯樊髙其行延居講席或有以千金求居間者先生峻拒不納樊侯退而省其私益用髙之嘉靖戊午年已四十有一矣始舉于鄉辛酉冬以吕師㑹葬遂不上公車一時郡邑爭表其廬謂得古師弟之誼焉先生舉孝亷後猶與愧軒先生讀書龍巖洞中學益有得負笈從逰者甚衆累試春官不第乙丑謁選河南獲嘉學諭日與諸生講學課藝多所造就隆慶庚午擢國子助教值馬文莊公為祭酒教規肅然先生贊襄之力居多時年己五十有六例不得入臺省同列欲先生少隱庚甲應選先生笑曰臺省寧可不得年其可隱邪僅得户部主事朝論偉之𣙜税九江先生處脂潤皭然不滓弊剔奸鋤商旅胥悦時有監闗郡倅某者墨吏也束于新令不得肆乃妄加汚衊事聞諸朝朝大夫共知先生賢竟為白其誣萬厯庚辰出守馬湖馬湖西南夷故地俗陋易囂先生恩威並濟禮讓躬先猓夷數十輩從其譯酋願望見先生顔色歸而愛戴彌切居未三載聞有猶子之戚念伯兄且老獨居遂投牒歸歸田二十餘年自讀書講學外他無所事督學敬菴許先生雅重先生檄縣延為鄉飲大賔先生雖堅遜恒虚席以待乙已六月三日無疾而卒距生正德戊寅三月十二日享年八十有八士大夫及門下士追思無己以其德履私諡曰貞懿先生先生學重根本篤于倫理而兢兢持敬自少至老一步不肯屑越暇中喜吟詩卓有堯夫擊壤遺意有云學道全憑敬作箴須臾離敬道難尋常從獨木橋邊過惟願無忘此際心又云近名終䘮已無欲自通神識逺乾坤濶心空意見新閉門只靜坐自是出風塵又云莫道老來積德難古人雖老志不朽富公八十尚書屏武公九十猶求友老來聞道未為遲錯過一生寧不忸從此努力惜分隂毋徒碌碌空白首觀此則知先生享上夀而完名全節非偶然矣先生與人言毎依大節而出之藹然可聽令人不忍别去雖新進少年延見必恪生平手不釋巻冠履几榻悉列箴銘而晩年尤喜讀易所著有自警俚語山居雜詠語畧族譜仰鄭堂集仲子九有付梓以傳九有乙未進士以猗氏令擢禮部主事未究其用而卒人皆惜之秦闗王先生先生名之士字欲立號秦闗學者稱秦闗先生其先咸寧人五世祖志和遷居藍田其後子孫因家焉父旌號飛泉官代邸教授明理學有語録藏于家先生幼承庭訓七八嵗即知學教授公授之毛詩二南輒解輒為諸弟妹誦之教授公喜有子後治大戴禮兼通易為諸生以文名庠校間嘉靖戊午舉于鄉己未試春官不第由是益肆力舉業者累年後屢不第幡然改曰所性分定聖道逺人乎哉一曲經生華藻奚為遂屏棄帖括潛心理窟毅然以道學自任為養心圖定氣説書之座右閉關不出者九年蒿牀糲食尚友千古行已必恭與人必敬飲食必祭必誠兢兢遵守孔氏家法一時學者以為藍田吕氏復出感慕執經者屨滿户外士習翕然又謂居鄉不能善俗如先正和叔何乃立鄉約為十二㑹赴㑹者百餘人設科勸糾身先不倦諸灑掃應對冠婚䘮祭禮久廢毎率諸宗族弟子一一敦行之于是藍田美俗復興萬厯甲戌病痺屬又哭毋過毁步履愈艱終䘮而嚮道之心愈篤謂非博取逺逰終難進道㑹仲子守亦與偕計已卯遂復如京是時先生已久謝公車第日與諸同志講學都門之蕭寺崇正闢邪力肩斯道即時貴或譚及二氏輒正辭距之不少假旣而道鄒魯瞻闕里徧拜先師及諸賢祠墓低回留之不忍去夢寐如見其人久之始歸由是秦闗之名動海内矣凡搢紳莅茲道茲者罔不式廬願見表厥宅里云嵗乙酉德清許敬菴先生督闗中學講學正學書院先生故許先生同志友也禮徴先生為多士式先生亦樂就許先生合志同方相為切劘時多士皆有所興起後許先生以應天丞謫歸先生亦南逰講學出武闗浮江漢而下迂道江之右㑹南昌章子潢新城鄧子元錫廣信衢州楊子時喬殷子士望復東渡浙水見許先生于德清東南學者聞先生至多從之逰先生二子宗容念先生疾客久肅迎歸是在己丑秋明年庚寅八月卒于家夀六十有三目欲瞑以手示二子為訣亦曾子啓手足意也先是南司成趙公用賢柱史王公以通相繼䟽薦趙䟽海内三逸公居其一䟽云孝弟力田行不踰乎軌範詩書敦説名己動于鄉閭雖久嬰足疾而過廬者必式宜如近王敬臣故事授以京秩俾表帥一鄉矜式後學後柱史䟽大略與趙符命下宗伯議議如薦者指先生為孝亷埀三十餘年竟不仕角巾野服悠焉終老至是詔授國子監博士除目至而先生已先物故四越月一命不待君子惜之先生生平修姱惇倫篤于行誼丁内外艱毁幾滅性處晜弟怡怡未五旬失耦誓不繼鰥居終身其于世俗聲色嗜好一切漠然性不問家而好施喜活人或謂貧所濟幾何則曰吾盡吾心力耳置祠祭墓祭二田為宗族置義倉義田即楹畮無多實貧士所難居恒晦迹却埽即郡邑以幣交未嘗苟受亦未嘗輕謁至于訪道求友雖䟦涉間闗數千里亦不憚逺云先生篤信好學見徹本原非沾沾矜一節一善以成名者世或止以甘貧苦節稱先生是豈足盡先生哉所著有理學緒言信學私言大易圖象巻道學考源録易傳詩傳正世要言正俗鄉約王氏族譜正學筌蹄闕里瞻思闗洛集京途集南遊稿所述有先師遺訓先君遺訓皇明四大家要言性理類言續孟録諸書行世闗學編後序夫天覆地載日照月臨凡有血氣莫不有性命而道在焉道在而由之知之則學在也奚獨以闗學名也闗學之編少墟馮侍御為吾鄉之理學作也吾鄉居天下之西北脊坤靈淑粹之氣自吾鄉發是以庖羲畫卦西伯演易姬公制禮而于萬世之道源學術自此衍且廣矣子曰文不在茲乎又曰吾其為東周乎則西方聖人發揮旁通東方聖人懷而則之其揆一也此載在詩書無庸復贅故此編惟列孔子弟子四人横渠先生而至今無不考而述焉故不載獨行不載文詞不載氣節不載隱逸而獨載理學諸先生炳炳爾爾也不論升沉不計崇卑而學洙泗祖羲文者無不載焉少墟之用心亦可謂𢎞且逺矣不然自張吕諸大儒而外如不列於史册則湮没而無聞後死者惡得辭其責也書成人無不樂傳之然則是學也果何學也誦是編而印諸其心即心即學即學即羲文周孔未見有不得者奚止論闗中之學即以論天下之學論千萬世之學可也萬厯嵗次己酉正月人日後學岐陽張舜典書于澶淵之闇然亭少墟集巻二十
