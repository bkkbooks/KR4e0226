  text: 闗學編首巻
  hash: sha256:26917bbf6ce857dc6f2ccacdc4e45dfe7f6b90c88c9545472f8e42cde9cc4b17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0226_WYG_021-1a, image: WYG1293/WYG1293-0327a.png}
body:
  text: 秦子秦子名祖字子南秦人一統志西安府孔門弟子篤于守道唐𤣥宗追封少梁伯從祀孔子廟庭宋真宗加封鄄城侯國朝嘉靖中改稱先賢秦子宋高宗賛曰秦有子南贇贇述作守道之淵成徳之博範若鑄金契猶發藥歴世明祀少梁寵爵聖門人物志末二句作紛華不撓縻我好爵燕子燕子名伋家語作級字子思秦人一作汧陽人孔門弟子唐𤣥宗追封漁陽伯從祀孔子廟庭宋真宗加封汧源侯國朝嘉靖中改稱先賢燕子宋陳知微賛曰八九之徒具傳大義賢哉子思道本無愧鍾靈咸鎬浴徳洙泗増封汧源皇澤斯被聖門人物志賛曰師席高振大成是集道傳一貫速肖七十善教云袤儒風可立漁陽之士得跂而及石作子石作子名蜀字子明秦之成紀人一統志鞏昌府秦州孔門弟子唐𤣥宗追封石邑伯從祀孔子廟庭宋真宗加封成紀侯國朝嘉靖中改稱先賢石子宋高宗賛曰在昔石邑能知所尊懋依有徳克述無言鼓篋槐市揚名里門此道久視彼美常存按姓氏英賢傳有石作蜀氏族畧複姓篇有石作氏注云石作蜀孔子弟子據此當稱石作子稱石子者誤壤駟子壤駟子名赤字子從家語壤作穰史記從作徒秦人一統志西安府孔門弟子唐𤣥宗追封北徵伯從祀孔子廟庭宋真宗加封上邽侯國朝嘉靖中改稱先賢壤子宋高宗賛曰式是壤侯昭乎聖徒執經請益載道若無詩書規矩問學楷模得時而駕領袖諸儒按通志畧壤駟氏複姓今稱壤子誤
