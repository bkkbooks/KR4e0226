body:
  text: 少墟集巻六明馮從吾撰語録學㑹約嵗丙申秋余與諸君子立㑹講學於寳慶寺越數㑹諸君子請余言為㑹約余謝不敏諸君子請益力爰述所聞條列如左亦藉手請正意也諸君子其謂之何一㑹期毎月三㑹初一十一卄一以中午為期不設酒醴不用柬邀大家初㑹相拜止於㑹中行之不必各各登門以滋勞擾若别有請益不在此例一㑹期講論毋及朝廷利害邊報差除毋及官長賢否政事得失毋及各人家門私事與衆人所作過失及詞訟請托等事䙝狎戯謔等語其言當以綱常倫理為主其書當以四書五經性理通鑑小學近思録為主其相與當以崇真尚簡為主務戒空譚敦實行以共任斯道無令鄉之先達如横渠涇野諸先生専美於前可也一㑹中一切交際俱當謝絶此正崇真尚簡處彼此各宜體諒若中有至親舊友不因學㑹相與者隨便一彼此講論務要平心易氣虛已下人即有不合亦當再加詳玩不可自以為是過於激辨昔張横渠先生一夕與二程論易次日語人曰比見二程深明易道吾所弗及汝輩可師之程伊川先生見横渠訂頑曰是起争端改為西銘且曰某兄弟無此筆力又曰自孟子後未見此書觀此足見二子舍已從人取人為善鄒魯真傳正在於此若以自是為自信主意一定無復商量如此縱講得是亦為不是况又未必是乎近世學者多坐此病吾輩當共戒之一坐乆興到願歌詩者歌詩數首以暢滌襟懐子與人歌而善必使反之而後和之氣象何等從容誠意何等懇至即此是學一學之不講孔子且憂况於學者今吾輩講學於此非徒教人乃所以自求其益耳何也人心易放學問難窮無論浮湛世味悠悠嵗月即使今日行義超卓儘足樹立苟以此自足自滿不復求益寧保終身之不改行改玉乎即不然寧保終身之不南越北轅乎故親師取友一則夾輔切劘使不至放逸其心一則問津指路使不至錯用其功耳總之自求其益非所以務外狥人也故鄒東廓先生有云學之不講聖門所憂所謂講者非以資口耳所以講修徳之方法也下文所指聞義而徙不善而改便是講學以修徳實下手處而吕涇野先生亦云學不講不明非是自矜將驗已之是非又云道學之名亦不消畏避人知方是真做纔有避人知的心便與好名的心相近此皆前輩折肱之言吾輩不可不潜心體驗者也一古今理學名儒標宗立㫖不翅詳矣陽明先生揭以致良知一言真大有功於聖學不可輕議且如吾輩今日講學於斯其於聖賢道理發揮亦可謂極明暢矣不知各人心中一㸃真偽處大家得而知之乎否其各人飭躬勵行亦可謂極真切矣不知其心中一㸃安勉處大家又得而知之乎否大家雖不得而知其各人心上一㸃良知明明白白一毫不可得而昧也吾輩今日為學不在逺求只要各人黙黙㸃檢自家心事黙黙克治自家病痛則識得本體自然好做工夫由是親師取友其益自爾無窮耳不然瞞昧此心支吾外面即嚴師勝友朝夕從游曷益乎此先生致良知三字所以大有功於聖學也若夫著實用功各求其所以致之之道則在吾輩大家勉之耳一人非聖賢孰能無過故顔子好學不過不遷怒不貳過而止耳無他竒術秘訣也今吾輩發憤為學斷當自改過始余每見朋友中背後多議人過失當面反不肯盡言此非獨朋友之過或亦彼此未嘗開心見誠以過失相規四字相約耳今願與吾輩約以後㑹中朋友偶有過失即彼此於静所盡言相告令其改圖不惟不可背後講説即在公㑹中亦不可對衆言之令人有所不便於已固不當以一𤯝而甘於自棄於人亦不當以一𤯝而阻其自新交砥互礪日邁月征即此便是學顔子之學不然講論雖多亦奚以為哉此改過所以為聖學第一義故於約中特言之其他不能具而悉也附答問二則問古之聖人只講學可矣何必立講學之名曰古之聖人若只自已講學而不立講學之名以為天下後世鵠則天下後世皆不知有講學之事而自古聖賢相傳之道統自聖人而任亦自聖人而絶矣是豈聖人之心哉聖人之心正要立此名以為天下後世鵠使天下後世有所趨向庶乎人人共為此事則自古聖賢相傳之道統或可以衍之于無窮而後聖人之心始遂耳聖人有功于天下萬世處正在于此非聖人故立此名而好之也問學者不言而躬行何必講學曰此言字不是指講學如有人自家不能孝不能弟却好議論别人不能孝不能弟君子曰不言而躬行可也何必議人又有人自家真能孝真能弟而却好對人誇自家孝自家弟君子曰不言而躬行可也何必誇人此言字指自家議論人自家誇張人説原都是不該有的故曰不言而躬行若自家真能孝真能弟不惟不自誇而且歉然不自足猶終日講如何孝如何弟不惟不議人而且廓然不自私猶終日與人講如何孝如何弟此講學之言正躬行之士不可一日無者也可曰不言而躬行哉言之一字不明不知誤了古今多少人少墟先生講學有年頃謝政歸余竊喜得相與肆力於學也乃與諸同志約㑹於寳慶寺中先生欣然從之坐講終日惓惓以躬行相勸勉一時人心莫不感發興起已咸謂其不可無約以遵守之也因請於先生先生出此以示後與㑹者益衆其約抄閲不給余因謀諸同志付之梓人嗚呼為學不在多言顧力行何如耳戒空譚敦實行先生約中業已及之矣願與同志共朂之余又何贅焉咸寧王境謹䟦士戒余至不肖諸生不不肖余而從之遊余愧無能為助也聊述數語以戒諸生知諸生必不其然第不如此不足以效忠告耳儻中有不率者諸生當先鳴鼓攻余訓導不嚴之罪一毋自恃文學違誤父兄指教一毋妄自尊大侮慢宗黨親朋一毋對尊長噦一決切噫隘嚏帝咳丘蓋切欠伸跛庇倚睇第視唾吐卧切洟替及撒手交足等弊一毋在稠衆中髙譚闊論旁若無人一毋假以送課徧謁官長以希進取或官長有命不得已録送可也一毋争强好勝擅遞呈詞或父兄有命亦當委曲勸化必萬不得已方可一毋借人書籍不還及致損汚言書籍則凡物可知一毋到人書房窺看私書簿籍及稱誇文房器具一毋揀擇衣服飲食及致飾車馬等物一毋見人貧賤姗笑凌辱見人富貴嘆羡詆毁一毋結交星相術士及扶鸞壓鎮諸凡無籍之人一毋看水滸傳及笑資戯文諸凡無益之書一毋撰造詞曲雜劇及歌謡對聨譏評時事傾䧟同袍一毋替人撰造掲帖詞状及私約書札此二段毎見人有犯之者往往明罹王法幽遭天譴一毋輕易品評前輩著作及學問淺深行事得失一毋彼此約分飲酒遊樂一毋唱詞作戲博奕清譚一毋出入酒館縱情聲妓及更深夜静方才到家如遇親朋見召席問有妓寧辭而不往可也一毋哄人詈人併議論人家私事一毋作課之日輕易告假及彼此説話看稿以亂文思以上數欵皆余髫年所聞於長老先生者故不憚諄諄為諸生言之諸生其慎聴毋忽諭俗千講萬講不過要大家做好人存好心行好事三句盡之矣因録舊對一聨做箇好人心正身安䰟夢穏行些善事天知地鑒鬼神欽丙申秋余偕諸同志立㑹講學于寶慶寺㑹凡旬日一舉越數㑹凡農工商賈中有志向者咸來聴講且先問所講何事余懼夫㑹約之難以解也漫書此以示若夫臨時問答各隨其人不具論少墟集巻六
