  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0226_WYG_005-1a, image: WYG1293/WYG1293-0119a.png}
body:
  text: 少墟集巻五明馮從吾撰語錄關中士夫㑹約原序關中㑹約蓋馮柱史仲好首議而諸君子樂成之一時義舉百年希覯於子野渙羣之易曷少焉柱史叩余言為約規余蓋重感吾黨先達人文之盛而式微於今也兹約誠行無渝則式微者以道盛往盛可無譚然竊有懼焉士固有同舍而割席千里而比肩者則心之一與弗一耳心誠一無㑹亦㑹矧曰㑹不約皆約矧成約故面㑹不若心㑹約以詞不若約以心嘗怪論交君子分社近黨合醵若嬉有一多焉而挾有一少焉而忮黨非嬉非挾與忮尤非心之所由弗一也兹用㑹以合一約以貞合㑹不數而志洽約不煩而誼正風啟大同道振式微類族自我鄉人所望乃或聲騖而寡實文具而鮮終陽浮道與而畜貳將令望我者縁􅍁索我拾罅議我其謂之何諸君子當俾不落是乃余為是懼也誠慮於所不必然但冀釋余懼者以必不然用廣首議美意云戊戌端月首㑹日約中朽樗周宇題夫世道隆汚係士風厚薄而返薄還厚倡之者當自士大夫始使士大夫而猶然不倡則於齊民何責焉昔夫子歎時人論禮樂而決之曰吾從先進當其時豈無野人夫子者而夫子不之恤若曰知我者其惟先進乎罪我者其惟先進乎今萬世而下猶知有先進可從者伊誰賜也吾二三士大夫誦法孔子有日覩今世道士風可不決所從而徒空歎君子野人哉頃者經軒熈宇二先生過訪精舍談及吾鄉士風為之咨嗟太息者久之余曰此豈異人任也在二先生倡之何如耳二先生曰然是亦不可以無約子其任之余謝不敏曰有諸前輩在二先生曰否否即此是前輩命也長者命少者不敢辭子其任之余曰唯唯遂載筆從事於二三士大夫之後萬厯丁酉冬十二月後學馮從吾書㑹約一省㑹風氣近古諸凡禮節頗有先民之意苐恐久而寖失其初是不可不一申之者其冠婚䘮祭當以㑹典家禮為主至於冠禮久已不行尤望諸公亟倡之一士夫經年不一面恐非吾輩一體之誼擬於每年正月初六日各擕餅果四器酒一尊同至一公所公拜二拜再拜二拜以見相答已時赴㑹申時散㑹中有年髙步履不便者公除餅果四器酒一尊送至其家非有大不得已事不可不到一彼此往拜俱用單帖止後輩於前輩用折柬一次其前輩亦只用單帖答後輩途遇前輩下車立道左俟前輩過方登車如年嵗及科目相近者或彼此下車相揖或車中拱手既別不必差人拜上一彼此往拜務要相見不可槩以不在辭如坐談時久隨便出一餅一果用之不必設卓以滋糜費一彼此稱謂或字或號不必稱翁惟後輩於前輩仍用翁字以見鄉黨重齒之意至於公事傳帖雖後輩為首於前輩亦不必稱翁庶中有姓同與號之上字同者不至無所分别一彼此爭構吾輩所無儻萬一有之大家務要盡心勸和勿令因小忿以傷大體至於外侮之來雖聖賢所不能免吾輩中儻有無故遭此者大家亦當左右維持無令失所傳曰出入相友守望相助疾病相扶持則百姓親睦夫鄉田同井者且然况於吾輩尚其念之一士夫宦遊歸及公事過家者吾輩為主人當先有一拜越數日其客回拜即主人中有年髙步履不便者或莊居不知者不必論其先施否亦當往拜仍當下車登堂以候安否不可過門止投一刺其燕㑹禮文俱當節省如中有至親同年不在此例一中有新選及出差陞轉過家者各捐分金一兩其餘願捐者聴一中有年老無子或有子而貧甚者每年公具分金若干以助之其異日夀器賻奠仍當破格存厚一異日中有大故公具分金若干為賻葬時再具若干為祭公舉外私舉者隨便一士夫之後有十分貧乏不能度日者廉其實量給資本以慰先世於既往以存厚道於將來切不可秦越肥瘠視之一士風薄惡莫過於投遞掲帖以後凡有縁門投遞者衆共絶之不必接覽一吾鄉士風雅稱恬靜而近日諸長者尤多閉戸寡營絶口不談時事如此美俗烏容過慮苐恐無知之人指稱吾輩或揑寫連名假書囑託當路或擅借一二名號傳帖相約甚至無名之帖頃刻傳徧而大家茫然莫知其所自諸如此類關係一方士風不小今後吾輩遇此不妨過於詳慎盖關防詐偽微獨居官即居鄉亦不可不一留心也以上數欵特其大畧耳若其詳則有鄉先正藍田呂氏鄉約鄉儀在願吾輩共斟酌講求焉關中㑹語䟦㑹舉於戊戌正月仲好氏書約先大夫題辭不佞以使事過里與末議焉亡何仲好養痾杜門九年始出不佞東西南北抱先大夫戚歸終制從鄉先生後亦踰九年越丁未春兩人始再與斯㑹盖相視而慨㑹合之難也雖然不佞重有戚焉先大夫題約諄諄以心一規兹雍雍濟濟罔弗一也而不幸往矣諸先進且强半修文嗟嗟百年駒隙幾俟河清此古人終日乾乾競寸隂而永終譽也㑹合維艱無虚良晤九原可仰盍朂方來近一時長者坦𠂻亮節人人可用為儀而嗣至諸君子鬱然煥然爭相澡濯即不佞如誦或亦可肖而化焉者於休哉洛下耆英情誼不洽於後進蘭亭少長流連僅止於壺觴孰如今兹萃渙維風而相觀道義者乎此㑹良稱不偶吾願諸君子共敦之矣㑹既畢仲好謂不佞不可無言遂不辭而䟦其後周傳誦書關中㑹語述此關中㑹約也何述焉紀侍御馮仲好先生雅意而述之以詔吾黨也盖吾黨寳慶之㑹前未有也自仲好始倡之㑹有定期約有定欵先生自有引故先達周司農先生弁有辭旨哉乃言皆萃渙之良箴而協徳之寳訓也盖崇儉徳以敦素風酌往來以通交際嚴稱謂以尊古誼絶告訐以警薄俗周窮約以厚廉靖䘏後裔以慰先徳敦本尚實之念維風善俗之規溢於言表一時士庶羨為盛㑹傳之海内慕為盛舉今行之十餘年弗替也兹仲好方奉召還臺觀風天下首以此化導搢紳士則斯世斯民皆善徳矣豈惟一鄉一國也與哉苐懼仲好行矣吾黨意人人殊設有弗繼仲好之雅者此事或廢奈仲好之始願何今以往有能體仲好意俾善則雅意世世守而不墜吾且願為執鞭而從之矣貞不佞敢僭為數言以為吾儕告勿立異勿有我勿為齊民所指摘則庶乎斯㑹斯約永貞為毋負矣夫覩是㑹也讀是約也有不犁然當心者非夫也若夫㑹心匪面之訓反薄歸厚之倡則有二先生之言在不佞又何説之辭歲丁未閏月朢日㑹中迂叟秦可貞拜手謹述少墟集巻五
