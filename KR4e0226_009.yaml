body:
  text: 少墟集卷九明馮從吾撰語録太華書院㑹語夫子論大人學術至於治國平天下子思論至聖功業至於贊化育參天地此豈過為推尊過為鋪張若曰不如此不足以滿大聖之分量不如此不足以樹承學之標的耳而或者見其學術功業如此又逡巡畏縮不敢當以大人至聖為不可幾及嗚呼益失夫子子思意矣故孟子不得已又曰大人者不失其赤子之心又曰聖人先得我心所同然若曰大人之學術雖如此其大初非有加於赤子之心至聖之功業雖如此其偉不過先得我心所同然耳豈真不可幾及哉又何逡巡畏縮以為不敢當也後世道學不明只是學者看得聖人太高自己太卑吾輩果能信此又何患不到大人聖人地位或曰信得此遂可不用學問功夫而頓入聖域乎曰不然世之不信學不用功者正坐不信得此耳若果信得此自然不逡巡畏縮自然肯用學問功夫且信得此學問功夫才有頭腦才得不差世豈有不用功夫而頓入聖域之理耶蒲阪張去浮署諭華陰一時士習勃然興起今歲戊申春莫余偕同志馮翊王惟大郡丞華下宜化汝刺史長安劉孟直郡丞咸寧楊工載進士西安周淑逺大參及門人數十人為華嶽之遊而去浮率闔學諸友邀余講學於嶽廟之灝靈樓虛往實歸此遊可謂不徒矣瀕别去浮出此卷索余書余因書此俟教此即連日與諸公所講大㫖無他竒也書完復書遊華二律於後併博一粲徵㑹來蓮嶽良朋喜共遊白雲時去住野鳥自夷猶雨霽千巖翠春深萬木稠山靈真有待吾道重千秋青柯亭榭倚山隈喜見儒冠濟濟來心性源頭須有辨覩聞起處豈容猜三峰直欲凌霄漢九曲常看浸草萊此㑹莫言閒眺玩百年道運自今開往戊申春余與諸同志講學太華山㑹語偶因病未及録故止存書去浮卷數語耳今壬子春莫復與去浮惟大化汝叔尚及華下高宜卿太守馮元皥刺史袁文禎明府華陰屈湛虛運長咸寧任以忠明府西蜀譙用錫胡國柱延安趙爾承司訓及門人百餘人㑹於太華書院盤桓十數日始歸歸來因録其語以應索者中亦有上㑹所講而未及録者亦併録之同志者幸有以教我聖賢學問全在知性有義理之性有氣質之性如以義理之性為主則源頭一是無所不是情也是好的故曰乃若其情則可以為善矣才也是好的故曰若夫為不善非其才之罪也若以氣質之性為主則源頭一差無所不差情也是不好的為恣情縱欲之情才也是不好的為恃才妄作之才今不在性體源頭上辨别而或曰性是善的情是不善的或又曰情是善的才是不善的只在末流上辨别紛拏盈庭何有了期問氣質之性自宋儒始發之孟子道性善何曽言及氣質曰孟子何曽不言氣質如動心忍性之性性也有命焉之性都是就氣質說第學者只當以義理之性為主氣質之性存而不論可也曰忍曰不謂何等詞嚴義正忍性之性性也之性是氣質之性人與禽獸同若教他忍教他不謂則禽獸便不能矣禽獸不能而人能之正謂人有此一㸃義理之性耳故曰人之所以異於禽獸者幾希自宋儒氣質之性之說出而孟子性善之㫖益明蓋人之清濁厚薄豈止三品蓋有什伯千萬而無算者皆是氣質若義理之性人人都是同的那有兩樣人性之皆善於此益信乾以大生坤以廣生天無不覆地無不載此天地之性善也若論氣質則天一屬氣便不免有旱潦地一屬質便不免有肥磽然則天地亦有性善有性不善哉惟不言氣質而言義理則為物不二生物不測天地之德孰大於此又何旱潦肥磽之足言也觀天地則知人矣問孟子言性善亦只說得情一邊性安有善之可名曰性體無聲無臭不覩不聞原不可名苐觀於情之善而性之善始可得而名耳故曰乃若其情則可以為善矣乃所謂善也觀於石中有火擊之乃見則知火在石中雖不擊亦有觀於洪鐘有聲叩之始鳴則知聲在鐘中雖不叩非無知擊之有火叩之有聲則知情知不擊之火不叩之聲則知性矣此正孟子所以善言性也問今人見孺子而怵惕此固自然而然矣如見美色而心蕩見金銀而心動抑豈勉然而然耶孟子以情之自然而善者驗性之善而或亦以情之自然不善者驗性之不善不知孟子何以為辭曰孟子正見彼以情之自然不善者驗性之不善故不得已亦以情之自然而善者驗性之善耳不知彼亦何以為辭問見孺子而怵惕見觳觫而不忍此固以情之自然善者驗性之善如見美食而思嗜見好色而思好彼亦以情之自然不善者驗性之不善可見性有善有不善矣而孟子專言性善何也曰如有二人於此一人見孺子而怵惕見觳觫而不忍見美食而不思嗜見好色而不思好一人見美食而思嗜見好色而思好見孺子而不怵惕見觳觫而不不忍則謂性有善有不善則可今以見孺子而怵惕見觳觫而不忍之人一旦見美食見好色固未有不思嗜思好者以此驗人性之有不善似是不知以見美食而思嗜見好色而思好之人一旦見孺子見觳觫亦未有不怵惕惻隱者以此驗人性之皆善又何疑焉孟子以氣質中之義理斷人性之皆善而告子以氣質中之氣質斷人性之有不善是告子徒知氣質之性而不知義理之性也孟子曰告子未嘗知義余亦曰告子未嘗知性告子曰食色性也甘食悅色是天生來有的故曰生之謂性既以食色為天性為自然則必以仁義為人為為矯强所以有以人性為仁義之說不知仁義亦是天生來有的原是天性原非人為原是自然原非矯強且不必别言仁義即就告子食色性也折之而彼自豁然彼亦無辭如甘食性也即甚甘食之人而語之曰汝叨人也則必羞悅色性也即甚悅色之人而語之曰汝淫人也則必惡可見羞惡之心人皆有之可見仁義亦是天生來有的非人為非矯強也豈以人性為仁義哉孟子從六陰既剝之後指㸃出一㸃微陽真有功於世道人心不小六經四書千言萬語總只是教人為仁義告子欲抹摋其言又不好說仁義不該為又不好說為仁義者之非而苐曰以人性為仁義人性天生來無仁義教人為仁義是戕賊人性而教以僞也如說好箇老僕被人教壞之類此言出則六經四書千言萬語皆絀矣無形之焰烈於嬴火不令之禁甚於托胄問孔子惓惓於學字慮字而孟子云不學不慮何也曰告子以食色為不學不慮之良知良能故謂之性而以仁義為學而後能慮而後知非不學不慮之良知良能故不謂之性故曰以人性為仁義不知食色固是不學不慮的仁義亦非待學待慮的如孩提知愛稍長知敬待學邪不待學耶待慮耶不待慮邪親親仁也敬長義也無他達之天下也可見仁義是不學不慮人性中天生來自然有的彼六經四書千言萬語惓惓教人學教人慮惓惓教人為仁義不過教人各自盡其性之本有各自率其性之所自然耳豈以人性為仁義哉彼以食色為性以甘食悅色為盡其性之所本有為順其性之所自然而此以仁義為性以愛親敬長為盡其性之所本有為順其性之所自然則以人性為仁義之說不攻自破矣此孟子不得已而有不學不慮之說也正所以發明當學當慮之意也告子食色性也謂之曰性若曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知甘其食也及其長也無不知悅其色也甘食性也悅色性也無他達之天下也故孟子不得已亦曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也如此則孟子仁義性也之說不惟别人心服即告子亦心服矣從告子之論性則甘食悅色無仁義以為隄防人人以縱欲為真以循理為僞其䆒也至於為禽為獸從孟子之論性則愛親敬長即食色亦協天則人人以循理為是以縱欲為非其䆒也可以為聖為賢性學一差毫釐千里歐陽公謂教人性非所先誤矣誤矣歐陽公謂教人性非所先是吾性中真無仁義而告子以人性為仁義之說是矣不然何故歐公併性亦不敢言孟子以孩提知愛稍長知敬驗仁義正以仁義不可言姑就知愛知敬處言之耳故曰天下之言性也則故而已矣又不可以平常知愛知敬言而以孩提稍長言正以孩提稍長非由學且慮耳故曰故者以利為本這箇性體當人初生時天即命之完完全全無稍虧缺只是待孩提稍長時才露其端耳由其端而窺其體可見此性體也湛然無一事而事事皆其所根柢而又不得其所以根柢之自澄然無一物而物物皆其所範圍而又不得其所以範圍之原一腔而乾父坤母一息而物與民胞此之謂義理之性而非氣質之性所能圉也學能悟此則道心為主而德性用事情與才善則俱善若不能悟此則人心為主而氣質用事情與才不善則俱不善矣此孟子道性善所以大有功於後學也問變化氣質之氣質與氣質之用小之氣質同否曰不同變化氣質之氣質就不好一邊說所以要變化氣質之用小之氣質就好一邊說只是不可恃他好所以要學問德性人人都是有的只是被氣質埋沒了所以德性不能用事須是要變化氣質氣質變化後德性才現方才說得涵養然則如何去變化如何去涵養曰在講學問變化氣質之氣質就不好一邊說則吾既得聞命矣若氣質之用小就好一邊說不知既就好一邊說便是義理矣如何尚謂之氣質邪曰善哉問此處最微妙如見孺子而怵惕此義理之性也若不識其端而擴充之則怵惕亦氣質耳息夜氣而幾希此義理之性也若不識其機而培養之則幾希亦氣質耳孩提知愛稍長知敬此義理之性也若不乘此未雕未琢之天而加以入孝出弟之功則知愛知敬亦氣質耳然則如何以義理之性亦謂之氣質曰謂義理之性乘氣質以發露而不由學問之功也謂靠天而不靠人恐在人之功既踈併在天之端倪亦不可保也故曰氣質之用小學問之功大學者若加學問之功無論幾希之夜氣不為知誘即旦晝之仁義亦可永存無論孩提之知能不至物化即終身之孝弟亦可參天豈不併氣質而亦為義理也哉氣質之用小學問之功大真聖人不易之言也天命之謂性性即理也此破天荒語此性字不是泛說若曰此中字乃天命之性中字自堯始發之故曰堯得統於天率性者率此中之性故謂之道若率其過不及之性則不謂之道矣修道者修其過與不及而歸之中也中原是天命之性率性之道修道者不過教人各自率其天命之性耳豈拂人之性豈强世之從也哉天命之性指中字說雖不可露出此字却不可不知此意今人只往高遠𤣥空處說不知愈高遠愈差愈𤣥空愈謬喜怒哀樂二句幾成聚訟不知議論都是但不該各執已見耳方其未發雖是未發而真機何嘗一息不流行寂然不動之中而感而遂通者自在是未發者未發而所以能發者不以未發而遂不發也及其已發雖是已發而真體何嘗一息不凝固感而遂通之時而寂然不動者自在是發者發矣而所以發發者不與之俱發也未發是已發之源已發是未發之流未發是已發之根本已發是未發之枝葉本體雖是一貫然源自是流之源流自是源之流根本自是枝葉之根本枝葉自是根本之枝葉脉絡尤自分明雖有寂有感而實無寂無感雖無寂無感而實有寂有感彼判然分而為兩者是支離口耳之學固不是若茫然混而為一者是影響虛無之學尤不是吾儒曰喜怒哀樂之未發謂之中異端欲抹摋未發之說則曰人一生都是發的那有未發之時吾儒曰發而皆中節謂之和異端欲抹摋已發之說則又曰人一生都是未發的那有已發之時吾儒曰不覩不聞異端又欲抹摋不覩不聞之說則又曰有覩覩明無覩覩暗有聞聞喧無聞聞寂那有不覩不聞之時未發也無未發之時已發也無已發之時不覩不聞也無不覩不聞之時一切俱無無無亦無將吾儒之言一切抹摋此正異端巧於害道處吾儒不察而以彼之說解我之㫖此所以聚訟紛紛而不可窮詰也悲夫覩明聞喧說得通覩暗聞寂無此理矣不論理之有無只管往𤣥妙處說此異端所以害道或曰彼原以理為障所以不論理之有無耳彼法原自如是吾儒曰無動無靜無寂無感無顯無微無字說得最圓活最輕省所以為妙異端亦曰無動無靜無寂無感無顯無微無字說的太重濁太死煞所以誤人問未發之中說者以為非時蓋指性體言也不知是否曰未發原是指性體言第不可抹摋時字何也本文明白說喜怒哀樂正見得人有有喜怒哀樂之時亦有無喜怒哀樂之時耳當無喜怒哀樂之時就是未發當有喜怒哀樂之時就是已發道理本自明白而好竒者必欲抹摋時字到底又抹摋不得真足竒矣問未發之中已發之和不得從功夫來如何能至此曰此二句俱是泛就本體見成說功夫當在言外若曰未發謂之中固矣若平日不加戒懼之功則胸中一團茅塞縱暫時休歇終難語廓然大公之體其何以養未發之中已發謂之和固矣若平日不加慎獨之功則胸中一團客氣縱勉強應酬終難語物來順應之妙其何以得中節之和此戒懼慎獨之功所以不容已也若不加功夫而苐曰本體如是如是則中和自中和而我自我也亦足惜矣自虞廷言中而學者多以發而皆中節之和當之不知道理有箇所以中節處不在發時當喜怒哀樂之未發而此理已具矣此時說箇不偏不倚真是不偏不倚說箇無過不及真是無過不及虞廷之所謂中正指此耳雖不覩不聞而天下事却件件離不得無其迹而有其理故曰天下之大本孔子知天命知此者也曽子止至善止此者也孟子道性善道此者也善哉乎朱子之推言之也曰問渠那得清如許為有源頭活水來又曰等閒識得東風面萬紫千紅總是春學問透悟乎此是從先天未畫處立根故曰立天下之大本此是無聲無臭的道理不是子思㸃破令人何處尋討道理只是平常如喜怒哀樂是人人有的時時有的未發便謂之中發而皆中節便謂之和從大家日用常行間指㸃出天命率性無聲無臭的道理何等平常何等𤣥妙何等𤣥妙何等平常喜怒哀樂未發之中此千古聖學之原故豫章延平靜中看喜怒哀樂未發氣象說者謂得伊洛真傳而佞佛者妄肆譏評曰未發是一念不起時也以一念不起之中忽起一看氣象之念便是起念便是發且既云未發矣氣象在何處既有氣象矣又何云未發令學者茫然無以應不知如可喜可怒可哀可樂之事一時未感我安得無故起念就此一時喜怒哀樂之念未起故謂之未發耳非一槩無念一毫功夫無所用而後謂之未發也試看此未發時氣象何等湛然虛明是湛然虛明正此未發之氣象也安得說未發矣而氣象在何處以一念不起之中縱忽起一看氣象之念不謂之發何也謂所起者戒慎恐懼之念而非喜怒哀樂之念也安得說既有氣象矣又何云未發未發功夫不是面壁絶念求之虛無寂滅之域只凡事在平常無事時豫先將性命道理講究體認戒慎不睹恐懼不聞只在性體上做功夫使心常惺惺念常亹亹時時討得湛然虛明氣象便是未發用力處亦便是未發得力處如此有不發發皆中節矣非以一槩無念為未發以靜中看未發氣象為起念為發也豫章延平得伊洛真傳正在於此安得援儒入佛而妄肆譏評佞佛者曰以一念不起之中忽起一看氣象之念便是起念便是發以此抹摋吾儒之說不知以活潑潑地之中忽起一虛無寂滅之念獨不謂之起念獨不謂之發乎且有念念也有無念之念亦念也念必不能無而必於無即此必於無念之念其病尤甚於有念也如此即佛氏亦自說不去矣而反以此詆毁吾儒不亦悖乎未發是一念不起時也若起一用功之念便是發如何還說得未發信斯言也則未發時一毫功夫無處用矣未發則功夫無處用已發則功夫又不及用如此將功夫一切抹摋只憑他氣質做去喜怒哀樂如何能中節不惟氣質之性憑他不得即義理之性亦憑他不得如不忍觳觫不屑呼蹴豈不是義理之性若不於此時加學問功夫則自起自伏旋生旋滅如何算得故孔子開口先拈一學字其㫖深矣問人性皆善善字何以解曰凡有益於天地萬物者皆謂之善凡無益於天地萬物有損於天地萬物者皆謂之惡孔子言明德便言新民子思言中和便言位育離過人說不得善離過與人說不得為善故曰君子莫大乎與人為善物之善羣者莫如羊善字從羊從言古人制字之意逺矣問孟子三箇幾希字同否曰人之所以異於禽獸者幾希指天命之初至善之本體而言也其所以異於深山之野人者幾希指君子存之之後到聖人地位者而言也其好惡與人相近也者幾希指庶民去之之後猶有一㸃可存之生機而言也三處自是不同幾希二字猶諺云差不多些非如老子所云視之不見曰夷聽之不聞曰希也所以差不多者只是這些子一㸃靈明處異於禽獸耳人之所以異於禽獸者惟此這些子聖人之所以異於途人者亦惟此這些子這些子原是視之不見聽之不聞的只是不可竟以視之不見聽之不聞解幾希二字耳吾儒言這些子一㸃靈明佛氏亦言這些子一㸃靈明佛氏所謂這些子一㸃靈明指目之知視耳之知聽饑渴之知飲食的這箇而言即告子生之謂性之說指生死之生而言也吾儒所謂這些子一㸃靈明指視之能明聽之能聰飲食之能知味的這箇而言即孟子人性皆善之說指生理之生不專指生死之生而言也言一㸃靈明處雖同所以言一㸃靈明者則異不可不辨目之知視耳之知聽饑渴之知飲食人與禽獸何異惟是視之能明聽之能聰飲食之能知味人始異於禽獸耳異端言性指人與禽獸同處言吾儒言性指人與禽獸異處言異處只是這些子故曰幾希幾希云者危之也惟異端言性指人與禽獸同處言所以自誤所以誤人異端言性亦不曽直以目之知視耳之知聽饑渴之知飲食為性而以目之所以知視耳之所以知聽饑渴之所以知飲食的這箇言性吾儒亦不曽直以視之能明聽之能聰飲食之能知味為性而以視之所以能明聽之所以能聰飲食之所以知味的這箇言性所以能明能聰能知味的這箇性體原是無聲無臭不覩不聞的在虞廷謂之道心在孔子謂之至善在子思謂之未發之中此理之根也所以能視能聽能飲食的這箇性體亦是無聲無臭不覩不聞的在老氏謂之谷神不死是謂𤣥牝𤣥牝之門是謂天地根在佛氏謂之有物先天地無形本寂寥能為萬象主不逐四時雕此欲之根也然則何以為欲之根曰只推䆒所以能視能聽的源頭而不推䆒其所以能明能聰該視不該視該聽不該聽的源頭如此則任視任聽縱耳縱目適已自便何所不為故曰此欲之根也源頭一差何所不差目能視而所以視能明之理即視而在耳能聽而所以聽能聰之理即聽而在口能飲食而所以飲食能知味之理即飲食而在惟提出所以能明能聰能知味之理則不離視聽飲食而視聽飲食皆屬天則若丢過所以能明能聰能知味之理而單言視聽飲食則視聽飲食便屬人欲此段論本體目能視而所以視能明之理即視而在盡其所以能明之理則無視非明而目之形踐耳能聽而所以聽能聰之理即聽而在盡其所以能聰之理則無聽非聰而耳之形踐口能飲食而所以能知味之理即飲食而在能盡其所以知味之理則無飲食非正味而口體之形踐故曰形色天性也惟聖人然後可以踐形此段論功夫慈湖已易云目能視所以能視者何物耳能聽所以能聽者何物手能運用屈伸所以能運用屈伸者何物足能步趨所以能步趨者何物目可見也其視不可見耳可見其聽不可見手足可見其運用步趨者不可見其可見者有大有小有彼有此有縱有橫有高有下不可得而一其不可見者不大不小不彼不此不縱不橫不高不下不可得而二視與聽若不一其不可見則一運用步趨若不一其不可見則一是不可見者在視非視在聽非聽在運用屈伸非運用屈伸在步趨非步趨視如此聽如此運用如此步趨如此晝如此夜如此寐如此寤如此古如此今如此萬如此一如此聖人如此衆人如此云云此段話說全是禪宗然則如何是吾儒宗㫖曰只消更一字視能明而所以能明者何物聽能聰而所以能聰者何物手能恭而所以能恭者何物足能重而所以能重者何物目之視可見也而視之所以能明者不可見耳之聽可見也而聽之所以能聰者不可見手足之運用步趨可見也而所以能恭能重者不可見其可見者有大有小有彼有此有縱有橫有高有下不可得而一其不可見者無大無小無彼無此無縱無橫無高無下不可得而二視聽若不一其不可見則一運用步趨若不一其不可見則一是不可見者在視非視在聽非聽在運用屈伸非運用屈伸在步趨非步趨晝如此夜如此寐如此寤如此古如此今如此萬如此一如此聖人如此衆人如此云云如此發揮便是吾儒宗㫖嗚呼安得起敬仲於九原而為之一提醒也問無意曰無意二字說得本體說不得工夫說得成功說不得用功如見孺子而惻隱見觳觫而不忍有意乎無意乎原是無意如到大而化之之聖聖而不可知之神地位有意乎無意乎亦原是無意故曰說得本體說得成功若用功須是誠意蓋人性皆善善念人人都是有的然必誠之又誠以至于至誠之能化則無意矣誠意到渾化無意處才是誠才謂之成功才合得本體若不用誠意功夫而執定無意為宗則功夫無實落下手處何時得到聖人無意地位不過空談本體以自寬心耳論語毋意意字與大學誠意意字微有不同誠意意字指一念而言毋意意字指事未至而自家先立一箇主意而言如適莫信果之類原不是不好的只是這箇主意預先立不得故曰毋意毋必毋固毋我問上蔡云心本一支離而去者乃意耳所以慈湖以無意為宗曰念未起之前心本一但念既起之後便有善念有惡念所以說支離而去者乃意耳非槩謂念既起之後全是惡念全無善念也上蔡之言原自圓活今泥支離而去之說一槩要無意不知一念而惡無意可也倘一念而善亦無意可乎人心原是活的有無念之時亦有有念之時有起惡念之時亦有起善念之時豈有一槩無意之理論本體原如是論功夫但當於起念之時看是善念就要著實擴充看是惡念就要著實克治豈有一槩無意任其所發而不為㸃檢之理此不待辨而自明者也或曰有意為善雖善亦私何也曰有意為善如自欺之意原是不該有的故謂之私若自慊之意原是不可無的豈可謂之私若克治自欺之意圓滿自慊之意此意正不可一日無者可槩曰無意無意哉若無自欺之意而併無自慊之意一切總歸於無是懲其有意為善而併不為善也無此理矣心本一支離而去者乃意耳與有意為善雖善亦私之說俱說得極是只是不該一槩以意為支離一槩以為善者為有意耳若一槩以意為支離其勢必至於滅意一槩以為善者為有意其勢必至於令人不敢為善至於令人滅意而不敢為善又將何所不至哉問此心一念發動處謂之意但發動處有善念有惡念如是善念誠可也如是惡念亦誠可乎大學何以云誠意曰人心一念發動處有善念有惡念有善念亦自有好善之念有惡念亦自有惡惡之念善念與好善之念一時竝起惡念與惡惡之念亦一時並起善念與惡念對言好善之念與惡惡之念不對言何也好善之念固善念惡惡之念亦善念也如起一善念即當為善却又不肯為是初念是而轉念非也如起一惡念復起一惡不當為之念遂不為是初念非而轉念是也此就平常論意者言也若誠意章却置過善念惡念兩念對言的只專以好善之念惡惡之念就好念頭一邊說所以意都是該誠的都該說初念是而轉念非又說不得初念非而轉念是矣至於如惡惡臭如好好色則萬念總歸於一念而其念不棼末念止還其初念而其念不轉無為其所不為無欲其所不欲為其所為欲其所欲又何不自慊之有如此則心本一而意亦復還於一又何至於支離而去哉又何必專言無意而後使心之一者不至支離而去也自慊是誠其善念的妙處小人閒居為不善節又是誠其惡念的差處子問善念誠可也惡念誠亦可乎誠於中形於外此又為誤誠惡念者之戒也故曰欲誠其意者先致其知心一也自心之發動處謂之意自心之靈明處謂之知意與知同念竝起無等待無先後人一念發動方有善念方有惡念而自家就知道孰是善念孰是惡念一毫不爽可見意有善惡而知純是善何也知善固是善知惡亦是善也惟此良知一毫不爽所以有善念便自有好善之念有惡念便自有惡惡之念彼不誠其惡惡好善之意者自家良知豈能暪昧得只是明知而故為之不肯致知耳小人掩其不善以著其善其於善不善之介其於誠不誠之介豈不分明所謂有惡念亦自有惡惡之念只是小人不肯誠於惡惡耳學者不必如何去做功夫只是知惡之當惡便如惡惡臭之惡以惡之則知惡之知致而惡惡之意誠矣知善之當好便如好好色之好以好之則知善之知致而好善之意誠矣此誠意所以先致知也獨字文公解曰人所不知而已獨知之地也以知字解獨字真得孔曽之髓而或以自字解獨字則誤甚矣意有善念有惡念而知善知惡之知則非意念之所能蔽超然獨存與物無對人之所以為人惟恃有此一㸃靈明耳由誨汝知之乎知字與是知也知字同正指此一㸃靈明處言之若知之為知之之知便對不知而言與知之乎是知也知字便不同矣或以知之乎是知也知字作德性之知極是但以知不知知字專作聞見之知亦太死煞當云有知有不知者吾心通塞之常知知知不知者吾心靈明之體俱以吾心言方妥蓋為知不知知字不離聞見而亦不滯於聞見故也若提出德性之知雖聞見亦德性若專靠聞見之知雖德性亦為聞見用矣此夫子所以直提德性之知以誨由也夫人之心有通有塞有明有蔽而人心之知無通無塞無明無蔽所謂超然獨存與物無對者此也太陽當天幽隱畢照盡掃浮雲還我太虛嗚呼盡之矣問有善念便有好善之念有惡念便有惡惡之念可見意原是誠的意本誠何必更益之誠曰意本誠無奈誠者之多僞也明知善之當好而不如好好色明知惡之當惡而不如惡惡臭斧斤伐矣而猶不知防牛羊牧矣而猶不知禁可乎於是不得不有求誠之功是求誠之功正所以復本誠之體也豈得謂之臆說謂之揠苗或又曰誠意之功為無奈多僞者言也倘斧斤不伐牛羊不牧原無多僞何必更誠曰恃知善之當好而不如好好色恃知惡之當惡而不如惡惡臭雖未伐而不防斧斤雖未牧而不禁牛羊可乎於是不得不有存誠之功是存誠之功尤所以葆本誠之體也又安得謂之臆說謂之揠苗哉意本自誠不必更誠心本自正不必更正是田苗本自發生而不必更培植灌溉也有是理乎懲助長之病而槩以培植灌溉為揠苗其不至於苗則槁矣者幾希講學不精誤人不小意本自誠心本自正是本體意本自誠却要還他箇誠心本自正却要還他箇正誠意正心是功夫觀意本自誠心本自正可見正心誠意不是揠苗不是以人性為仁義意本自誠却要還他箇誠此誠字就念起之後言也若念未起之前不前定乎誠則人性雖善而牿之反覆竊恐一日之間善念少而惡念多久之純是惡念併此善念之少者亦無矣又將何以誠之哉故曰靜中養出箇端倪方有商量處可見古人不惟誠此念於既始有念之後抑且誠此念於未始有念之先古人惟誠此念於未始有念之先所以一日之間善念多而惡念少久之純是善念併此惡念之少者亦無矣其於誠意也豈不尤易易哉此子思子有戒慎不覩恐懼不聞之說也養未發之中正是誠意的源頭學問問心與意性與情何以分别曰性者心之生理非心之外别有性也情者性之動意者心之發情者性之發於外意者心之動於中情如喜怒哀樂必有所感而後動或發而中節或發而不中節以其有情之可見也故曰性之發於外意者或外有所感而自家方動此意或外無所感而自家忽動此意以其只有此意而情尚未發於外也故曰心之動於中意正在情將發未發之間最是聖學緊關處不容草草少墟集卷九
