body:
  text: 關學編原序我關中自古稱理學之邦文武周公不可尚已有宋橫渠張先生崛起郿邑倡明斯學臯比勇撤聖道中天先生之言曰為天地立心為生民立命為往聖繼絶學為萬世開太平可謂自道矣當時執經滿座多所興起如藍田武功三水名為尤著至于勝國是乾坤何等時也而奉元諸儒猶力為撑持塤吹箎和濟濟雍雍橫渠遺風將絶復續天之未喪斯文也豈偶然也哉逮我皇明益隆斯道化理熙洽真儒輩出臯蘭創起厥力尤囏璞玉渾金精光含斂令人有有餘不盡之思鳯翔以經術教授鄉里真有先進遺風小泉不繇文字超悟于行伍之中亦足奇矣司徒步趨文清允稱高弟在中顯思履繩蹈矩之死靡他至于康僖上承庭訓下啓光祿而光祿與宗伯司馬金石相宣鈞天並奏一時學者歙然嚮風而關中之學益大顯明于天下若夫集諸儒之大成而直接橫渠之傳則宗伯尤為獨步者也宗伯門人幾遍海內而梓里惟工部為速肖元善篤信文成而毁譽得失屹不能􅐁其真能致良知可知侍御直節精忠有光斯道博士甘貧好學無愧藍田嗚呼盛矣學者俯仰古今必折衷于孔氏諸君子之學雖繇入門户各異造詣淺深或殊然一脈相承千古若契其不詭于吾孔氏之道則一也余不肖私淑有日頃山中無事取諸君子行實僣為纂次題曰關學編聊以識吾關中理學之大略云嗟夫諸君子往矣程子不云乎堯舜其心至今在夫堯舜其心至今在諸君子其心至今在也學者能誦詩讀書知人論世恍然見諸君子之心而因以自見其心則靈源濬發一念萬年橫渠諸君子將旦莫遇之矣不然而徒品隲前哲庸嘵口耳則雖起諸君子與之共晤一堂何益哉萬歷嵗在丙午九月朔日長安後學馮從吾書于靜觀堂
