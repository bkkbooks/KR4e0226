body:
  text: 少墟集卷十明馮從吾撰語録太華書院㑹語問非禮勿視非禮勿聽非禮勿言非禮勿動曰非禮不是難勿的亦不是易勿的必如孟子先立乎其大則小者不能奪也然後能勿必如朱子至明以察其幾至健以致其決然後能勿不然物交物則引之而已矣其孰能察幾而致決哉孔顔之學原是由中以應外而後世有異學者出遂借由中之說以開自便之門若曰學在由中不存制外苟先立乎其大心上有主即視聽言動終日在非禮中有而不有有何罣礙不然心上無主即閉門靜坐終日在妄想中無而不無其為非禮也多矣况聖學一悟本原則視聽言動自是圓妙又何必一一在外靣末節上㸃檢以襲義外之學耶嗚呼心可匿而視聽言動不可匿故托之乎心令人不可揣摩耳不知先立乎其大則小者不能奪也今小者業已奪矣而猶曰我先立乎其大其孰信之為此言者真小人而無忌憚之尤者也伊川先生目擊此弊不得已有制於外所以養其中之語故四針中不曰操之有要心為之則而曰操之有要視為之則不曰內惟靜專發無躁妄而曰發禁躁妄內斯靜專句句是制外養中意無一由中應外語夫先生豈不知由中應外哉謂不如此不足以救異學之失而塞小人自便之門耳且聖學原是由中以應外若中不得力外何以應故必制於外以養其中而後其中有主其中得力始能應外耳是制於外正所以養其中也所以二字最當玩味主意原為養其中使由中以應外豈徒制其外而已哉先生識如此其高言如此其妙憂道救世之心又如此其苦二句少一句不得合而言之始得孔顔千載不傳之祕或有主由中之說而著論以非制外之語是不知制外正所以養其中也蓋亦不深於由中之義矣既終日在非禮中矣心上無罣礙否何以知之既終日閉門靜坐矣心上有妄想否又何以知之且既終日在非禮中便是罣礙又何云無罣礙肯終日閉門靜坐便見無妄想又何云妄想此異端大言欺人語耳自是逃不得識者問或有謂四勿與克己無干者有謂克己是本四勿是末者皆名儒語也似非本㫖曰然四勿原是克己之日那有本末之分為此言者是混於異端之說而不自知者也故不容不辨問非禮即已也是否曰不然如言動之非禮即已還說得若視聽之非禮則非禮之聲色在外我安得禁絶之君子平其政行辟人可也豈有仁者而行辟人之理且非禮之聲色在外不視之聽之何以知其非禮非非禮業已視矣聽矣而猶云勿視勿聽不亦晚乎不知頭一視頭一聽卒然而感卒然而應不謂之視聽不視不聽何以知其非禮非非禮惟是一視之聽之既知是非禮之聲色就不該視聽却再要視聽何也雖自己亦看不過矣勿視勿聽指第二視第二聽說勿視者克己欲視之心勿聽者克己欲聽之心勿言勿動者克己欲言欲動之心故曰克己非禮之色視也由己勿視也由己非禮之聲聽也由己勿聽也由己非禮之言動言動也由己勿言動也由己故曰由己二己字原自分明而後世學者欲借由己己字回護克己己字又欲借由己二字抹摋克己二字甚且訓克為能必欲為私欲左袒何也紛紛議論病根在此問天下歸仁與叔作八荒我闥文公作歸猶與也何如曰二說原是一意所謂德不孤必有鄰者此也所謂東海西海有聖人出焉此心此理同者此也第己之未克也則肝膽吳越方寸荆棘吾心先與天下隔而天下安得不與吾心隔及一日之既克也則一腔四海八荒我闥吾心先與天下通而天下安得不與吾心通天下豈有不與吾仁者哉况同然者在我即千古且與其仁又何况天下二說原是一意不可分而為二也學問只要得這個同然的得此同然則可以考三王可以建天地可以質鬼神可以俟後聖而况於天下豈有不與吾仁之理不然真是肝膽皆吳越舉足皆荆棘矣况天下哉論學得其所同然則楊墨佛老不能為之亂論政得其所同然則申韓桑孔不能為之奪問天下非之而不顧得無於同然之說有礙乎曰天下非之而不顧彼正信得其所同然也蓋天下有一時之浮議有千古之是非彼誠看破千古之是非得人心所同然所以天下非之而不顧耳苟不得其所同然而曰天下非之而不顧則無忌憚甚矣此安石之人言不足恤所以得罪於天下後世也聖人先得我心所同然耳聖人講學故先得我心所同然我亦講學故後得聖心所同然聖人與我分得先後分不得異同論氣則聖人得其清而我濁論質則聖人得其厚而我薄論時則聖人生於古而我今如何學得聖人所恃者此同然之性體耳故曰心之所同然者何也謂理也義也心之理義是謂聖心之理義是謂性體雖有善者亦無如之何矣讀至此真令人痛哭流涕小人壞了人國家君子反替他擔箇不是使庸君世主不信仁賢皆小人之貽禍也事體敗壞至此即盧扁望而却走矣豈盧扁不能活人哉昔靖康之禍已成龜山立朝止九十日即盧扁亦何能為而論者責備不已吁亦寃矣南宋秦檜托胄相繼敗壞一文公立朝止四十九日其能效尺寸之益而論者亦責備不已何也可為古今一慨長國家而務財用者必自小人矣桑孔之徒小人中之小人也王安石之流君子中之小人也小人中之小人其罪易見君子中之小人其罪難知雖然斥逐忠良引用凶邪至於覆人邦家其罪業已彰明較著而或者猶作祠堂記以左袒之何也故曰君子中之小人其罪難知也安石一行新法而百姓如在水火觀鄭俠流民圖真可墮淚君實罷新法出斯民於水火中而或者病其激且驟不知拯溺救焚可從容以待否什一去關市之征孟子謂其斯速已矣何待來年余謂君實之速正得孟子之意而或以為激且驟者蓋章惇蔡京之餘咳也不可不辨世之論安石者曰執拗曰自是此皆是病症非是病根安石志大才髙學博目空將古今聖賢都看不上以為堯舜雖是聖帝而疆域甚隘禹湯文武雖是聖王而享國不過數百年孔孟雖是大聖大賢而亦不能使春秋戰國為唐虞三代都是迂闊了須是富國強兵開疆拓土名利兼收做古今第一箇有用的聖人幹古今第一件有用的功業且宋室國弱兵寡全被韓范富歐及趙抃程張諸迂闊人把國家事耽閣了須是得這等敢做敢為不怕人議論不說迂闊話的人如吕惠卿章惇蔡京輩才幹得實事才做得出大功業譬之人家生出箇有才幹不安詳的子孫來看祖宗甘貧自守以為迂闊要大做一番不知要治多少産業不知要畜多少幹僕使上擴祖宗纍世之業下垂子孫不拔之基存下這箇主意凡講道理之人皆誚其無用而踈逺之凡揮霍不羈奔走營為之人皆喜其有用而信任之不論道理只要起家如此做去竊恐家未必成而禍已隨之矣安石之病何以異此不論道理只是一味要做事功其心以為待我事功成時方且格天地光祖宗使人人稱頌一時天變何足畏祖宗何足法人言何足恤哉此安石之病根所以深入膏肓而不可救藥也不知舍道理而專求事功豈止事功不成竊恐灾害並至雖有善者亦無如之何矣安石不是自為功名富貴計亦不是執拗自是亦不是有心禍天下只是學術主意差了所以自誤誤人國家至此耳可恨可惜安石這一𣲖學術自淳于髠商鞅李斯申韓桑孔以及李覯至安石遂大壞決裂不可言矣淳于髠曰魯繆公之時公儀子為政子思泄栁為臣魯之削也滋甚若是乎賢者之無益於國也髠所謂賢者蓋指聖賢道學之士言耳不然賢者無益於國將不賢者有益於國乎髠不若是之悖矣李覯著富國強兵䇿各十篇富國䇿大約說天下事非利不行強兵䇿大約說天下事非勢不行惓惓進霸而退儒惓惓以勢利為是以仁義為迂幸覯不當國耳安石既當國安得不禍宋哉孟子曰今之事君者曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也君不向道不志於仁而求富之是富桀也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之強戰是輔桀也由今之道無變今之俗雖與之天下不能一朝居也覯之立論總之為君辟土地充府庫約與國戰必克耳其不信孟子何怪焉孟子之言一驗於李斯之於秦再驗於安石之於宋這一𣲖學術誤人不小朱文公以富國強兵解利字不惟得孔孟微㫖其所以為後世君臣慮者尤深逺矣這一𣲖學術如講黃白之術者自以為丹成可以起巨萬之家可以延千年之壽視孔孟深耕易耨清心寡欲之方不足博一笑耳若曰何迂闊至此卒之敗家傷生在此一丹而猶不知悟也悲夫問足食足兵與富強奚異曰以仁義民信為主則足食足兵皆國家之至計若以仁義民信為迂則足食足兵亦富強之嚆矢矣不然吾儒學術豈專欲國貧而兵弱哉必不其然士君子不可無者氣節却不可認客氣為氣節士君子不可無者事功却不可認功利為事功以功利為事功則枉尋直尺而無品以客氣為氣節則憤世凌物而無量聖學宗㫖全在心性二字心性功夫要在品量二字然則品量可學與曰何不可學余嘗謂一介不苟以學品則品自高萬物皆備以學量則量自大今觀此華嶽削成四方壁立萬仞非品乎俯視寰宇皆在目中非量乎吾輩講學於此髙山仰止景行行止即此便有餘師又何事逺求哉願共贔屭毋負山靈太華書院㑹語附録太華書院陽城崔時芳青柯坪舊為諸生誦讀之藪近名公多聚講於斯而逺邇負笈者日益衆觀者比之白鹿洞故事吾道之明喜在此時先為署今改題太華書院實以因為創云白鹿昔年洞青柯今日坪地分千里合道㑹百年明自賦操刀拙因慚製錦榮巨靈應不棄同結此山盟右一一識君王後銅分仙掌初喜翻桑柘影願共芷蘭居蚉負驚山重鳬臨覺境虛彈琴覔古調不用舊刑書右二白髮今猶健公餘定省時饑寒隨有問案牘幸無私恐負民非孝因知道是師登山頻著屐吾欲信吾斯右三乾坤為父母胞與忍屯膏未滿一人望即分五內勞訂頑開大覺克己借鈞陶俯仰天無際寧稱華嶽高右四太華初盟蒲阪張輝太華初盟在戊申春暮馮少墟先生偕諸同志聚講於此因盟焉華陰士之知講學實自此始至己酉冬崔公明府改青柯坪之署為書院不佞得與其中俚言志喜太華開靈祕名賢訂約新道明涇與渭人契晉連秦覽勝延風月侵燈問智仁半生疑未破片語悟歸真右一真象原無二迷來却有因兾空眼底幻印染世間塵形在神斯在名淪器亦淪域中圖五嶽千古講難真右二插漢三峰峻登高不畏身如何逢坦易遽爾漫逡巡一簣莫由己半肩亦讓人冉求力自足離我乃尋真右三不動山為體磨青萬古春氣蒸新靉靆雨霽舊嶙峋今古無窮態乾坤不了身青柯擬白鹿盟結此山真右四遊太華㑹講灝靈樓長安劉養性馮仲好偕同志搢紳及諸俊秀士舉㑹於華下灝靈樓古未有也不佞竊幸執鞭而時蒲張去浮先生主華陰師席先生雅任斯道亦帥羣弟子來㑹蓋數日不佞惟三峰朗月迷途都照比成小詠諗諸君子㑹仲好書先生卷因續貂左方特削芙蓉柱太虛天留勝地故仙居一時冠劒文非喪千載荆榛道合除野性從來同木石靜觀何處不鳶魚雲開忽見三峰出徙倚闌干月上初宿莎蘿坪雨霽時郡邑諸生於青柯坪候仲好講學當面三峰入望真鬱然蒼翠正嶙峋山靈似識吾儕意為洗塵埃萬古新登太虛閣望絶頂結構馮虛色色幽三峰圗畫一亭收藤蘿屈曲穿巖上泉澗清泠繞地流石鼎茶烟浮細細松林鳥語弄悠悠蓮花咫尺如相面可許攜笻到上頭青柯坪聽華州李生季成彈琴作漁樵歌山頭雲净山雨晴松風颼颼飛泉鳴何處遞鐘發幽響一尊邀我李長庚風韻泉流兩不惡况有七絃太古之希聲初聞如在烟水間欵乃緑簔明月灣再聽忽轉翠微半丁丁萬丈之巉巖劉郎馮几聽罷大拍手自昔塵想亦何有華山遊人知多少誰者探竒得此否吁嗟乎函關紫氣虛也無高尋白帝欲何如孔門樂事須吾徒春風到處皆舞雩書孟直詩後華嶽之㑹足稱一時之盛余愧不足為諸君子役所幸有孟直諸什則今日之遊可托不朽矣昔朱元晦與陸子靜遊白鹿洞泛舟樂曰自有宇宙以來已有此溪山還有此佳客否余於今日亦云余兒康年侍行得此詩付梓以傳余為跋其後馮從吾仲好甫書遊華麓紀事西安周傳誦余未遊畢郢前同年馮仲好侍御約以暮春遊華嶽及歸自畢原則仲好病謝客將謂此行或不果越數日勿藥卜初十日丁酉啓行先是同志聞之無不勃勃有扶笻之興屇期與偕者劉孟直二守楊工載進士仲好與余四人耳三人各肩小輿孟直獨䇿欵段駕巾車相期遲之滻滸余晨興俶裝攜童僕裹糧出長樂門有士友數人且榼酒郊關外壯其行酒數巡别去至滻滸則孟直工載已先至矣久之仲好至長君康年隨侍遂聨輿東涉滻灞宿斜口夕陽在山緑禾被畝相與散步村中已明月掛山頭晴空一色坐談旅舍茅簷下真與野老爭席矣漏下一鼓餘始寢戊戌辰發行十里至臨潼仲好具飯於城隍廟道士所飯畢行四十里至泠口一作零水名仲好具午飯又行四十里至渭南宿西郭旅邸中月明如昨乃闤闠紛沓不比村落閒寂孟直工載寓稍逺仲好雖同寓以體癯新愈先就枕余挑燈獨坐忽憶邑人秦汝睦憲副在此安得促膝一談作懷汝睦一絶己亥行二十里至赤水邀諸君子同飯道遇一病狂者獰猙號呼街衢中行人辟易見吾輩過長跪道左叩頭致敬良久方起因嘆此便是幾希尚存世之病心者獨此人乎哉飯已行三十里至華州方議從城外直抵敷水鎮留一僕往邀宜化汝刺史暨弟叔尚文學皆夙期同遊者乃化汝知吾輩且至使人要於路遂入城過冦萊公祠拜謁瞻佇者久之仲好戲謂余此非與子先後守天雄者耶則余汗下幾無能自存嗟嗟庸碌浮沈望桑梓前修愧死矣同詣化汝具飯留宿舍南園亭主人既别去仲好就寢余與孟直工載三人劇談亭中花香月影竹韻松風令人忘倦幾欲呼酒對主人念深夜中止遂成宿宜氏昆季園亭一律庚子留不得發早飯後邀遊城南姬氏園園中竹木陰森牡丹數百株爛焉奪目化汝以酒至列坐花間修爵無算偶有舉孔子志學從心語者仲好剖析精義亹亹不倦余謂聖人一生學問只在矩上用力當其志學即是欲此矩立不惑知命耳順即是不踰此矩但從心所欲而不踰直到七十之年吾輩為學先須認取矩在庶可終身依據從心地位俟之可也聞者或以為然已入城叔尚具饌邀坐適族子纘裳歸自襄垣縣署聞余駐此來見遂得隅坐飲罷别去仍宿園亭月下坐談移時各寢辛丑早飯化汝所有同年馮元皥刺史暨李生華實化汝弟謙姪元賓相繼投刺來訪往來畢日已近午因拉化汝叔尚同行下晝至敷水鎮化汝仍具飯飯畢朝邑王惟大二守走使來迎謂原期雲臺觀四方香火輻輳湫隘囂塵約至華嶽廟㑹集薄暮抵廟惟大已治具作東道主人矣初議次早即可登嶽或謂明日既望四方登嶽者甚衆喧雜難往仲好議少留㑹友人講學於此遂宿焉此出野服微行不欲溷有司乃華陰令嘉定朱君官聞之夜遣吏致館穀次日壬寅執刺來顧既别遣役具遊嶽夫馬辭不受晚復具席於灝靈樓上誼惓惓厚也然非余初心矣是日來訪者又有學諭蒲坂張君輝司訓延川段君懷誠孝亷楊君應震學諭理學名士午後㑹講於嶽廟官署中邑諸生與者數十人私謂今日華麓何殊白鹿鵝湖甚盛事也講畢赴朱令筵令以雩禱托宜化汝代主席晚王惟大又治具寓邸坐次講學談藝甚適成宿嶽廟四絶時余肘後攜華嶽志一卷輿中披數過是夜就寢憶十二年前侍先大夫遊此不覺泣下成重遊華山一律然登臨之興未巳也明日癸卯㑹講友益衆得家報有伯母病甚劇時年踰八十餘余恐有他辭欲先歸諸君子固留甲辰復㑹講於灝靈樓上觀三峰出沒雲間竒甚談笑盡歡乙巳諸君登嶽余轅遂西王惟大亦以事歸朝邑瀕行晤朝邑趙進士天宿邂逅别去楊孝亷復具飯飯余兩人不偕登嶽者是夜仍宿華州宜刺史園欹枕瞿然猶作華嶽之夢遂成懷同遊諸君子及再過宜大夫園亭兩律丙午宿泠口丁未抵家則伯母氏伏枕俟余見余至甚喜越壬子仲好諸君子始歸自青柯坪途中阻雨故耳此遊也相謀甚久同謀者甚衆而後克行行者僅四人而余又不克終蓋遊之難也豈塵襟凡骨山靈拒之不假數日之緣耶然勝友良辰聯牀握手義重聚樂虛往實歸前後浹旬日亦無負此遊矣乃私次第其事以志友人見之誚曰自昔為嶽遊者多矣子中道而止鮮克有終足未躡華嶽之半目不窮峻極之形而紀嶽遊不亦恧乎余曰唯唯否否吾子獨不聞歐陽子之言乎曰醉翁之意不在酒在乎山水之間而已雖然猶知有山水也今日之遊大集羣英精談名理作華嶽一段嘉話又有不在乎山水者奚必於登奚必於不登若必歷三峰之勝摩巨靈掌洗玉女盆挹金天露採玉井十丈蓮自昔為嶽遊者多矣紀不啻詳余即登亦可無紀重遊華山有感併引萬厯戊申春服既成同劉孟直郡守楊工載進士馮仲好侍御遊華嶽過華下邀州人宜化汝刺史宜叔尚文學同行至則朝邑王惟大郡守蒲坂張去浮學諭延川段修甫司訓偕羣英咸集講學論道樂而忘倦今日華麓直可追鵝湖白鹿洞故事寧獨躋攀稱勝覽哉山靈有知自當生色因憶往歲丙申侍先大夫遊此忽一紀矣嗟嗟安得復著斑衣扶杖履重覯此佳㑹也觸境興思風木增感援筆記事情見乎辭幾年不出華陰道此日重來華嶽遊為問真源尋白帝非關函谷度青牛五千仭聳星初聚百二天開氣欲浮惟有當時觴咏處西風牢落不堪愁宿華嶽廟同馮侍御諸君子㑹講時方旱禱萍蹤南北愧當年負却名山幾度緣才得靈宫一夜宿恍如身抱白雲眠其一蓬忩睡起鬢䰐鬖向曉看山山更藍何計盡封肥􅖆穴祈靈直叩黑龍潭其二金天靈净蓮花發白帝宫深古木疏怪底坐來添爽氣山流蒼翠到庭除其三良朋聚首誼千秋滿座高談四壁幽覽勝漫勞誇華嶽此行何異寶山遊其四遊嶽先歸道中懷宿青柯坪諸君子杖藜攀陟喜相從咫尺烟霞路幾重身染白雲歸滿袖山回紫氣擁三峰離當勝地情偏切味入村醪興轉濃遙想同遊陶謝手新詩何處勒高蹤跋周淑逺詩古今名公遊華嶽者代不乏人未有徴㑹講學如今日者亦人不乏詠未有永言孝思如淑逺氏者昔陸象山與朱晦翁講義利章於鹿洞聞者流涕今讀此詩而有不流涕者非夫也余頃與同遊諸君子講惓惓於孝弟二字其於千古聖學頗足自信蓋淑逺倡之矣年弟馮從吾仲好跋壬子春月馮仲好直指赴新闢太華書院講座余病未偕詩以送之長安劉養性新闢榛荒向白雲指迷不厭此重勤振衣千仭應無古倡道三峰始自君源濬玉泉回聖脉印提仙掌領人羣却羞蝴蝶追隨意未及關門一字聞青柯坪聽講西蜀胡如楠講堂初起集鴻儒幸有賢哉二大夫谷口清風山際月分明引我出迷途少墟集卷十
