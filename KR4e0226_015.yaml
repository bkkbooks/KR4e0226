body:
  text: 少墟集卷十五明馮從吾撰記關中書院記余不肖偕諸同志講學寶慶古剎有年矣歲己酉十月朔日右丞汪公憲長李公憲副陳公學憲段公聯鑣㑹講同志幾千餘人相與講心性之㫖甚具歡然日晡始别瀕别諸公謂余曰寺中之㑹第可暫借而難垂久逺當别有以圖之明日即以寺東小悉園檄咸長兩邑改為關中書院延余與周淑逺諸君子講學其中而汪公復為書院置公田延綏撫臺凃公聞而嘉之以俸餘增置焉講堂六楹諸公扁曰允執蓋取關中中字意也左右各為屋四楹皆南向若翼東西號房各六楹堂後假山一座三峯聳翠宛然一小華嶽也堂前方塘半畝豎亭于中砌石為橋偏西南不數十武掘井及泉引水注塘井覆以亭二門四楹大門二楹舊開於南緣鄰官署冠蓋紛遝深山野人不便厠跡因改于西巷境益岑寂且不失吾顔氏陋巷家法也西巷地基乃用價易民居大門外復構小屋數楹仍居數家以供灑掃之役前後稍為修葺未及數月煥然成一大觀矣松風明月鳥語花香令人有春風舞雩之意而劉郡丞孟直復為八景詩以壯之一時同志川至雲集吾道庶幾興起而余愧不足以當之也一日講畢諸生請曰自昔書院創建皆有記而當道諸公盛舉又不可泯焉不彰也先生得無意乎余唯唯因進諸生諗之曰我關中形勝甲于天下羲文武周後先崛起弗可尚矣自橫渠後理學名儒代不乏人蓋文獻之邦而學問之藪也吾輩生于其後何可無髙山景行之思且書院名關中而扁其堂為允執蓋借關中中字闡允執厥中之祕耳夫中之一字自堯始發之所謂堯得統于天者此也然中與不中雖見于事而實根于心舜又恐人求中于事而不知求中于心故曰人心惟危道心惟微惟精惟一允執厥中其㫖微矣然危微精一之辨莫詳于子思中庸一書蓋中之為德庸德也中之為言庸言也喜怒哀樂中節子臣弟友盡道是也于此一一中節一一盡道直至中和致而位育臻然後可以合無聲無臭之妙然後可以語盡性至命之學嗚呼豈易言哉夫喜怒哀樂中節固也若必待已發而後求中節子臣弟友盡道固也若必待既感而後求盡道則晚矣故必當一念方動之時而慎之而後能中節盡道也此慎獨之說也故曰其要只在謹獨雖然又必待念起而後慎之則亦晚矣故必當一念未起之時而慎之而後能中節盡道也此戒慎不覩恐懼不聞之說也故曰靜中看喜怒哀樂未發氣象一念未起則涵飬此心一念方動則㸃檢此心于此惟精于此惟一庶乎有不發發皆中節有不感感皆盡道矣嗚呼豈易言哉然人多不肯用戒慎之功者何蓋亦未知本體責任不容諉耳且天命之謂性非命之甘食悅色如告子所稱正命之使我位天地命之使我育萬物也我能位育則性盡而能復天之命我不能位育則性失而無以復天之命可不畏哉命如君命父命師命然君命父命師命皆著于聲臭而惟天命不著于聲臭故曰上天之載無聲無臭天之命我者如此其重而又無聲臭之可即念及于此喜怒哀樂雖欲不中節不敢也子臣弟友雖欲不盡道不敢也獨雖欲不慎不覩不聞雖欲不戒慎恐懼不敢也孔子曰畏天命又曰小人不知天命而不畏也彼不畏者原不知耳若知之豈敢不畏哉知本體之難諉自知功夫之當盡而或又謂本體原自現成用功即落臆說是謂天地本位萬物本育而我不必位育之也棄天䙝天甚矣其如天命何嗚呼位天地育萬物聖人此天命凡人亦此天命上而天子此天命下而庶人亦此天命無聖凡貴賤無弗同者今吾輩自天生以來俱各命之以位育之性俱不容不講危微精一之學即汲汲皇皇異日猶未知能復天之命否也而尚敢暇逸為哉上帝臨汝無二爾心願共勉之諸生􅋏然曰今而後始解允執之義矣敢不努力以毋負上天所以命我之意于是次其語書之以為記時大參閔公熊公憲副劉公張公常公郡守尹公二守朱公鄭公沈公節推王公咸寧署篆别駕孫公長安令楊公皆興起正學襄厥成事例得並書凃公諱宗濬南昌人癸未進士汪公諱可受黃梅人庚辰進士李公諱天麟武定人庚辰進士陳公諱寧歷城人壬辰進士段公諱猷顯固始人壬辰進士閔公諱洪學烏程人戊戌進士熊公諱應占隆昌人壬辰進士劉公諱一相長山人丁丑進士張公諱問明夀光人辛丑進士常公諱守信磁州人己丑進士尹公諱伸宜賔人戊戌進士朱公諱星耀貴溪人癸未進士鄭公諱敦原長治人壬午鄉進士沈公諱震龍臨安人乙酉鄉進士王公諱大智玉田人甲辰進士孫公諱謀蒲州人選貢士楊公諱鶴武陵人甲辰進士其餘捐金助修諸公姓氏不能備書俱載碑隂復性堂記金溪吳踈山先生理學醇儒也家踈山之旁自少至老講學于斯先生沒若干年而郡大夫即其地肖像立祠祀之甚盛舉也後有屋一區顔曰復性堂曩時諸名公嘗就此堂而講業焉頃先生仲嗣中丞公馳書山中問記于余余與公為同年同志私淑先生有日誼何容辭余惟聖賢之學心性之學也人之一身止有此心性在何處不知心所具之生理為性非心外别有性可對言也性不可見而見之于情如孩提知愛稍長知敬情也而必有所以能知愛能知敬者性也然其所以能知愛能知敬者又孰為之天也故曰天命之謂性天命之以能愛之性而後能知愛天命之以能敬之性而後能知敬惟其性善故其情善亦惟其情善故知其性之善耳不然性不可見又安所據而曰善邪性情夲一物特因寂感而異其名而先儒有情其性性其情之說是以性為善而以情為不善也亦不思甚矣且是性也一物不容而實萬物皆備上物字指欲下物字指理今有人焉或指之曰若能孝若能弟若能忠信即再三稱之亦欣然皆受而不嫌其多不然而或指之曰若不孝若不弟若不忠信即一言及之且艴然不受而何况于再夫其欣然皆受也是發于性之所本有也可見萬物原來皆備心體原來有善其艴然不受也是發于性之所本無也可見一物原來不容心體原來無惡而或謂無善無惡為心之體何哉以知善知惡為良知而以無善無惡為心體是又以情為善而以性為無善也尤不思甚矣人性皆善而習始有不善孔子標講學二字正使人變其習而復其性也其功豈不賢于堯舜逺哉先生之言曰吾人講學却要識得大頭腦總只是盡性性者天地萬物之同源又曰性一而行百即孩提之知愛性也而行具矣暗于性而語行者妄也外其行而語性者虛也嗚呼先生可謂淵源堯舜而得孔孟之宗矣先生生平行履如為令以循良稱為御史以直介稱不具論論其大者當分宜柄國先生誼托枌榆而又資深望重旦夕當遷卿二而先生獨先幾引去若鴻冥鳳舉不可罻羅人咸笑先生迂拙而不知當時巧捷之士如某某輩雖幸取一時富貴而卒之身名俱敗悔之無及然後知先生之見逺而先生之不可及也昔孟子推尊孔子而斷之曰可以仕則仕可以止則止可以久則久可以速則速余故于先生出處之大者斷先生之學真能復性云近世士大夫多以講學為諱講學者又多以心性為諱又何怪其躬行之不逮而仕止久速之不當可也吁亦足憐矣中丞公家食時嘗約宗黨同志月三為㑹講學于此堂以紹述先生之訓今節鉞三晉而猶惓惓不忘此堂學可知也余懵不知性聊書此以志私淑若闡揚先生微言奧㫖則自有諸名公鴻筆在關中書院科第題名記萬厯己酉冬當路諸公為余創關中書院講學其中越三年壬子從遊諸生得雋者伐石題名於書院乞余為記且曰先生之設科有日矣初講於家後講於寶慶寺自辛卯甲午後科第濟濟稱盛矣題名當從辛卯始惟先生命之余曰然即此推讓一念是諸君善與人同意也敢不成諸君之美遂不辭而漫為之記往代無論近世題名者多矣聲聞過情君子耻之而余又為之助其波可乎是不然七八月之間雨集溝澮皆盈涸可立待此無夲之名不可有也故君子恥之原泉混混不舍晝夜盈科而後進放乎四海此有本之名不可無也故君子取之而說者槩以名為不必有誤矣昔顔淵閔子騫冉伯牛仲弓以德行名宰我子貢以言語名冉有季路以政事名子游子夏以文學名凡此皆有本之名也而其本則皆得之於學蓋道者源也而學則所以濬其源道者根也而學則所以培其根故從講學入則吾道一以貫之不惟德行是即言語政事文學亦是所以諸賢各得成其名不然而不從講學入則道本一而裂而為四德行不過一自好之士政事不過一功名之士言語文學不過一口耳辭章之士不惟言語政事文學非即德行亦非矣又烏得與聖門諸賢論名哉是則皆是非則皆非於此豪髮于彼尋丈故曰學之不講是吾憂也今諸君講學於此固欲成為聖為賢之名德行必欲為顔閔言語必欲為豫賜政事文學必欲為由求遊夏非徒僅僅成科第之名也者如第曰成科第之名則鴈塔豐碑不啻足矣又奚取于斯邪雖然書院之講固不専為科第而即科第亦足見書院講學之益惟諸君不以一時科第自多而以聖賢有本之學自勉使郿塢子厚藍田四吕髙陵仲木再見于今日則業與名世爭流而名與天壤俱敝寧直諸君不負科名即關中書院亦當與白鹿嶽麓並名不朽矣余不與有榮施也哉是為記書與友人論文書館課今天下蓋稱文盛矣學士大夫搦管抽思摛葩掞藻人蛇珠而家荆玉豈不彬彬質有其文哉顧縱橫滋而朴茂散虛無熾而大雅微其流弊有出文詞外者關係人心世教匪細故也起弊維風是在足下僕敢略陳其愚而足下察焉夫六經尚矣下此談文者不曰國䇿則曰秦漢不曰佛老則曰莊列建安而下率置貶辭矣然其間如昌黎廬陵輩猶或寓目焉曰此詞人之雄也如濓洛關閩見謂迂逺而闊于事情曰此宋頭巾語耳不翅瓦礫置之矣夫宋之文載于性理一書其雕章琢句焜耀耳目不逮國䇿諸書僕不敢强為左袒但其析理闡義羽翼聖經亡論韓歐即秦漢有之乎亡論秦漢即左國有之乎子輿氏以來此為正印奈何以瓦礫置之也僕嘗讀國䇿秦漢諸書其詞㫖髙古閎深不具論論其中所載事多縱橫捭闔之術其機械變詐至不可方物佛老莊列諸書叛經非聖倡為虛無寂滅之談其不雅馴處薦紳先生難言之今世學者問字國䇿貰㫖曇𣆀其意甚盛但恐數年莊嶽不止齊其語耳蓋常人溺于所聞曲士局于所見讀縱橫捭闔之書不覺流而為機械變詐之人讀虛無寂滅之書不覺流而為放縱恣肆之人其始也止艷羡其文詞其既也耳濡目染不知不覺併以移易其心術而瑕纇其人品可不眘哉雖然救縱橫虛無之弊者在于明理上而六經孔孟下而濓洛關閩夫非理學之淵藪而修詞之標的與試取此諸書讀之猶令人鄙吝消融心胸開朗勃然有正人君子之思即不然而亦不至于為縱橫為虛無也故曰文章以理為主願足下之熟計之也或又謂文章理學原不相能以理學為文章不迂則腐僕斷以為不然夫談理者莫如易而六經中稱最竒者亦莫如易談理者莫如孟子而戰國峕稱最竒者亦莫如孟子但今人未之深思耳然今人為文其主意與古人異古人為文主意在發理而翼聖今人為文主意在炫辭而博名主意在理故讀理學諸書易入而易信主意在辭故不得不剽取國䇿莊列以塗人耳目詎知浸淫之久其弊有出于文詞外哉然則為文者宜何如僕以為六經孔孟其正鵠也濓洛關閩其嚆矢也注精凝神于此務必至于解悟而後已則此心確有主意而後間取國䇿秦漢及諸子百家之書讀之以為射疏及逺之一助使不至詭遇以獲禽庶幾乎返縱橫為朴茂挽虛無為大雅乃稱藝苑良工哉此僕所有志而未逮亟欲請正于足下者惟足下財察答同志問族譜書承問族譜僕至寡劣何以復命雖然竊奉教于君子矣敢無說而處于此夫族之有譜猶國之有史尚矣第史之為道備載善惡用昭勸戒要之以義為主譜之為道揚善隱惡有勸無懲要之以恩為主不可一槩論也乃今之作譜者則不然縱筆訐發略無顧忌自以為不虛美不隱惡自負曰直人亦從而直之居然史遷復出矣不知其直正有不在此者惟是家出寒微不諱可也事行細小不忌可也有可稱則傳無可稱則闕可也微顯闡幽據事實録不至溢美可也即此便是直又何必縱筆訐發略無顧忌而後為直哉無論族譜即郡邑修志其載善惡昭勸戒此固毫髮不可諱者尚且于職官一類但寓褒貶于三十年之前于三十年之後者則闕之一則有自己曽相與之嫌恐是非涉于愛憎一則公論必久而後定故姑以俟之異日夫修志且然况修譜者可輕肆褒貶乎李獻吉謂子孫而不録其先人是悖亂之行也若録其先人而又訐其過其為悖亂孰甚焉古人不又云乎作法于凉其弊猶貪作法于貪弊將何極今之作譜者雖似過訐不過一時講究未明誤以訐為直耳猶屬無心倘後世子孫一有小嫌不能捐釋借此族譜泄彼忿心則是以古人敦仁廣孝之書為後人報復恩讎之具也乂誰為之作俑哉綱常風化關係不小奈何不慎之于始而猶沾沾以訐為直也嗚呼不虛美不隱惡此在作史則可若譜則但不虛美可耳禮諱尊親不隱可乎哉先是作者誇其門閥多失于虛美近日作者懲其虛美又失于揚惡虛美則以恩掩義固不可揚惡則以義傷恩尤不可此作譜之所以難也鄙見如斯惟足下教之幸甚奉許敬菴老師從吾不佞不能勉自䇿勵以答老師之知然繩趨尺步何莫非老師賜也猥托榆枋敢云自致顧影增慙溯源感德恭惟老師門下主盟吾道表笵人倫凡㝢內後進之士思挹台光而聆緒論者不翅如泰山北斗况從吾夙辱陶鑄被化尤深所不襏滌矜奮而甘自暴棄其若上負名教下負生平何徼幸以來日夕兢兢尤甚于諸生時時與同志諸君子講明此理反覆體驗務實得于身心而資暗學踈恆不免二三之擾奈何老師時惠教言閔其愚而匡直之幸甚今天子寤寐耆英尊崇理學行將起老師于東山為學士大夫典刑為斯世斯民造福是又中外士紳所共為引領者豈從吾一人祝願之私答李詢蕘同年承教巧拙二字深服特識樂只君子民之父母烏用巧為也昨許敬師貽書略云閒觀世故知功名富貴之無常絶不萌一毫驕侈之念弟又為之說曰閒觀世故知功名富貴之有數絶不萌一毫揀擇之心夫既無㨂擇矣即巧將安用之年丈古心質行卓爾不羣弟年來每與淑逺諸兄弟談身心之學惓惓念詢蕘不置詢蕘勉旃毋以拙之一字為迂也答饒映垣同年郡守古稱二千石其展布所學使元元受福視監司更切弟殊為年丈喜至尊諭謂此正學問明證日弟爽然自失矣學問原非𤣥虛臨政蒞民靡匪實際事上接下揔屬真修所貴透悟者透悟乎此耳敝差幅員廣闊拮据孔囏况弟以病軀當之其不勝明甚惟是兢兢一念不敢輕易放過此可以盟之幽獨而亦可以質之年丈者也惟年丈不惜針規震發䝉蔀幸甚答蕭慕渠老師從吾自罪歸來一切時事不敢聞惟與二三同志立㑹講學以求寡過于萬一承教出力擔當從吾雖非其人實不敢不勉也第聖賢道理原不落口耳而以口耳擔當之則支原不涉意氣而以意氣擔當之則激原不借興致而以興致擔當之則易作輟從吾清夜沉思惟恐墮此三者之病奈何惟老師終教之幸甚答强睿菴侍御承教隱居求志行義達道夫人之志不同有志事功者有志氣節者有志道德者要之道德可以兼事功氣節事功氣節不可以兼道德求志者惟求志此道德譬如樹培其根水濬其源異日遇事功則事功而非倚于事功遇氣節則氣節而非倚于氣節不患其華不茂而流不長也若不辨所求何志而第曰求志無論思不出位謂何竊恐古人亦不若是之憧憧擾擾矣昔子路志在强兵冉求志在足民公西華志在禮樂其志豈不甚偉不知由志强兵矣如或知爾而畀之足民之任求志足民矣如或知爾而畀之禮樂之任赤志禮樂矣如或知爾而又畀之强兵之任三子者其將何以應之得非所行者非其所志而所志者又非其所行者邪雖大賢作用臨時自有轉移而要之畢竟有所倚故夫子獨喟然于春風沂水之㸃者誠進三子之事功氣節于一無所倚之域也豈徒與其逍遙曠達而已哉夫志如三子而夫子猶進之况後世之志事功氣節者不求進于道德可乎不然喜談事功氣節而不信講學其不為功名客氣所纍者幾希鄙見如斯不知明公以為何如與友人吾儒之學以孔孟為宗二氏之學宜所不道門下才大學博言孔則孔言孟則孟言佛老則佛老任其揮霍無不如意此自門下緒餘非可以淺近窺測者第恐學者聼其言不得其意志淆兩可功分多岐勢且必進二氏而絀吾儒其所關係不小且今聖學不明異端蜂起非門下砥柱中流又孰與回狂瀾而障百川哉孟子曰能言距楊墨者聖人之徒也余亦曰能言距佛老者聖人之徒也昨因賤恙不能多談别來體驗此心覺過不去然不為門下一言此心亦覺過不去即此是良知也不知門下以為何如答逯確齊給事王使君人至辱翰教展讀周環宛如疇昔雁塔之㑹愈快可知弟茫不知學而比年靜中體驗益覺學問功夫不容易言大抵悟處欲髙欲透修處欲實欲確故言知不言禮名為虛見言禮不言知名為循跡一以貫之此吾儒之正脉而易大傳知崇禮卑之說也近世學者多馳騖于虛見而槩以規矩凖繩為循跡其弊使人猖狂自恣流于小人而無忌憚此關係于人心世道不細弟方妄為此懼而來諭獨揭此四字為言真可為近世學者對症之藥且年兄如此用功同志自當興起而猶然以旁無彊輔為歉得非造彌實而心彌虛邪景逸桂渚二兄誠吾道中不易得者第愧弟非其人耳聚首何日願各努力答涂鏡源中丞逺辱翰教深感提撕大學稱至善此性體也知止者知止于至善也知止則見不落空心不涉妄此所以定靜安慮得取之左右逢其原耳修身為本功夫正在此而世之學者多談𤣥說虛舉至善而一空之令人茫然莫知其所止蕩檢踰間無所忌憚何怪焉老公祖倡學榆塞獨揭孔曽之宗其有功于吾道甚大從吾多病暴棄自每旬㑹講外日惟閉關靜坐每靜極則此心湛然如皓月當空了無一物似乎少有所窺然終不敢自信不知知己何以震發之使不終于暴棄幸甚神木髙君能知皈依門下將來造詣必不可量聖學源流此刻大有關係初學之士縱有志向苦乏見聞得此可以探崑源而陟華巔矣使旋此謝臨楮皇悚又嵗序更新玩愒如舊方切愧悚乃辱手教儼若對談開我實多敢不佩服佳刻疏草字字忠讜言言經濟蓋從學問涵飬中流出者當與古名臣奏疏並傳什襲珍藏三復斂袵從吾不肖年來與同志講切雖茫無所得而此心稍覺有一二悟入處聖賢學問要在知性大學止至善此性體也性體至善乃天生來自然而然不假一毫人力故曰天命此至善之性體率之則為道盡之則為聖人率性是本體盡性是功夫率性衆人與聖人同盡性聖人與衆人異不可不辨也如見孺子入井而怵惕惻隱此率性也衆人與聖人同至于知擴而充之以至于保四海此盡性也聖人便與衆人異矣孩提知愛稍長知敬此率性也衆人與聖人同至于擴知能之良滿孝弟之量通乎神明溥乎四海此盡性也聖人便與衆人異矣不忍觳觫之牛不屑呼蹴之食此率性也衆人與聖人同至于推不忍之心以愛百姓推不屑之心以不受萬鍾此盡性也聖人便與衆人異矣率性無功夫盡性有功夫盡性者即盡其所率之性由功夫以合本體者也惻隱之心仁之端也惻隱乃率性之道而仁乃天命之性天命之性不可見而于惻隱見其端由其端以窺其體而本體之善可知故曰性善大學止至善正止乎此耳學問不止乎此則三品之說得以搖奪明德不淪于𤣥虛便落于口耳新民不涉于功利便流于刑名性學不明源頭一差無所不差此知止所以為大學第一義也一得之愚正欲面求指正而承諭欲弟入榆陽為諸生一闡發殊為至願第病體支離不敢出門徒抱耿耿奈何又承教易義佳刻讀之大撤䝉蔀夫易道難言久矣狥迹者既泥于象數而崇虛者又索于渺茫聖學幾為天下裂老公祖此刻由象㑹理得理忘象不離日用常行內直造先天未畫前此亦吾道當大明之一㑹也夫豈偶然承教戒慎不覩恐懼不聞此自體言千古聖學宗㫖老公祖一言道破矣聖賢論學雖有自用言者有自體言者而要之以體為主蓋得其體則其用自然得力但不言用則其體又不可見其或諄諄言用者蓋欲人由用以識體耳孟子謂惻隱為仁之端而以乍見明惻隱之皆有蓋舉乍見知惻隱為用為率性之道欲人由端識體知仁為體為天命之性也指㸃出萌蘖正欲人從此好覔根本既覔得根本則不惟萌蘖是即枝枝葉葉皆是矣故孟子前說惻隱之心仁之端也而後直說惻隱之心仁也蓋既由用以見其體又何用之非體此所以直說惻隱為仁而不必更言其端耳且此性體原不覩不聞然必不覩不聞之時乃見性體如見孺子入井見觳􅑌之牛此時固有怵惕惻隱之心矣然未見之前豈遂無是心乎未見之前之心不覩不聞正以體言正以天命之性言既見之後之心有覩有聞便以用言便以率性之道言矣故于不覩不聞之時然後識性體果不落于覩聞也若謂共覩共聞之時而不覩不聞者自在雖已發而根柢者固未發也又何必論時不知不覩不聞之時而共覩共聞者亦自在雖未發而活潑者固常發也又何為専以不覩不聞為性體乎未見入井而胸中已涵一孺子未見觳觫而胞內已具一全牛先天脉理旁皇周浹故曰至善至善者性體也在易謂之太極在曽子謂之至善在子思謂之未發之中知止則戒慎不覩恐懼不聞合下便見性體合下便得未發之中如是則身心意知天下國家一以貫之豈有不發而皆中節者哉此大學知止二字所以兼體用而言所以為妙也中懷縷縷不知是否又不得面相印正惟老公祖詳教之是望是懇又頃辱翰教大慰離索夫性學難言久矣如知愛知敬此良知也然必有所以能知愛知敬者此性體也至善之性體蓋自父母初生時天已命之豈待孩提稍長而後有知愛知敬此感而遂通境界然不惟愛敬未感之前而所以能知愛知敬者寂然不動雖知愛知敬之時而所以能知愛知敬者亦寂然不動也此所謂未發之中此所謂天命之性戒慎恐懼正戒慎恐懼乎此耳大學至善蓋直指性體言此曽氏之學所以獨得其宗也承教知止二字此聖人為後學開宗立教至精至要之言非實體諸身未見其妙㫖哉言乎從吾山中無事閉門功課亦只有此苐末繇一領面教恐不無南越北轅耳腆貺逺頒其何以當對使拜嘉䖍此布謝答楊原忠運長不佞跧伏深山聞門下聲稱藉甚竊神交之日久近余懋吾亟道門下惓惓不佞盛意不佞方圖修訊乃使使奉書貺儼然先之矣此其謙德虛懷即古人寧多讓焉且感且愧其何以當道學之傳肇自虞廷十六字而孔子括以學之一言此正先師喫緊為人處此其功真賢于堯舜逺甚故子思解之曰君子尊德性而道問學孟子解之曰學問之道無他求其放心而已矣可見聖門之學全在心性上用功非泛泛然向外馳求也世儒不知有心性者多炫聞見以為博其究也失之泛濫固不是至于知有心性者又黜聞見以為髙其究也失之空寂尤不是此聖學所以不光而世道人心所以不古若也故以心性為本體以學問為功夫元元本夲歸根復命此聖門一貫之學非深造自得不及此承教亹亹千百言遡聖學之淵源抉異端之流弊援古證今批郤導窽三復為之斂袵至于逢說云始也陶沙見金而終也瓦礫皆金始也遡流窮源而終也左右逢源可謂直透聖真獨得孔氏之宗矣其有功于道術不小眀儒四語切近精實敬當置之座右不佞幼不知學長而悔恨生平多病居諸浪擲不覺五十又一老矣幸門下不吝提撕共𢎞斯道魯陽之戈尚可揮也使旋肅此報謝馮楮神馳不盡又不佞三年以來雖屢奉翰誨終是神交不若形與昨辱左顧獲領面談生平饑渴一朝頓釋第卒卒别去未得多留為歉耳顧生回得接手札宛如再晤昨一時請教之言業已不省為何語而門下一一條縷誠為愧悚然藉此得堅自信則門下教我多矣疑思拙録徼惠辨言奬詡過情愧非三都何當𤣥晏銘刻銘刻不覩不聞原是至靜無感時莫見莫顯原是一念方動時豈可混而為一不覩不聞原就至靜之時論而道體豈落于覩聞即不覩不聞而道在也不然是道専屬于動而至靜之時無道矣莫見莫顯原就方動之時論而道體豈淪于隱微即莫見莫顯而道在也不然是道又専屬之靜而方動之時無道矣即此才見道夲不分動靜不可須㬰離于此倘一時不加戒懼功夫則是道不離我而我自離道矣可乎此所以君子戒慎恐懼而不敢須㬰離也言不覩不聞則無覩無不覩無聞無不聞無動無靜無寂無感無時不戒慎恐懼可知可見君子之心渾然全是一團虛明境界慎獨云者不過就中㸃出一㸃機括令人倍加警省耳維天之命於穆不已何分動靜而易謂復見天地之心正是就中㸃出一陽方動一㸃機括見天地之心未嘗已耳非謂天地之心盡之乎一陽也程子謂其要只在謹獨要字最妙而後儒謂聖學只在謹獨是天地之心只在一陽之來復矣豈六隂六陽獨非天地之心也哉不覩不聞莫見莫顯原就時言而道即在其中故曰無時不然彼丢過時而専以不覩不聞為道體則可覩可聞鳶飛魚躍獨非道體也耶是道偏于靜而遺乎動如前所云云矣又何以稱動靜無端顯微無間也哉道體原是圓滿不分動靜靜時乃道之根本方動時乃道之機括動時乃道之發用學者必靜時根本處得力方動機括處㸃檢動時發用處停當一切合道然後謂之不離然必在靜時根本處預先得力方動機括處再一㸃檢然後動時發用處才得停當故特舉不覩不聞與獨處言之此先天之學而後天自不待言非謂道體専屬之靜而功夫専在于寂動處感處可以任意縱有差錯無妨也此處稍偏則放縱恣肆者得以藉口喜怒哀樂之不節而曰我能冥合道體不必一一在事為上㸃檢此小人所以托之乎中庸而行無所忌憚也毫釐千里關係不小不佞有慨于中久矣承諭及敢藉手請正不知門下以為是否小刻二部奉覽使者不能久留佳序容刻成覔便専致先此附謝又恭喜長蘆之行不佞抱痾深山不克馳祖至今為歉日惟擊壤鼓腹歌緇衣甘棠之詩以寄遐思耳疑思佳辨梓成有日苦乏鴻羽茲因許生之便謹具二部呈覽許生下帷發憤滿望髙掇而抱璞不售人皆扼腕渠略不介意此其所得又在世俗功名之外矣不佞益器重之今秋敝鄉應試朋友相從者甚衆俱勃然有志於理學殊為吾道得人喜又殊為敝鄉士風喜凡此皆老公祖曩日倡明之效不佞敢貪天功以為己力孟子曰人皆可以為堯舜夫人既皆可以為堯舜則世豈不皆可以為唐虞今世道不及唐虞只是人不皆為堯舜耳若是吾輩大家著實講明以斯道覺斯民則人皆為堯舜則世即可為唐虞矣欲明明德於天下此等責任願欲不論在朝在山人人皆可做得白沙先生謂朝市山林皆有事者此也從吾雖不敏願與門下分任之後晤無期臨書悵惘又莊誦來教益見門下别來學問之密造詣之深敬服敬服近世學術多岐議論不一起于本體功夫辨之不甚清楚如論本體則天命之性率性之道衆人與聖人同論功夫則至誠盡性其次致曲聖賢與衆人異論本體則人性皆善不借聞見不假思議不費纎毫功力當下便是此天命率性自然而然者也論功夫則不惟其次致曲廢聞見思議功力不得即至誠盡性亦廢聞見思議功力不能此戒慎恐懼不得不然者也如以不借聞見不假思議不費纎毫功力為聖人事不知見孺子入井孩提知愛稍長知敬亦借聞見假思議費功力乎可見論本體即無思無為何思何慮非𤣥語也衆人之所以與聖人同者此也若論功夫則惟精惟一好問好察博文約禮忘食忘憂即聖人且不能廢矧學者哉此非聖人之好勞而故為是不廢也謂廢此則無以盡己之性盡人物之性贊化育而參天地也謂非此則非所以致曲無以收形著動變之妙而造至誠之化也論本體雖下愚鄙夫亦所同有而况于聖人論功夫雖上知聖人亦不能廢而况于下愚若不分析本體功夫明白而混然講說曰聖學不借聞見不假思議不費纎毫功力雖講的未嘗不是却誤人不淺矣况本體又有寂感功夫又有安勉又有不容混淆者必講䆒得清楚明白從此體驗愈體驗愈渾融愈渾融愈體驗造到無寂無感無安無勉地位便是堯舜之執中孔門之一貫才與自然而然不費纎毫功力之本體合此盡性至命之學聖聖相傳之正脉也若論功夫而不合本體則泛然用功必失之支離纒繞論本體而不用功夫則懸空談體必失之捷徑猖狂其于聖學終隔燕越矣鄙見如斯不知髙明以為何如向承捐建書院厚分同志方謀置閒㑹藩臬諸公聮鑣㑹講别時欲另圖一講所與老公祖所見略同即于寺東閒署創為關中書院規模閎闊景趣幽雅吾道似益有興起之機苐愧不佞不足以當諸公盛舉耳向厚分業充修理不朽之誼豈獨不佞一人之感門下延州政蹟卓犖不凡讀去思碑字字真切然又有書不盡者甘棠之詠語豈虛哉辨學録中直把人心作道心一句改為氣質作義理故再以二冊往向所奉者亦望更之何如又吾儒之學以至善為本體以知止為功夫而下文云致知在格物可見必格物而後能知止也格物乃知止以前功夫故曰物格而後知至知至者知止也丢過格物而别求知止之方此異端懸空頓悟之學非吾儒之㫖也靜坐原是吾儒飬心要訣故程子每見人靜坐便嘆其善學若必欲靜坐數十日徹夜不寐而後心目中有真見此異端坐禪放光之說非吾儒之㫖也且人之精神有限嚮晦入宴息自是當然只不如宰豫晝寢可耳若無故十數日徹夜不寐即强壯人亦生病矣且無論聖學恐亦非飬生之道也况孟子夜氣之說全重一息字若數十日徹夜不寐是數十日無夜息矣其何以飬平旦之氣而存仁義之良耶吾儒之所謂太極蓋指生生之實理而言故曰生生之謂易維天之命於穆不已故六隂既剝一陽即復可見天地生生之心未嘗一日少已故曰復其見天地之心此吾儒之正論也若曰天地原是一團隂氣全藉日之一㸃真陽才能生物如冬天去日逺便寒夏天去日近便暑可見至於月與星俱藉日之光以為光如人之一身全是一團血肉隂氣只是有此一㸃真陽之氣才能不死故仙家錬氣必錬至純陽而後可以長生此段議論是仙家飬生之說與吾儒之㫖全不相干豈可以此為吾人之性以此為至善以此為未發之中哉吾儒所謂性指生生之實理而言非指此一㸃陽氣而言也此儒學𤣥學之辨差毫釐而謬千里者鄙見如斯未知是否便中幸不吝教尤懇又五月間逺承翰示率爾裁復殊愧不悉近世學者病支離者什一病猖狂者什九皆起於為無善無惡之說所誤良可浩嘆頃得顧涇陽先生小心齊劄記讀之如門下所提數欵皆大有關係至於辨無善無惡之說尤為痛快的確不佞向從先生遊别來近三十年所見不約而同可謂竒甚門下謂千聖相傳之道脉不至顛墜顧先生真其人若不佞何敢當哉顧許兩生一向相聞否今在何處乞示之以慰遐念寄書者為真定撫院承差因便附此其人無他瀆也又榖日雪晴掩關嗒坐忽墮雲翰破我寂寥喜可知也聖賢學問總在此心彼不知求心者無論即知求心而索之虛無寂滅之域是異端之所謂心非吾儒之所謂心也其弊尤甚於不求故年來不得已以綱常倫理要盡道天地萬物要一體仕止久速要當可喜怒哀樂要中節辭受取與要不苟視聽言動要合禮存此謂之道心悖此謂之人心惟精精此者也惟一一此者也此之謂允執厥中此之謂盡性至命之實學數語大書于書院允執堂屏欲與同志同勉之而來教謂吾輩誠能終日體此數語時時㸃檢時時收攝如蘧伯玉之寡過未能如曽子之戰戰兢兢子思之戒慎恐懼孟子之求放心勿忘勿助便是下學上逹功夫本體合而為一而自無支離猖狂之失矣㫖哉斯言若以一得之語為不甚謬妄者千載聖學何幸當吾世而如日中天豈不為吾道一快哉第東西間隔不克聮床劇談為悵快耳聞昨夏台體有脾泄微恙今已大愈喜甚喜甚不佞亦有此疾每入秋即發近年夏間禁忌瓜果至秋遂不發矣口之於味一句不惟飬德亦飬身之要訣也答喬裕吾同年昨嵗郭子至得手教莊誦再三如侍臯比辱惠詩扇詞翰兩絶詩教中異端此日紛無忌先聖從來慎獨知只此二語崇正闢邪開關啓鑰聖學無餘藴矣别來精詣至此伊洛淵源當在年丈敬服敬服弟生平善病不耐勞役雖深居簡出而書院㑹講必不敢輟每㑹林下諸老有扶杖赴㑹者有攜子孫聽講者其他同志咸集彈琴歌詩人人踴躍第愧弟非其質耳不知年丈何以教我使無貽名教辱詩扇二柄小刻六種請政萬惟不吝郢削尤仞至愛與楊晉菴都諌昔橫渠講易聽從者已衆一夕領二程言而即勇撤臯比一變至道於此足見同志講劘之功最為喫緊從吾懵不知學不敢望橫渠萬一而仁丈則今之二程也顧東西間隔不得時時領教奈何孟叔龍集一部奉覽憶吾三人鼎足談學曽幾何時頓有離合存亡之感叔龍乎叔龍乎九原不可作矣後死者慨韶華之易駛念學問之難窮願共努力俾千古斯文之統不至當吾世而落寞即東西間隔不减芝蘭同室也何如何如答朱平涵同年别年兄草有三年矣頃周逹菴年兄使至得手教大慰饑渴方今理學大明真儒輩出而年兄躬行實踐逺宗鄒魯近接伊洛海內共仰為山斗弟即逺在西僻必不敢暴棄以負夙昔承教謂今人只是自足自誇此誠近日學者頂門之針先師論學一則曰未能再則曰未能一則曰何有再則曰何有此豈過為貶損蓋道理無窮學問無盡惟聖人見得真識得破所以有此言堯之兢兢舜之業業文之望道未見皆是物也滿街皆是聖人其言甚是警策第此言是論本體非論功夫是論大家非論自己若不下功夫而自家便認做聖人則病狂甚矣年兄下一轉注謂天下決有聖人自已決不是聖人又何等警策蓋自以為未能乃其所以為真能自以為何有乃其所以為真有也先師家法原是如此彼自足自誇者原是不知何足怪焉弟素多病丙申歸來賤體頗適因與山林舊遊立㑹講學于寶慶寺不意自戊戌一病閉關九年至丙午冬始復舉寶慶之㑹而已酉冬藩臬諸公為寺中不便特為弟闢一書院雖講有専所同志益為興起第愧弟不足以當之耳許師捐館深為吾道悲悼聞師已得諡而許長兄又得䕃當路又為師建祠微年兄之力不至此同門當共感之寧獨弟一人也年兄有三子二女麟角鳳毛方興未艾聞之喜甚弟有二子二孫弟素無婢妾一切家事俱老妻與長兒料理弟庶得一意講學此徼有天幸者也負郭田百畝俱先世所遺可笑做官幾年毫無增益惟儉淡一著稍稍度日大抵貧者士之常原不足患第患學不到孔顔樂處耳因有二詩録在别紙博笑承問深感敢併及之答汪明卿學博天地間惟有此道人生天地間惟有此學地無邉腹時無古今人無窮達官無文武無不可學無不可為賢為聖故曰人性皆善人皆可以為堯舜夫以皆可為堯舜之人而與之論道談學或有疑而不信者非其人甘于自棄亦習俗移人雖賢者不免耳若有人焉提撕警覺呼寐者而使之寤雖至顓䝉未有不醒然悟蘧然覺者何也彼其性原皆善故也不佞深信孟子之言往嵗倡學寶慶而朋友中初則駭既則疑終則駭者釋疑者信而且悔其知學之晚今又移講關中書院人心益為踴躍同志益為興起駸駸乎斯道有中天之漸雖不佞愧不敢當而人性之善亦略可覩已人人始信孟子之言果不我欺而不佞之信孟子果非迂也環州邉邑也志稱民淳士慤夫士必慤而後智能民淳而後可以興教化今幸借門下坐鱣鳴鐸以理學為諸生倡來書云環人士近知向學任生秉衡尤大有長進聞之喜而不寐時雨之化作人故自如此此非獨環士之幸實百二文運之幸也佳刻言言名理至如堯舜至今在孔顔尚可尋又如人心豈無過夜氣滌吾思夢中一㸃覺觸處皆良知尤得聖學真脉而末云醉後狂言亂醒時愧悟存于人情日用間提醒人心尤為痛快兩牛生能付梓人其志向可知而來書謂能傳不佞之道于邉鄙夫不佞何敢當是門下能傳堯舜孔顔之道于邉鄙也雖然亦非堯舜孔顔之道乃天下萬世古今聖愚所共由之道也以天下萬世古今聖愚所共由之道即傳之天下萬世古今聖愚所同具之人于此無所損于彼有所益于彼無所損于此有所益在聖人不識不知順帝之則在百姓日遷善而不知為之者將天下萬世古今聖愚鎔成一片昔人謂太和在成周宇宙間不佞謂太和今在大明宇宙間矣此吾道所以為大而聖學所以不可不講也或謂學不必講者真佳什中所謂醉後狂言不惟不當與之較且當憐之恤之求解酲之方而療之矣使酲解而醒也寧不自悔其失言哉不佞嘗謂功名富貴乃醉人之毒酒讀書講學乃解酲之良方不知門下以為何如今夏書院池蓮綻蕊庭竹交隂即非㑹期同志亦時相過從講間未嘗一日不明卿在口屈指相晤之期當在明嵗明卿偕計時耳使旋草草布悃便中時惠德音尤感答李翼軒老師方今理學大明真儒輩出誠可為世道喜第髙明之士多講佛氏無善無惡之說無惡既占地步而無善又開便門竊又為世道憂從吾生平善病不知學問昨辨學拙録聊以敷衍師傳私用警醒實無所得承示辨言抉西極之隱病剖東魯之微言如靈曜當天幽隱畢照彼佛氏無善無惡之說不待辨而自知其非矣且古今闢佛者固多如老師此序絶未曽有蓋天地間不可無此一篇大文字吾道中不可無此一篇大議論何幸借鄙言發之此世道之幸非徒從吾一人之私感也後學小子不知鄉里先正何况尚友千古關學編姑以紀述先正學術之槩愧筆力不足以發之徼惠𤣥晏諸先正沒且不朽承諭康僖公學問實其父端毅公成之石渠意見有禆經學康僖公傳中業已補入矣近又于胡可泉秦州記中查出周小泉一弟子王君名爵者亦補入周傳內可見深山窮谷之中故不乏真修實踐之士第患無人物色耳聖學以求友為要兩兄入太學友天下善士而老師庭訓又日督之不惟聮翩兩宋科名即程氏兄弟之學亦始基于此矣吾道幸甚因便肅此布謝極目山斗心神飛越不盡答江劬見比部敝同年中理學甚盛至于挺然粹然如思岡兄者尤不多得雖千里間隔末由面晤正欲借赫蹄以商正所學而昨見邸報知作古人為之欷歔纍日頃承翰示知家既四壁而一子又稚未婚何天之報施善人至此耶益令人傷䀌不已平日不知有著述否如此髙賢咳唾必有關係門下便中貽書于家令其收輯遺文仍借大筆辨而傳之貴精不貴多但得一二册行世則此兄為不死矣何如何如答鄒南臯先生近世學者多口實超悟辨髦規矩而曰一切無礙其害道不小承教獨提規矩二字無令放鬆而以小心翼翼為真家法可謂大有功于吾道矣是非毁譽自是人情常態他山之石可以攻玉未必無益雖然又安得化石為玉使共偕大道之為得也又丁巳冬今嵗徽州大㑹汪登源余少原諸公以書托貴門人江汝修跋涉數千里見召且約㑹畢偕二三同志訪翁丈于水田不肖初亦欲藉此登龍以酬生平之願奈賤恙偶發留汝修兩月而竟不克如願奈何見翁丈集中亦有答新安書院諸同盟啓讀至念神交千秋比席思道孚萬古同堂為之躍然不肖亦可藉以自解耳又頃魚客至辱詩扇佳刻謝謝學問要日減又要日增易之益卦是日增之說也損卦是日減之說也增非增其所無不過復其所本有減非減其所有不過去其所本無夲體如是功夫亦如是此吾儒一貫自得之學也何如聞貴邑仁文書院重加修飭大興講㑹殊喜不肖生平多病又不能治家人生産業近病體日益衰家事日益窘惟是講學一念日益壯益堅可笑也承教林間光隂天與君所賜無得虛過敬用佩服答余少原廷尉頃江汝修至辱翰教深感道體無窮學問無盡學者不廣求師友縱下苦功終無長進故先師當年轍環天下周流四方豈漫逰也哉正所以尋師取友講明學問也而或者不知謂専欲得君行道以求一遇則誤矣貴郡大㑹尤不肖所願分一尺光者逺辱台命此正可以明證學問一大機㑹也即跋涉豈敢有憚焉第病體支離蹣跚不前奈何惟老公祖時惠鞭影策我桑榆則雖隔數千里與㑹講一堂無異耳汝修歸肅函布謝臨楮不勝皇恐答楊原忠郡守聖賢之學總在心性而心性得力不得力又全在日用行事見得若行事縱恣而曰我能了悟心性其孰信之此孔子講學惓惓於孝弟忠信博約知行有以也日欲求孝弟忠信之理盡知行博約之功使日用行事件件恰當又不専在行事上用功須是在心性一念上用功庶功夫不落口耳而行事始得恰當此曽子所以有慎獨之說也雖然若只在一念上用功則一念未起之前平素豈遂無功夫邪且無論妄念多而真念少主人難以措手即真念多而妄念少主人亦不勝其㸃檢矣如此即慎獨功夫亦有不足恃者此子思子所以又有未發之說也未見孺子而惻隱已具未見觳觫而不忍已涵此所謂性體也此理無聲無臭不覩不聞為天地根為萬物命于此時時戒慎時時恐懼隨處皆知行博約之功滿腔皆孝弟忠信之理有不起念念自無妄有不躬行行自皆真庶乎慎獨之功自然省力而日用行事自然恰當矣此喜怒哀樂未發之中所以為千古聖學之原也慎獨未發正所以發明孔氏之㫖非未發之說精于慎獨而慎獨之說又精于孝弟忠信也至于前啓中夲體有寂感功夫有安勉二語尚未請教夫聖學以心性為本體一念方萌如大學所云意是感而遂通之時然感而未離乎寂故謂之獨一念未起如中庸所云未發是寂然不動之時然寂而能涵夫感故謂之大夲此俱指夲體說故曰夲體有寂感如其次致曲下苦功夫不待言矣如至誠盡性豈遂無功夫邪故兢兢業業忘食忘憂功夫都是一樣只是自然勉然處不同耳非謂至誠盡性全不用功夫也故曰功夫有安勉至于頓漸之說嘗謂志頓而功漸如孔子十五志學當下便志于從心所欲不踰矩非頓乎然雖志于從心所欲不踰矩亦豈能當下便從心所欲不踰矩須是由立而不惑知命耳順而然後能從心所欲不踰矩非漸乎大抵學問夲于心性頓則志決漸則功深頓漸皆是不然頓則𤣥虛漸則支離頓漸皆非矣門下以為何如與趙夢白先生講學之名不可騖亦不可避世教衰微民不興行久矣為今之計更無别法亟宜提此二字使學者望而趨之期而至之或亦可以救什一于千伯耳譬如豎鵠于東必不射矢於西雖不中亦不甚逺且天下事有真必有僞于數十人中但得一二真者相與擔聖道而砥世風亦不啻足矣僞者置而不論可也若朝講學而夕責備人人皆聖賢堯舜其猶病諸惟翁丈教之與鄧允孝布衣别來三復游秦佳刻筆氣超脫不羣從此熟去不患不到李杜堂室也憶昔有一文人曰周程張朱不能為詩文托之理學遂成名於後世意蓋嘲之也一客應云周程張朱不能為詩文一托理學尚且成名于後世若能為詩文者而又從事於理學其名豈不在周程張朱之上邪其人大為惶愧因悟而為世名儒不佞聞其言快甚答吳繼踈中丞弟素不嫻古文辭而又以賤恙諸凡應酬文字槩從謝絶昨辱台命正以老年伯為一代理學之宗而老年丈又趨鯉庭而執牛耳是以藉此印正所學實不成文也而老年丈不加改削遽付梓人非弟請教意矣近日學者多侈異說而略躬行弟妄欲以身挽之而力不逮弟自歸山一切時事不敢聞兩京搢紳書來一字不敢答其餘見任諸公非有書來不敢先以書往靜攝荒莊非公事不至偃室非赴書院㑹講不入城市嘗併日而食室人交謫而不敢以貧告人虛譽雖隆而實德則病光隂易過而學問難窮不知老年丈何以終教我使不至大為同袍辱望之望之詩扇一柄博笑答韓旻阜司李不佞雖妄意聖學從事有年而質暗功踈實無所得頃辱詢蕘其何以當孟子以雞鳴善利一念分舜跖兩途此正喫緊為人處蓋論先天之本體則一念未起純然是善安得有利誠有如門下所謂淳泓止水一團清氣云者是未起念以前之境界也自念起而後有利之一端與善分途耳論先天之功夫則一念未起培此善根利從何生誠有如門下所謂未為之先加攝持法云者是未起念以前之功夫也自功夫踈而後有利之一途與善爭馳耳然天下無一念不起之人亦無功夫一念不踈之人所以雞鳴之時不是善念便是利念故孟子就此起念之初剖聖狂之路令人審幾而致決非謂雞未鳴念未起之前遂可不孳孳而任其念之或善或利也今日雞鳴念起之後孳孳為善明日雞鳴念起之後又孳孳為善則明日之孳孳固屬既為之後固屬後天而今日之孳孳以明日言又屬未為之先又屬先天矣今日之念起是善是從本體中露出端倪眀日之念起又是善是從功夫中露出本體如此做去庶乎善念漸多利念漸少久之純是善念絶無利念矣到此境界則雖流衍汪洋放乎四海之後依然渟泓止水一團清氣之初也門下所謂未為之先動念之始要加一攝持法使箇箇走往舜路去不走往利路去㫖哉斯言深得聖學之源矣竊以為只每日雞鳴而起孳孳為善不孳孳為利便是攝持法便是先天功夫更無别法雖上知不能無人心既起念之後誰敢自認其無利雖下愚不能無道心未起念之前誰肯自諉其無善審雞鳴善利之一念決舜跖聖狂之兩途自上知以至下愚皆當警省不獨中人也臆見如斯幸有以教之不盡答羅匡湖給諌頃接翰教二十餘年之别得此宛承色笑喜何可言聖賢學問要在悟性天命之性不覩不聞如因觳觫而不忍此可得而覩聞者也而其所以能不忍觳觫者果可得而覩聞否因呼蹴而不屑此可得而覩聞者也而其所以能不屑呼蹴者果可得而覩聞否此不覩不聞之性體在虞廷謂之道心在孔門謂之一貫在曽子謂之至善在子思得之為天命之性為未發之中為天下之大夲學問在此處得力則本體一徹無所不徹即萬感萬應與靜中未發氣象毫無加損寂然不動感而遂通天下之故雖感而遂通天下之故而其寂然不動者依舊寂然不動故曰不覩不聞下文章曰不見變曰不動成曰無為敬曰不動信曰不言德曰不顯天載曰無聲無臭總只是發明此意一得如斯方欲請正而來札闡發更透痛快不可言佩服佩服因便此謝外俚言五首書呈覽笑答黃武臯侍御陽明先生致良知三字真得聖學真脉有功于吾道不小知善知惡是良知一語尤為的確痛快苐無善無惡心之體一句即告子無善無不善佛氏無净無垢之㫖不容不辨何也良知知字即就心體之靈明處言若云無善無惡則心體安得靈明又安能知善知惡邪其靈明處就是善其所以能知善知惡處就是善則心體之有善無惡可知也是無善無惡之說之誤即就先生知善知惡是良知一句證之也先生又云為善去惡是格物必曰有善無惡者心之體則為善者為其心體所夲有去惡者去其心體所夲無上知可以夲體為功夫而下學亦可以功夫合本體庶得致良知之夲㫖今曰無善無惡是去惡固去其心體所本無而為善非為其心體所夲有則功夫不合本體不幾以人性為仁義坐告子義外之病邪是無善無惡之說之誤又即以先生為善去惡是格物一句證之也聞之前輩有解未發之中者云未發不可以善名不可以惡名止可名之曰中不知中就是善安得謂不可以善名未發純然是善故曰中此句正是子思直指心體處若曰無善無惡者心之體亦可曰無中無不中者心之體矣有是理哉是無善無惡之說之誤又就子思未發之中一句證之也或者又以鏡喻云照妍照媸者鏡之明無妍無媸者鏡之體若以有善無惡為心之體亦可以有妍無媸為鏡之體邪不知知善知惡之善惡字即妍媸之說也有善無惡之善字即明之說也鏡之能照妍媸處就是眀鏡之眀處就是善非専以妍為善也是無善無惡之說之誤又就以鏡喻之說證之也且余性素喜靜坐坐久靜極不惟妄念不起抑且真念未萌心體惟覺湛然當下更無紛擾心甚樂之間以語同志同志曰子不信無善無惡之說今子坐久靜極不惟妄念不起抑且真念未萌即此可見無真無妄非無善無惡之驗邪余曰心體惟覺湛然當下更無紛擾即此便見有真無妄非有善無惡之驗邪是無善無惡之說之誤又就自家靜坐之久證之也此善字即未發之中即天命之性即心之本體人之所以異于物者正在于此不然知善知惡是良知何人能知而物不能知邪又何人能致而物不能致邪人能知而物不能知人能致而物不能致正以人之心體有善無惡而物之心體無善無惡耳天命之氣質人與物同天命之性體人與物異故人率人之性便能知愛知敬便謂之道物率物之性止能知飲知食便不知飲食之道矣先生良知二字正指人之所以異于禽獸者幾希處先生致之一字正在人物之所以分途處用功此致良知三字真得聖學真脉有功于吾道不小也答張居白大行承教性情善惡之㫖反覆玩味門下近日何潜心精詣至此聲色臭味此氣質之性也其或有發而中節如聲色之得其正臭味之得其正處便是仁義禮智既是仁義禮智情安得不善而不可遂以聲色臭味之性為善仁義禮智此義理之性也其或有發不中節如仁義之有所偏禮智之有所偏處還是氣質未融氣質既未融情安得成善而不可遂以仁義禮智之性為中間尚有不善仁義禮智正是善之别名復性者變化此氣質而復此仁義禮智之性之本體也朱文公之學集諸儒之大成其功甚大其所得甚深即間有智者千慮之一失無足為文公病也王文成之學其得失正不相妨其得處在致良知三字直指聖學真脉且大撤晚宋以來學術支離之障晚宋儒者徒知文公著述之多而不知其非有意于立言也往往拋却自家心性而以考索聞見為學人品雖真而學脈多雜若曰著述不多不足以為道學耳故以薛文清之賢止因其著述少遂久稽祀典自良知之說行而人始知箇箇人心有仲尼不専在著述多寡而文清始獲從祀其默有功于世道人心何如此文成得處不可誣也其失處一在以無善無惡為心之體翻孟子性善之案墮告子無善無不善佛氏無淨無垢之病令佞佛者至今借為口實一在舉學庸首章必欲牽附而絀文公以窮理解格物之說不知窮理盡性以至于命易言非歟一在低昻朱陸太過而以影響疑朱仲晦以集注或問為中年未定之見不知文公臨終時猶改訂誠意章注集注或問不知費一生多少心思安得以為未定之見而啓後學之惑此文成失處不可諱也大約孔孟而後諸儒各有得失不能盡同是在學者去短集長毋令瑕瑜相掩可耳清任和不同而同為聖去奴死不同而同為仁朱陸薛王不同而同為儒總之皆吾師也近日信文成者偏信其失處以致懲其失者併得處亦不之信皆非矣妄辨如斯不知可無毫釐千里之差而得殊途同歸之妙否雖然此特就文成立言處斷其得失耳若論其躬行處如擒濠之事功抗瑾之莭義居家之孝友生平歷履固粹乎無可議者非若立言之猶有得失也而論者不察誤以為重知略行則寃甚矣惟門下詳教之答顧良知布衣足下精於醫且尤志於儒不佞感足下且尤愛足下願足下益自愛陽明之學以致良知為宗故其詩曰欲識渾淪無斧鑿須從規矩出方圓善學陽明者必立身行已無一言一動不求合于規矩凖繩而不敢有一毫踰越處方謂之真能致良知方見其學透夲源不然還是知未致還是夲源未透不可不察也譬之用藥治病然必深識病源而後立方製劑無一不精無一不效亦必立方製劑無一不精無一不效而後見其果能深識病源不然即自號曰深識其孰信之足下精于醫故敢以醫喻惟足下留神答楊晉庵都諌昔蘧伯玉行年五十而知四十九年之非今從吾六十矣而猶不知五十九年之非惶愧又當何如兹小豚知弟生平芝蘭莫如翁丈不自揣度唐突椽筆誤辱珠玉第奬借過情令人局蹐不敢當耳厚貺逺頒不敢槩辭肅此附謝不腆侑緘伏惟莞納弟居㑹城人事蝟瑣不得已僻靜莊居非㑹講不入城市多病之軀頗得靜攝之效至于賤日一切宴㑹交際槩從謝絶晨興惟焚香告天以祝聖天子萬夀晚同二三同志在書院中烹茶以當杯酒歌詩以當音樂淡中滋味最覺深長若張筵設樂徴逐呌號于酒肉場中不惟心非其好力亦不能給也仁兄知我聞之必發一笑答髙景逸同年學問源頭全在悟性而戒慎恐懼是性體之真精神規矩凖繩是性體之真條理于此少有出入終是參悟未透今日講學要內存戒慎恐懼外守規矩凖繩如此才是真悟才是真修才是真瀟灑受用不知老年丈以為是否答史蓮勺侍御長安距渭上不百里而不克時領麈誨徒切饑渴夫學之不講久矣翁丈毅然任之讀學庸問辨不覺手舞足蹈為吾道喜中多精語未易縷悉朱文公以必至于是而不遷解止字最妙今人亦有至於是而稱止未幾而復遷者此古人所以有靡不有初鮮克有終之戒也翁丈以純亦不已解止字尤妙若遷則便是已矣必純亦不已才謂之止而不遷不遷者非自足自滿駐足于此止而不遷也故止於至善止字為好字眼止吾止也止字為不好字服若看得不活而苐曰止於是而不遷以此為駐足處則是止吾止也之止非止於至善之止矣翁丈以未見如傷解純亦不已更得大學止字之㫖至以羞惡良知論見君子而厭然以理之夲體人之靜時論無聲無臭不覩不聞修身須先行於妻子慎獨在常視乎鬼神尤令人悚然快然佩服不已苐葑菲之言亦辱採擇不無形穢之愧奈何近南𤣥老輯越中述傳真稱陽明知己二丈山中乃作如此工夫橫渠涇野之風當自渭上大振此所以喜也使旋草草謝教諸容嗣布不一與王保宇郡丞從吾不佞景仰山斗積有嵗年近從賢肖益得有道之詳至如平定救荒永平佐政尤卓卓在人耳目者殊為世道慶幸苐無繇音問為歉耳吾鄉橫渠張子其尊人當祀啓聖祠昨畢東郊公祖業已題請矣至如後人二百五十年當道諸公止在吾鄉物色竟不可得向待罪長蘆灤州曽送有志書彼時未得暇閲且并其冊籍失之山中無事近有一客遺所得灤州舊志讀之見橫渠後人從金元已流寓于灤且纍朝俱有恩典載之甚詳讀至此不覺踴躍為先儒喜望臺下取志行查移文吾鄉成此盛舉是臺下無量之功德不朽之盛事也即目下不能如程朱之例大加䕃叙然既開其端後必有踵而行之者則創始之功當亦在臺下况此事尤人人之所樂成者哉五百年闕典當有在于今日者不知門下以為何如臨行深有拳拳又向得華翰知橫渠先生後裔在灤大為吾道一快鳳翔太府沈公祖聞之喜甚即具書奉謝併致書永平太府項老先生欲得永平一印信公文可據以申呈吾省當路便于題請耳沈公祖篤志理學力以表章先儒為己任國朝二百五十年闕典直待今日良為竒遇吾輩為桑梓先儒尤當竭蹶成之以竟千載不朽之事諸凡借重鼎力知不待從吾詞之畢也謹此稱謝鳳翔差役専為此事更望垂青臨楮繾綣不盡答王蒼坪明府昨唐突佳刻亦美則愛愛則傳意耳過承嘉惠當與同志共之老父母功德無涯矣知感知重沈刻併領肅此布謝張橫渠先生後人一向諸公祖俱在郿縣物色而竟不可得昨見灤州志載之甚詳頃移書永平王保宇二守查已的確倘得借重鳳翔府移文永平府得一印信公文可執以呈請兩臺縱目前不能比程朱例遽徼恩典然今日既開其端他日必有竟其事者則創始之功當與天壤共不朽矣此知老父母所樂聞者敢併及之與沈芳揚太府久聞老公祖力講理學種種作用卓犖不凡私心景仰有日苐閉户深山久缺聞問耳頃辱翰貺先施宛承謦咳感何可當橫渠先生苖裔已托永平王保宇二守行查的確辱老公祖下詢此斯世斯文之幸也橫渠可作亦結金蘭老公祖自道也從吾惟舉手加額為吾道稱賀為老公祖稱謝而已佳刻周李二書繼往開來功德無量敬用珍藏灤志一部奉覽橫渠家譜寄在張心虞處老公祖取而觀之何如外拙刻數種請教臨楮不勝皇悚又使至辱翰教獲覽老公祖與永平公移與橫渠先生族人書禮併與王保宇二守書老公祖為此舉可謂委曲詳盡無所不用其心矣殊為吾道踴躍不已國朝二百五十年缺典直至老公祖今日始舉真所謂時如有待道不虛行者也謹此三肅稱謝外從吾與王二守晝已附使者矣併復不一答吳百昌中舍文公之學粹乎無議故新建亦云吾于晦菴有罔極之恩可見新建實未嘗不尊信文公也今學佛者多借新建以詆文公是非悖文公實悖新建矣今為吾道計惟當辨佛學之非而不當非學佛者之人辨其佛學之非則彼知其非當自悟若非其學佛者之人則同志中先自立形跡又安望其逃而歸哉况亦非以善飬人之道也不佞關中書院每㑹雖無人不容而必不敢容一僧謂彼髠髮出家已叛於儒之外非若同志學佛猶在于儒之中也在儒之中而誤信乎佛此所以不可不辨而又不可不以善飬之耳何如答陳可績茂才人心道心不必深求不必逺求如一念敬便是道心一念肆便是人心一念謙便是道心一念傲便是人心一念讓便是道心一念爭便是人心一念真便是道心一念僞便是人心一念信學便是道心一念非學便是人心於此一一察識便是惟精一一體驗便是惟一察識體驗純一不已便是允執厥中至淺至深至近至逺而古今學者多厭常喜新曲為解釋反覺支離葛藤答南二太中丞癸亥八閩夙稱海濵鄒魯而台丈以理學世家節鉞其地天蓋為吾道藉重也幸甚幸甚修己以敬修己以安百姓承教一敬之內定有許多作用且有許多轉移妙法原非空空作啞禪也最是最是中庸說無為而成而一則曰有九經一則曰有三重二有字正與無為無字相應不然則老氏矣惟其有才討得無此修己以敬所以能安人安百姓也何如同安有洪芳洲朝選官刑部侍郎因不成遼王獄為江陵所恨罷官仍假他事下獄竟斃獄中此古今第一竒事寃事台丈為一表章之何如少墟集卷十五
