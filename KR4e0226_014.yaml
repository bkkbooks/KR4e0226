body:
  text: 少墟集卷十四眀馮從吾撰說做人說上一日與館中二三同志閲邸報中有做官做人之說咸韙其言而余以為做官做人不是兩事總之做人盡之矣或曰做官做人豈毫無所分别邪余曰然吾儕立身天地間祇有做人一事試觀吾儕今日聚首講學容容與與無半㸃塵囂宛然洙泗杏壇景象固是做人眀日朝參課業或揖讓于禁近或吟咏于祕閣亦是做人異日𣪚館之後或留而在內或出而在外職業所關巨細不一無大無小無敢瘝曠亦是做人非曰如此為做人如彼為做官也嘗觀大學一書至平天下章凡理財用人為君為相道理具載無遺而總謂之大人之學若做官做人分為兩事是格致誠正屬做人平天下治國屬做官也有是理哉是大學一書乃古人做人之法則吾儕所當時時潛心理㑹者也且吾儕自七八嵗入社學後呌成做童生進學後呌成做秀才科第後呌成做舉人做進士入仕途呌成做官林下呌成做鄉先生自少至老此身入于世套中何時才去做人不知做秀才做箇好秀才做官做箇好官就是做人其道理工夫說在大學可無贅也嗟嗟耳目口鼻人也視聽言動人也此非有餘彼非不足何待于做人必待于做而後可言人也自少至老方汲汲做人之不暇而暇言他哉余曰祇有做人一事者以此做人說下館中與二三同志論學彼此拳拳以做人相印證余曰做聖人易做文人難吾儕于難者尚殫精竭力圖之于易于易者反玩日愒月委之于難何也或有疑者欲余竟其說余曰難易之間是在自悟非可以騰諸口說也無已試以舜孔觀之古今論大聖必曰舜孔舜之德業詳載虞書中若不可幾及而夫子乃曰舜好問而好察邇言隱惡而揚善執其兩端用其中于民其斯以為舜乎玩其斯二字可見虞書所載多少德業都不是舜之所以為舜處而惟此乃其所以為舜然則好問好察難邪隱惡而揚善難邪孔子天縱聖人不知有何樣髙逺之為而其自道苐曰其為人也發憤忘食樂以忘憂不知老之將至云爾夫發憤忘食難邪樂以忘憂難邪由此觀之吾儕特不肯去把做詩文之心為做聖賢之心耳若是肯去好問好察肯去隱惡揚善肯去發憤忘食樂以忘憂則舜孔有何難為顔淵曰舜何人也豫何人也有為者亦若是陽眀先生曰箇箇人心有仲尼豈欺我哉吾儕祇說堯舜孔孟難為試觀一日十二時中曽去好問好察否曾去隱惡揚善否曽去發憤忘食曽得樂以忘憂否途患不行不患不至不用工夫而曰堯舜孔孟難為真難之難也且吾儕自入館來朝而誦久而諷行思坐想何嘗一息不在詩文上用功其詩文何嘗一息不在班馬李杜上模擬真可謂殫精竭力矣試自反之其詩文視班馬李杜竟何如邪孰難孰易必有能辨之者僉以為然余又曰做人不在多言顧力行何如耳今言已多矣願相與共朂之講學說客有講學者因人言而志阻遂不復講余怪而問之客曰子猶敢言學乎方言學而人言隨之何益也余曰子向日之講學也果為人乎抑為巳乎如為人也則人言誠所當恤如為巳也則方孜孜為巳之不暇而暇計人言乎哉聞謗而輟則必聞譽而作作輟由于毁譽是好名者之所為也講學之謂何且人之議之也議其能言而行不逮耳能言而行不逮此正學之所禁也者人安得不議之吾儕而果能躬行也即人言庸何傷客又曰學貴躬行固矣講之何為余曰講學正所以為躬行地耳譬之適路然不講路程而即啓行未有不南越而北轅者也又譬之醫家然不講藥性而即施藥未有不妄投而殺人者也又譬之兵家然不講兵法而即應敵未有不喪師而辱國者也天下之事未有不講而能行者何獨于吾儒而疑之客憮然曰有是哉有是哉微子今日之講吾幾以冥行當躬行矣豈不誤哉講學之益正在于此願與吾子共朂之夢說問聖人立言最平易真切乃夫子有夢見周公之嘆毋乃𤣥幻乎余曰不然晝之所為安得如夜之所夢更為真切或曰子之言更𤣥幻甚矣余曰不然天地之氣復于子人心之氣息于夜此處發見呈露才是本來真心最真最切莫過于此試觀吾儕發憤為學一日之間喜怒哀樂恰似件件中節矣至于夢中或喜或怒反有不中節處辟如性嗜酒者一向戒之矣至于夢中或不免于飲或恍然悟其戒而飲之知節何也此正真情發見也然須得戒之又戒以至于與戒俱化斯夢中亦不飲矣觀人心之真者莫過于此中庸論喜怒哀樂而先之戒慎恐懼夫戒慎不覩恐懼不聞工夫亦可謂至精至密矣然使胸中猶有戒慎恐懼在則夢中必不免有不中節處故又曰致中和致之云者戒之又戒以至于與戒俱化之謂也如此才能發皆中節雖是已發之和猶然未發之中位天地育萬物即此便是豈待外求哉且吾儕平日好做詩夜間必夢題詩甚且有一二佳聨出來真是晝間做不到可見人之精神原可以通天地原可以貫古今欲見堯舜便見堯舜欲見周孔便見周孔奚必羮墻哉吾儕今日試驗喜怒哀樂何如夢中喜怒哀樂又何如則此心存亡工夫生熟自是一毫不爽故曰書之所為安得如夜之所夢更為真切也昔韓子原道謂周公以是傳之孔子夫周孔相去不啻百有餘嵗夫孰傳之而孰受之邪孔子欲行周公之道故屢接于夢寐間後儒日誦法孔子而卒不能使孔子入夢可勝嘆哉可勝嘆哉天道說董子有言天人相與之際可畏也嘗以秦論始皇自知天下雖為己有而法令太酷人心含怨終夜皇皇計無所出于是不得已為焚書坑儒之舉若曰聖賢載籍能發人聰眀英雄豪傑能議人是非從古國家搖亂不能長久皆始于此焚書坑儒自以為天下無復有書無復有儒黔首可愚而我可無恙矣此與鑄金人十二于咸陽意同然能焚書而不能焚黃石之書能坑儒而不能坑子房之儒圯上之遇老人從何處來十日之索子房從何處去當斯時也秦之鹿已出柙矣黔首果可愚而一世二世果得宴然無恙也邪夫以始皇之雄而無如天意何何世人恃其聰眀才辨敢于與造物者爭衡也豈未覩秦事也乎哉吁亦愚矣名實說學者之病莫大乎務名金名曰金金也玉名曰玉玉也鉛而金之石而玉之名孰與我雖然即名焉亦名曰鉛而金之耳石而玉之耳其名彌大其病彌章名而至此名愈乎哉遁世不見知而不悔即其所以疾沒世而名不稱君子蓋辨之矣勤儉說越中有二士夫其一人講學其一人不信學二公家俱裕俱以勤儉二字訓其子其子少年初亦奢惰後俱折節為勤儉廪廪遵父命惟謹其講學公之子汲汲皇皇讀書求友有勤無惰自奉甚儉即敝衣糲食宴如也而周族黨賑貧乏略不少吝其家日裕而聲望亦日起卒為名儒其不信學者之子亦汲汲皇皇持籌治生有勤無惰自奉甚儉即敝衣糲食亦宴如也而至親族黨一毫無所施豫人多以是怨之由是衆叛親離訟獄煩興家事亦漸銷落而營利愈甚卒為鄉里所不與夫此二子者其勤同其儉同其廪廪遵父命同而家道之隆替若此其異何哉蓋以學問為勤儉則雞鳴而起孳孳為善吉人為善惟日不足其勤也為真勤菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫其儉也為真儉故人品家道成則俱成以世俗為勤儉則其勤也為奔忙為營求其儉也為貪鄙為嗇吝故人品家道敗則俱敗耳然則家道之敗也其病豈獨在惰與奢哉夫子孫而能勤儉亦足稱矣而止因學之不講遂至以此敗其家而不悟嗚呼昔人有言毋以嗜欲殺身母以貨財殺子孫母以學術殺天下後世為人父祖者奈何以講學為非而至以勤儉殺子孫也哉悲夫余聞其事而有感因為之說以貽同好孝弟說别孫生繩祖堯舜之道孝弟而已矣宗族稱孝鄉黨稱弟者又止為士之次何也蓋堯舜之孝弟是造道之極滿孝弟之量者也鄉黨宗族之稱孝弟如王祥王覽輩是天資之美盡孝弟之一節者也盡孝弟之一節即可以為士可見人皆可以為堯舜祇是人安于天資之美未加學問之功安于一節之善未滿分量之全所以為士之次所以堯舜不可為耳豈堯舜之道有出于孝弟之外哉原泉混混不舍晝夜盈科而後進放乎四海宗族稱孝鄉黨稱弟之士是原泉混混之水也堯舜之孝弟則放乎四海矣堯舜雖放乎四海其實不過滿其原泉之量又未嘗于原泉混混有所增加故曰孝弟而已矣而已矣者無所增加之謂也華下孫生繩祖幼而失怙垂髫學舉子業弱冠王母歾生宜承重哀毁逾禮既襄事廬於墓側者三年一時以孝聞戊申春余偕同志講學太華山中而生偕其師劉生若魯友李生華實王生國賔徒步九十餘里從余逰瀕别余朂之曰若不聞田畫之告鄒志完乎願君無以此自滿士之所當為者未止此也生聞其言再拜而謝眀年己酉三月生復徒步二百餘里從余講學太乙峰下余留居月餘見其氣宇端凝意向勤懇視昔益有加焉此其所造將來蓋未可量者余深喜吾道之得人也因其歸書孝弟說以遺之書孝弟說贈寧孝子堯舜之道孝弟而已矣夫而已矣者無所增加之謂也往嵗華下孫生繩祖為其祖母廬墓三年余為此說今嵗丙辰三月河津寧生獻誠越數百里從余學余聞獻誠為其母有疾日侍湯藥衣不解帶者二年母圽哀毁踰禮廬于墓側者又三年一時以孝聞于秦晉間余甚嘉之今獻誠將歸㑹余病不能為文以闡揚其孝復手書此說以貽之河東有曹真豫張緑汀二先生者獻誠其以余言請正焉又書孝弟說贈馬孝子堯舜之道孝弟而已矣夫而已矣者無所增加之謂也先是華州孫孝子繩祖為其祖母廬墓三年余書此說遺之而復朂之曰若不聞田畫之告鄒志完乎願君無以此自滿士之所當為者未止此也繩祖再拜而謝嘗慨省㑹盛地士之顯親揚名問視定省刲骨愈親者濟濟不乏而廬墓孝子自顔彩後不少概見余方欲藉孫生以風之而今得揮使馬誠其人不翅空谷足音跫然而喜因偕咸陽同年張西華郡丞門人張爾維孝亷往訪其廬余素未識馬君而識荆自此始見其哀戚之色溢于眉端談及母氏劬勞泫然淚下余益重之因聞于學臺尹公公為之表厥宅里里閈士紳始津津稱馬孝子馬孝子云今孝子三年之喪畢治任將歸余偕諸士紳迎于東郊孝子抱主而泣觀者如堵㑹余病不能為文復書此說遺之余自倡學以來每以人性皆善人皆可以為堯舜二語為同志講數年以來同州有沈時泰渭南有姚應魁臨潼有張應珮華隂有石之岱藍田有王之賈田養心陳化龍徐眀教而華州又有張迪光皆相繼廬墓而養心之岱余亦親至其廬乃今又得馬君孰謂人性不皆善而人不皆可為堯舜哉馬君勉矣向告孫生田畫與鄒志完之言無煩余覆說也顧用晦字說姑蘇顧生晿離初字離眀或以為文之太著也更之曰元晦此其意甚善而余以為先儒之字襲之不可復更之曰用晦生再拜稽首而謝詰朝生介許生大倫丐余為說以志紳佩余惟晦之為義子思子言之詳矣尚絅暗然晦之始也內省敬信晦之功也篤恭而天下平晦之成也上天之載無聲無臭至矣余又何言生聞之喜甚復再拜稽首謝曰離雖不敏敢不書紳佩先生之教針座右二針有序三載靜攝庶幾寡過日來塵溷頓覺茅塞每一㸃檢不自知其汗之浹背也嗚呼靜中靜易動中靜難余未嘗一日不三復斯言由今觀之益信因述座右二針用代嚴師訓戒乙未榖日識呼汝從吾慎汝存心一念少差百盩俱侵母愧汝影毋愧汝衾勉旃勉旃上帝汝臨呼汝從吾慎汝制行一步少錯終身大病母任汝情毋任汝性勉旃勉旃庶幾希聖贊秦關王先生像贊有序藍田王秦關先生捐館舍二十年矣前嵗丁未督學祁公博採公議祀先生于學宫今嵗己酉邑侯梁公學博錢君楊君復從闔邑士民之請為先生建専祠以祀之一時人心翕然稱為盛舉仲冬二日安主于祠從吾偕同年周淑逺參知及門人任生國珣梁生爾楨瞻拜祠下樂觀其盛覩先生之像儼若面先生而復與之上下其議論也因贊數語用旌山斗贊曰清臞之貌篤實之學四吕而後公稱先覺昔聆公訓今拜公祠闢邪崇正百世可師解命解日者以支干八字槩人生平人皆信之余以為人生平毁譽得失死生榮辱非支干八字所能概也倘有人焉慨然思猛然省即于此毁譽得失死生榮辱八字勘得破能于此中討得主張則一切世味自不得以籠絡之便是鵬摶萬里鳳翔千仭格局便是為聖為賢的命若是昏昏昧昧營營逐逐于此八字勘不破于此中討不得主張則自暴自棄枉了一生便是春蠶作繭秋蛾赴燈格局便是為狂為愚的命嘗觀此八字誤了古今多少英雄豪傑真是可恨可憐命乎命乎豈日者所能測識哉孔子曰不知命無以為君子而孟子亦曰夭夀不二修身以俟之所以立命於戲深矣論論荀卿非十二子閣試昔荀卿以儒自命而立言指事一禀于仲尼可謂偉矣然仲尼之徒惟思孟獨得其宗而卿之非十二子也以思孟為聞見雜博猥與墨翟惠施輩同類而共譏之是何敢于髙論異說而不讓邪胡其悖也卿之言曰它魏不可合文通治陳史不可合衆眀分墨宋不可容辨異縣君臣慎田不可經國定分惠鄧不可為治綱紀似也而猶曰持之有故言之成理若有不盡非者何至以僻違無類幽隱無說閉約無解乃歸之思孟而以唱和為有罪哉孔氏既沒異端棼如戰國以來從衡捭闔之習盛而吾道不絶如線矣仲尼之道燦然復眀于世者唱和之力也而可曰罪也邪卿固尊信仲尼者正宜以思孟為津筏而後可以窺洙泗之源委案飾其辭而祇敬之曰此先君子之言也繇斯以觀卿顧不當祇敬先君子哉果爾則卿亦世俗之溝猶瞀儒嚾嚾莫知其非者矣豈不自言而自悖之邪尊仲尼而非仲尼之徒亦太惑矣或謂卿妄以道自任眀知思孟之學故為排之以自繼仲尼之統不知有此一念之勝心而已不可與入道矣何足為思孟損益哉且卿之尊信仲尼也甚篤而子弓雖賢與仲尼並稱已失低昻之實又何論思孟卿受學于子弓意推尊子弓以彰巳學所從來故不得不與仲尼並稱是卿之尊信仲尼亦桓文之尊周室不過陽浮慕之已耳不然子弓固不在仲尼下而思孟豈遂在子弓下哉是仲尼而非思孟余誠不知其何說矣大抵卿懲叔季不學之弊而歸咎于性惡見霸功之算計見效也而曰法後王故聞思孟之稱性善而談法古不翅如枘鑿然此其詆思孟之根不可救藥者也獨不思相近之訓安所稱惡而堯舜湯文豈不惓惓于垂訓無乃仲尼非乎它魏慎墨之流仲尼之徒羞稱之至如史鰌之直固其所深嘉樂與者亦不可概例于諸子老莊輩詆聖侮法不遺餘力乃置之不論甚矣卿之好竒也然則卿之非十二子也其誠敢為髙論異說而不顧者哉或又謂後世儒者借喙思孟行實悖之才無可用世而竊儒名以蓋其愆卿誠有激乎其言之者不知果有激而言也非其竊儒名者可矣併真儒而非之可乎哉昔人稱卿才髙而不見道諒矣嗚呼卿一非思孟而李斯遂焚書坑儒以促秦二世之亡非學而遂以亡人之國也學可非乎哉禍秦者斯而禍斯者卿也此古今治亂得失之林也聖之時論館課夫時之義大矣哉惟純天之聖人而後可以當之然所謂時者何消息盈虛莫窺機緘通復禪代莫測端倪乃造化自然之妙而不容一毫人力參焉者也使人力可以一毫參則是道為有方之物而聖人可以為時矣聖人豈能為時哉不惟聖人即造化亦不得而强之如春之不得不夏夏之不得不秋而秋之不得不冬也時則使然造化烏得而强之造化不能强乎時而人恆恃其聰眀智慮以安排揀擇于其間曰如此則清如此則和如此則任始强此以律彼繼强彼以合此是執夏之箑而曰曷不為裘之溫也執冬之裘而曰曷不為箑之便也豈不盩于時哉節概雖髙勛業雖偉殆與純天之聖人異矣夫惟純天之聖人為能含心于寂合氣于漠聰眀在聲臭之先而智慮在覩聞之外夫是以自作主宰造化為役時清而清不為絶俗時和而和不為狥人時任而任不為干時靜也如隂之翕而靜與天俱動也如陽之闢而動與天遊易不云乎動靜不失其時其道光眀嗚呼深哉是道也乃吾夫子之道而非夷惠伊尹之道也伯夷道在于清則與和二栁下惠道在于和則與清二伊尹道在于任則與清與和又二夫二則偶偶則可以容吾之聰眀智慮以安排揀擇之故取其清者去其和取其和者去其任即其所造可以亷頑而立懦可以寬鄙而敦薄可以致君而澤民而終不足以語造化自然之妙何其盩于時也乃吾夫子則毋意毋必毋固毋我而已矣可仕則仕可止則止可久則久可速則速而已矣故其自言曰吾道一以貫之一則無偶無偶則無所安排無所揀擇時乎夏則箑而非有心于箑也時乎冬則裘而非有心于裘也聖人以為時固如是吾亦如是以應之耳矣造化不能强乎時而吾欲以聰眀智慮强之能乎哉此孔子所以為聖人之時也時乎時乎豈易言哉後人不眀于時之說而専以隨時變易解之至為與時浮湛者藉口嗚呼獨不思夏之必暑而冬之必寒乎故曰信如四時又語其一定而不移也伊川曰隨時變易以從道也夫隨時變易而不從道則小人而無忌憚反不若夷之清惠之和尹之任矣是故君子毋輕言時少墟集卷十四
