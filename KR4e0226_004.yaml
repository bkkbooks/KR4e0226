body:
  text: 少墟集巻四明馮從吾撰語錄訂士編示臨清學諸生夫子博文約禮之訓不顓為一顔子發而顔子一旦慨然認到自家身上曰博我約我何也彼誠信得道理原在自家身上夫子不過一指㸃之耳向也迷而今也悟方才覺得有趣方才欲罷不能若是自家信不到但假人口吻曰博文約禮云云終是無趣味終是不得欲罷不能子思曰人莫不飲食也鮮能知味也此迷悟之説也且顔子既稱欲罷不能矣不知欲罷不能之時何様光景誠不可不於此處潛心博文約禮有先後而無等待若待博文完了才去約禮則天下古今道理無窮盡何時能博得完將終其身無約禮之時矣余師許敬菴先生曰孔子教人其大端曰博文約禮道之散見於人倫庶物之間者文也其本於吾心天然之則者禮也隨事而學習之謂博隨學而反已之謂約禮即在於文之内約即在於博之時博而約之所以為精也精則一一則中孔子學而不厭誨人不倦其斯而已矣先生此説可謂善發聖人之藴雖欲從之末由也已此正是顔子學有得處文王望道而未之見孔子不知老之將至云爾自古聖人大都如此士君子為學須要造到欲從末由至於無所用力處然後謂之學顔子之學不然掘井九仞而不及泉與不掘何異問苟不固聰明聖知達天徳者其孰能知之何也曰註云固猶實也實者歛華就實之意正為上文頭一句説聰明睿知又恐學聖人者騁其聰明睿知在外面用功不肯歛華就實所以曰固或曰既是學聖人不當騁其聰明睿知上文何必頭一句説聰明睿知曰天下之事非聰明睿知之人一件做不得且如該寛裕温柔處却發强剛毅該發强剛毅處却齊莊中正可乎不可此所以先説聰明睿知後説容執敬别但世之學者易於騁聰明恃睿知故又曰固字云耳上章淵泉如淵此章淵淵其淵正是固字之意在天地必有大徳敦化而後有小徳川流在聖人必有肫肫淵淵浩浩之大徳敦化而後有聰明睿知容執敬别之小徳川流在學聖人者必固聰明聖知達天徳而後能知至聖之所以配天也無聰明睿知不可騁聰明睿知亦不可此固之一字學者不可一時不體驗問苟不固聰明聖知達天徳者其孰能知之固矣然學者欲固聰明聖知達天徳從何處用功曰下章𦂳接衣錦尚絅惡其文之著也可見存一惡其文之著心便是下學用功第一着論其心雖惡其文之著論其道則文終不能掩故曰君子之道闇然而日章衣錦尚絅猶如無錦然而錦終不能掩乃其所以為錦如固聰明聖知猶如無聰明聖知然而聰明聖知終不能秘乃其所以為聰明聖知也固聰明聖知達天徳就是無聲無臭的境界但自惡其文之著也一念始可見歛華就實這一念真是下學用功第一着示東昌聊城兩學諸生非禮勿視四句工夫在應感上做出門如見大賔二句工夫在心上做然則回與雍何以辨也不知四勿字難而二如字易請以戰喻夫非禮之聲色交於外而我欲視聼之是外㓂也非禮之言動起於内而我欲言動之是内㓂也内外交攻而我以孤軍猝遇强敵不假應援一鼔而下難邪易邪出門使民其心易肆特内㓂竊發耳然必借見賔承祭之心以勝之不然鮮不北矣故此一㨗也是應援之兵之力也而主兵又安在哉以此較彼難邪易邪此回雍之辨也或曰顔子心齋坐忘幾於化者也何至有非禮曰禮不易言也一念少過即非禮一念少不及即非禮故曰約之以禮約也者約其過與不及而歸之中也至精至微非可以騰諸口説者豈至如世俗所謂非禮非禮云哉噫内㓂外敵雖太平之世所不免而恃吾有以備之若曰顔子而無非禮也是唐虞無四凶而商周無桀紂也天下有是理哉堯舜湯武不以其故損聖又何疑於顔子故千言萬語為顔子解者是昧於時勢者也問顔子學幾於化者也視聼言動豈有非禮豈待於勿勿之云者不過在靜中一念上用功防未萌之欲云爾若必待視聼言動而後勿不幾於粗乎曰此意甚是雖然如此則顔子靜中一念且不能靜矣更説甚動顔子學幾於化靜中一念已是澄澈的未萌之欲已不消防只是在視聼言動時再一㸃檢耳但把顔子之非禮不可㸔的太粗顔子之四勿不可㸔的太着力便是且靜固靜易乎動亦靜易乎賢如顔子豈有靜中不靜賢如顔子又豈能動中不動有耳目口體便有視聼言動有視聼言動便就有非禮處勿之云者是動中求不動之意也動而不動則動中能靜矣動中能靜則靜中能靜又何待言靜固靜動亦靜無内外無將迎此孔子之所以為四絶而顔子之所以為四勿也一間未達其絶與勿之間乎不見可欲使心不亂夫不見可欲使心不亂易見可欲而使心不亂難此四勿之學非顔子不足以當之涇野先生教人於動處求靜真得夫子告顔淵非禮勿視聼言動意示濟寧學諸生仲尼祖述堯舜一章是一首仲尼贊武字土字一韻行字明字一韻化字大字一韻自古贊體之妙莫過於此問中庸引夫子之言皆言子曰惟君子中庸章言仲尼祖述堯舜章稱仲尼者何曰此二章正相應盖前邊説舜文武周見得這中庸道理散見於堯舜文武衆聖人前邊説天地鬼神至於日月星辰華嶽河海禽獸草木無不言及見得這中庸道理散見於天地萬物後邊説祖述憲章上律下襲見得這中庸道理雖散見於堯舜文武天地萬物而實統㑹於仲尼故曰譬如天地之無不持載無不覆幬如四時之錯行日月之代明可見仲尼曰君子中庸亦惟仲尼為能中庸耳聰明睿知章就是仲尼之小徳川流經綸大經章就是仲尼之大徳敦化不徒曰承上文云爾仲尼曰君子中庸非仲尼吾誰與歸詩云衣錦尚絅惡其文之著也只是箇淡故下文即曰淡而不厭學者只凡事淡得下其識見自别其品格自髙不患不到聖賢地位自古熱閙人多喜動喜事恬淡人又多厭動厭事惟淡而不厭才謂之君子之道才謂之中庸論君子之道説到篤恭天下平道理可謂至大不知有何様竒特工夫方才得到此顧先之以淡而不厭一句可見淡之一字乃吾儕安身立命所在若是能悟破淡字則精神收歛在内覺得世間種種可豔之物自與自家身上不相干涉就是在爵祿名位中必不為爵祿名位所用何等安閒何等瀟灑須有此等胸襟方才做得出篤恭而天下平的事業不然把自家一段精神終日馳騖於外只在榮身肥家紛華靡麗上做營營逐逐􅑫自苦累一生有何好處又何論事業故舜禹有天下而不與不是有心去把天下不放在心上只是把天下㸔的淡所以能不與也雖然人情好甘而君子曰淡非迂也嘗得出淡中滋味自是能甘得淡自是能不厭若嘗不出淡中滋味縱曰我能淡我能淡其如不甘何故不以淡為甘而輕言淡者非深於淡者也示四氏曲阜兩學諸生孔子之道一貫之道也原不貴博亦不賤博故曰君子博學於文約之以禮亦可以弗畔矣夫弗畔者弗畔此一也夫子知曾子博而能約可與言一也故直示之曰一貫知子貢博而不能約不可與驟言一也故必先試以多學而識然後約之曰一貫可見善學聖人者惟恐當下不能承認此一也又何必沾沾以博自多哉齊景公欲用孔子晏子沮之曰當年不能究其藴累世不能闡其施盖病其博也而史遷亦曰儒者博而寡要勞而少功夫博而不約其流弊至於什百千萬而不可返皆多之一字為之嚆矢也噫人情好勝勢必畔而至此不足為異但使晏嬰沮景公而聖道不行於當時史遷列六家而聖學不明於後世可勝異哉可勝異哉世道不如古全係於士君子好髙之心勝不在日用間着實用功孔門言志亡論夫子與顔子何如只㸔子路願車馬衣輕裘與朋友共敝之而無憾居然三代時大道為公景象可見古人為學何等着實吾儕試自揣車馬輕裘與朋友共敝之也果能無愛惜心否即不然果能無納交要譽心否但只有纎毫未化便是有愧於此心便是有愧於子路縱髙談性命何益此世道所以不如古也楚侗先生維風編中有云知道者之於詩文直榆莢視之可也余讀之以為知言豈直詩文顔淵曰願無伐善無施勞即善與勞亦榆莢視之可也不然即此一念有善有勞之心便不是善便不是勞矣舜之舎己孔之毋我皆是此意噫難言哉顔子蕭然在陋巷中有何善有何勞而居然以不伐不施自任是何等様胸襟吾儕當細思之有善有勞難不伐不施易何世之有善有勞者多而不伐不施者少也於此方見顔子之不可及伐善伐伐也有以不伐為伐者尤伐之伐也施勞施施也有以不施為施者尤施之施也故曰聖人欲上民必以言下之欲先民必以身後之此斷不可以為訓老者安之朋友信之少者懐之是孔子一生的學術一生的事功孝者所以事君弟者所以事長慈者所以使衆是曽子一生的學術一生的事功老吾老以及人之老㓜吾㓜以及人之㓜是孟子一生的學術一生的事功問大行不加窮居不損君子所性誠然不知性是怎麽模様曰君子所性根心處雖不可見至於睟面盎背是昭然可見者只説這睟面盎背處大行能加窮居能損否余嘗見富貴之士或有形容憔悴者貧賤之士或有發氣滿容者可見這根心生色處大行窮居斷然加損不得問大行不加窮居不損曰芳草和煙暖更青寒門要路一時生年年㸃檢人間事惟有春風不世情君子所性大行不加窮居不損分定故也只一箇分定了便改移不得可見人只是安分便是盡性安分二字人人能言之不知道理甚大功夫甚難必如夫子所謂隠居以求其志才謂之安分於窮居行義以達其道才謂之安分於大行陸子靜謂宇宙内事皆已分内事已分内事乃宇宙内事才説得出分字意睟然見於面盎於背施於四體四體不言而喻分明畫出一箇聖人模様宛然如見吾儕既見之矣不可在模様上欣羨當自根心處求之又示四氏曲阜兩學諸生問四氏學及曲阜學諸生曰諸生或為聖人之後或近聖人之居誠為厚幸然為其孫者何以無愧於祖為其弟者何以無愧於師乎諸生唯唯否否余曰爾諸生以讀書科第為無愧乎如此則世之取髙科躋膴仕者皆可以為聖人矣爾諸生以為然否爾諸生必不以為然既不以為然何不求其所以無愧者而奮然思齊也然其所以無愧者何在諸生又唯唯否否余曰陽明先生云箇箇人心有仲尼箇箇人心既有仲尼則為其孫者生來原無愧於祖為其弟者生來原無愧於師此道完完全全聖非有餘我非不足故孟子曰大人者不失其赤子之心但只是自家信不及所以不肯思齊所以有愧耳且爾諸生有能篤信聖人如子夏者乎子夏篤信聖人故學以致其道後儒不篤信聖人故學以致其舉業學其所學非聖人之所謂學也非聖人之所謂學則雖謂之有愧也亦宜雖然子夏惟篤信聖人故入聞聖道而悦亦惟篤信聖人故出見紛華而悦何也子夏篤信聖人不曽篤信自家所以入聞聖道而悦又出見紛華而悦耳顔子其初亦篤信聖人故仰之鑽之瞻之三之字俱指聖人其後一聞聖教始信得博我約我始信得我自家生來原是聖人故既竭吾才如立卓爾曰卓爾則入也卓然見於其前出也亦卓然見於其前孰為聖道孰為紛華孰為可悦孰為不可悦舉躅皆是盈眸皆是鳶飛魚躍現在眼前此顔子之所以不可及也篤信聖人則離過聖人必有出入處篤信自家則道也者不可須臾離也又安得有出入乎哉今吾輩生於千百世之下聖人生於千百世之上是入也既未聞聖道而出也又只見紛華安得不愧於聖人爾諸生不要説聖人生於千百世之上我生於千百世之下只信得過聖人生於千百世之上固是此赤子之心固是此良知我生於千百世之下亦是此赤子之心亦是此良知既亦是此赤子之心亦是此良知我何為不奮然思齊而甘心有愧於聖人也今諸生能篤信此赤子之心否能篤信此良知否抛却自家無盡藏緣門持鉢效貧兒諸生得無惕然於此乎諸生又唯唯否否余曰孟子不云乎是心足以王矣齊王抛却自家能王之一念却去問霸者之事豈非緣門持鉢效貧兒耶吾輩果能篤信此赤子之心我與聖人同篤信此良知我與聖人同則識得本體自然可做工夫做得工夫自然可復本體當下便是聖人故曰箇箇人心有仲尼非虚語也自從宇泰收功後始信人間有丈夫豈非千古之一快哉如此則爾諸生在天地謂之肖子在聖門謂之髙弟登髙科躋膴仕於此心此知無所加固謂之不愧不登髙科不躋膴仕於此心此知無所損亦謂之不愧故曰仰不愧於天俯不怍於人嗚呼盡之矣諸生為之躍然余反觀竊自愧遂書之以示諸生併以自朂焉示寧陽學諸生克已復禮為仁先儒解克字謂如三軍遇敵戰必勝攻必取此言甚好聖人復起不能易也但自家兵馬若平素操練得不閑熟停當而輕言克是所謂以不教民戰是謂棄之耳故夫子又曰操則存舎則亡然則欲克己者又不可不先講操心之道問顔子其心三月不違仁已幾於化矣夫子與之論仁宜有𤣥虚奥玅處第曰非禮勿視聼言動何淺易也曰惟至淺乃至深惟至易乃至難吾輩學問不及古人只為一生在此區區形骸上討箇受用終日將外邊聲色應感陪奉此軀即有志於學者亦多從此起見種種情識擺脱不去自視於視聼言動不知有多少欠闕多少愧怍處如何到得顔子且非禮之視是誰視非禮之聼是誰聼非禮之言之動是誰言是誰動皆是此一箇區區形骸作用至於非禮勿視是誰勿視非禮勿聼是誰勿聼非禮勿言非禮勿動是誰勿言勿動這不得一段真精神真力量如何能斬釘截鐵一齊勿去亡論罣礙湛溺即勿矣猶有拖泥帶水處亦不得謂之勿勿者㧞去病根意也顔子四勿真孟子所謂先立乎其大者大者先立則彼區區形骸如耳目之官豈能奪之豈直不能奪且即此區區形骸即是靈明真體故曰仁者人也又曰形色天性也惟聖人然後可以踐形若顔子者亦庶幾可謂踐形而無愧於為人矣大約異端言仁指的是那能視能聼能言能動的那箇吾儒言仁指的是這能勿視能勿聴能勿言能勿動的這箇這箇道理至淺至深至易至難𤣥虚奥妙莫有過於此者若舎此别談𤣥虚奥妙余豈知之哉非禮勿視四句非字不同有非者有非之非者有似是而非者非者不難勿非之非者亦不難勿惟似是而非者為難勿故曰非禮之禮非義之義大人弗為這等去處非顔子不能剖析學者能體㑹得聖人訒言之意雖言以終日亦謂之訒不然即閉口深藏亦訒之蠧也故曰吾與回言終日又曰予欲無言有言無言真不在言上説仁者其言也訒訒之云者非徒不言也蓋太極之理動而生陽靜而生隂不靜專則不動直不靜翕則不動闢故子思曰小徳川流大徳敦化訒之云者亦敦化意也聖賢道理原自精細聖賢學問原自深湛故易曰洗心退藏於密詩曰夙夜基命宥密訒之云者亦藏密意也大抵人之精神最忌外露人之力量最怕輕洩士君子果能收歛這一段精神􅌢固這一段力量如猫之捕䑕如鷄之抱卵不識不知勿忘勿助到此地位才是真為之難才是仁者其言也訒這等去處别人識不得須是要自家内省内省者收視返聴自家黙黙湛思黙黙㸃檢耳後世學者豈不毅然要做好人但終日外省處多内省處少如何筭得故次章即云内省不疚夫何憂何懼而子思亦曰内省不疚無惡於志君子之所以不可及者其惟人之所不見乎正得夫子告司馬牛之意吾輩為學須是要在人所不見處用功示泰安學諸生泰安諸生講富與貴是人之所欲廣土衆民君子欲之孔子登東山而小魯三章盖聖賢道理原是一貫此三章書只當作一章㸔大約學者只是在富貴貧賤上打不破徒自纒擾一生安能到聖賢地位所以然者只是㸔得大行能加所以不能審富貴㸔得窮居能損所以不能安貧賤若是能㸔破大行原不能加富貴自然能審㸔破窮居原不能損貧賤自然能安一切世味都擺脱得開瀟灑快樂自然睟面盎背所見自然大所處自然髙當下便是登東山而小魯登泰山而小天下的境界睟面盎背就是成章氣象在水謂之瀾在日月謂之光所性是何物就是此仁在水謂之源在日月謂之明故曰仁義禮智根於心此所以君子無終食之間違仁造次必於是顛沛必於是也君子之志於道也志此而已矣或曰富貴貧賤勘得破便到聖賢地位抑何其言之易也曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲又曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也由此觀之言何容易雖然孔顔樂地非難造好讀誠明定靜書願與諸生共懋勉之昔人有言過得貧富關便是小歇處過得生死關便是大歇處余以為貧富關便是生死關過此便是大歇處何云小也嗚呼人能過此關天下何事不可做昔涇野先生教人惓惓以甘貧改過為訓而谿田先生深以為然此正前輩學問真切處非後學可及雖然不甘貧就是過能甘貧就是改過仔細㸔來世間人種種過失那一件不從富貴貧賤念頭生來卑卑者無論即髙明有意思者亦往往堕此坑塹良為可惜諸生不可不時時惕然猛省富貴貧賤自有定數欲之不能來惡之不能去世之人徒多費此一畨欲惡耳不處不去君子只是箇勘得破富貴是人所欲貧賤是人所惡受病之根正在此欲惡二字君子之心如鑑之空如衡之平原未嘗先有欲惡二字横於中所以富貴貧賤到前便能審之安之如鑑本空而妍媸自辨衡本平而輕重自分不然饑者甘食渇者甘飲其如飲食之正味何無終食之間違仁造次必於是顛沛必於是只是此心常惺惺要不失此真體耳非分外硬將一物强置之胸中必於是必於是也富貴貧賤不當著跡㸔日用間富貴貧賤時時都是有的且如食求飽居求安便是欲富貴心惡惡衣惡食便是惡貧賤心豈止於此大凡念頭起處都是富貴貧賤所在此所以時時要照管時時要收攝不然若著跡㸔則三公萬鍾一生能遇幾次所云終食不違造次顛沛必於是者果何物耶念及於此此心真是一時放下不得君子所性仁義禮智根於心惟根於心所以能生色可見根之一字最要緊世間諸凡作用如事功節義之類都只是枝葉枝葉有遇有不遇而惟此根乃是人人有的故曰人性皆善有此根則時而大行如樹木遇春夏其枝葉自然發生於此根實無所加時而窮居如樹木遇秋冬其枝葉自然收藏於此根實無所損故東廓先生云世俗通病只認得箇有才能有勲業有著述的聖人不認得箇無才能無勲業無著述的聖人此實根本之論嗚呼人人有此根人人不肯自認有此根徒只在枝葉上用功何也自笑從前顛倒見枝枝葉葉外頭尋誠切中後世學者之病問孔子之道精矣微矣孟子苐以登東山而小魯云云形容之何也曰觀水有術必觀其瀾日月有明容光必照焉然則學聖人者奈何曰流水之為物也不盈科不行君子之志於道也不成章不達雖然吾輩今日不當在成章上馳騖只當在成章以前用功或曰何也曰觀水有術必觀其瀾日月有明容光必照焉孟子豈徒曰觀之而已哉知此則知聖道之所以大知此則知君子之所以成章示濟南厯城兩學諸生古今談道者多矣莫精於費而隠一言若曰君子之道費而隠非隠而隠也子思有感於當時昏昧渺㝠虛無寂滅之説行故為是言以覺之然亦非自子思始也夫子曰二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也又曰予欲無言天何言哉四時行焉百物生焉天何言哉知此則昏昧渺㝠虚無寂滅之説不攻自破矣知此則知道知中知學及其至也聖人亦有所不知不能天地亦有所憾此是論道理如此然學者只當極力以求其至不可以聖人之不知能自諉下文曰至誠曰至聖曰至徳至道曰至矣總是發明此意這至字不在髙逺上説就是中庸故曰中庸其至矣乎又曰中庸不可能也中庸二字雖聖人天地亦有不能盡處故堯之允執舜之精一一生兢兢業業只是為此若中庸是容易的堯何必允執舜何必精一堯舜又何以曰猶病哉註謂覆載生成之偏寒暑災祥之不得其正夫曰偏曰不得其正可見中之一字天地亦有不能盡處此所以人猶有所憾若把至字㸔的太髙逺便非中庸之旨且天地聖人有所不能盡的道理就是愚夫愚婦所與知能的道理下文説到參天地贊化育説到篤恭而天下平才只是盡了愚夫愚婦的道理其實於愚夫愚婦道理上一毫無所加才謂之中庸才謂之至然篤恭而天下平即修已以安百姓堯舜其猶病諸故曰聖人亦有不知不能夫以天地之化育而尚賴聖人以贊之故曰天地之大人猶有所憾可見這中庸道理匪髙匪卑匪逺匪近匪難匪易如以為髙逺而難也難道自家不如愚夫愚婦如以為卑近而易也又難道自家過於天地聖人至乎至乎可不勉哉自老子有道可道非常道名可名非常名之説於是逺人為道者索隠行怪求之於虚無寂滅之域子思子憂之不得已有鳶飛魚躍之説若曰斯道在天地間舉目皆是舉足皆是何可道何不可道何可名何不可名無内無外無有無無無之非道無之非名無之非學閉門靜坐則靜中有鳶飛魚躍之趣應事接物則動中亦有鳶飛魚躍之趣推之至於夢寐之中則夢寐中亦有鳶飛魚躍之趣推之至於造次顛沛之時則造次顛沛中亦有鳶飛魚躍之趣故夫子夢見周公豈真有周公之揖讓造次必於是顛沛必於是所必於是者又果何物何事也哉信乎知鳶飛魚躍之趣則知道可道為常道而道不可道者非常道名可名為常名而名不可名者非常名老子虚無寂滅之説當不待辨而知其非矣右數則皆因諸生講此書遂書以示之雖聖賢精藴未必甚解但藉此與諸生相印證耳雖然余之所以惓惓於諸生者又不顓在此講説間也乙未冬日長安馮從吾仲好甫書于濟南之澄清軒昔楊子之隣人亡羊追之不獲曰岐路之中又有岐焉不知所之楊子戚然變容者竟日余觀近日博士家逐迹䘮真殆不幸類是夫書者聖人之迹也而有不可傳者存焉惟大覺𤣥解始能旦暮遇之而近日博士家慕弔詭則支離傳註狃發蒙則懼傷口珠或夢中占夢而自謂全覺或學一先生之言而暖姝自喜是何其多岐也夫赤水𤣥珠知珠不能索而得糟魄之喻斵輪者所以釋椎斵而議讀書之君也然則逐迹䘮真之士安得不厪朱公之戚哉侍御馮先生以關陜大儒出入金馬之門已而簪筆柱下代狩東省廵厯之暇時進諸博士弟子與之辨析精微愍大道之多岐而亡羊者衆也因錄次成書命之曰訂士編云意與諸博士弟子相印證也余得而卒業焉大都闢博約一貫之道發克復四勿之功明根心定性之旨而歸重於先立乎大之一言推原費隠之説仲尼之中庸而拈出淡字固字之義尤宋大儒所未發直指良知為作聖之基而勘破生死貧富之關至於由回之志顔冉司馬之仁孔曾孟子之學術事功又各歴歴剖之詳焉去聖人二千餘嵗矣僅僅數千言胠其關鍵曲盡閟妙筌蹄盡化而不出其宗噫化聲邪法音邪三籟邪子靜登壇新建提衡淵淵理窟哉余掊知雪神恍見徳機而知先生之發吾覆也乃請其草授之剞劂氏嘉與海内諸博士弟子共印證之都人士聆真人之謦欬得未嘗有何啻逃空谷者忽聞足音也疇不跫然而喜左袒下風乎出涯涘而觀大海庸詎東省十數學宫而已哉先正李文達嘗言宦途惟薛大理以理學為務兹觀馮先生雅有文清夫子之風焉是編出而宋儒先又樹一赤幟矣海内博士家誠無樂鴳於鐘皷無求馬於唐肆滌除宿根掃撤塵障而别具隻眼焉周道如矢君子所履豈惟永無岐路之泣即向所稱聖人之不可傳者盡在是矣屬下直𨽻河間府知府陳邦科頓首謹書少墟集巻四
