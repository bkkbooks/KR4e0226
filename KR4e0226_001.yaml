body:
  text: 少墟集巻一明馮從吾撰語録辨學録原序心學之傳始自虞廷而其言曰人心惟危道心惟微惟精惟一允執厥中十六字言本體辨析至精言工夫條理極宻萬世道學之宗統於是矣後世學者寖失其宗不知中之所在而概以心當之扵是以覺言道而不以所覺之理言道其言盖淫扵佛氏空覺極圓之説以無善為心體以天生蒸民本有之性悉掃而空之其弊至扵率天下之人恣情縱欲流扵小人之無忌憚而猶自以為無礙也聖學之蓁蕪可勝慨哉少墟馮公潛心理學積有嵗年精一之功入扵無間近得其所與諸門人辨學録讀之直指心之理為道心以心之覺為人心道心非無覺以覺之正當處言也為書八十一章闡性命之秘辨似是之非如所云吾儒之㫖只在善之一字佛氏之㫖只在無善二字又曰儒學只有一箇善字直從源頭說到究竟更無兩様故易曰繼善顔曰一善曽曰至善思曰明善孟曰性善又曰孳孳為善善總是一箇善為總是一箇為非善與利之間復有無善之善嗚呼盡之矣善即理也即道也即中也精乎此謂之惟精一乎此謂之惟一執乎此謂之執中以之為君謂之仁以之為臣謂之敬以之為子謂之孝以之為父謂之慈以之交朋友謂之信以之視聽言動謂之禮以之臨大節而不奪謂之節皆理也道也中也此吾儒之正傳孔孟相與講求切磋以教天下萬世只此一脉以維持宇宙更無餘藴矣少墟辨析於毫髪之間凡世儒所易惑處輒為道破吾儒之家寳始復其舊佛氏之流弊始塞其源虞廷心法於是乎曉然復明於天下矣其功不亦偉歟不敏與少墟共叅此學於十餘年之前已亥以後不相聞者幾十年而少墟究理愈深辨學愈晳頃者不敏叨撫榆陽得以所學知止一宗逺求印正少墟以為有當也所以相期於必至之域固有不言而信者矣若夫少墟立朝大節居鄉儒行卓然於一時固薦紳士大夫所共服也篤實輝光之應豈偶然哉豈偶然哉萬厯三十五年歳在丁未春仲之吉賜進士第中憲大夫欽差廵撫延綏等處地方贊理軍務都察院右僉都御史豫章涂宗濬書王文成掲良知之學新天下耳目其論自正而其徒賢知之過者浸淫竄入于禪今且百年而弊滋甚于是格物脩身兩家之說復起或矯枉救失或標宗分門紛若聚訟矣不佞竊謂道本一貫求之言語文字則支離蔓延愈益晦塞夫格物致知脩身何可偏廢也長安馮仲好辨學録凡八十一章其首章云聖賢學問總在心上用功不然即終日孳孳屬枝葉耳所以辨心學甚詳或言仲好之學又似專以正心立教者非也身外無心心外無意知物道一而已惟以言語文字自為一家而後衆言淆亂聽其說可喜而覈其實則乖仲好為析是非決嫌疑使大道不迷於他岐則脩身正心誠意致知格物一以貫之矣昔孔子論性相近而孟子獨稱性善孔子多言仁而孟子每言義彼願學孔子者豈顧倍之要以是時淫辭邪說熒惑天下欲正人心必就其蔽錮關切之所在而剖決挽回之故曰予豈好辨哉予不得巳也不佞未見仲好全録而苐據前數章所論辨意當如此與仲好談者張孝亷心虞傳其録者張右丞憲周仲好有訂士編善利圖説士戒關學編諸書與此互相發明蓋自得之見不易之論合而觀之知學不可無辨辨不可無録録不可無傳矣又余自秦入晉張右丞以馮仲好辨學録廹余序之余所見才數章皆論心語倚馬成草姑以塞諾耳久之得全録而知仲好所辨在儒學釋學其論極為精微也釋初入中國所傳經語義猶淺其後乃有禪或不立文字净知妙圎體自空寂或以不思善不思惡本來面目或不看經念佛無事省縁静坐體究所謂彌近理而大亂真者其源皆自不辨心性始吾儒曰盡心知性釋亦曰明心見性若相同而實相逺蓋本之告子告子非不言心而曰不得于言勿求諸心惻隱之心仁也羞惡之心義也而曰仁内義外非不言性而曰猶杞栁猶湍水曰生之謂性孟子辨之不遺餘力世無孟子而釋氏以告子之說簧鼔天下論性曰在目為見在耳為聽在口為議論在手能持在足能運又曰衆生皆有佛性噬人之獸可為瞿夷比丘十千之魚盡為忉利天子曰離一切心即汝真性曰禪學悟入乃是心思路絶天理盡見曰心法起滅天地朱子惜其明心而曽不得心為之用見性而曽不得性為之用則以知覺運動之性為性而非義理之性以惟危之人心為心而非惟微之道心也人之所以異于禽獸者幾希耳心性一謬人與禽獸何殊此其學術視吾儒本原若緇素然又安往而不謬哉吾儒萬物皆備于我而釋惡外物吾儒循理心虚而理實而釋以理為障吾儒學不躐等而釋病其迂一超直上好竒弔詭之士墮其雲霧中于是攘莊列之言以佐其髙如宋景文所云抑自覺其陋而更出巳意益求前人所不及者入之而諱其恠幻鄙俚之談如朱紫陽所云而禍始烈有謂盜賊念佛免罪為聖人大改過者有謂造無限罪惡而遷謫時剗地說禪者有謂識透即罪惡都無者禪自禪罪惡自罪惡是禪學且為亂賊三窟矣愚不肖者復惑於輪廻因果之說而皈依之而彼且曰度盡衆生方了菩提衆生度盡又惡用世界為也昔鵞湖之學墮于禪朱子辨之不啻孟子之於告子至今日乃有舍喜怒哀樂未發之中而談無善無惡心之體又曰無求同異于儒釋求其是者而學焉可矣無求是非於講說求諸心而安焉是矣遂使儒門頓有三釋以雪峰雲門過孔子上儼然為釋傳法沙門建幡告四逺則逢䝉殺羿者也左右采獲自負集儒釋大成而所崇信惟釋則游說反間渠成而利秦者也隂宗其指陽避其名既得欛柄入手開導之際改頭換面隨宜說法則暮夜詩禮發冢之盜恐東方明者也凡此皆起于學之不明學之不明起于心性之不明而仲好之所為力辨也辨者亦有之曰釋見聖人之上一截儒得聖人之下一截是以下學上達為二學也曰儒釋本同而末異是以物有本末為二物也無為貴辨矣仲好直窮其本之不同而其學之不可以達明鏡之照利斧之斷芟夷藴崇之加蔓草何以過兹明道先生言㑹者大率談禪天下成風設有數孟子無如之何故宋時辨釋學者惟周程張朱其詳具遺書語録文集中而本朝惟羅文莊困知記今得仲好羽翼之幸甚猶恨無羽翼仲好其人者而何得以好辨疑仲好也大泌山人李維楨本寧父吾鄉先正道林先生少嬰羸疾入山習静不言黙識者三年自是洞然於性命之學古人學問多從病中生也少墟先生生而善病弱不好弄甫就外傅即鋭然志於聖學先後從敬菴魯源兩先生遊及官中秘柱史未嘗一日輟講歸而卧病閉關九年精思力踐遂入聖人之室所著疑思録學會約善利圖說多先生病言而辨學録一書尤先生静中妙悟見儒釋所以分別處皆昔賢所未發也陽明先生謂釋氏與吾儒只是毫釐之隔先生獨辨其宗㫖不同如薫蕕冰炭之不相入余嘗撮舉一二如曰吾儒之學以理為宗佛氏之學以了死生為宗仙家自有仙家宗㫖佛氏自為佛氏宗㫖與吾儒全不相干曰吾儒論學只有一箇善字曰天命之性就是命之以善善何曽有聲有臭曰操則存舍則亡出入無時莫知其鄉僅僅十四字解人心惟危道心惟微曲盡其妙曰佛自佛儒自儒不混而為一曰吾道本大何必兼二氏而後見其大邪固不能兼正正豈可以兼邪皆先生獨得之見千言萬語惟恐學者墮入罟擭陷穽之中蓋吾儒之道如渡江河之有維楫揚帆鼓柁中流自在而行彼真空妙有把柄何在如以飄飄不繫之舟試於黒風白浪何嗟及矣此先生惓惓欲人求之實地也先生清明在躬志氣如神然終日正襟危坐儼乎若思應事接物如執玉如捧盈此心未嘗一刻放下先生有主之學於是可見昔横渠學凡數變陽明亦悔二十年錯用其心先生過人逺矣余生於闇齋道林二先生理學之鄉愧不聞道賴先生時時教之若將興起焉者為妄綴數語以志依歸之意若先生微言妙論余固不足以知之也武陵後學楊鶴頓首書孔子曰有弗辨辨之弗明弗措也夫學問思行學巳賅是矣猶必明辨云者謂不如此譬之適越而北其轅彌學彌逺彌行彌差矣乙已秋鳳翔張心虞孝亷訪余山房而二三門人聞心虞至亦多朝夕過從共談心性之學秋涼夜静語話偏長別後因録其相與發明者得八十一章雖下學上達之㫖不敢謂得一貫真傳而吾儒異端之辨或亦可以俟後聖于不惑耳夫以余之闇汶曽何足與聞斯道而一得之愚得之朋友講習者為多于是益信明辨之功其益果大而曩所稱弗明弗措原非有心弗措辨至此雖欲措焉不能也于是題其篇曰辨學録長安馮從吾識辨學録自古聖賢學問總只在心上用功不然即終日孳孳總屬枝葉右一章聖賢之學心學也然心亦有不可不辨者故曰人心惟危道心惟微惟精惟一允執厥中若不辨人心道心而第曰只在心上用功則遍周法界之說當與精一執中並傳矣右二章孔門不輕言心其自敘曰從心所欲不踰矩其稱囘曰其心三月不違仁其警人曰無所用心難矣哉言心便言矩便言仁此道心之說也言心便言用此精一之説也以道心為主則心有所用而不落于空人心悉化為道心即心即矩即仁即心是言仁即所以言心也又何必數言心哉不然舍矩言心舍仁言心又舎用言心則此心了不可得而左袒人心者得借口矣右三章孟子論心之本體歸之理義故曰心之所同然者何也謂理也義也論心之工夫歸之操存故曰操則存舎則亡此正孟子得統于孔子處若言心不言理義則本體涉于虚言理義不言操存則工夫流於泛便非孔門惓惓論仁之㫖右四章人心至虚衆理咸備丢過理說心便是人心惟危之心即有知覺是告子知覺運動之覺佛氏圓覺大覺之覺非吾儒先知先覺之覺也覺之一字亦不可不辨知覺的是天理便是道心知覺的是人欲便是人心非槩以知覺為天理為道心也若丢過理字説心說知覺便是異端右五章程子曰理與心一而人不能會之為一朱晦翁曰此心虚明萬理具足外面理會者即是裏面本來有的陸象山曰人心至靈此理至明人皆有是心心皆具是理又曰此心同也此理同也薛文清亦曰心所具之理為太極心之動静為隂陽而王陽明亦曰人心一刻純乎天理便是一刻的聖人終身純乎天理便是終身的聖人此理自是實自來吾儒論心都不曽丢過理字若丢過理字可以言心則先儒之說皆誣而象山心皆具是理此理同也二句皆剰語矣右六章問心可有乎曰不可有問心可無乎曰不可無或又問心可有乎曰可有心可無乎曰可無或者未達曰人心可有乎曰不可有道心可無乎曰不可無道心可有乎曰可有人心可無乎曰可無曰如此則又何未達之有或者憮然曰而今而後始知心果具是理而堯舜其心果至今在也右七章世俗之所謂有心有的是人心吾儒之所謂有心有的是道心異端之所謂無心無的是道心吾儒之所謂無心無的是人心這等去處辨之不可不精故曰惟精守之不可不一故曰惟一一則純是道心無復有人心之雜矣故曰允執厥中必如此方不墮世俗之弊流異端之非右八章楊龜山曰六經不言無心惟佛氏言之有人說無心伊川曰説無心便不是只當說無私心無私心三字可為千古名言程門之所謂私心即虞廷之所謂人心也此不可不無者也右九章問私心私也有求公之心亦私也何如曰有求公之心便是公如何説亦是私右十章人心一槩說不得有亦一槩說不得無如均喻也喻利之心不可有喻義之心不可無均為也為惡之心不可有為善之心不可無均報也報怨之心不可有報徳之心不可無均憂也憂貧之心不可有憂道之心不可無可見人心原一槩說不得有無只當論其所有所無之心為何心可耳右十一章吾儒曰喻利之心不可有異端曰喻義之心不可有吾儒曰為惡之心不可有異端曰為善之心不可有或詰之曰喻義之心不可有喻利之心可有乎為善之心不可有為惡之心可有乎彼則曰喻義之心且不可有况喻利乎為善之心且不可有况為惡乎夫喻利之心為惡之心固不可有喻義之心為善之心豈可無而彼亦以為不可有如此為言雖中人亦知其非彼又恐人之非之也復倡為一切總歸于無心之說以為人之心體本空無利無義無善無惡者其本體也必也無喻利心併無喻義心併無無喻義心無為惡心併無為善心併無無為善心一切總歸于無心方合本體耳說至此雖髙明亦莫知其非矣不知說至此正是發明喻義之心不可有為善之心不可有處奈何不察而誤信之邪且義原非外性原是善心之本體原是有善無惡的可見必有喻義為善之心而後為合本體也今欲一切總歸于無心安在其為合本體邪况人心易放而難收儘去喻義猶恐喻利儘去為善猶恐為惡今欲一切總歸于無心竊恐義無而利未必無善無而惡未必無反為本體之累不小也又安在其為合本體邪又况義利只有兩途人心原無二用出于義即入于利出于善即入于惡豈有無義無利無善無惡一切總歸于無心之理乎大抵義原非外特自有其義之心不可有而喻義之心必不可無性原是善特自有其善之心不可有而為善之心必不可無縱是喻之又喻以至于化為之又為以至于忘造到上天之載無聲無臭處只好說有喻義之心而至于化有為善之心而至于忘有喻義為善之心而無聲臭之可儗亦說不得喻義之心不可有為善之心不可有今曰喻義之心不可有為善之心不可有此孔子所謂小人而無忌憚者之言不待辨而知其非者也右十二章問天命之性無聲無臭原着不得善字曰天命之性就是命之以善何消着故曰性善孟子道性善正直指天命之初而言耳又問無聲無臭何也曰善曽有聲有臭耶右十三章天命之性如一陽來復造化生意雖未宣洩而凡宇宙間形形色色萬紫千紅無一不胚胎完具于其内故曰天命之謂性此自是實在道理原不落空若曰天命之性𣺌渺冥冥一切俱無如此不知天命的是箇甚麽便于天命二字說不去矣右十四章無適莫心而有比義心者君子也有適莫心而無比義心者衆人也無適莫心而併無比義心者異端也異端之說恰似髙于吾儒不知心無二用一無比義心便有適莫心既有適莫心而又無比義心此異端之學依舊落于衆人可見道理本自明白特人不察耳右十五章問人心一槩說不得有無此是論工夫若論本體則無善無惡全說不得有矣異端無心之說蓋指本體也似亦有理曰不然論工夫心原一槩說不得有無還有不可不有者不可不無者若論本體則全說不得無矣故孟子曰無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也曰無曰非何等明白又曰惻隠之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之惻隱之心仁也羞惡之心義也辭讓之心禮也是非之心知也仁義禮知非由外鑠我也我固有之也曰皆有曰固有又何等明白而曰本體無善無惡異端無心之說專指本體而言誤矣右十六章問近日學者亦知無善無惡之說之誤又講起有善之善有無善之善之說若謂善之善對惡而言也無善之善指繼善之初不對惡而言也惡如彗孛妖氛善如景星卿雲無善之善如太虚惡如木石屑善如金玉屑無善之善如目中不容一屑何如曰吾儒之㫖只在善之一字佛氏之㫖却在無善二字近日學者既惑于佛氏無善之說而又不敢抺摋吾儒善字于是不得已又有無善之善之說耳不知吾儒之所謂善就指太虚本體而言就指目中之不容一屑而言非專指景星卿雲金玉屑而言也善字就是太虚非太虚為無善之善也乃若其情則可以為善矣乃所謂善也由可以為善之善才見得乃所謂善之善兩箇善字原只是一箇豈有可以為善之善乃與惡對之善乃所謂善之善乃無善之善之理哉右十七章問有其善喪厥善有意為善雖善亦私可見善原是不可有的彼無善無惡之說有無善之善之說或亦未可盡非也曰有其善喪厥善有意為善雖善亦私是謂工夫不可自有其善不可有意為善耳非謂善不可有亦非謂本體無善無惡善有善之善有無善之善也右十八章問無善無惡有無善之善之說彼欲以無字藥有其善有意為善有字之病非得已也曰有之一字病痛誠無窮如有詩文者以詩文自髙有功名者以功名自髙有氣節者又以氣節自髙傲世凌物令人難近或以為名之心為善或以為利之心為善或又以以善服人之心為善假公濟私令人難測如此是皆有其善有意為善之病不知一有其善便不是善故曰喪厥善一有意為善便不是為善故曰雖善亦私至于喪至于私則善于何有如此是其病正在無善也而又誤以無藥無豈不益助其病而速之亡乎且心之本體原有善無惡而誤為無善以藥人之病夫醫先自誤也其如藥人何右十九章山下出泉本源原清漸流漸逺有清有濁謂有濁而清名始立則可謂流之清對濁而言則可謂水之源無清無濁則不可謂流之清為清之清源之清為無清之清則不可知此則本體無善無惡之説有善之善有無善之善之說是非不待辨而決矣右二十章山下出泉本源原清此性之說也漸流漸逺有清有濁清者勿使之濁濁者復澄之清此學之説也三品之説是徒知漸流漸逺有清有濁未嘗不是而不知山下出泉本源原清澄濁求清非義外也慈湖之說是徒知山下出泉本源原清亦未嘗不是而不知漸流漸逺有清有濁則澄濁求清非揠苗也嗚呼不知本體者疑性之或惡而既以學為義外知本體者信心之即道而又以學為揠苗學果何日而明哉右二十一章天地間道理有竒便有偶如有陽必有隂有晝必有夜有中國必有外國有君子必有小人至于天人理欲公私善惡之類皆是若不扶陽抑隂不尊中國攘外患不進君子退小人不存天理遏人欲而曰無隂無陽無内無外無君子無小人無理無欲無無亦無與其譽堯而非桀不如兩忘而化其道此大亂之道也右二十二章與其譽堯而非桀不如兩忘而化其道譽字下得有毒道字占得地步堯千古大聖人也稱之原非譽而曰譽令人不敢開口矣故曰毒堯桀兩忘原非道而曰道雖自己占地步其如害道何孔子祖述堯舜孟子言必稱堯舜使人人以堯為法以桀為戒才是大公至正才是相忘而化其道今曰不必堯之是而桀之非則是舜蹠不分善利不辨令人何所法戒何所適從而曰道道豈如是耶後世以君子小人參用為大公至正而曰建中靖國病正坐此不知以君子小人參用為中中豈如是耶道字中字不明關係不小不可不辨右二十三章吾儒之所謂道正指其可道者而名之也而異端則曰道可道非常道是明以不可道者為道矣又曰上徳不徳是以有徳是明以不徳為徳矣無善之善其說蓋本之此嗚呼以不可道為道以不徳為徳以無善為善則善者為有善之善惡者為無善之善君子絀而小人肆矣右二十四章無無亦無之說人爭談之不知使人心而果能無無亦無也在吾儒固非中道在異端猶成一家不知人心原是活的心之神眀原不可測如無一分公心便有一分私心無一分善心便有一分惡心公私理欲原相為勝負原不容並立原無一切俱無之理今却欲無無亦無不知公心一無私心便有善心一無惡心便有無者真自信其無有者又不覺其有一不覺其有雖流禍至于不可救藥而亦不自覺矣是無無亦無之說徒隂縱私欲而使之長也豈能無無亦無哉右二十五章君子無心于功名却有心于斯世小人無心于斯世却有心于功名右二十六章人心最不可有物人心又最不可無主以公為主則私之物自無矣以理為主則欲之物自無矣譬如太陽當空則魍魎自息主翁在室則僕𨽻自馴若懲魍魎而併揜太陽懲僕𨽻而併逐主翁吾懼其魍魎愈熾而僕𨽻愈縱横也是誰之過與孔子曰苟志于仁矣無惡也孟子曰先立乎其大者則小者不能奪也此人心不可無主之說也右二十七章吾儒論學只有一箇善字直從源頭說到究竟更無兩様故易曰繼善顔曰一善曽曰至善思曰明善孟曰性善又曰孳孳為善善總只是一箇善為總只是一箇為非善與利之間復有箇無善之善也功夫雖有生熟道理却無兩様故孔子曰道二仁與不仁而已矣今曰有善之善對惡而言有無善之善不對惡而言則是孳孳為善之善為其對利而言之善也而善與利之間復有箇無善之善在矣有是理哉右二十八章有意為善有所為而為如以為利之心為善為名之心為善以以善服人之心為善之類非以安而行之為無意為無所為利而行之勉強而行之為有意為有所為也今人見人孳孳為善而槩曰有意槩曰有所為則阻人為善之路矣右二十九章書曰善無常主協于克一孔子稱回曰得一善拳拳服膺而勿失可見善原只是一箇善豈有有有善之善無善之善兩箇善之理古之聖賢若預知後世之必有為此說而預防之者竒矣竒矣右三十章異端之說陽欲髙出吾儒隂實左袒世俗此所以嗜好者多且世俗之人有明白好利忘義者亦有内好利而外假仁義者這等人自已不喻義為善而又忌他人之喻義為善心欲非之而無其辭今一旦倡為喻義之心不可有為善之心不可有而又極稱無無亦無之說以伸其辨彼世俗之人聞此言欣然得借以非人益欣然得借以自便如此豈有不嗜好之理彼其說誠有以隂中其心故也其他如聖人不仁伯夷死名一切無礙之類未易枚舉總只是左袒世俗此所以學異端者多好利敗名非其人甘于不肖亦其說自誤之耳右三十一章易曰易有太極又曰無思無為若曰這箇太極乃天地間自然的道理故曰無思無為若不說出箇易有太極而第曰無思無為不知無思無為的是箇何物詩曰天生蒸民有物有則又曰上天之載無聲無臭若曰這箇物則乃天地間自然的道理故曰無聲無臭若說不出箇有物有則而第曰無聲無臭不知無聲無臭的又是箇何物夫有太極而無思為有物則而無聲臭乃吾儒正大道理正大議論與佛氏不同若丢過太極專講無思無為丢過物則專講無聲無臭是無思為而併無太極無聲臭而併無物則也有是理乎講的雖是吾儒的話頭其實墮于佛氏之見而不自知矣或曰中庸引無聲無臭亦不曽說出物則何也曰中庸雖不曽説出物則不知所謂徳所謂敬信所謂篤恭者是何物耶若丢過徳丢過敬信篤恭而直曰無聲無臭有是理乎孔子曰毋意又曰誠意曰無知又曰致知若曰必誠意而後能毋意必致知而後能無知也必毋意而後見其真能誠意必無知而後見其真能致知也故曰誠無為又曰不識不知順帝之則雖無為却有誠雖無知識却有帝則若丢過誠意而專講無意丢過致知而專講無知則亦墮于佛氏之見而不自知矣慈湖曰人性自善衆徳自備無之斯闕有不為異可謂千古名言惜乎以無意為宗而不信誠意令人有餘恨也右三十二章吾儒之言曰易有太極是生兩儀而異端之言曰有物渾成先天地生恰似一様不知吾儒所謂太極指實理而言異端所謂有物指谷神𤣥牝而言不可不辨右三十三章自異學言無而世儒多爭言無以為精微奥妙不知精微奥妙處豈專在無之一字哉易有太極敢道這有之一字説他不精微奥妙不得右三十四章使契為司徒教以人倫此堯舜首開萬世教學之原而曰父子有親君臣有義夫婦有別長㓜有序朋友有信此五箇有字何等明白而異學爭言無世儒又從而附和之何也不知使父子無親君臣無義夫婦無别長㓜無序朋友無信是何道理成何世界于此而後知聖人之為慮逺而儒佛之辨不可不嚴也右三十五章父子有親君臣有義夫婦有別長㓜有序朋友有信這五箇有字都是天生來自然有的在易為太極在書為恒性在詩為物則天命之性命此者也率性之道率此者也脩道之教脩此者也惟其都是天生來自然有的何假思為故曰無思無為何假學慮故曰不學不慮曰無思無為不學不慮恰似精微奥妙曰有親有義有別有序有信又何等平易明顯即平即竒即顯即微不離日用常行内直造先天未畫前此吾儒之所謂有無非異端之所謂無也右三十六章問無思無為大意曰無思無為何思何慮此吾儒之微言也而混佛者亦多喜談之不可不辨昔有一士人問某公無思無為之說者答曰汝目自能視耳自能聽饑來自能喫飯倦來自能眠有思乎有為乎寂然不動感而遂通何思何慮其人聞其言大悦不知這等講無思無為便是佛氏之㫖或問如何是吾儒之㫖曰不過就某公之言下一轉語耳曰目自能視視自能明耳自能聽聽自能聰饑來自能喫飯喫飯自能知味倦來自能眠眠自能知節有思乎有為乎寂然不動感而遂通何思何慮如此講無思無為便是吾儒之㫖此毫釐千里之辨也何也彼只說目自能視更不説論理之可視不可視有這箇明的道理只說耳自能聽更不說論理之可聽不可聽有這箇聰的道理只說饑來自能喫飯倦來自能眠更不說論理之可喫不可喫可眠不可眠有這箇知味知節的道理若曰一論可不可便是有揀擇心有分別心有取捨心便是有思有為便不是了不知目雖自能視耳雖自能聽饑來雖自能喫飯倦來雖自能眠這箇可視不可視明的道理可聽不可聽聰的道理可喫不可喫可眠不可眠知味知節的道理原都是天生來隨耳目口體自然有的豈待思豈待為豈有所揀擇分別取捨于其間哉某公之言未嘗不是只是丢過理字空說目能視耳能聽饑來能喫飯倦來能眠單在氣質情欲上說所以為異端所以悞人耳且人之所以異于禽獸者幾希全在此理之一字若不論理則禽獸目亦自能視耳亦自能聽饑來亦自能食倦來亦自能眠亦無思無為人與物何以辨別而人又何以參三才而稱靈于萬物哉故曰此毫釐千里之辨也且如知覺運動視聽飲食一切情欲之類原是天生來自然的原無思無為寂然不動感而遂通何思何慮佛氏窺見這些子遂以此為真性遂把吾儒這箇理字以為出于有思有為出于偽如告子以人性為仁義莊子以仁義為殘生傷性之類不是天生來自然的故孟子不得已指㸃出箇見孺子而怵惕覩親骸而顙泚不忍觳觫之牛不屑嘑蹴之食之類以提醒世迷見得吾儒這箇理字也是天生來自然的無思無為寂然不動感而遂通何思何慮非以人性為仁義而殘生傷性也縱是説出多少功夫千言萬語説思說為只是教人思這箇無思的道理為這箇無為的道理非義外非揠苗非強世也吾儒指的是理異端指的是欲各人宗㫖不同若不察而第曰均講無思無為均講何思何慮是以吾儒之微言為異端之口實也其不至于援儒入佛推佛附儒者幾希右三十七章問如何是思其無思為其無為曰今人乍見大賔承大祭雖甚放肆之人未有不竦然起敬者有思乎有為乎出門如見大賔使民如承大祭雖費思為不過思這箇無思的道理為這箇無為的道理耳至于已饑思食已溺思拯有思乎有為乎禹思天下有溺由已溺之也稷思天下有饑由已饑之也亦只是思這箇無思的道理孩提知愛稍長知敬有思乎有為乎堯舜之道孝弟而已矣人皆可以為堯舜亦只是為這箇無為的道理思其無思為其無為此千古聖學真傳不然起頭一步先錯縱思為到底只成就得一箇五霸假之學問思為愈熟眞心愈喪右三十八章問守與化曰守之又守以至于化便是化如既得後便須放開不然却只是守如此是化可為也自以為得便是無所得一放開便是半塗而廢便是功虧一簣便不是化化只是守到純熟相忘處非越過守別求化也守與化功夫雖有生熟之別却不是判然兩條路或者又云既得後不可放開太早不知只一放開便不是說不得遲早孔子七十而從心所欲不踰矩文王之所以為文也純亦不已若孔子說我得矣便放開便是踰矩文王說我得矣便放開便是已其何以為聖人後世學者只是越過守浮慕化所以敢于放開卒至于流弊不可言右三十九章只說放開便是無所得譬之古人寫字雖寫到縱横變化無所不妙處只是熟了其實不是放開羲之醉後寫蘭亭只是羲之把一生精神都着在字上一息不曽放開所以入于神化而不自知此正見羲之于字學有所得處知此則聖學可知右四十章大而化之之謂聖聖而不可知之謂神越過大字説不得化越過聖字説不得不可知右四十一章論學當先辨宗宗㫖明白功夫才能不差仙家自有仙家宗㫖佛氏自有佛氏宗㫖與吾儒宗㫖全不相干只是後世髙明之士講學不精見理不透誤混而為一一混而為一遂令人難以分辨毋論信佛者即吾儒中闢佛者亦多以上達歸佛以下學歸儒以頓悟歸佛以漸脩歸儒以明心見性歸佛以經世宰物歸儒諸如此類名為闢佛適以尊佛名為崇儒適以小儒何也佛氏上達吾儒下學佛氏得上一截少下一截功夫如此是夫子下學儒而上達佛也是佛反出其上而夫子由下學方能至也可乎脩而不悟豈曰真脩十五志學七十從心漸也以十五而即知志學非頓乎學而不厭脩也黙而識之非悟乎誠則明矣明則誠矣此亦吾儒頓悟漸脩之說也經世宰物而不出于心性安所稱王道先明諸心知所往然後力行以求至非吾儒之言乎今以上以悟以心性歸佛氏以下以脩以事物歸吾儒是佛氏居其精而吾儒居其粗也有是理哉故曰闢佛而適以尊佛崇儒而適以小儒也不知佛氏之失正在論心論性處與吾儒異不專在舍經世宰物而言心性正在所悟所達處與吾儒異不專在舍漸脩而言頓悟舍下學而言上達也惟其論心論性所悟所達處宗㫖與吾儒異所以彼法中原無用此下學漸脩經世宰物之功非舍也况宗㫖一異即用下學漸脩經世宰物之功亦與吾儒不同又何論舍不舍也又况宗㫖一異豈止舍下學舍漸脩舍經世宰物若曰達無所達悟無所悟無無明亦無無明盡即上達頓悟明心見性亦欲舍之矣况學與脩哉而又何經世宰物之與有故學者崇儒闢佛當先辨宗若宗㫖不明而徒嘵嘵于枝葉之間吾恐其說愈長而其蔽愈不可解也右四十二章或者以上以悟以心性歸佛以下以修以事物歸儒闢佛而適以尊佛崇儒而適以小儒無論矣儻有人焉出而洞佛氏之一偏見吾道之大全舉頓悟漸修心性事物而一以貫之可謂千古一快矣而又或過于張皇以為吾儒曰心彼亦曰心吾儒曰性彼亦曰性道理本同但華言梵語異耳且偏處二氏不能兼吾儒而全處吾儒可以兼二氏吾道至大二氏之學雖甚髙逺總不出吾道之範圍也不知吾儒既曰可以兼二氏二氏亦曰可以兼吾儒彼此相兼是混三教而一之也欲以崇儒闢佛而反混佛于儒蹈三教歸一之弊豈不左哉且儒佛既混于是談儒者稍求精更誤入于佛氏闢佛者稍欠精反操戈于吾儒雖名世大儒不能自解免也是其貽禍者一儒佛既混又于是詆儒者摘一二誤入佛氏之語以為非毁攻擊之話柄談佛者借一二吾儒精微之語以為惑世誣民之嚆矢雖大姦巨惡亦難以遽測識也是其貽禍者二向使佛自佛儒自儒不混而為一則談儒者安得誤入于佛氏闢佛者安肯操戈于吾儒詆儒者何所借以肆其毁談佛者何所借以行其私哉且吾道本大何必兼二氏而後見其大若必待兼二氏而後見其大則又安所稱大耶况吾儒正道也異端邪説也邪固不能兼正正豈可以兼邪若正可以兼邪又惡在其為正耶如此是闢佛而亦以尊佛崇儒而亦以小儒也又豈不左哉或曰吾道至大何所不容豈宜自限藩籬不知吾道雖大而彼之論心論性宗㫖原與吾異夫彼先自異也吾又安得強而同之而曰不以籓籬自限哉斯言也蓋為崇儒而混佛者辨非為信佛而非儒者言也若三教日月星之說蓋信佛而非儒者之言人人皆知其非無庸辨矣右四十三章吾儒之學以理為宗佛氏之學以了生死為宗如人生則能知覺運動死則血肉之軀還在便不能知覺運動可見人之生死生死的是血肉之軀這能知覺運動的一㸃靈明真性原未嘗生未嘗死所謂本來面目萬刼不磨者此也悟得這箇便是超悟便知無死無生所謂出離生死見性成佛者此也其悟入處不由積累不由聞見不可言說不可思議只在當下一覺一覺便了更有何事雖中間説得千變萬化其實宗㫖只是如是原來他別是一般話説與吾儒論心性處全不相干蓋性者心之生理吾儒所謂性亦不由積累不由聞見但吾儒以理言非專以能知覺運動的這箇言佛氏惟以能知覺運動的這箇言雖說出離生死其實全落在生死上説不論道理不論工夫只是空空的任這一㸃靈明隨他氣質情欲作用耳可見彼所云性乃氣質之性生之謂性之性吾所云性乃義理之性性善之性彼所云一㸃靈明指人心人欲説與吾儒所云一㸃靈明所云良知指道心天理説全然不同雖理不離氣而舍理言氣便是人欲天理人欲之辨乃儒佛心性之分此宗㫖處不可不辨也蓋彼法中原有宗門有教門宗即是這箇宗㫖別是一條超然直路與教不相關由教而入者便有階級若謂一為教法所縛一落階級便無由超悟故曰世間俗士為名利縛為嗜欲縛其身不得自在小乘人又為空縛為法縛其心不得自在惟大乘人免此二縛謂之解脱身心俱自在得出世之樂又最上一乘有無不立脱縛雙遣當下便是即向所謂見性成佛不由見聞思議之類言至此便誤人不小矣且為名利縛為嗜欲縛彼以為欲障固是至為空縛為法縛彼又以為理障而惟有無不立脱縛雙遣後為最上一乘空其欲而併欲空其理空其理而併欲空其空說的恰似𤣥妙不知一空其理欲將自縱一縱其欲何所底止如此即自號曰我能空其空豈可得耶所以然者蓋由彼所云這箇真性原只是氣質情欲作用原不論道理安得不以理為障原不用功夫安得不以教為縛任水泛濫而無隄防任馬奔逸而無銜轡安得不自悞而誤人哉佛氏差處全在宗㫖宗㫖一差無所不差故曰不可不辨也若夫髠髪出家棄倫遺世雖庸愚亦知其非故不煩吾儒之覼縷也右四十四章喜怒哀樂之未發謂之中是直指天命之性而言也曰未發是無其迹而非無其理故曰天下之大本所謂一理渾然萬化從此出焉者此吾儒之說也而佛氏覺性本空之說則似之以為這一㸃靈明作用的性本來原是空的目惟無覩故能覩耳惟無聞故能聞心惟無知覺故能知覺目雖能覩而所以能覩的真空之性原不可得而覩耳雖能聞而所以能聞的真空之性原不可得而聞心雖能知覺而所以能知能覺的真空之性原不可得而知不可得而覺故曰覺性本空不生不滅若與未發之中相似而不知其實大有不同者吾儒曰未發則目雖無覩而天命真覩之理已具無覩故能覩以無覩而有覩之理也耳雖無聞而天命真聞之理已具無聞故能聞以無聞而有聞之理也心雖無知覺而天命真知真覺之理已具無知覺故能知覺以無知覺而有知覺之理也即發而皆中節覩以天下而無不明而所以能明的真覩之理亦不可得而覩聞以天下而無不聰而所以能聰的真聞之理亦不可得而聞知覺以天下而無不睿知而所以能睿能知的真知真覺之理亦不可得而知不可得而覺故曰上天之載無聲無臭沖漠無眹即萬象森羅萬象森羅亦沖漠無眹未發之中不為無已發之和不為有未發已發渾然一理故中為大本和為達道中和致而天地萬物可位育也種種道理自天命之初已備就是後來多少功夫多少事業都只是率性之道耳吾儒所謂未發全在理上說所以一切作用都是在理字上作用去所以有不容已的功夫不容已的事業喜怒哀樂自然中節天地萬物自然一體佛氏所謂真空不在理上説所以一切作用都是在欲字上作用去所以着不得一毫功夫做不得一毫事業喜怒哀樂全不中節天地萬物全不相干佛氏真空指的是欲之根吾儒未發指的是理之根根宗處止差毫釐作用處便謬千里如此又何論流弊哉右四十五章佛氏所謂直指人心指的是人心所謂見性成佛見的是氣質之性所謂真空空的是道心義理之性只是他議論閃爍變幻不肯明白說破所以易于惑人耳右四十六章吾儒論性以心之生理言佛氏論性不以心之生理言舍心言性舍理言心故曰離一切心即汝真性又曰心生性滅心滅性現所以不得不説無念所以不得不說無心右四十七章佛氏說空說無若示人以可攻之隙却又說空而不無即成妙有用而不有即是真空若一着于空便是頑空非真空矣說的與吾儒未發之中中也者天下之大本無而未嘗不有有而未始不無益相似不知吾儒所謂無是無其迹佛氏所謂無是無其理吾儒所謂有是有其理佛氏所謂有是有其欲真空空的是天理之本然妙有有的是人欲之作用諱空而説真空諱無而說妙有不知愈有反愈逺愈妙反愈差右四十八章吾儒論天命之性説一物不容而實萬物咸備佛氏論真空之性亦說本來無物而實不礙諸物但吾儒上物字指欲下物字指理佛氏上物字指理下物字指欲耳知此則凡與吾儒相似之言俱可不辨而決矣右四十九章或曰性只是一箇性那裏又是兩箇以義理氣質分儒佛余曰人得天地之理以為生此所謂義理之性也而氣質乃所以載此理豈舍氣質而于別處討義理哉性原只是一箇但言義理則該氣質言氣質則遺理故曰氣質之性君子有弗性焉此闢佛之説也且子既知性只是一箇性何不一之于性善之性而獨欲一之于生之謂性之性耶今欲一之于生之謂性而不一之于性善此三品之説所由起也是子自二之三之以至于倍蓰而無算也性豈有二焉孟子道性善故曰夫道一而已矣此吾儒之㫖也右五十章客有以頓悟闢佛氏者或解之曰佛家亦有頓漸二法勤施積行功果圓滿方能了得心性若明心見性之後不加苦行何以成佛達磨面壁九年前此功夫可知也不知吾儒自有吾儒功夫佛氏自有佛氏功夫宗㫖既異功夫自殊即面壁百年亦難與吾儒並論也譬如仙家調息運氣煉丹養神縱下苦功亦何與吾儒事右五十一章不講孔孟之學不在理字上用功縱閲窮載籍坐老蒲團依舊是箇俗人右五十二章問佛氏千言萬語只要抺摋理字回䕶欲字何也曰然吾儒説去欲他却説欲是去不得的吾儒說存理他却説理是不消存的甚且併天理人欲四字都要抹摋中間雖説欲障其實是說理障的客語畢竟要回䕶這箇欲字病痛全在誤認生之謂性一句知覺運動是氣是欲而知覺運動之恰好處是理佛氏原認欲字為性不曽論理安得不抹摋理字回䕶欲字且使人人都講天理人欲四字明白便人人都勘破他的病痛又安得不併此四字俱欲抹摋也且理欲之辨古聖賢言之甚詳彼欲抹摋理而卒不能抹欲回䕶欲而卒不能䕶于是又展轉其說以求勝而曰欲明明徳于天下欲仁而得仁欲何可無向所云云將以求吾所大欲也不知欲明明徳欲仁得仁欲字半虚半實指功夫説人欲之欲欲字全實指本體說安得混而為一况明德與仁俱是理欲明明徳欲仁俱是在理上用功安得借口說是欲而曰欲不可去也學者雖終日講寡欲如孟子講無欲如周子尚且不能寡不能無今曰欲不可去吾懼其欲之流禍不可言也且犬地間理字原是抹摋不得的欲字原是回䕶不得的彼佛氏千言萬語徒以自誤耳右五十三章問天理人欲原分別不得假仁假義天理即是人欲公貨公色人欲即是天理其說然否曰不然既天理即是人欲便是人欲既人欲即是天理便是天理如何説分別不得且仁義原是天理假仁假義便是人欲便不是天理貨色原是人欲公貨公色便是天理便不是人欲如此分別益覺明析而反曰天理人欲原分別不得此隂為縱欲滅理之言不可不察也右五十四章問仁者人也目能視耳能聽口能言身能動人也即仁也何如曰此惑于佛氏之説也視聽言動是氣不是理如何說是仁視聽言動之自然恰好合禮處才是仁耳目口體為形視聽言動為色視聽言動之自然恰好處為天性理不離氣天性不離形色視聽言動之禮不離耳目口體故曰仁者人也非便以能視能聽能言能動為仁也非禮勿視非禮勿聽非禮勿言非禮勿動此正是夫子教顔子為仁髙不騖𤣥逺卑不墮情欲處若不論禮不禮勿不勿而惟以視聽言動為仁是直把氣質作義理名雖騖𤣥逺實則墮情欲矣自古學佛者多恣情縱欲無所底止非獨學者之過亦其始教之差誤之也右五十五章昔人謂佛氏得吾儒之體只是無用又謂學佛有得于形而上者而但不可以治世不知佛氏所以為異端者正在不得吾儒之體正在誤認形而下者為形而上者端猶端倪發端之端源頭處一差所以後來流弊無窮異端云者謂其發端處與吾儒異也若不窮究其發端而徒辨別其流弊彼將曰其所以破佛者乃佛書自不以為然者也徒滋聚訟終難伏辜右五十六章問孔子毋意毋必毋固毋我與佛氏無人相無我相無前念無後念何以別曰聖人之心渾然一團天理凡有應感純是徳性用事心體乾乾淨淨那裏有一毫意必固我若佛氏之無相無念是併天理徳性而一切俱無也安得與吾儒之毋意必固我並論右五十七章問子絶四何不說子絶四絶意絶必絶固絶我又何不說子毋四毋意毋必毋固毋我而曰子絶四毋意毋必毋固毋我何也曰此二字正見聖學所以為妙絶者絶無之詞毋者禁止之詞絶字是説工夫究竟處毋字是說工夫實落處言絶而不言毋是言上達而不言下學不謂之孔子言毋而不言絶是言下學而不言上達亦不謂之孔子用毋字工夫造絶字地位故曰下學而上達此孔子之學所以異于人而知于天也解絶字為無字可解毋字為無字不可右五十八章性者心之生理生之一字乃吾儒論心論性之原故曰天地之大徳曰生又曰生生之謂易乾則大生坤則廣生天地以生物為心而人得之以為心此天理之所以常存而人心之所以不死也吾儒之所謂生指生理生字而言論理不論氣告子之所謂生指生死生字而言論氣不論理謂理離于氣不是謂氣即為理尤不是惟論氣不論理此生之謂性之說所以開異學之端也吾儒言生佛氏亦言生苟不明辨其所以生則儒佛混矣右五十九章問人心至虚不容一物理在何處安得不說理障曰人心至虚不容一物處就是理安得說理在何處而以理為障也異端之所謂理誤指物而言吾儒之所謂理正指不容一物者而言耳右六十章人心之初惟有此理故乍見孺子將入于井皆有怵惕惻隱之心此時固容不得一毫殘忍刻薄之念亦容不得一毫納交要譽之念殘忍刻薄納交要譽雖不同同謂之欲故謂心之本體容不得一毫欲則可謂容不得一毫理則不可蓋人心之初惟有此理豈可說容不得或問如何是理曰即所謂怵惕惻隱之心是也右六十一章思索文字忘其寢食禪家謂之理障余少年正坐此病蓋詩文翰墨雖與聲色貨利之欲不同然溺志于此而迷其本原是亦謂之欲也既謂之欲余方病其為理之障也又安得復歸咎于理哉認欲為理而復歸咎于理誤矣余敢以此為理字雪千載不白之寃右六十二章理障二字固是佛氏差處吾儒不能闢之已不是或又從而附和之何也理之一字乃天地間自然那移不得的道理正程伯子所謂不以堯存不以桀亡者佛氏要減也減不去吾儒要添也添不來只是吾儒指㸃出這箇字如呼寐者而使之寤耳原非專為闢佛而創出此字也且謂之曰理自是無障謂之曰障還不是理可見附和其説者特察理不精之過亦豈有心從彼而甘于異端哉右六十三章問佛氏于性字上添一真字何也曰這箇真字極有說若曰這箇知覺運動的性是真則那箇仁義禮智的性是偽不待言矣不知知覺運動固是真仁義禮智亦不是偽今既以知覺運動為眞以仁義禮智為偽安得不以圓融廣大為真以規矩準繩為偽以恣情縱欲為真以存誠持敬為偽也世俗方坐此病而佛氏又從而羽翼之故至今深入膏肓而不可救藥悲夫右六十四章夫子與曽㸃與其素位而樂天非與其放縱而恣肆也人情方喜放縱而惡檢束而况又以佛氏先入之言為主于是托之春風沂水之樂以騁其放縱恣肆之病至于狼狽決裂蓋亦不少也豈不惜哉善乎康節先生之言曰自有吾儒樂人多不肯尋以禪為樂事又起一重塵右六十五章陽明先生曰君子無入而不自得正以其無入而非學也說得極是若不言學而惟言自得是不深造之以道而欲其自得之也必不得矣舍學求樂舍深造以道求自得此佛老所以誤晉室之諸賢也右六十六章問晉室諸賢皆一代髙才何不知自愛至此曰當時老莊之教盛行人人皆錯認了道理誤以放言肆行蔑棄禮法為真為髙為無心為自然以謹言愼行顧惜名節為矯為偽為有心為沽名所以流蕩忘反至此非明知其非而故蹈之也又問彼獨無良知與曰良知自在只因一念錯認了道理遂大迷終身不悟耳右六十七章世之砥節礪行循規蹈矩而不聞道者誠有之未有真能聞道而遂不砥節礪行循規蹈矩者也執節行規矩而槩以為聞道固不是外節行規矩而別求箇聞道尤不是右六十八章世俗論真在不拘禮法異端論性在絶仁棄義而于禮之一字掊擊尤甚如此病痛牢不可破恰似自古生知的大聖人把一切禮法都丢過任意自家縱横必不似學知的聖人只拘拘在禮法上又恰似禮之一字專為後世迂儒設不為自古大聖人設不知孟子論堯舜性之處却云動容周旋中禮者盛徳之至哭死而哀非為生者經德不回非以干禄言語必信非以正行何也不惟説禮且說動容周旋中禮不惟在大節上要𦂳雖一步一趨一言一動細微曲折衆人容易忽略處都是確然不苟的如此難道說他不是自然性之的聖人可見吾儒論真論性與世俗論真異端論性絶不相同人又奈何以禮為偽為迂以不拘禮法為真為自然哉知此可以祛世俗之障可以破異端之說右六十九章喜事功而厭道徳樂寛大而惡檢束人之常情不知聖賢所以重道德者非薄事功而甘迂濶也以道徳為事功乃真事功也所以重檢束者非惡寛大而甘桎梏也以檢束為寛大乃真寛大也不然厭道徳而喜事功則枉尋直尺併事功亦不能成矣惡檢束而樂寛大則越禮犯法併寛大亦不可得矣于此見聖賢之見逺而世人之計左也右七十章問喜怒哀樂如何見得中節不中節曰我喜而人不以為可喜我怒而人不以為可怒我哀樂而人不以為可哀樂便是不中節我喜而人皆以為可喜我怒而人皆以為可怒我哀樂而人皆以為可哀樂便是中節故曰和也者天下之達道也這句就是發而皆中節謂之和的註解解的何等明白又問何以天下之大本解未發之中曰若不解作中也者天下之大本也則吾儒之未發亦異端之無無亦無矣右七十一章問夜氣之存不存何處驗得曰其日夜之所息平旦之氣其好惡與人相近也者幾希可見好惡與人相近便是喜怒哀樂中節便是夜氣存好惡與人相逺便是喜怒哀樂不中節便是夜氣不存極容易驗大學唯仁人能愛人能惡人是斧斤不曽伐的見賢而不能舉舉而不能先見不賢而不能退退而不能逺是旦晝牿亡的好人之所惡惡人之所好是牿之反覆夜氣不足以存的孟子夜氣之說不是幽深𤣥逺的話說乃天徳王道一貫之學也若丢過好惡只講幾希便落𤣥虚便非孟子之㫖右七十二章問惟心之謂與指的是人心是道心曰心只是一箇心那有兩箇操則存便是道心舍則亡便是人心舍而復操便是道心操而復舍便是人心玩二則字真是出入無時莫知其鄉故曰人心惟危道心惟㣲僅僅十四字解人心道心惟危惟微曲盡其妙真所謂聖人之言也右七十三章聖賢論心不外綱常倫理出處辭受動静語黙于此件件透徹步步踏實才見真心才是真正學問得力處在此用力處亦在此若世俗論心反于放言肆行的人說心地好心上真正佛氏所謂直取無上菩提一切是非莫管也世豈有此理且不知有心學者無論幸而知有心學而又外綱常倫理出處辭受動靜語黙以求心吾不知心學果何時可明也右七十四章問自古有學儒而其人非者有學佛而其人是者何也曰學儒而其人非是其人非也非學儒之過也有學佛而其人是者是其人是也非學佛之效也昔人有誤服砒巴而生者亦有傷食五穀而死者豈砒巴能生人而五榖反死人哉知此可以定儒佛之辨矣右七十五章第七十六章七十七章闕孟子曰性善又曰人皆可以為堯舜可見天生蒸民原都是儒曷嘗分某為儒某為佛哉但後來擇術不精一時誤為所惑遂叛儒習佛始自逺于吾儒耳非生來性惡而不可為儒為堯舜也孔子曰性相近也習相逺也其㫖深矣右七十八章世之論善惡禍福報應皆歸之佛氏此大不然積善之家必有餘慶積不善之家必有餘殃作善降之百祥作不善降之百殃惠廸吉從逆凶非吾儒之言耶羿善射奡盪舟皆不得其死然禹稷躬稼而有天下又指其人以實之矣至于史傳所載尤為章明較著蓋善惡禍福報應昭昭不爽此自是天地間實理實事原非幻妄原非渺冥故曰夫微之顯誠之不可揜如此夫曰誠者言其實有此理實有此事也彼佛氏之說恠誕不經誠不足道而或者乃以天地間如此實理實事反歸之佛豈未聞吾儒餘慶餘殃之說耶語云一念而善景星慶雲一念而惡妖氛厲鬼嗚呼嚴矣右七十九章栽培傾覆正是體物不遺處此所以中庸鬼神章後即言報應大徳受命天地何心鬼神何心人亦何心只是一理之自然感召耳而或者朝脩徳而夕望報一或不應輒以為天地間無善惡報應之事不知一為報而脩徳又是偽又不是誠如何能感召天地故曰居易以俟命必居易以俟命而無一毫望報之心才謂之誠才謂之徳才能受命大徳必受命是論其理居易以俟命是論其心且如禹稷躬稼而有天下禹既以身報矣稷至十六傳而子孫始有天下稷即大徳難道以其身强與造化爭只得居易以俟可見君子居易以俟命正是道理合當如此彼不務安命而行險以徼幸真小人而愚者也右八十章子思前説鬼神之為徳也其盛矣乎後便說質諸鬼神而無疑可見不質鬼神不可以言學詩云相在爾室尚不愧于屋漏神之格思不可度思矧可射思兩引之以為證又可見不慎獨不可以質鬼神程子曰有天徳便可語王道其要只在謹獨嗚呼盡之矣右八十一章夫學一也有異端之學有越俎之學有操戈之學何謂異端之學佛老是也而佛氏為甚二氏非毁吾儒不遺餘力乃巧于非學之尤者而講學者多誤信之故不可不辨何謂越俎之學吾儒講學所以明道也講間惟當泛論道理如孔子論明徳新民子思論天命率性孟子論夜氣性善皆是泛論何嘗着跡譬如白日當天在在皆其所臨照時雨霑足處處皆其所潤澤非專為某人某人而照某人某人而雨也無論居官居鄉當講學日不得議及他事論及他人方得講學家法不然是以議事當講學以論人當講學也不幾于越俎而失體哉何謂操戈之學吾儒學問當以孔子為宗而顔曽思孟周程張朱皆誦法孔子後學所由以津梁洙泗者也若曰學當以孔子為宗而周程張朱皆不足法即此一念去學千里矣以周程張朱為非以孔子為是是孔子特不敢非耳若孔子可非則亦非之矣非宋儒而宗孔子亦非真宗孔子者也且非宋儒而獨宗孔子是其心以孔子自任也以孔子為宗則可以孔子自任則不可即此一念去學萬里矣况此心一慣其勢不至併孔子而非毁之不已也又何以為宗孔子耶世之非學者方且非毁宋儒而我又從而附和之不幾于操戈而入室哉蓋異端可駁也而以駁異端者駁時事則為越俎異端可闢也而以闢異端者闢宋儒則為操戈此尤人情之異流學術之隠病不可不亟辨者也嗚呼不講學者無論即躬行講學毅然以聖道自任者多坐此病而反令非學者借為口實其所關係不小異端之病余于録中已詳辨而越俎操戈之病則未之及也因書此與同志共戒之馮從吾又書夫謂之學以學道也然道一而巳矣而學則多岐焉故學不可不辨也明辨之先于篤行也孔門之正宗也故卑之而功利也易辨也惟髙之而寂空也難辨也何者此性命彼亦性命此生死彼亦生死混之而無別淆之而不清非深于聖道者不能析其弊而歸之正余少有志于學中間亦為異教所溺者數年近始悟而反之乃知吾道至足亦至精也歲乙已至長安訪少墟馮兄而商正之遂留余精舍中頗久日為辨難毎至夜分喜而忘倦其髙足弟子亦鱗鱗共集話也余稍發其端少墟則大闡其藴辨虚實有無邪正幾微之介昭然如明鑑之燭鬚眉不爽也此非深于道者乎則其開我之迷而鼔我之趨者益誠不淺矣余別後少墟乃述其言次第成篇共八十一章傳之宇内則所以指導來學者功豈細耶嗚呼有志于學者其尚毋忽于斯言友弟岐陽張舜典謹䟦少墟集巻一
